<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>College and Career Night, Family RSVP</title>
<style>
 body{margin:0;font-family:Calibri,'Segoe UI',Arial,sans-serif;background:#eef2f6;color:#26323c}
 .card{max-width:660px;margin:30px auto;background:#fff;border-radius:12px;overflow:hidden;
   box-shadow:0 2px 10px rgba(0,0,0,.06)}
 .top{background:#1F3A5F;color:#fff;padding:24px 28px}
 .top h1{margin:0;font-size:23px} .top p{margin:6px 0 0;color:#cdd9e6;font-size:14px}
 form{padding:24px 28px}
 label{display:block;font-size:14px;font-weight:bold;margin:14px 0 6px;color:#33414d}
 input[type=text],input[type=email],select,textarea{width:100%;padding:10px;border:1px solid #c8d0d8;
   border-radius:8px;font-size:14px;font-family:inherit}
 .check{font-weight:normal;display:flex;align-items:center;gap:8px;margin:6px 0}
 .grp{background:#f5f8fb;border-radius:8px;padding:10px 14px;margin-top:6px}
 button{margin-top:20px;background:#2E6E6A;color:#fff;border:0;border-radius:8px;padding:12px 22px;
   font-size:15px;cursor:pointer}
 .note{font-size:12px;color:#7a828a;margin-top:14px}
</style></head><body>
<div class="card">
 <div class="top"><h1>College and Career Night</h1>
  <p>Henrico Fields Middle School, Thursday November 12, 2026, 5:00 to 8:00 PM</p></div>
 <form action="#" method="post">
  <label for="fam">Family last name</label>
  <input type="text" id="fam" name="fam" required>
  <label for="stu">Student first name</label>
  <input type="text" id="stu" name="stu" required>
  <label for="grade">Grade</label>
  <select id="grade" name="grade"><option>8th grade</option><option>7th grade</option>
   <option>6th grade</option></select>
  <label for="count">How many attending</label>
  <input type="text" id="count" name="count" value="2">
  <label>Tables you most want to visit</label>
  <div class="grp">
   <div class="check"><input type="checkbox" id="t1"><label for="t1">Health careers</label></div>
   <div class="check"><input type="checkbox" id="t2"><label for="t2">Skilled trades</label></div>
   <div class="check"><input type="checkbox" id="t3"><label for="t3">Technology</label></div>
   <div class="check"><input type="checkbox" id="t4"><label for="t4">Arts and design</label></div>
  </div>
  <label for="lang">Handout language</label>
  <select id="lang" name="lang"><option>English</option><option>Spanish</option></select>
  <label for="q">A question for the counseling booth</label>
  <textarea id="q" name="q" rows="3"></textarea>
  <button type="submit">Send my RSVP</button>
  <div class="note">Your reply goes to the counseling office only. We do not share family
  contact information.</div>
 </form>
</div></body></html>
