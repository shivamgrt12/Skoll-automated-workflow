<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booster Fundraising Tracker</title><style>
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f6f8;color:#22303c}
header{background:#0f2b46;color:#fff;padding:20px 28px}header h1{font-size:1.3rem}
.wrap{max-width:900px;margin:24px auto;padding:0 18px}
.total{background:#fff;border-radius:12px;padding:26px;box-shadow:0 3px 10px rgba(0,0,0,.06);text-align:center;margin-bottom:22px}
.total .big{font-size:2.6rem;font-weight:bold;color:#0f2b46}.total .sub{color:#6b7885;margin-top:6px}
.track{background:#e3e8ee;border-radius:10px;height:26px;margin-top:18px;overflow:hidden}
.fill{background:#c89b2c;height:26px;text-align:right;color:#0f2b46;font-weight:bold;font-size:.8rem;line-height:26px;padding-right:8px}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 3px 10px rgba(0,0,0,.06)}
th,td{padding:11px 12px;text-align:left;border-bottom:1px solid #eef1f4;font-size:.9rem}
th{background:#0f2b46;color:#fff;font-size:.75rem;text-transform:uppercase}
td.amt{text-align:right;font-weight:bold;color:#0f2b46}
</style></head><body>
<header><h1>Ridgemont Rams Booster Club, 2026 to 2027 Campaign</h1></header>
<div class="wrap">
<div class="total"><div class="big">$21,700 raised</div><div class="sub">Goal $31,000</div>
<div class="track"><div class="fill" style="width:70%">70 percent</div></div></div>
<table><tr><th>Event</th><th>Date</th><th>Net Raised</th></tr>
<tr><td>Season kickoff cookout</td><td>Aug 22, 2025</td><td class="amt">$4,200</td></tr>
<tr><td>Fall concessions stand</td><td>Oct 30, 2026</td><td class="amt">$6,800</td></tr>
<tr><td>Spirit wear sales</td><td>Nov 1, 2026</td><td class="amt">$3,500</td></tr>
<tr><td>Alumni golf outing</td><td>Nov 7, 2026</td><td class="amt">$7,200</td></tr>
<tr><td>Winter raffle in progress</td><td>Dec 2026</td><td class="amt">$0</td></tr>
</table></div></body></html>
