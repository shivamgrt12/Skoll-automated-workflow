# Prompt-stage QC severity map (config schema for the QC team).
# Keys are gate filenames in this folder. Value "block": a failing gate stops
# the run. Value "warn": a failing gate is reported only. Unlisted gates default
# to block. Every gate here blocks, including the heavy-turn word count.
severity:
  10_no_redundant_context.md: block
  # Deterministic backstops for the two defects the .md judges rationalise:
  # enumerated deliverable lists and leaked cross-source resolution rules.
  15_no_deliverable_list.py: block
  18_no_reconciliation_rule.py: block
  20_difficulty_and_subagents.md: block
  30_word_count.py: block
  # English-only enforcement: taskers reported prompts generated in the persona's
  # native language; this deterministic gate blocks any non-English prompt.
  35_language_check.py: block
  40_no_solution_leak.md: block
  50_persona_alignment.md: block
  60_prompt_qc_vendor.py: block
  70_prompt_qc_review.md: block
