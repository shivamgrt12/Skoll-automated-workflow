# Mid-stage QC gate severity map for the rubric stage (runs right after
# work/rubric.json is generated, before later stages spend tokens). Any gate
# NOT listed defaults to "block". Set a gate to "warn" to make its failure
# non-blocking. Keys are the gate filenames in this folder.
severity:
  10_rubric_qc.md: block

# Per-gate context (symbolic dirs handed to the fix/verify model call). Tokens:
# work, input, home, task, mock_data, harness. Omitted gate keeps full context.
# The rubric auditor reads rubric/test artifacts (work) and verifies fabricated
# values against the mock data.
context:
  10_rubric_qc.md: [mock_data, work]
