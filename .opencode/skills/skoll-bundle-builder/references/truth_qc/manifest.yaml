# Mid-stage QC gate severity map for the truth stage (runs right after
# work/TRUTH.md is generated). Any gate NOT listed defaults to "block". Set a
# gate to "warn" to make its failure non-blocking. Keys are the gate filenames
# in this folder.
severity:
  10_truth_qc.md: block

# Per-gate context (symbolic dirs handed to the fix/verify model call). Tokens:
# work, input, home, task, mock_data, harness. Omitted gate keeps full context.
# TRUTH.md is measured against the whole bundle: persona (input), data (home),
# mock_data, and the work artifacts. Only task is dropped (the gate never reads it).
context:
  10_truth_qc.md: [input, home, mock_data, work]
