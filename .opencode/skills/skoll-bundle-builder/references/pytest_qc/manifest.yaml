# Mid-stage QC gate severity map for the pytest stage (runs right after
# work/test_outputs.py + work/test_weights.json are generated). Any gate NOT
# listed defaults to "block". Set a gate to "warn" to make its failure
# non-blocking. Keys are the gate filenames in this folder.
severity:
  10_test_outputs_qc.md: block
  20_route_needle_check.py: block
  25_no_file_content_check.py: block

# Per-gate context (symbolic dirs handed to the fix/verify model call). Tokens:
# work, input, home, task, mock_data, harness. Omitted gate keeps full context.
# The auditor reads test artifacts (work) plus the data/ files (home at this
# stage); the needle check has its own harness resolver so it only needs work.
context:
  10_test_outputs_qc.md: [home, work]
  20_route_needle_check.py: [work, harness]
  25_no_file_content_check.py: [work]
