# Mid-stage QC gate severity map for the mock-data selection (runs right after
# the prompt stage resolves work/api_selection.json, before later stages spend
# tokens). Any gate NOT listed defaults to "block". Set a gate to "warn" to make
# its failure non-blocking. Keys are the gate filenames in this folder.
severity:
  10_mock_data_selection_qc.md: block
  # Persona alignment + enrichment + cross-file consistency. Fails drive the
  # values-only enrichment auto-fix; a residual failure after the fix budget
  # halts so a human aligns the data rather than shipping a misaligned bundle.
  20_mock_data_alignment_qc.md: block

# Per-gate context (symbolic dirs handed to the fix/verify model call). Tokens:
# work, input, home, task, mock_data, harness. Omitted gate keeps full context.
# Selection reads the mock_data catalogue; alignment also reads the persona.
context:
  10_mock_data_selection_qc.md: [mock_data, work]
  20_mock_data_alignment_qc.md: [input, mock_data, work]
