  ## Preferences
  - **Coffee**: Black, strong, no sugar, brewed in a stovetop Moka pot. He judges drip coffee silently.
  - **Food and drink**: Ukrainian home cooking (borscht every Sunday, varenyky, holubtsi, chicken Kyiv), his own honey in tea, oatmeal, and marinades, charcoal-only grilling with shashlik for summer gatherings. Drinks moderately: horilka on special occasions, Yuengling Lager with Vasyl after fishing.
