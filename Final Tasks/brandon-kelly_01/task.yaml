  ## MEMORY.md

  # Memory: Brandon Kelly

  ## Personal Profile
  Brandon Kelly is a Ukrainian-American master electrician who emigrated from Kharkiv, Ukraine in 1996 at age 27 and became a naturalized US citizen in 2003. He anglicized the family surname to Kelly at naturalization; the family name in Kharkiv was Kovalenko, and "Brandon" was the English given name he adopted for the same reason. He built his life in Philadelphia with his hands, starting with almost nothing, and that self-made, stubbornly self-reliant streak runs through everything he does. He holds a Diploma in Electrical Engineering from Kharkiv Polytechnic (1990), a journeyman certification completed through the Ridgemont Technical Institute apprenticeship program (1999), and a Commonwealth of Pennsylvania Master Electrician License (2001).

  Culturally he is deeply Ukrainian: he cooks from memory, listens to Okean Elzy and Ukrainian-language radio while he works, talks to his bees in a mix of Ukrainian and English, and keeps a jar of Ukrainian honey on the shelf he never opens. He is nostalgic without being sentimental and waves off questions about the old country. He carries quiet grief for his late wife Nataliya and constant worry for his mother Halyna in Kharkiv. He is tender with living things and slow to show the same warmth to people, with a small circle of trust and a high bar for entry. His philosophy is simple: do the work right, owe no one, and show up at 2 AM for the few you call family.

  ## Key Relationships
  - **Andriy Kelly (son)**: 32 (born March 15, 1994), HVAC technician at Ridgecrest Mechanical in Baltimore, divorced, father of Mila. He and Brandon talk weekly but keep it to logistics and sports; neither has known how to go deeper since Nataliya died.
  - **Katya Kelly (daughter)**: 28 (born November 2, 1997), graphic designer at Foxpoint Creative in Brooklyn, single. Calls Brandon two to three times a week, more emotionally open than Andriy, and worries about him living alone.
  - **Mila Kelly (granddaughter)**: 4 (born November 24, 2021), Andriy's daughter, lives in Baltimore with her mother (Andriy has her every other weekend). Brandon drives down once a month to see her. She calls him "Dido."
  - **Halyna Kelly (mother)**: 81 (born December 12, 1944), lives alone in Kharkiv, Ukraine. Brandon sends $400 a month and calls every Sunday by WhatsApp video. Her health is declining (cataracts, arthritis) and she refuses to leave Kharkiv.
  - **Vasyl Bondarenko (best friend)**: 60 (born January 18, 1966), fellow Ukrainian immigrant, retired machinist in Northeast Philadelphia. They fish together, drink coffee at the Ridgemont Diner, and argue about chess openings.
  - **Nataliya Kelly (late wife)**: Born August 14, 1971; passed away in 2022 from pancreatic cancer at age 51. Married 28 years. Brandon rarely speaks of her but keeps her garden exactly as she left it.
  - **Roman Tkachuk (chess club VP)**: 63, retired Thornfield University math professor, co-founded the Bridgeton Chess Club with Brandon 8 years ago, handles tournament logistics.
  - **Darren Yates (apprentice)**: 24, second-year electrical apprentice. Eager but sometimes careless; Brandon is hard on him because he sees potential.
  - **Irina Polishchuk (community friend)**: 55, runs the Ukrainian Cultural Center on Cottman Avenue, organizes community events, occasionally asks Brandon for electrical volunteer work.
  - **Steve Hoffman (accountant)**: 52, CPA at Kelford & Associates, has handled Kelly Electric taxes and bookkeeping for 12 years.

  ## Work & Projects
  Kelly Electric LLC is a sole proprietorship (with occasional apprentice help) doing residential and small commercial electrical work in the Philadelphia metro and surrounding suburbs (Bucks, Montgomery, Delaware counties). Brandon has been a licensed Pennsylvania Master Electrician for over 20 years; the license was renewed in 2025. He carries general liability and workers comp through Ridgemont Business Insurance. Specialties are residential panel upgrades, whole-house rewiring of older Philadelphia homes, EV charger installations, and small commercial work. Typical workload is three to four active jobs at a time, booked four to six weeks out, at $95 an hour for standard work and flat-rate bids on large projects. Darren Yates assists on larger jobs at $22 an hour.

  Beekeeping: 12 colonies on the half-acre lot in Fox Chase, with a spring harvest (late May to early June) and a late summer harvest (August). He sells at the Briarwood Farmers Market (Saturdays, April through October) and supplies Cedarbrook General Store and the Ridgemont Co-op. He produces about 600 lbs of honey a year for roughly $6,000 to $8,000 in revenue, and belongs to the Southeastern Pennsylvania Beekeepers Guild.

  Chess club: Brandon is president (elected 2022) of the Bridgeton Chess Club, 40 members meeting Wednesdays 6:30 to 9 PM at the Ridgemont Community Center. He handles scheduling, new-member orientation, and club finances. The club hosts two annual tournaments, the Spring Open (March) and the Fall Classic (October). Dues are $50 a year per member; he manages club funds in a dedicated checking account at Brightpath Credit Union, with the ledger snapshot tracked in the `chess_club_budget_summary.xlsx` workbook and the live balance visible through the Plaid feed.

  ## Finance
  - **Kelly Electric**: about $135,000 a year gross, about $85,000 net after expenses, materials, insurance, and Darren's wages.
  - **Honey sales**: about $7,000 a year. Total annual income about $92,000 net.
  - **Home**: Fox Chase house owned free and clear (bought 2004 for $165,000, now worth about $310,000). Property taxes $3,200 a year.
  - **Truck**: 2017 F-150, paid off.
  - **Insurance**: business insurance $2,400 a year; ACA marketplace health plan at $480 a month with subsidy, $6,500 deductible.
  - **Monthly to Halyna**: $400 via Western Union.
  - **Utilities** about $220 a month; **phone** $65 a month; total monthly spend about $3,200.
  - **Savings**: $48,000 in savings and $12,000 in checking at Brightpath Credit Union; $165,000 in a SEP-IRA at Brightpath Financial (about $8,000 a year contributions); $250,000 term life policy with Andriy and Katya as beneficiaries.
  - **Style**: Frugal, cash-oriented, suspicious of debt, saves aggressively, spends on bee equipment and chess books.

  ## Health & Wellness
  - **Primary care**: Dr. Patricia Wynn at Ridgemont Family Medicine. Last physical January 2026.
  - **Back**: Chronic lower back pain from decades of physical work, managed with stretching, ibuprofen, and a heating pad.
  - **Knee**: Right knee replacement planned. Consultation at Greenleaf Orthopedic Associates (Dr. Ramos), with surgery likely scheduling for late summer.
  - **Blood pressure**: Borderline high (138/88 at last check), on lisinopril 10mg.
  - **Cholesterol**: Slightly elevated, managed with diet (less salo, more fish).
  - **Vision**: Reading glasses (+2.00); keeps three pairs because he loses them.
  - **Dental**: Overdue, last visit 2024.
  - **Sleep**: In bed by 10 PM, up by 5:30 AM, often awake at 4:30 with worry; 6 to 7 hours average. Working the hives is his closest thing to meditation. He carries grief and worry quietly and would never see a therapist voluntarily.
  - **Diet (medical)**: No food allergies; avoids overly spicy food; reducing salo and salt for cholesterol.

  ## Interests & Hobbies
  - **Chess**: Plays daily online (Lichess, rated about 1850), runs the club, and competes in regional amateur tournaments two to three times a year. Takes losses personally and replays games in his head for days.
  - **Beekeeping**: His passion and his calm; worries over each colony like family.
  - **Woodworking**: Builds his own hive boxes and frames in the garage shop and recently started making cutting boards as gifts.
  - **Reading**: Chess strategy (Nimzowitsch's "My System," Dvoretsky), beekeeping journals, Ukrainian literature (Shevchenko, Franko), and John le Carre spy novels.
  - **Music**: Okean Elzy, DakhaBrakha, the pianist Sviatoslav Richter, Lysenko's classical compositions, and classic rock on the job site.
  - **Fishing**: Three to four times a year on the Schuylkill River or in the Pine Barrens with Vasyl, more about the quiet than the catch.
  - **Cooking**: Borscht, varenyky, and holubtsi from memory; his salo recipe is famous in the Ukrainian community.

  ## Home & Living
  - A 3BR/1.5BA row house in Fox Chase, Philadelphia, owned outright since 2004.
  - Half-acre backyard with the 12 beehive colonies, Nataliya's garden (kept exactly as she left it), and a small tool shed.
  - Detached garage converted to a woodworking shop: table saw, drill press, hand tools, and a frame drying rack.
  - The house is clean but dated; the kitchen was last updated in 2008 and the bathroom needs work, both perpetually "next year."
  - Nataliya's reading chair sits untouched in the living room, some of her things remain in the closet, and family photos cover every surface.
  - A quiet block of mostly older residents; Brandon knows everyone and shovels Mrs. Kowalski's sidewalk in winter.

  ## Devices & Services
  - **iPhone 13**: Primary device, cracked case, peeling screen protector. Refuses to upgrade because "it works."
  - **Dell laptop (5 years old)**: Invoices, email, chess analysis, and bookkeeping.
  - **Work truck**: 2017 Ford F-150 with custom tool racks, 89,000 miles.
  - No tablet and no smart home devices: "I wire other people's smart homes, I don't need one."
  - Owns a stovetop Moka pot, charcoal grill, and his grandfather's pocket knife among his prized small things.

