  ## MEMORY.md

  # Memory: Anthony Cross

  ## Personal Profile

  Anthony is a former commercial shrimp-boat fisherman who runs Bayshore Sustainable Aquaculture on Clear Lake Shores, Texas, with his business partner Derek Patterson. He lives alone in a small clapboard cottage on the leased waterfront property near NASA Road 1, with a screened porch overlooking the channel and a workshop out back where he restores a 1978 Carolina Skiff in slow hours.

  He is Anglo-American with four generations of Galveston Bay and League City roots, the family originally from Yorkshire, England. He holds a high school diploma from Clearwater High School in League City (2011), an Aquaculture Business Certificate from Gulf States Institute Online (2022), and ongoing Marine Biology continuing-education coursework at Brazosport University extension. He speaks English only.

  He spent ten years on commercial shrimp boats, including his father's boat the Margaret Anne, before transitioning to aquaculture in 2023. The shift was driven by watching estuary collapse and habitat destruction firsthand, not by ideology. The transition strained his relationship with his father, who views the move as a betrayal of the family trade.

  He is quietly superstitious in ways he would deny if pressed (no Friday tank-cycle starts, a specific dock knot, his grandfather's pocket knife in the truck). He processes emotion through labor: built three grow-out tanks the week the divorce papers arrived, repaired the entire dock when his dog died. He reads marine biology journals and Wendell Berry essays alongside Patrick O'Brian novels, mostly keeps it to himself because the marina crowd does not run book clubs. He has a complicated relationship with the gentrification of Galveston, where the channels he fished as a kid are now condo developments.

  ## Key Relationships

  - **Nathan Cross (son)**, age 9 (DOB March 15, 2017). In 4th grade in Austin, smart and curious, loves the shrimp tanks, asks a million questions about water chemistry. Custody is every other weekend, alternating holidays, and one month in July.
  - **Jennifer Cross née Taylor (ex-wife)**, age 33 (DOB February 8, 1993). Hospital administration at Hillcrest Healthcare in Austin. Amicable co-parenting, communication strictly logistical. Divorced 2023.
  - **Margaret Cross (mother)**, age 62 (DOB December 6, 1963). Retired school cafeteria manager, lives in League City, regular at Bayside Methodist Church, Anthony's moral compass and the one person who can tell him he is wrong and have him actually listen.
  - **Robert Cross (father)**, age 65 (DOB March 20, 1961). Still runs the shrimp trawler Margaret Anne out of Kemah, views Anthony's aquaculture work as a betrayal of the family trade. Talks happen but stay strained.
  - **Tyler Cross (brother)**, age 28 (DOB November 22, 1997). Bartender in downtown Galveston, easygoing, mediates between Anthony and Robert. Lives above the bar.
  - **Rachel Cross (sister)**, age 37 (DOB March 30, 1989). Nurse at Bayview Healthcare in League City, married with two kids, the sibling Anthony is closest to. Practical and no-nonsense.
  - **Derek Patterson (business partner)**, age 39 (DOB October 11, 1986). Marine biologist turned entrepreneur, handles science and R&D while Anthony handles operations and sales. 50/50 ownership. Met at an aquaculture conference in 2021.
  - **Pastor David Mitchell**, 68. Pastor at Bayside Methodist Church on Bolivar Peninsula. Has known the Cross family for decades.
  - **Chef Marcus Rivera**, 38. Executive chef at The Boathouse, Bayshore's primary client at 80% of oyster harvest. Demanding but fair.
  - **Bill Carpenter (dock neighbor)**, 55. Gulf War-era Navy vet, runs a small charter fishing operation next dock over. Teaches Anthony carpentry tricks, watches the property when Anthony is away.
  - **Dr. Sarah Hutchins**, 42. Veterinarian and aquaculture consultant at Lonestar Foundation Aquaculture Extension. On call for disease outbreaks and biosecurity.
  - **Ray Kendall**, 60. Owns Kendall Marine Supply in Dickinson. Gives Anthony a break on pricing because he knew Robert.
  - **Jake Dawson**, 25. Full-time farm hand at Bayshore.

  ## Work & Projects

  - **Role**: Co-owner and Operations Manager, Bayshore Sustainable Aquaculture, LLC.
  - **Business partner**: Derek Patterson (50/50 ownership).
  - **Tenure**: 2 years (started January 2024).
  - **Operation**: Pacific white shrimp (Litopenaeus vannamei) in recirculating aquaculture systems plus Eastern oysters (Crassostrea virginica) in rack-and-bag systems in permitted tidal lease areas.
  - **Site**: 2-acre leased waterfront on Clear Lake Shores with RAS building, nursery, grow-out tanks, oyster processing shed, and dock access.
  - **Production**: ~8,000 lb shrimp per year (4 cycles), ~50,000 oysters per year.
  - **Clients**: The Boathouse (Chef Marcus Rivera, primary, 80% of oyster harvest), 4 other Galveston restaurants, Saturday farmers' market at the Galveston Strand.
  - **Staff**: Jake Dawson (full-time farm hand), one part-time delivery driver shared with another farm.
  - **Year 2 of operations**, not yet profitable. Running on the Lonestar Foundation Small Business Innovation Grant ($75,000 over 2 years, year 2) plus restaurant revenue.
  - **Current challenge**: Scaling production to meet restaurant demand without overextending cash flow; TPWD permit renewal for oyster lease expansion in progress.
  - **Career timeline**:
    - June 2011 to August 2013: Deckhand, Margaret Anne (Robert Cross's shrimp trawler), Kemah waterfront.
    - September 2013 to December 2018: Deckhand and second captain, various commercial shrimp boats out of Galveston and Freeport.
    - January 2019 to December 2021: Captain, F/V Bay Runner (shrimp trawler), Galveston.
    - January 2022 to December 2023: Transition year. Aquaculture Business Certificate (Gulf States Institute Online, 2022); planning and capital assembly with Derek Patterson.
    - January 2024 to present: Co-owner and Operations Manager, Bayshore Sustainable Aquaculture.

  ## Finance

  - Salary from Bayshore: $36,000 per year (reinvests most revenue into the business).
  - Bayshore revenue: ~$145,000 projected 2026, up from $98,000 in 2025.
  - Bayshore expenses: ~$130,000 (feed, energy, lease, staff, equipment, insurance, permits).
  - Lonestar Foundation grant: $37,500 remaining (year 2 of 2, disbursed quarterly).
  - Bayshore operating balance: ~$18,000, fluctuates with harvest cycles.
  - Personal monthly expenses total about $2,430: cottage included in waterfront lease ($2,200/month total paid by Bayshore), truck payment $380 (2020 Ford F-150, ~$9,500 owed), child support $600 (court-ordered, based on 2022 trawler income), health insurance $295 (ACA Bronze, $7,000 deductible), auto and boat insurance $210, groceries $350, child expenses on Nathan visits ~$200, gas/fuel $250, phone/internet $115, subscriptions $30.
  - Personal savings: $4,200 in Gulf Coast Credit Union.
  - Retirement: none currently; no 401(k), no IRA. Keeps him up at night.
  - Financial goals: Bayshore to profitability by Q4 2026, personal emergency fund to $10,000, open a Roth IRA, request child-support modification reflecting current income.

  ## Health & Wellness

  - **Conditions**: Chronic left knee pain from years of working wet pitching decks; wears a brace on bad days, ices after heavy work. Pre-cancerous actinic keratosis spots removed from forearms and nose in 2024. No prescription medications.
  - **Medications**: Glucosamine for the knee, daily multivitamin.
  - **Skin care**: SPF 50 daily, long sleeves on the water, biannual derm checks.
  - **Primary care**: Dr. James Franklin, Bayside Health, League City.
  - **Dermatology**: Dr. Linda Morrison, Lakewood Wellness, Galveston.
  - **Exercise**: Manual labor is the exercise. Kayaks 3 to 4 mornings a week at dawn as recreation and meditation.
  - **Sleep**: 9:30 PM to 4:45 AM. Sleeps hard, rarely has trouble.
  - **Mental health**: Generally stable. Does not see a therapist but probably should. The divorce hit harder than he admits. Talks to Margaret and Bill Carpenter when things get heavy.
  - **Family health context**: Nathan has mild asthma (albuterol PRN, managed well, pediatrician in Austin). Margaret has osteoarthritis in both hips (naproxen PRN), sees Dr. Franklin. Robert refuses regular care; chronic shoulder injuries from trawling and hearing loss from engine noise.

  ## Interests & Hobbies

  - **Fishing**: Redfish, speckled trout, and flounder in Galveston Bay and Clear Creek. Takes Nathan whenever he visits.
  - **Boatbuilding and repair**: Restoring a 1978 Carolina Skiff in the workshop. Slow, therapeutic.
  - **Woodworking**: Built most of the furniture in the cottage. Workshop shares space with aquaculture equipment storage.
  - **Reading**: Marine biology, sustainable agriculture, Patrick O'Brian's Aubrey-Maturin series, Wendell Berry essays. Currently reading Braiding Sweetgrass by Robin Wall Kimmerer.
  - **Cooking**: Gulf Coast classics including shrimp and grits, gumbo, oyster po'boys, red beans and rice, fried catfish. Uses his own shrimp and oysters.
  - **Kayaking**: Paddles the channels around Clear Lake Shores at dawn. Knows every tidal channel by heart.
  - **Teaching**: Volunteers at the Galveston County extension office, runs free aquaculture workshops for commercial fishermen considering the transition.

