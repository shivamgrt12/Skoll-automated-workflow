  # Heartbeat: Anthony Cross

  ## Recurring Events

  ### Daily
  - **5:00 AM Central**: Water quality check at the RAS building. Log DO, pH, salinity, and temperature to the YSI spreadsheet on Drive.
  - **5:00 to 8:00 AM Central**: Sacred work time. Phone in the truck, no surfaces unless tide, harvest, or restaurant delivery makes it urgent.
  - **9:30 PM Central**: Lights out. Surface any next-day prep notes by 8:30 PM.

  ### Weekly
  - **Monday**: Morning routine plus full systems check by 5:00 AM. Feed schedule 7:00 AM. Office and admin 9:00 AM to noon for invoices, email, and orders. Afternoon equipment maintenance or oyster rack work, tide dependent.
  - **Tuesday**: Morning routine. Delivery day. Truck loaded with restaurant orders, deliveries to The Boathouse and two other restaurants by 10:00 AM. Afternoon nursery work and seeding trays. Evening free.
  - **Wednesday**: Morning routine. Derek Patterson on site for water chemistry and system optimization. Afternoon extension office workshop prep or grant paperwork. 6:45 PM reminder for the 7:00 PM call with Nathan.
  - **Thursday**: Morning routine. Harvest day when the shrimp cycle is ready. Processing and packing. Second delivery run if needed. Afternoon maintenance and repairs.
  - **Friday**: Morning routine. Farmers' market prep in the evening. 4:00 PM weekly P&L review, supply ordering, and accounting. Afternoon boat work or skiff project.
  - **Saturday (in market season)**: 5:30 AM reminder for farmers' market load-out. Galveston Strand booth 7:00 AM to 1:00 PM. Afternoon Nathan weekend starts on alternating Saturdays with pickup from Brenham meeting point at 11:00 AM. Off-weekend Saturdays: fishing, boat restoration, or reading.
  - **Sunday**: Dawn kayak when weather and tide allow. Methodist service with Margaret at Bayside Methodist when on a Nathan-off weekend. Sunday dinner at Margaret's house. Drop Nathan back to Brenham on Nathan-on Sundays.

  ### Monthly
  - **1st of each month**: Review the Bayshore operating balance and the personal monthly budget.

  ### Quarterly
