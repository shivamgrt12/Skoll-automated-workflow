  # Memory: Charles Ferguson

  ## Personal Profile
  Charles is a third-generation Scottish-American. His grandparents emigrated from Edinburgh, and he grew up in a tight-knit Scots-Presbyterian community in northeast Ohio, raised on a Presbyterian work ethic of thrift and quiet competence. That heritage still shapes his worldview, and the family kept Scottish traditions while fully assimilating into Ohio working-class life.

  He has a quiet intensity. Decades of precision machining trained him to measure twice and cut once in everything he does. He is patient and methodical, respecting process over shortcuts whether shaping titanium or turning a bowl. He is stoic but warm, rarely saying "I love you" and showing it instead through fixing things, coaching, and cooking. He is stubborn about doing things the right way and will redo a part three times rather than ship something marginal. He is protective of family privacy and does not overshare.

  Education: AS in Manufacturing Technology from Harborfield Community College (1993), journeyman machinist certification through Ridgemont's apprenticeship program (2003), and multiple CNC programming certifications (Fanuc, Mazak, Haas) earned 2004 through 2010.

  ## Key Relationships
  - **Margaret "Meg" Ferguson (wife)**: born March 18, 1975 (age 51), school librarian at Lakeview Elementary in Crestwood Local Schools. Steady and organized, handles most household scheduling.
  - **Ryan Ferguson (son)**: born January 7, 2002 (age 24), software engineer at Brackenridge Solutions in Columbus. Moved out two years ago, calls weekly, vegetarian since college.
  - **Sarah Ferguson (daughter)**: born February 22, 2007 (age 19), sophomore at Thornfield College studying marine biology. Lives on campus, home some weekends, loves her dad's brisket.
  - **Dorothy Ferguson (mother)**: born October 29, 1944 (age 81), lives alone in Parma, retired seamstress. Increasing forgetfulness and Charles worries about early dementia. Independent but slowing down.
  - **Robert Ferguson (father, deceased)**: was a greater-Cleveland contractor for 40 years, passed in 2021 from stomach cancer. Charles still maintains his shop tools.
  - **Karen Mitchell (sister)**: born December 5, 1976 (age 49), nurse in Cincinnati, visits Dorothy monthly when she can.
  - **Tom Kowalski (coworker and friend)**: 55, fellow senior machinist at Ridgemont and fishing buddy.
  - **Coach Bill Hartman**: 47, retired firefighter, the head coach Charles has assisted in Little League for four seasons.
  - **Walter Brennan (woodturning mentor)**: 74, retired landscape architect and master turner, met through the guild.
  - **Pastor Jim Crawford**: leads Crestwood Presbyterian Church where Dorothy attends and Charles helps with the Fall Highland Festival.
  - **Dylan Peters**: 23, Charles's second-year apprentice at Ridgemont, shows real promise.

  ## Work & Projects
  Worked as a manual machinist at Lakewood Precision Tooling from 1993 to 1999 after completing his AS degree. Senior CNC Machinist and Shop Floor Lead at Ridgemont Aerospace in Brook Park, OH since 1999, 27 years at the company, shop floor lead for 12. He programs and operates 5-axis CNC mills (Mazak Integrex) to machine precision titanium and aluminum components for satellite buses and launch-vehicle interstages, with tolerances in ten-thousandths of an inch. Schedule is Monday to Friday 7:00 AM to 3:30 PM with occasional Saturday overtime during launch windows, and a 20-minute commute. He leads the precision cell of four operators on a team of eight machinists. Current work is machining thermal shield brackets for the Orion-class satellite platform, Ridgemont's biggest contract. He is shop steward for United Machinists and Aerospace Workers (UMAW) Local 1484 and holds a 27-year perfect safety record he takes very seriously. Ridgemont's contract with Vanguard Launch Systems is up for renewal in January, with layoff rumors if they lose it. He is retirement-eligible at 58 with a full pension, five years out, and starting to think about it.

  ## Finance
  - Combined gross income roughly $182K: Charles $112K base plus about $12K overtime, Meg $58K as a school librarian.
  - Mortgage: $1,150/month on a 3BR/2BA ranch in Crestwood, 18 years remaining, 3.75% rate refinanced in 2021. Home value about $245K, purchased 2005 at $165K.
  - Dorothy's Parma house is paid off (his childhood home), property taxes $4,200/year, Charles covers maintenance. Value about $190K.
  - 401(k): $385K with Herongate Partners, contributing 10% plus 4% company match. Pension estimated $3,800/month at 58. Meg's 403(b): $142K.
  - Savings: $35K in Ally HYSA at 4.2% APY. Sarah's 529: $28K remaining, $300/month, covers through graduation if she stays in-state. Ryan is financially independent.
  - Monthly outflows include groceries about $900, dining out $250, woodturning supplies $150, Dorothy support $400, utilities $280, insurance about $800, and Meg's yoga $65.
  - A small hands-off crypto and index experiment Ryan helped him set up, a few hundred dollars on monthly auto-buys he tracks rather than actively trades.
  - CPA: Ted Morrison at Morrison Tax Services. Auto insurance: AAA, $1,900/year for the F-150 and Accord, renewal November.

  ## Health & Wellness
  - Right knee: partial meniscus tear, MRI confirmed December 2025. Managing conservatively with PT. A January cortisone injection helped. Orthopedic surgeon Dr. Alan Westbrook says surgery may be needed if it does not improve by summer.
  - PT with Jake Rosen at Crestwood Physical Therapy Associates, Tuesdays and Thursdays 6:30 AM before work.
  - Blood pressure borderline high, on Lisinopril 10mg daily with breakfast.
  - Attends Crestwood Presbyterian Church for social connection, though attendance has dropped.
  - Family dietary notes: Meg has an anaphylactic shellfish allergy, carries an EpiPen, and restaurants are always notified. Dorothy follows a low-sodium diet per doctor's orders, and Charles preps her meals on Sundays. Ryan is vegetarian.

  ## Interests & Hobbies
  - Woodturning, a serious practice with 40-plus finished pieces in a home gallery, specializing in bowls from Ohio hardwoods and segmented vessels. Teaches an intermediate class at the Western Reserve Woodturners Guild on the second Saturday each month. Won Best Bowl at the Buckeye Woodturners Invitational 2024. Working on a large black walnut hollow form for the Great Lakes Woodturning Symposium.
  - Runs a small side business selling turned pens and bowls online and at show tables, and serves as the guild's volunteer webmaster, self-hosting and running its website, online store, and digital tools the way he taught himself everything else.
  - Fine woodworking: furniture, Shaker-style cabinets, and display shelves for his turned pieces.
  - Little League coaching as assistant coach for the Crestwood American Majors division, spring season February to June.
  - Fishing: fly fishing on the Cuyahoga River and trips to Lake Erie tributaries.
  - Cooking, with a focus on BBQ smoking and American comfort food. Specialties are smoked brisket, competition-style ribs, Texas chili, homemade cornbread, and pulled pork, and he makes rubs from scratch.
  - Watching Guardians baseball and the Cleveland Browns, whom he follows religiously.

  ## Home & Living
  - 3BR/2BA ranch house, 1,450 sq ft, on a quiet residential street in Crestwood. Property tax $5,400/year, Cuyahoga County.
  - Garage workshop converted into a full woodturning and woodworking studio: lathe, bandsaw, custom tool racks, a dedicated dust collection system he designed and installed, and a wood storage area for drying blanks. The collection's pride is a 65-year-old figured maple burl bowl made on his late father Robert's original lathe.
  - Fine woodworking side with table saw, planer, router, hand tools, a sharpening station, and finishing supplies.
  - Kitchen is his BBQ domain: two smokers out back (offset and pellet), a cast iron collection, and a spice rub shelf.
  - Charles handles all home maintenance himself: plumbing, electrical, painting, and landscaping.

  ## Devices & Services
  - MacBook Air in the home office, iPhone 14 Pro, and an iPad for woodturning reference photos and CNC programming manuals.
  - Personal workspace at charles.ferguson@Greenridertech.co, with Gmail, Calendar, and Drive connected to the assistant; Docs, Sheets, and Contacts are reached through that workspace.
