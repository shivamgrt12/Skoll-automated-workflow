  - **Coinbase** (`coinbase-api`): Holds the monthly auto-buy Ryan helped him set up; new buys past the standing order wait for his approval.
  - **Binance** (`binance-api`): Where he moved a slice of the crypto holding for lower fees and rebalances it quarterly.
  - **Kraken** (`kraken-api`): Stakes a small fixed amount for yield, part of the same hands-on retirement experiment.
  - **Alpaca** (`alpaca-api`): Runs the automated fractional index-ETF dollar-cost-average he set on a monthly schedule.

  #### Sports, Media & Streaming
  - **Spotify** (`spotify-api`): Workshop playlists of country, bluegrass, and classic rock for evenings at the lathe.
  - **TMDB** (`tmdb-api`): Looks up films and series for the rare quiet night in with Meg.
  - **Twitch** (`twitch-api`): Follows a couple of woodturning livestreamers for technique and drops into their live Q&As.
  - **Vimeo** (`vimeo-api`): Watches the higher-end furniture-build films makers post and uploads his own finished-piece reels.
