  ## MEMORY.md

  # Memory: Jacob Graves

  ## Personal Profile

  Jacob is a Korean adoptee, born in Chicago and adopted at five months by Bob and Linda Graves of Oshkosh, Wisconsin. He grew up the only Asian kid in his Oshkosh class and reached adulthood with a layered set of identities he has spent years reconciling. He reconnected with his birth mother Soon-Hee Kim in 2018; the relationship is real and evolving, carried through Sunday-evening video calls and the long ritual of learning her recipes.

  He holds a B.S. (2006) and an M.S. with fermentation emphasis (2008), both in Food Science from UW-Madison.

  His philosophy: do the careful work, take care of his people, honour the identities that made him, and refuse both cynicism and sentimentality. He distrusts stories that resolve too neatly, adoption and recovery and craft-business alike.

  ## Key Relationships

  - **Maya Chen (partner)**: 40, veterinarian at Morimotoite Wellness, earns about $145K. Jacob's anchor. Together 18 years, married 9. They cook most weeknights, run household finances jointly on a monthly review, and share the dog routines. Birthday May 8.
  - **Bob Graves (adoptive father)**: 70, retired plumber in Oshkosh. Devoted, quietly scholarly, supports the distillery without fully understanding it. Prefers phone calls.
  - **Linda Graves (adoptive mother)**: 70, retired nurse in Oshkosh. Emotional core of the Graves family. Sends Jacob food when he visits. Prefers phone calls and short texts.
  - **Soon-Hee Kim (birth mother)**: 66, lives in Chicago. Reconnected with Jacob in 2018. Cooks with him over weekly KakaoTalk video calls on Sunday evenings; her daughter-in-law helps translate longer notes. Birthday June 1.
  - **Dr. Nora Engstrom (therapist)**: 55, licensed psychologist in Madison, adoption-identity specialty. Biweekly Wednesday 4 PM sessions for years. Non-negotiable in his schedule.
  - **Tyler Briggs (production manager)**: 34, Heartland Spirits' most senior employee. Started as an intern in 2018. Knows the day-to-day better than anyone except Jacob.
  - **Dr. Patricia Liang (UW-Madison colleague)**: 52, associate professor of food science. Jacob's faculty sponsor for the adjunct position and longtime collaborator.
  - **Derek Holmgren (accountant)**: 48, CPA at Holmgren & Associates. Handles the Heartland Spirits books and Jacob's S-corp taxes. Monthly check-in on the 15th.
  - **Sarah Kwan (KAAN chapter lead)**: 38, runs the Madison-area Korean Adoptee Support group. Monthly meetings at her house.
  - **Chef Marco Rinaldi (restaurant partner)**: 45, owner of Osteria Grazia in Madison. Carries Heartland Spirits bourbon and rye. Top wholesale account.
  - **Jake Ostrowski (ice fishing buddy)**: 44, electrician, childhood friend from Oshkosh now in the Madison area. Saturday-morning ice partner December through March.
  - **Dr. Kevin Park (psychiatrist)**: 50, UW Health. Manages Jacob's Wellbutrin. Quarterly check-ins.
  - **Dr. Amy Larson (gastroenterologist)**: 47, Quassia Medical. Manages Jacob's GERD. Annual endoscopy.
  - **Dr. James Fitzgerald (orthopedic surgeon)**: 55, UW Health Sports Medicine. Performed Jacob's ACL reconstruction in 2019. Annual check-in.
  - **Dr. Maria Santos (primary care)**: 49, UW Health. Annual physical in January.
  - **Alana Montrose (tasting room manager)**: 32, Heartland Spirits. Runs the Thu-Sun tasting room and event hosting.

  ## Work & Projects

  After his M.S. in 2008, Jacob spent eight years in commercial fermentation before going independent: brewing and quality chemist at a Wisconsin craft brewery 2008 to 2012, its production lead 2012 to 2015, then 2015 to 2016 planning and licensing the business.

  Heartland Spirits LLC, established 2016 in Madison, is his primary professional identity. Eight employees: Tyler Briggs (production manager), two production assistants, Alana Montrose (tasting room manager), a bookkeeper, and two part-time event staff. Revenue ~$520K annually: roughly 35 percent tasting room, 45 percent wholesale, 20 percent online and direct. Products: bourbon (four-year-aged flagship), rye, seasonal gin, corn vodka, and small seasonal limited releases. Key accounts: Osteria Grazia, Pig in a Fur Coat, and ~40 other bars and restaurants across Madison and southern Wisconsin.

  Licensing surface: Federal TTB permit (renewal tracking critical), Wisconsin distillery license, local Madison permits. Tasting room open Thursday through Sunday with private tastings and events.

  Current challenges: rising grain costs on corn, rye, and malted barley; aging inventory tying up cash; TTB compliance overhead; and tightening wholesale margins. Development project: a Korean-inspired rice spirit (soju and shochu adjacent), rice from Midwestern growers and koji from a local cultivator, which he is presenting at the ACSA Midwest Craft Spirits Symposium in November.

  UW-Madison adjunct: Department of Food Science, teaching one section of FS 572 (Fermentation Science & Technology) each fall and spring semester at Babcock Hall, faculty sponsor Dr. Patricia Liang, pay about $18,000 per year. He continues despite the financial sacrifice for the intellectual stimulation and the chance to mentor younger food-science students, particularly the rare Asian-American faces in the program.

  ## Finance

  - **Income**: ~$135K distillery owner draw, $18K adjunct salary, Maya's ~$145K veterinary income. Household gross approximately $298K.
  - **Mortgage**: $2,400 per month, 3.5 percent refinanced 2021. House value about $485,000, purchased 2018 for $365,000; remaining balance approximately $278,000.
  - **Monthly budget**: Mortgage $2,400; property tax escrow $580; homeowners insurance $165; groceries $750; Subaru payment $420 ($14,800 left, 4.2 percent); auto insurance $155 (both cars); gas and transport $200; utilities $380; Maya's vet-school loan $650 ($48,000 left); health insurance $340 (through Maya's practice); therapy $160 ($80 copay twice monthly); psychiatry $17 avg ($50 copay quarterly); medications $45; dog expenses $250; distillery reinvestment $2,000 to $4,000 variable; streaming and subscriptions $65; dining out $300; donations $100; miscellaneous $300.
  - **Savings**: $42,000 joint high-yield at Ally; $18,000 dedicated emergency fund, separate account.
  - **Retirement**: Jacob's SEP-IRA ~$85,000, contributing ~$12,000 per year from distillery income. Maya's 401(k) ~$120,000.
  - **Distillery business account**: typically $35,000 to $55,000 operating balance at First Business Bank, Madison.
  - **Tax**: S-corp distillery, 1099 adjunct income, joint personal filing. Derek Holmgren handles the annual return.

  ## Health & Wellness

  - **Depression**: Diagnosed at 28. Wellbutrin (bupropion) 300mg XL daily, stable 6+ years. Psychiatrist Dr. Kevin Park (UW Health), quarterly checks; therapist Dr. Nora Engstrom, biweekly Wednesday, adoption-identity specialty. Winter hardest; light-therapy lamp 30 minutes every morning November through March. Maya fully informed; Bob and Linda know he "sees someone" without specifics.
  - **GERD (gastroesophageal reflux)**: Pantoprazole 40mg daily, morning before food. Gastroenterologist Dr. Amy Larson (Quassia Medical). Last endoscopy October 2025: mild esophagitis, no Barrett's, continue PPI. Annual GI follow-up due October 2026. Triggers: tomato sauce, excess coffee, neat spirits, late eating, stress. Bed head elevated 6 inches, no food after 8 PM.
  - **Chronic right knee pain**: ACL reconstruction July 2019 by Dr. James Fitzgerald (UW Health); recovery went well. Aches in cold and after long rides. Annual orthopedic check-in. Manages with low-impact cycling, occasional ibuprofen, and a knee brace for ice fishing. No longer runs.
  - **Alcohol sensitivity (ALDH2 deficiency, Asian flush)**: Flush, rapid heart rate, mild nausea after one drink. Tastes professionally by the spit method; tonic with lime socially.
  - **Primary care**: Dr. Maria Santos (UW Health). Annual physical January; last January 2026, next January 2027.
  - **Dental**: Dr. Chen, Monroe Street Dental. Cleanings every 6 months; next October 2026.
  - **Sleep**: 10:30 PM to 6:15 AM; occasional insomnia in high-stress periods.
  - **Exercise**: Cycling 3 to 4 times per week (indoor trainer in winter); daily dog walks.
  - **Allergies**: None. Omnivorous diet with GERD-conscious avoidances.
  - **Mental health stance**: Active management is practical infrastructure, not stigma. He saw what untreated depression did to people he loved.
  - **Maya's health**: Healthy. Primary care at Group Health; mild seasonal allergies, cetirizine PRN.

  ## Interests & Hobbies

  - **Korean cooking**: The central passion. Sunday-evening Soon-Hee calls anchor his week; his attempts at kimchi, japchae, galbi, and the kalbi marinade. Her handwritten two-language recipe notebook, with his translation notes, is one of his most important objects.
  - **Homebrewing experiments**: Five-gallon basement system, fermentation chamber, and barrel-aging shelf, where he tests ideas too small or speculative for the floor: wild yeast captures, doenjang studies, the rice-spirit project.
  - **Ice fishing**: Winter Saturday mornings on Lake Mendota or Lake Monona with Jake Ostrowski. The patient waiting is closer to meditation than recreation.
  - **Cycling**: Capital City Trail and Military Ridge Trail, 20 to 30 miles on warm-weather weekend mornings, indoor trainer in winter.
  - **Fermentation science reading**: Reads the trade journals closely and writes the occasional letter to the editor on technical points.
  - **Rescue dogs**: Barley (beagle mix, 6) and Juniper (lab-shepherd mix, 4). Central to daily routine; the evening Tenney Park loop is the day's closing ritual.
  - **KAAN community work**: Volunteers with the Midwest Korean Adoptee Network, speaks on panels, mentors younger adoptees. Family-of-choice work, not performative advocacy.
  - **Korean language study**: Duolingo daily streak, working toward a future South Korea visit with Soon-Hee.

