  # Memory: Kristen Moore

  ## Personal Profile

  Kristen Marie Moore was born in Memphis and has never lived anywhere else. Memphis is in her vowels, her music, and her sense of what an afternoon should feel like. She does not romanticize the South; she knows it as it is. Her ancestors are buried in this dirt, her mother is twenty minutes away in Whitehaven, and the man at the gas station on Germantown Parkway knows her by name. She is a Black Southern woman whose cultural inheritance runs through Sunday service at Grace Tabernacle, her grandmother's piano, and the peach cobbler recipe on a notecard taped together at the corners. She is conscious of what she kept from her mother's generation (the cobbler, the church, the hospitality) and what she put down (the silence about therapy, the idea that strong women do not need help).

  She holds a B.S. in Psychology (2004) and an M.Ed. in School Counseling (2008), both from the University of Memphis. Native English speaker, no other languages. Her path was built on twenty years counseling teenagers through college applications, family crises, and identity spirals, and she refuses to forget the people who taught her how to listen. The refusal lives in small ongoing choices: the Sunday visit to Loretta, the casserole, the remembered birthday, the way she stays late on a Wednesday for a senior whose application is unraveling.

  She believes you owe your people your honesty before you owe them your comfort. She believes grief is a room you learn to live in, not a problem to be solved. She believes boundaries are an act of love and that she is still learning to hold them. She believes God is a real presence in her life without being in a hurry to define what that means. She believes in showing up small and consistent rather than grand and occasional: the casserole, the phone call, the remembered birthday.

  She runs warm and a little loud when she is happy, and her laugh has a way of pulling other people in. She is stubborn under the warmth, deliberate when a decision matters, and has been told she is "intense" and "a lot" by people who meant it as criticism. She is mostly fine with that. What she will not tolerate is being condescended to. She second-guesses herself in private more than she ever shows, especially decisions about Jaylen. She is widowed; Marcus Moore was killed in a car accident in February 2022, and grief reshaped her rather than broke her. She is not currently dating and is not interested in being asked about it.

  ## Key Relationships
  - **Jaylen Moore** (son, 16). Junior at Westgrove High School. Plays JV basketball, 3.4 GPA, quiet and deadpan-funny, looks like Marcus. Learner's permit and eager to drive. Pulling away in normal teenage ways. Text for logistics, voice for anything that matters.
  - **Loretta Hayes** (mother, 72). Lives alone in Whitehaven, twenty minutes away. Osteoarthritis in both knees and early-stage macular degeneration. Fiercely independent, increasingly reliant on Kristen for errands and rides. Prefers phone calls; do not text her. Kristen drives her to Clearview Vision Center every 8 weeks.
  - **Tanya Brooks** (closest friend, 41). English teacher at Crestview Academy. Lunch together most days; Kristen's go-to for venting. Single, no kids, Midtown Memphis. Text and iMessage.
  - **Pastor Reginald Owens** (pastor, ~60). Senior pastor at Grace Tabernacle Church. Kristen has attended since childhood. Officiated Marcus's funeral. Kristen trusts him deeply but keeps the relationship boundaried. Email and phone.
  - **Denise Moore** (sister-in-law, 48). Marcus's older sister, lives in Nashville. Warm but sometimes complicated; grieves Marcus differently and occasionally says things that land wrong. Talk every couple of weeks. Takes Jaylen for a weekend in Nashville 2 to 3 times a year. Text and call.
  - **Will Hayes** (brother, 39). Lives in Atlanta, works in logistics. The person who makes Kristen laugh her twenty-two-year-old laugh. Calls every other Sunday after church. Helps with Loretta's expenses when he can. Kristen wishes he visited more. Phone and text.
  - **Dr. Naomi Pratt** (therapist, ~50). Clearwater Counseling, Germantown. Monthly, in-person. Started 2022 as grief counseling, transitioned to general therapy. Kristen values the space but sometimes skips when life gets hectic. Office line.
  - **Principal Cheryl Vance** (boss, 55). Principal at Crestview Academy. Supportive but stretched thin. Gives Kristen autonomy in the counseling department. Respectful, low-drama working relationship. Work email.
  - **Dr. Howard Klein** (school psychologist). Crestview colleague. Co-coordinates 504 and IEP cases. Work email.
  - **Marcus Moore** (husband, deceased February 2022). Killed in a car accident. His workshop in the garage is mostly untouched; his life insurance is earmarked for Jaylen's college.

  ## Work & Projects
  - **Crestview Academy**, High School Guidance Counselor. Germantown, TN. On-campus, in-person Monday through Friday, 7:30 AM to 5:00 PM (counseling office hours 7:30 AM to 3:30 PM; often stays for meetings or paperwork until 4:30 or 5:00 PM).
  - A private school of roughly 600 students, grades 9 through 12. Salary $62,000.
  - Responsibilities: college counseling for juniors and seniors, crisis intervention, student mental health referrals, parent conferences, 504 and IEP coordination with Dr. Howard Klein.
  - Current focus: end-of-year college decision follow-ups for seniors and planning the summer bridge program for incoming freshmen.
  - School breaks mid-May. Kristen works a reduced schedule through June for summer programming, then is off in July.
  - Work systems: Brightpath LMS, Outlook for work email, Google Workspace personally. The assistant has no access to the work laptop.
  - Career timeline: practicum and graduate-assistant work at the University of Memphis counseling center, 2006 to 2008. Hired as full-time counselor at Crestview Academy in August 2008 after completing her M.Ed., and has been on the Crestview counseling team continuously since.

  ## Finance
  - Annual salary $62,000 from Crestview Academy. Take-home roughly $4,100 per month after taxes and benefits.
  - Monthly outflow: mortgage to Regions Bank $1,150, utilities (electric, water, internet, phone) $280, groceries and dining $500, car payment $340, car insurance $130, gas $120, Jaylen's expenses (activities, clothes, school fees) $200, Loretta's supplemental expenses (rides, groceries, misc) $150, streaming (Netflix, Hulu) $30, Fitbit Premium $10, therapy copay $40, church tithe $150, personal and household sundries $500, savings $300, buffer roughly $200.
  - Cash: roughly $11,000 in Regions Bank checking and savings.
  - Retirement: 403(b) through Crestview of roughly $28,000.
  - Debt: car loan balance $14,500. Mortgage balance roughly $98,000. No credit card debt.
  - Marcus's life insurance payout sits in a separate Fidelity account, roughly $45,000, earmarked for Jaylen's college.
  - Current life insurance policy through Crestview's benefits.
  - Tax prep: TurboTax self-file. Considers a CPA every few Aprils; comes back to TurboTax.
  - Financial style: careful and practical. Tracks spending in a paper notebook at the kitchen table every Sunday evening. Has tried apps; comes back to the notebook.
  - Generous with her people in ways that do not always add up on paper: unexpected gift cards, checks tucked into birthday cards, grocery runs picked up for friends who are grieving.
  - Goal: a Washington, D.C. trip with Jaylen before he graduates; saving on and off for two years.

  ## Health & Wellness
  - Generally healthy. No chronic conditions.
  - Mild seasonal allergies in spring; takes over-the-counter cetirizine 10 mg daily in March and April.
  - **Dr. Angela Simms** at Bluffside Family Practice handles primary care. Last visit November 2025; next annual physical November 14, 2026.
  - **Dr. Kevin Marsh** handles dental cleanings. Last visit March 2026; next visit November 4, 2026.
  - **Dr. Naomi Pratt** at Clearwater Counseling in Germantown handles therapy. Monthly, in-person since 2022.
  - Movement: walks 3 to 4 mornings per week, roughly 2 miles around her neighborhood. Not a runner. Wears a Fitbit Inspire 3 for steps and sleep.
  - Sleep: aims for 7 hours, often gets 6. Stays up grading or handling school paperwork.
  - Sensory: sensitive to sudden loud noises since 2022 (a slammed door, a horn, an unexpected siren). Keeps low music in the house partly for this reason.
  - By Friday her shoulders are around her ears, her jaw is tight, and there is a particular ache in her lower back. The weekend is for letting it settle.

  ## Interests & Hobbies
  - Cooking is her primary decompression. Comfort-leaning, every-burner, music loud enough to feel in her chest. She thinks while she stirs.
  - Bakes her mother's peach cobbler from a notecard recipe for church potlucks and family ceremonies.
  - Walking three or four mornings a week. Gospel, audiobook, or just the neighborhood waking up. Two miles. She calls it her time, not her exercise.
  - Reads in small portions, 15 minutes at night. Writing about grief, growth, and becoming. Underlines lines that hit, dog-ears pages without apology.
  - Music is structural, not background. Gospel choirs that break open at the bridge. The first three Stevie Wonder albums. Early-nineties R&B from cookouts.
  - Owns her grandmother's upright piano. Plays in pieces. Jaylen is teaching himself things on it. Has been telling herself for two years she will take lessons again.
  - Long phone calls with Will from the back porch on alternate Sundays.

  ## Home & Living
  - 3-bed/2-bath ranch on Maplethorn Drive, purchased 2016 with Marcus. Mortgage through Regions Bank. Quiet cul-de-sac, fenced backyard, one-car garage.
  - Layout: Kristen's bedroom, Jaylen's bedroom, and a guest room that doubles as her home office. The kitchen is the gathering spot, large enough for a table.
  - Garage: Marcus's workshop mostly untouched. Not ready to clear it out.
  - Pets: none currently. Jaylen has been asking about a dog.
  - Aesthetic: warm woods, family photos, a quilt her grandmother made on the back of the couch, plants she keeps mostly alive. Soft lighting, no overhead lights in the evening. A vanilla candle going somewhere.
  - Vehicle: 2022 Honda CR-V.

