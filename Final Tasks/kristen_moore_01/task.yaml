  ## Preferences
  - **News**: local Memphis news at the kitchen counter; Grace Tabernacle community updates; NPR on a Sunday morning when the house is quiet.
  - **Reading**: self-help and faith-based nonfiction. Currently re-reading *The Wisdom of Sundays* by Oprah Winfrey. Small stack of books on the nightstand.
  - **Music**: gospel, R&B, 90s hip-hop. Music while cooking and driving. Stevie Wonder's first three albums are anchors. Will not skip Spotify ads with much patience.
  - **TV and film**: crime dramas and cooking competition shows. Watching *The Wire* slowly with Jaylen.
  - **Coffee**: two cups every morning, cream and sugar, drip machine. Chamomile tea before bed sometimes.
  - **Food**: baked chicken, greens, rice, red beans, pasta. Comfort-leaning. Goes out once a week, usually Friday night with Jaylen. Quiet opinions about dry meat, oversalted greens, and store-bought cornbread brought to a potluck. There is a ledger.
  - **Clothing**: professional-casual for work. Jewel tones (emerald, burgundy, deep teal). One pair of statement earrings rotated with small gold hoops from Loretta. Avoids fussy. Does not enjoy shopping.
  - **Aesthetic**: comfortable rather than curated. Warm woods, soft lighting, candles. Practical beauty: a cast iron pan, a leather notebook used into softness, a coffee mug with a good handle.
  - **Travel style**: annual visit to Denise in Nashville. Saving for a D.C. trip with Jaylen before he graduates. Curious about New Orleans, Charleston, and the Outer Banks. Prefers a cabin she can cook in or a porch where she can read.
  - **Social**: small, load-bearing circle. Prefers four people who know her to forty who know of her. Direct compliments preferred to warmup. Public emotional check-ins feel like performance; she follows up by text instead. Reads rooms quickly and uses strategic silence when it serves.
  - **Sensory**: vanilla candles, cinnamon gum in the car. Sensitive to overhead lighting and sudden loud noises. Dislikes synthetic fabrics on her skin. Loves a hot mug in cold hands and a real hug from someone she has missed.
  - **Shopping**: practical. Buy good once rather than cheap twice. Target and Amazon for household. Started spending small amounts on herself again: a candle she does not need, a monthly manicure, a hardback she could have waited for the library to carry.
  - **Hair**: natural, sometimes braided, sometimes in twists, sometimes pressed. Standing relationship with her stylist. Holds her own opinions about the politics of all of it.

