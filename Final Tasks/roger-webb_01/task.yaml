  - **GitHub** (`github-api`): hosts bakery website code and the contractor's deployment scripts.
  - **GitLab** (`gitlab-api`): stores backup repositories and version-controlled recipe documentation.
  - **Sentry** (`sentry-api`): tracks errors on the bakery website and online ordering flow.
  - **Datadog** (`datadog-api`): monitors bakery website uptime and page load performance.
  - **Okta** (`okta-api`): provides single sign-on access across bakery tools and shared vendor portals.
  - **Cloudflare** (`cloudflare-api`): manages DNS and security for the bakery website domain.
  - **Kubernetes** (`kubernetes-api`): orchestrates containers for the bakery's online ordering infrastructure.
  - **PagerDuty** (`pagerduty-api`): routes alerts for bakery website downtime and payment processing failures.
  - **Contentful** (`contentful-api`): manages content for the bakery website and seasonal landing pages.
  - **Algolia** (`algolia-api`): powers site search on the bakery website for menu items and blog posts.
  - **Webflow** (`webflow-api`): powers the bakery's public website where Roger drafts copy and a contractor publishes updates.
  - **WordPress** (`wordpress-api`): hosts the bakery blog with recipe stories and behind-the-scenes posts.
  - **Figma** (`figma-api`): houses menu board designs and bakery packaging drafts the designer shares.
  - **Typeform** (`typeform-api`): runs the bakery's special-order intake form for holidays and custom cake requests.
  - **ServiceNow** (`servicenow-api`): tracks IT service requests for bakery equipment, POS, and network issues.

  #### Finance & Payments

  - **Plaid** (`plaid-api`): aggregates Bank of Hawaii account data for budgeting and cash-flow visibility.
  - **Stripe** (`stripe-api`): processes online pre-orders during festival weeks and holiday pastry runs.
  - **PayPal** (`paypal-api`): processes vendor payments, donations, and one-off supplier invoices.
  - **Square** (`square-api`): pulls daily sales reports from the bakery POS iPad for revenue tracking.
  - **QuickBooks** (`quickbooks-api`): bookkeeping for Koa Morning Star, tracking revenue, expenses, and tax preparation.
  - **Xero** (`xero-api`): provides backup bookkeeping and export-ready financial reports alongside QuickBooks.
  - **Coinbase** (`coinbase-api`): holds a small crypto position Roger monitors alongside traditional savings.
  - **Binance** (`binance-api`): provides access to crypto trading pairs and market data for portfolio tracking.
  - **Kraken** (`kraken-api`): tracks crypto prices and supports portfolio rebalancing alongside Coinbase.
  - **Alpaca** (`alpaca-api`): manages a small stock portfolio and tracks market positions.

  #### Sales, Marketing, Support & Analytics

  - **HubSpot** (`hubspot-api`): manages customer records and regular patron contact details for the bakery.
  - **Salesforce** (`salesforce-api`): tracks the wholesale pastry pipeline and catering inquiry contacts.
  - **Mailchimp** (`mailchimp-api`): powers the bakery newsletter and seasonal promotion campaigns for regulars.
  - **Klaviyo** (`klaviyo-api`): drives targeted email campaigns for holiday pre-orders and loyalty promotions.
  - **ActiveCampaign** (`activecampaign-api`): automates follow-up campaigns for catering leads and event inquiries.
  - **Google Analytics** (`google-analytics-api`): tracks bakery website traffic, visitor patterns, and conversion rates before festivals.
  - **Mixpanel** (`mixpanel-api`): analyses user behaviour on the bakery website and pre-order funnel.
  - **PostHog** (`posthog-api`): captures session recordings and heatmaps from the bakery website.
  - **Amplitude** (`amplitude-api`): tracks product analytics and customer engagement across bakery digital channels.
  - **Segment** (`segment-api`): pipes event data from the bakery website to analytics and marketing tools.
  - **Zendesk** (`zendesk-api`): manages support tickets for custom cake orders and special dietary requests.
  - **Freshdesk** (`freshdesk-api`): processes help-desk inquiries for wholesale accounts and vendor communications.
  - **Intercom** (`intercom-api`): handles customer chat inquiries from the bakery website and social channels.

