  ## MEMORY.md

  # Memory: Catherine Atkins

  ## Personal Profile
  Catherine Atkins is the owner of Atkins and Associates Fine Wines, a Napa Valley importer and distributor she built from the ground up. She holds an MBA from Pacific Coast Business School (2007) and an Advanced Sommelier certification from the International Sommelier Society (earned 2005, cert #ISS-2005-0473), and she apprenticed from 2002 to 2004 under retired sommelier William Prescott in Sonoma County. She is sophisticated, business-astute, and sensory-driven, the kind of person who remembers a wine by its taste, its maker, and the story behind the bottle. She is at home in any fine dining room. Beneath the polish she is a devoted family woman who assists with coaching Jack's soccer and drives Emily to horse shows.

  ## Key Relationships
  - **Robert Atkins (husband)**: born March 8, 1981 (45), interior designer, runs Robert Atkins Design in downtown Napa. Handles decor for the quarterly tasting dinners. Dairy-light by preference.
  - **Emily Atkins (daughter)**: born January 19, 2010 (16), competitive equestrian at Meadowbrook Stables, rides five days a week. Vegetarian as of this year. Student at Vineyard Hills High School.
  - **Jack Atkins (son)**: born October 27, 2012 (13), plays club soccer for Napa Valley SC where Catherine assists coaching. Student at Napa Valley Middle School. Big appetite, struggles with math.
  - **Brian Harper (sales director)**: Manages the West Coast sales team, eight years with the company, her most trusted lieutenant though not an equity partner.
  - **George Whitfield (California supplier)**: Owner of Whitfield Estate in Napa Valley, an old friend.
  - **Sofia Marchetti (Italian wine contact)**: Piedmont producer at Tenuta Marchetti, potential new supplier with introductions to three other Italian estates.
  - **David Kim (top client)**: Sommelier at Le Jardin Doré, the biggest single account.
  - **William Prescott (mentor)**: born December 5, 1957 (68), retired sommelier in Sonoma County who trained Catherine for two years.

  ## Work & Projects
  Catherine founded Atkins and Associates Fine Wines in 2010 and has built it over fifteen years from a single-region importer into the current 14-winery portfolio. The business operates from a converted Victorian house in downtown Napa with an attached temperature-controlled warehouse, open 9:00 AM to 6:00 PM weekdays with evening and weekend events. Staff includes Brian (sales director), three sales reps, Eric (warehouse manager), and Susan (admin and bookkeeper). The current portfolio is 14 California and Oregon wineries: Napa Valley (5), Sonoma (4), Willamette Valley (3), Paso Robles (2). Annual revenue is 3.8 million dollars, growing 12 percent year over year, with roughly 420,000 dollars of inventory in the warehouse at any time on a 60-day turnover.

  The Italian expansion project is the major current initiative: scouting Piedmont and Tuscan producers with a target of four to five (Barolo, Barbaresco, Brunello, Chianti Classico). Sofia Marchetti at Tenuta Marchetti is the lead contact. Distribution agreements need legal review by attorney Richard Stein before signing. The agent has already compiled profiles of six top Barolo estates, drafted a client proposal for Solo Filo's fall wine program, and compared temperature-controlled shipping options for Italian imports.

  Key accounts: Le Jardin Doré, Valleyvine, Bottega, Vine and Table, Maison Terre, Solo Filo. Shipping runs temperature-controlled through Domaine Transport under an exclusive agreement. Licensing is current on both the TTB federal importer license (Basic Permit #CA-I-21055) and the California ABC license (Type 17/20, #555-0412). Insurance is a Hartford business policy. The business was profiled in the March issue of Vine and Cellar Magazine. An open concern is tariff uncertainty on European wines, which she monitors closely.

  ## Finance
  - Household income: Catherine 280,000 dollars (salary plus distributions), Robert 145,000 dollars (design firm).
  - Mortgage: 3.5 percent fixed, 5,200 dollars per month, 20 years remaining on the Yountville house.
  - Business line of credit: 250,000 dollars with Napa Valley Community Bank, 80,000 dollars drawn for inventory.
  - Emergency fund: 72,000 dollars in Schwab savings, roughly four to five months of total expenses.
  - Investment portfolio: 680,000 dollars in Schwab, growth-oriented, Roth IRAs maxed.
  - Self-directed sleeve outside Schwab: roughly 18,000 dollars she watches herself, split between a small crypto holding (held at Coinbase, priced against Binance and Kraken) and an index-ETF experiment at Alpaca. She trades it rarely and treats it as play money, not the family's real savings.
  - College savings: 529 plans, 95,000 dollars for Emily and 72,000 dollars for Jack.
  - Personal wine collection: roughly 400 bottles, estimated value 85,000 dollars, stored in the home cellar.
  - Business valuation: estimated 1.5 million dollars including inventory, contracts, and goodwill.
  - Major monthly outlays: mortgage 5,200, Emily's riding 2,800, Jack's soccer 600, groceries 1,400, personal dining 800, BMW 780, Porsche 1,100, yacht club 350, plus utilities, insurance, auto, art, and charity.
  - Taxes prepared by Bellevue and Partners (same CPA as the business), filed jointly.

  ## Health & Wellness
  - Catherine: good overall health, BMI slightly above normal from frequent tastings. Annual physical in January, LDL cholesterol borderline high at 138 with diet adjustments recommended. Monitors liver enzymes annually, clean so far, and takes that seriously as a professional necessity. Takes omega-3 fish oil (1g), a multivitamin, and milk thistle. Sleeps roughly 10:00 PM to 5:30 AM. Past knee tendinitis from cycling in 2024, resolved with physical therapy and a bike fitting.
  - Robert: healthy, Pilates three times a week, occasional migraine managed with sumatriptan 50mg as needed.
  - Emily: healthy competitive athlete, sport physicals current, rides five days a week.
  - Jack: healthy, in a growth spurt, pediatrician Dr. Amy Ross with a check-up due in November.
  - Dental: Dr. Thomas Whelan in St. Helena.
  - Dietary: no allergies in the family and no restrictions for Catherine, who appreciates everything from street food to Michelin. Robert avoids heavy cream and aged cheeses. Emily is newly vegetarian, so Catherine is learning more plant-based cooking. Jack eats everything in large quantities.

  ## Interests & Hobbies
  - Wine sourcing trips: annual West Coast visits, now expanding into Piedmont and Tuscany.
  - Cycling: three times a week plus a Saturday group ride, on a Cervélo R5, riding the 28-mile Silverado Trail loop.
  - American home cooking: Saturday market runs and signature dishes including pot roast, barbecue brisket, clam chowder, apple pie, and smoked ribs.
  - Jazz: season tickets to the Bay Area Jazz Collective, plays saxophone at home (Duke Ellington standards on a Yamaha YAS-62).
  - Sailing: keeps a 32-foot Catalina at Marin Bay Yacht Club for weekend sails.
  - Art collecting: emerging artists, frequents galleries in San Francisco and Napa.
  - Hosting: quarterly food and wine pairing dinners for top clients.

  ## Home & Living
  - A 4-bedroom, 3,200-square-foot house on 2 acres in Yountville, built in 2008.
  - Custom wine cellar, temperature and humidity controlled, holds 600 bottles.
  - Covered patio with a commercial-grade Weber Summit grill and pizza oven for outdoor entertaining.
  - Heated saltwater pool maintained by Clearwater Pool Service, and landscaping by Napa Valley Landscaping with olive trees and lavender borders.
  - A horse trailer parking pad and tack storage shed for Emily, a fabric and material showroom for Robert in a spare bedroom, and Catherine's private home office with wine library, tasting counter, and dual monitors.
  - Kitchen with a Viking range, Sub-Zero fridge, and copper pots, which is Catherine's domain.
  - Smart home: Sonos whole-house audio, Nest thermostats, August smart locks, Ring doorbell and cameras.
  - Two-car garage, currently full, with a possible third bay under consideration. The gravel driveway needs re-grading before winter.

  ## Devices & Services
  - MacBook Pro in the home office, iPhone 15 Pro, and an iPad for wine portfolio presentations.
  - Garmin Edge 840 cycling computer.
  - BMW X5 (2023) for daily driving and client meetings, Porsche 911 Carrera for weekends.
  - Subscriptions: Strava premium, Spotify, Apple Music, Netflix, Apple TV+, and indie film channels.
  - Separate accounts on Wine-Searcher and Vivino for market pricing.

