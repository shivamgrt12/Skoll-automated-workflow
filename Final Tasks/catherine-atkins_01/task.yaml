  - **DoorDash** (`doordash-api`): Catering pickup for last-minute warehouse events.

  #### Scheduling & Productivity
  - **Google Calendar** (`google-calendar-api`): Master calendar for appointments, family events, tastings, and sourcing trips.
  - **Google Drive** (`google-drive-api`): Storage for portfolio documents, pricing sheets, contracts, and family files.
  - **Calendly** (`calendly-api`): Booking link for supplier and client intro calls. You keep the availability windows honest against her real schedule.
