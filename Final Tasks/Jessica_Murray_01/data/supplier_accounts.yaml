# Murray Plumbing and HVAC LLC - supplier account card
# Kept in the shop binder + shared Box folder. Rechecked at year-end.
# Notes: Baxter's is the primary plumbing rough-in supplier. Atlantic is the
# primary copper and building-materials supplier. Statement due dates are
# tracked on Jessica's phone calendar; late fees kick at NET+5.

business:
  name: Murray Plumbing and HVAC LLC
  billing_address: "Elmhurst shop, Providence, RI"
  primary_ap_email: jessica@murrayplumbing.com
  backup_ap_email: mark@murrayplumbing.com

suppliers:
  - slug: baxters
    name: "Baxter's Plumbing Supply"
    account_number: BAX-4471
    account_since: "2005-03"
    contact: "Bobby Baxter (owner) 401-555-0611"
    counter_rep: "Nina Kepler"
    address: "1210 Elmwood Ave, Providence, RI 02907"
    terms: "NET 30"
    credit_line_usd: 20000
    balance_status: "Current as of 2026-10-31"
    invoice_style: "Emailed PDF + monthly statement"
    notes: |
      Baxter's is the source of record for Henderson Ave 4-unit
      rough-in material. October invoice reflects the actual line-item
      totals for the job; if the Airtable tracker disagrees the invoice
      wins. Bobby will honor a 30-day extension once a year without
      touching the credit line.

  - slug: atlantic
    name: "Atlantic Building Materials"
    account_number: ATL-8830
    account_since: "2009-11"
    contact: "Ray Cortez (yard manager) 401-555-0688"
    counter_rep: "Sam Freitas"
    address: "44 Allens Ave, Providence, RI 02905"
    terms: "NET 30"
    credit_line_usd: 15000
    balance_status: "Current as of 2026-10-31"
    invoice_style: "Statement emailed on the first business day of the month"
    notes: |
      Atlantic sets the copper per-foot rate we pay. October statement is
      the source of record for copper Type L 3/4-inch. If the Notion
      supplier price list disagrees, the emailed statement wins - the
      Notion page has not been updated since April.

  - slug: dispatch_backup
    name: "R.I. Wholesale Plumbing (backup only)"
    account_number: RIWP-2210
    account_since: "2018-05"
    contact: "Front counter 401-555-0733"
    terms: "COD"
    credit_line_usd: 0
    balance_status: "N/A - COD"
    notes: |
      Kept only for weekend emergencies when Baxter's is closed. Do not
      route routine rough-in through this account, prices run 8-12% high.

policy:
  reconciliation_rule: |
    Statement or invoice always beats a tracker cell. Baxter's PDF invoice
    overrides the Airtable "Cost Estimate" column on any job where the
    two disagree. Atlantic statement overrides the Notion price list.
  credit_line_total_usd: 35000
  year_end_action: "Ask both suppliers for updated W-9 by Dec 15."
