  ## MEMORY.md
  
  # Memory: Jessica Murray
  
  ## Personal Profile
  
  - **DOB**: February 17, 1976
  
  Jessica Marie Murray is a master plumber and licensed general contractor in Providence, Rhode Island, who has spent three decades in the trades. She worked general construction labor around Providence from 1994 to 1996 before securing an apprenticeship spot at the UA Local 51 apprenticeship program (1996 to 2000), got her master plumber's license in 2000 (RI Master Plumber License #MP-20-0847, issued by the Rhode Island Contractors' Registration and Licensing Board), her general contractor's license in 2004 (RI General Contractor License #GC-04-2391), and opened Murray Plumbing & General Contracting, LLC in 2006.
  
  She is a high school graduate (Cranston High School West, 1994) with no further formal education and no apology for it. Her family has been in New England for generations. The Rhode Island accent surfaces under stress and around her mother. English only.
  
  She reads people the way she reads a wall: looking for what holds and what gives. Direct without being unkind, except when she has decided someone has earned it. Long fuse for genuine effort, short fuse for excuses dressed up as explanations. Humor is the load-bearing wall: dry, quick, constant. She is more extroverted than she presents on first meeting, generous with the people she has earned and uninterested in expanding the circle.
  
  Her working-class identity is the architecture of how she sees the world, carried without performance and without apology. Her philosophy is short: work well done is its own argument, loyalty matters more than agreement, money is a tool, family is the gravity. Sunday brunch at her mother's is the closest thing to a religious observance in her life now, and she rearranges the week around it.
  
  ## Key Relationships
  
  - **Mark Murray** (husband, 48, DOB December 4, 1977): Together since 2002, married May 21, 2005. Runs the business admin (invoicing, scheduling, accounts). Organized where Jessica is chaotic. Teaches part-time at a Providence elementary school in the mornings. They argue about her hours and her pricing. He is her person, and she knows it.
  - **Ethan Murray** (son, 19, DOB October 11, 2006): HVAC student at New England Institute of Technology. Lives at home. Quiet, good with his hands, helps on job sites during school breaks. Jessica is proud and deliberately does not push him into the family business.
  - **Sophia Murray** (daughter, 16, DOB April 22, 2010): Junior at LaSalle Academy. Honor roll, plays volleyball. Recently started dating, which Jessica handles with interrogation-level questioning. Texts only, no email on file.
  - **Dorothy Murray** (mother, 78, DOB April 29, 1948): Widowed in 2017 when her husband William died of a heart attack. Lives alone in Cranston. Hosts Sunday brunch every week. Jessica checks on the house regularly. Does not email.
  - **William Murray** (father, deceased 2017, DOB November 15, 1946): Carpenter, taught Jessica how to hold a hammer before she could read. Heart attack at home at 70. Family still talks about him at Sunday brunch.
  - **Laura Murray** (sister, 47, DOB March 20, 1979): Licensed electrician, owns her own shop. They sub-contract to each other regularly. Fishing partner a couple of times a summer.
  - **Paulie DeStefano** (lead crew, 45): Jessica's right hand for 15 years. Runs plumbing jobs independently when she is off-site. Loyal, reliable, fully trusted.
  - **Danny Oliveira** (crew, 34): General labor and demo. Dependable, learning plumbing. Two small kids and needs the hours.
  - **Mike Russo** (crew apprentice, 28): Newest hire. Eager, makes mistakes. Jessica yells at him on site and buys him lunch after.
  - **Frank Desmond** (carpentry sub): Reliable, books up fast. Regular sub on remodels.
  - **Helen Thompson** (mother-in-law): Mark's mother. Joins for Christmas and other family holidays.
  
  ## Work & Projects
  
  - **Business**: Murray Plumbing & General Contracting, LLC. Established 2006. Licensed and insured in Rhode Island.
  - **Role**: Owner, operator, master plumber, general contractor.
  - **Office**: Home office in Elmhurst for paperwork; Mark manages admin from there. No storefront. The 2023 Ford F-250 is the rolling office.
  - **Crew**: Paulie DeStefano (lead), Danny Oliveira, Mike Russo. Plus rotating subs: Laura Murray (electrical), Frank Desmond (carpentry), HVAC subbed out as needed.
  - **Services**: Residential plumbing, kitchen and bath remodels, general contracting for small to medium renovations. Some small commercial (restaurant plumbing, office buildouts). No new construction, by choice.
  - **Geography**: Strong on the East Side and College Hill. Word-of-mouth driven. 4.8 on Google reviews.
  - **Cadence**: Steady April through November, slower December through March.
  - **Revenue**: Business grosses about $420,000 a year. Jessica takes home roughly $95,000 to $110,000 depending on the year, after crew wages, materials, insurance, and overhead.
  - **Preferred suppliers**: Baxter's Plumbing Supply, Atlantic Building Materials.
  
  ## Finance
  
  - **Household monthly income**: about $9,900 total. Jessica's take-home averages $8,500/month and varies seasonally. Mark earns about $1,400/month teaching part-time.
  - **Mortgage**: $1,450/month with Narragansett Trust. About $135,000 remaining, roughly 9 years left. Refinanced 2015. Property tax and insurance escrowed at $520/month.
  - **Utilities and household**: Utilities $340, groceries $650, gas (work truck plus Mark's car) $380, auto insurance $210, dining out $200, streaming subscriptions $28 (Hulu, Spotify family).
  - **Health insurance**: $890/month (family plan, marketplace).
  - **Kids**: Ethan's NEIT tuition payment plan $350/month after aid. Sophia's LaSalle Academy tuition and activities about $400/month.
  - **Business expense draw**: about $800/month, variable, sometimes reimbursed by jobs.
  - **Community donation**: $100/month.
  - **Savings**: about $600/month into savings or emergency fund.
  - **Buffer**: roughly $2,982/month after recurring outflows. Used for big-ticket business costs, kid expenses, slower-season smoothing.
  - **Reserves**: $38,000 savings at Narragansett Trust. SEP-IRA at Fidelity around $145,000. Sophia's 529 around $22,000.
  - **Debt**: Mortgage above. Work truck loan ($12,000 remaining, 18 months left on the 2023 Ford F-250). No credit card debt.
  - **Style**: Cash-flow focused. Pays on time, saves when she can. Mark runs the day-to-day. Jessica runs the business accounts. Worries about retirement, does not panic about it.
  
  ## Health & Wellness
  
  - **Primary care**: Providence Primary Care Associates. Last physical January 2026. Doctor told her to lose 15 pounds and stretch more. She nodded.
  - **Chronic back pain** from thirty years of crawl spaces and pipe work. Managed with ibuprofen, intermittent stretching, and occasional visits to Dr. Lisa Yoon, chiropractor, at Eastside Spine & Wellness.
  - **Knees**: both arthritic, right worse than left. Stairs are annoying. Does not complain.
  - **Blood pressure**: borderline high. Lisinopril 20mg daily.
  - **Build**: about 5'7", 170 lbs, stocky, strong, carrying extra weight in the middle.
  - **Sleep**: averages 6 hours. Bed around 11 PM, up at 5:00 AM on work days. Sleeps better on weekends.
  - **Mental health**: no diagnosis, no therapy. Manages stress through work, humor, family, and the grill. Gets quieter under load, not louder.
  - **Substances**: Smoked in her 20s, quit at 30 when she got pregnant with Ethan. Occasional cigar at a cookout, maybe twice a year. Beer (Narragansett or Sam Adams) on weekends.
  - **Dietary**: No medical restrictions. Doctor wants less red meat. She has opinions about that.
  
  ## Interests & Hobbies
  
  - **The grill**: Weber Genesis in the backyard. Burgers, steaks, ribs, chicken. The sequence of seasoning, heating, tending, and timing is her closest thing to a meditative practice, though she would roll her eyes at the word.
  - **Red Sox**: Year-round companion, seasonal heartbreak. Radio on in the truck during games she cannot watch. Will write an estimate with one ear on the radio.
  - **Patriots**: Fall Sundays. Football has lost some of what it used to be for her; she does not elaborate.
  - **Fishing with Laura**: A couple of times a summer when schedules allow. More about the coffee than the fish.
  - **Home improvement on her own house**: Renovating the Elmhurst Colonial room by room for twenty years. The unfinished basement is a project she keeps circling and setting aside.
  - **Music in the truck**: Classic rock. Springsteen, Zeppelin, AC/DC. Will sing along when alone, badly, and deny it.
  
  ## Home & Living
  
  - **House**: Three-bedroom Colonial in Elmhurst, Providence. About 2,200 sq ft. Built 1948. Bought 2004, refinanced 2015. Jessica has renovated most of it herself over twenty years.
  - **Layout**: Three bedrooms upstairs (master, Ethan's, Sophia's). One full bath upstairs, half bath downstairs.
  - **Kitchen**: Fully remodeled 2019. Jessica did the plumbing, Laura the electric, countertops hired out. Mark chose finishes.
  - **Bathroom**: Remodeled 2021.
  - **Basement**: Half-finished. Tool storage, workbench, couch and TV that mostly belong to Ethan.
  - **Backyard**: Fenced. Gas grill (Weber Genesis), patio, vegetable garden.
  - **Garage**: Detached, single-car. Half is work tool and material storage.
  - **Vehicles**: 2023 Ford F-250 lettered work truck. 2020 Honda CR-V (Mark's daily driver).
  
  ## Devices & Services
  
  - **Phone**: iPhone 13 in a beat-up OtterBox case. Calls, texts, job-site photos all day long.
  - **Laptop**: HP laptop (2021). Mark uses it for QuickBooks; Jessica uses it for email and code lookups.
  - **TV**: 65-inch Samsung in the living room. Cable for sports, Hulu for everything else.
  - **Streaming subscriptions**: Hulu (no ads), Spotify family plan.
  - **Accounting**: QuickBooks Desktop on the laptop. Mark runs it.
  - **Banking**: Narragansett Trust (business checking, personal checking, personal savings). Fidelity (SEP-IRA, Sophia's 529).
  - **Home security**: Ring cameras at the front door and driveway.
  
  ## Contacts
  
  - **Mark Murray** (husband): 401-555-0183, mark.murray.pvd@gmail.com. Business admin and elementary teacher.
  - **Ethan Murray** (son): 401-555-0247, ethan.murray01@gmail.com. HVAC student. Lives at home.
  - **Sophia Murray** (daughter): 401-555-0312. Texts only, no email on file.
  - **Dorothy Murray** (mother): 401-555-0155. Cranston, RI. No email.
  - **Laura Murray** (sister): 401-555-0198, laura.murray.ri@gmail.com. Electrician, sub-contractor.
  - **Paulie DeStefano** (lead crew): 401-555-0421. Calls and texts.
  - **Danny Oliveira** (crew): 401-555-0387. Calls and texts.
  - **Mike Russo** (apprentice): 401-555-0443. Calls and texts.
  - **Frank Desmond** (carpentry sub): 401-555-0509, frank.desmond.builds@gmail.com.
  - **Suppliers**: Baxter's Plumbing Supply, Atlantic Building Materials. Account numbers held with Mark.
  - **Providers**: Providence Primary Care Associates (primary care), Dr. Lisa Yoon at Eastside Spine & Wellness (chiropractor).
  - **Home address**: Elmhurst, Providence, RI. Full street address held privately, shared only on confirmation.
  
  ## Connected Accounts
  
  - **Gmail**: jessica.murray@Finthesiss.ai. Personal plus client and supplier correspondence.
  - **Google Calendar**: jessica.murray@Finthesiss.ai. Jobs, estimates, family events, appointments.
  - **Business Facebook page**: Mark posts. Jessica does not log in.
  - **Personal Facebook**: Account exists, never checked.
  
  ## Preferences
  
  - **Reading**: Skims the Providence Journal online. Reads Plumbing & Mechanical and code updates when the job requires it. Almost never reads fiction.
  - **Music**: Classic rock in the truck. Springsteen on the longer drives.
  - **TV and sports**: Red Sox spring through fall, Patriots fall and winter. Game on in the background during evenings.
  - **Beer**: Narragansett lager or Sam Adams. A few on weekends, rarely on work nights.
  - **Comfort foods**: A meatball sub from a deli that does it right, Dorothy's lasagna, buttered toast, very strong black coffee in a chipped mug she has owned for fifteen years.
  - **Comfort sounds**: Baseball on the radio, rain on the roof of the truck, Laura laughing.
  - **Wardrobe**: Durable jeans, flannels in winter, fitted T-shirts in summer, one Carhartt jacket she has owned for ten years. One nicer outfit for funerals, weddings, and the rare client dinner.
  - **Aesthetic**: Solid materials, clean joinery, function over decoration.
  - **Shopping**: Researches tools for hours. Buys T-shirts off the sale rack without looking. Brand-loyal where the brand has earned it.
  - **Local first**: Drives across town to a hardware store run by someone she knows rather than save fifteen minutes at a big-box.
  - **Gifting**: Practical, well-considered. Christmas shopping starts in October, mostly done by Thanksgiving.
  - **Travel**: Prefers familiar places. Cape Cod, the White Mountains in October, the Maine coast. Packs light, refuses to check a bag.
  - **Sensory likes**: Cut wood, fresh-cut grass, a basement after a week of rain, Dorothy's kitchen on a Sunday morning, the weight of a well-balanced tool.
  - **Sensory dislikes**: Fluorescent overhead light, synthetic fragrance, dryer-sheet smell, new-car plastic, TVs playing news in waiting rooms.
  - **Pet peeves**: "It's just plumbing." People who run late twice. Automated phone trees. Clients who change their mind after demo. Condescension dressed up as politeness. Romaine lettuce.
  
