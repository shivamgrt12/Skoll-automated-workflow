  - **Sunday, 10:40 AM**: Leave for brunch at Dorothy's house in Cranston. Brunch starts at 11:00. Missing it requires a serious reason.
  
  ### Monthly
  
  - **1st of each month**: Sit down with Mark to review business expenses and cash flow for the month ahead.
  
  ### Seasonal / Variable
  
  - **April through November**: Busy season. Shorter fuse, longer days, weekend catch-up work more common.
  - **December through March**: Slower season. More home projects, more reflection, more time at the kitchen table.
  
