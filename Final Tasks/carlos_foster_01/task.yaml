  ## MEMORY.md

  # Memory: Carlos Foster

  ## Personal Profile
  Carlos Foster is a game developer, co-founder and lead designer at Moonstone Games, a self-funded indie studio. He holds a BS in Computer Science from the University of Washington (2018) and is otherwise self-taught in game design and pixel art. He is creative and detail-obsessed, the kind of person who will spend four hours getting a single animation frame right. Introverted but collaborative, he is quiet in crowds and comes alive in small-team brainstorms. He is a gamer to the core and sees the world through game-design lenses, and he is deeply ambitious: he wants Moonstone to be the next Supergiant Games or Team Cherry. He does his best creative work between 10 PM and 3 AM, deflects praise with self-deprecating humor, and cares far more about quality than he lets on. He grew up in a close Mexican-American family and learned to cook from his mother.

  ## Key Relationships
  - **Mia Torres (girlfriend)**: born January 9, 1999 (age 27). UX designer at a tech startup. Gives UI and UX feedback on Verdant Hollow, usually on Sundays when Carlos shows her builds. Pescatarian, runs three times a week, bakes when stressed.
  - **Tyler Brennan (roommate and co-founder)**: born February 14, 1996 (age 30). Programmer at Moonstone and best friend since the University of Washington. Handles engine and programming sprints. Keeps a chaotic, multi-monitor room and lives on energy drinks during crunch.
  - **Ricardo Foster (father)**: born March 22, 1968 (age 58). Software engineer at Pinnacle Software, lives in Bellevue. Manages mild hypertension with lifestyle changes.
  - **Elena Foster (mother)**: born November 18, 1969 (age 56). Accountant in Bellevue. Hosts monthly Sunday family dinner with Mexican-American fusion cooking.
  - **Sofia Foster (sister)**: born March 15, 2000 (age 26). In dental school at the University of Washington School of Dentistry. Busy and stressed; Carlos checks in weekly.
  - **Alex Kowalski (composer)**: Freelance, composing the Verdant Hollow soundtrack of 22 tracks, 14 done. Prefers WhatsApp voice notes.
  - **Sam Reeves (publisher contact)**: At Ember Gate Publishing, met at PAX. Expressed interest in Verdant Hollow after the demo.
  - **Jordan Park (D&D friend and game dev)**: Works at Ironforge Studios, part of the Saturday campaign.

  ## Work & Projects
  After graduating in 2018, Carlos spent three years as a junior developer at Pinnacle Software (where his father also works), then left in mid-2021 to go freelance with pixel-art commissions and game-jam consulting. He and Tyler co-founded Moonstone Games in late 2024 and began work on Verdant Hollow in January 2025. Moonstone runs out of a home office: Carlos and Tyler work from the spare bedroom of their shared apartment, "the studio." Carlos owns design, art, and narrative; Tyler owns programming and engine; Alex is the freelance composer. Carlos typically works noon to 3 AM with breaks. The current project, Verdant Hollow, is a 2D action-RPG with pixel art, metroidvania exploration, and narrative choices, built in Unity with art in Aseprite and version control on GitHub. It is 18 months in, targeting Steam Early Access in November. The current phase is Act 2 level design, boss encounters, and UI polish. The Steam demo has 1,200 wishlists growing about 8% month over month. Publisher discussions are open with Ember Gate Publishing (Sam Reeves, interest but no formal offer) and Pixel North Games (wants to see the Early Access build); Tyler prefers self-publishing, Carlos is open to a deal. Targets include Steam Next Fest demo showcase, PAX West via an indie MEGABOOTH application, and weekly Tuesday playtests with five beta testers over Discord. Carlos handles marketing on Twitter/X (@moonstonegames, 4,500 followers).

  ## Finance
  - Self-funded studio: $45,000 invested so far. Monthly studio burn rate is $2,800 (Alex's contract, software licenses, hardware, marketing), leaving roughly 8 months of runway before revenue or funding is needed.
  - Carlos's savings: $38,000 remaining, down from $65,000 before starting Moonstone. Freelance income $1,500 to $2,500 per month from pixel-art commissions and game-jam prizes.
  - Household: Tyler earns about $3,000 per month freelance; Mia's salary is $95,000. Rent is $2,800 per month split three ways (Carlos $1,050, Tyler $1,050, Mia $700). No student loans (scholarship plus parents).
  - Emergency fund: $12,000 in Meridian Savings at 4.0% APY. Health insurance now via marketplace at $320 per month.
  - Files taxes as self-employed via TurboTax. Considering forming a Washington LLC for Moonstone. PAX booth at $3,000 is the biggest near-term expense.

  ## Health & Wellness
  - Generally healthy but very sedentary: sits at his desk 12 to 16 hours daily. Weight 165 at 5 feet 9 inches, stable.
  - Mild carpal tunnel from drawing and coding; wears a wrist brace at night sometimes. Eye strain managed with blue-light glasses, the 20-20-20 rule, and eye drops.
  - Takes vitamin D (2000 IU, a Pacific Northwest necessity), B12, and glucosamine for his wrists. Last physical in January: bloodwork normal, vitamin D deficiency flagged and corrected.
  - Sleep schedule is poor, usually 3 AM to 11 AM, worse during crunch.
  - Providers: Dr. Jennifer Wu (dentist, Bellevue), currently six months overdue for a cleaning; Dr. Mark Yoon (chiropractor) when desk-posture back pain flares.
  - Eats everything but defaults to Latin food. Accommodates Mia's pescatarian diet when they cook together.

  ## Interests & Hobbies
  - Game design: obsessively studies level design, narrative mechanics, and game feel.
  - Pixel art: draws game assets and personal pieces and posts process videos online.
  - Pixel-art teaching: Occasionally runs informal pixel-art workshops, posting materials on Google Classroom for aspiring indie developers.
  - D&D: runs a weekly Saturday campaign as DM for five friends, an elaborate homebrew world called "The Shattered Crown," about 8 months in.
  - Anime and manga: seasonal watcher; favorites include Mob Psycho 100, Cowboy Bebop, and Chainsaw Man.
  - Indie game festivals: PAX, IndieCade, Day of the Devs; lives for demo feedback.
  - Retro gaming: collects SNES and GBA carts, speedruns Super Metroid, most prized cart is an original Chrono Trigger.
  - Taco-hunting: ranks every taco spot in the Seattle and Bellevue area in a spreadsheet.
  - Coding side projects: game jams, small tools, and shader experiments.

  ## Home & Living
  - 3-bedroom apartment in downtown Bellevue, 1,600 square feet, modern building, on a 1 Gbps fiber line that is non-negotiable for game dev and playtesting.
  - "The Studio": spare bedroom converted to a workspace with two desks, dual-monitor setups, and a whiteboard wall. Carlos's desk has an Autonomous SmartDesk, an Aeron chair, a Wacom Cintiq, and dual 4K monitors.
  - Living room is a gaming setup: 65-inch OLED TV, gaming PC, Switch dock, retro console shelf. Mia keeps a minimalist standing desk in the bedroom. Tyler's room is chaotic with a mechanical keyboard collection.
  - Kitchen is decent but underused, mostly Carlos's arroz con pollo and Mia's baking. Small balcony with one struggling potted basil plant. Upstairs neighbors are loud on weekends; Carlos games in headphones.
  - Lease renews in December; he is considering a place with a dedicated office room.

  ## Devices & Services
  - Custom-built gaming PC (RTX 4080, 32GB RAM), MacBook Air for travel, iPhone 15, iPad Pro with Procreate for digital art.
  - Game-dev tools on-machine: Aseprite for pixel art, Unity engine, GitHub for version control, plus a Steam developer account for Moonstone.
  - Consoles: Nintendo Switch, Steam Deck, SNES Classic, and the retro cart collection.
  - Subscriptions: Spotify, Crunchyroll, Netflix, YouTube Premium.

