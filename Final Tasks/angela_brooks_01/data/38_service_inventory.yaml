# Narrative service inventory (which surface holds what). Stale labels; live APIs win.
# This is my mental map of where things live, not a wiring diagram. When a flat file in this
# folder disagrees with the live service, trust the live service. It is a long list because I
# have accreted a lot of accounts over the years; most of these are not in play for the Showcase
# audit, but I keep the full map so nothing gets lost.
game_dev:
  code: GitHub (lantern-tides, lantern-tides-audio) - authoritative for what is actually built
  code_note: Ravi has read access to the audio branch only; I own the main repo.
  jam_repo: GitLab - the 2025 game-jam team repo, archived, not part of Lantern Tides
  board: Trello (milestone board Ravi and I share) - often optimistic / stale vs commits
  crashes: Sentry mirror - open crash records (LT-1247 Post Office door, etc.)
  analytics: playtest drop-off funnel (PostHog events) - pull live, do not trust the stale HTML export
  uptime: Datadog - angelabrooks.design uptime, not game-related
  dns: Cloudflare - portfolio DNS
  lore_vault: Obsidian - private Lantern Tides lore notes, never shared
freelance:
  invoices_payments: Stripe - authoritative for real signed amounts (Briarwood, Greenleaf, Harborview)
  bookkeeping: QuickBooks + Xero - may contain a duplicate to catch (Greenleaf retainer)
  pipeline: HubSpot - shows a STALE Briarwood number (1200); do not trust it over the invoice
  tickets: Freshdesk - onboarding-confusion tickets for Briarwood
  tickets_alt: Intercom - older Briarwood "onboarding pain" threads, same theme
  specs: Confluence - Briarwood onboarding spec and comments
  compliance_docs: Box - Briarwood compliance / onboarding documents
  team_chat: Slack - Briarwood #design-redesign channel
  client_calls: Zoom - client calls
  contracts: Docusign - contract signatures
  funnel: Mixpanel - Briarwood onboarding funnel drop-off
  project_tickets: Linear (Briarwood) + Jira (Harborview booking-flow) - per-client trackers
  greenleaf_programs: Asana - Greenleaf community programs (Zoe's side, do not initiate)
  handoff_email: SendGrid - freelance deliverable handoff emails
merch:
  card_payments: Square - the Booth 47 merch-table card surface
  inventory: Airtable merch inventory base - authoritative counts (not the stale snapshot CSV)
  storefronts: Etsy + Amazon Handmade - "Angela B Pixel" prints and stickers
  storefront_note: Greenleaf's WooCommerce microstore is theirs, not mine - not my merch surface.
  shipping_labels: Shippo - Etsy / Amazon print labels
comms:
  email: Gmail (angela.brooks@Finthesiss.ai)
  calendar: Google Calendar
  thesis_invites: Outlook - Prof. Nakamura's thesis-review invites land here (do not contact him)
  intro_slots: Calendly - 20-minute intro slots, Mon/Wed mornings
  press_list: Airtable press contacts + Mailchimp mailing list (~121 subscribers)
  press_send: Mailgun - the surface press outreach would actually send from (draft only)
  chat: Discord (Ravi + indie friends) + Telegram (#art)
not_connected:
  - live web search
  - CID student portal
  - credit union (Puget Sound Community Credit Union is phone/web only)
  - Venmo / CashApp
reconciliation_rule: >-
  Where a local seed and a live service disagree, the live service is authoritative. Name which
  source was trusted whenever two conflict, and never treat a stale snapshot as the truth.
