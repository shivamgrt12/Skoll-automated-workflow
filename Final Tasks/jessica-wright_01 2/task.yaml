  ## MEMORY.md

  # Memory: Jessica Wright

  ## Personal Profile
  Jessica Wright (née Khoury) is a principal interior designer and small-business owner who grew up in suburban Arizona, moved east for design school, and built her life in Washington, DC. She holds a BFA in Interior Design from Ellsworth School of the Arts and Design (2002) and is NCIDQ-certified. She is quietly rooted but widely curious, drawing on Mediterranean tile work, Japanese minimalism, and Scandinavian light without feeling scattered by the range. She treats beauty as structural rather than decorative, composing rooms with a logic of light and material. She is flexible about style and unyielding about quality, and clients sometimes mistake that standard for rigidity. Her perfectionism is both her greatest asset and her likeliest path to burnout, and she knows it. The hostess gene runs deep: her mother taught her a guest should never want for anything, and her dinner parties are warm, considered, and effortful behind an effortless surface.

  ## Key Relationships
  - **Gregory "Greg" Wright (husband, 48, born February 22, 1978)**: Environmental-law attorney at Whitfield and Crane LLP in downtown DC. Methodical and calm where she is intuitive and expressive. Handles family finances and weekend grocery runs. They disagree on renovation timelines and agree on everything that matters.
  - **Layla Wright (daughter, 14, born December 3, 2011)**: Freshman at Brookhaven Academy. Studious, opinionated, plays violin in the school orchestra. Close with her grandparents and sometimes helps coordinate the Sunday calls.
  - **Nabil Wright (son, 11, born January 19, 2015)**: Sixth grader at Brookhaven Academy. Energetic, social, into basketball and video games. Easy kid, starting to need more structure as middle school picks up.
  - **Kamal Khoury (father, 78, born November 2, 1947)**: Retired civil engineer in Arizona. Declining health, mobility issues, and early-stage memory concerns. Jessica calls every Sunday and sends money monthly; she has not seen him in person since 2024.
  - **Dina Khoury (mother, 74, born February 14, 1952)**: Homemaker in Arizona. Sharp, proud, manages Kamal's care with iron will and will not ask for help. Talks with Jessica every Sunday and sometimes midweek when urgent.
  - **Priya Chandran (design assistant, 29)**: Part-time at Wright Interiors. Handles vendor coordination, sample orders, and some client communication. Reliable and learning fast; Jessica is training her toward project management.
  - **Rania Haddad (closest friend, 44, born October 26, 1981)**: Pediatrician in Bethesda; they met through a mutual friend fifteen years ago. Dinner monthly, texts daily. The person Jessica is most honest with about stress.
  - **Claire Pemberton (key client, around 55)**: Repeat client on a Georgetown townhouse renovation, their third project together. Demanding but respectful. Biggest active revenue source.

  ## Work & Projects
  Principal designer and owner of Wright Interiors, a sole proprietorship registered in DC and roughly three years old as an independent firm, founded 2023. After earning her BFA in 2002 she worked as a junior then associate designer at Lowell and Park Interiors in DC from 2002 to 2013, then spent ten years as a senior designer at Hargrove Design Associates from 2013 to 2023 before going independent, a continuous timeline with no gaps. No physical studio; she works from a dedicated second-floor home office plus client sites. Full-service residential interior design: concept, sourcing, vendor management, and installation oversight. She typically juggles three to five active projects, with client meetings usually Tuesday and Thursday and site visits as needed. The flagship active project is the Pemberton Georgetown townhouse renovation, now in its Phase 2 design reveal cycle. She drives a 2022 Volvo XC60 to client sites and vendor showrooms.

  ## Finance
  Combined household income is about $310,000 a year (Jessica roughly $110,000 net from the firm; Greg roughly $200,000), with combined monthly take-home around $18,500. Major monthly outflows include the $3,200 mortgage, $3,400 in Brookhaven tuition for both kids, $1,800 for Priya's part-time salary, $1,100 groceries, $600 sent to her parents, a $520 Volvo payment, and roughly $1,500 to savings. Savings sit around $85,000 joint at Capital One; Greg's 401(k) is about $420,000, Jessica's SEP IRA about $65,000, and the kids' 529 plans about $45,000 combined. Debt is roughly $18,000 left on the Volvo loan and about $380,000 on the mortgage, with no carried credit card balance. Greg manages investments and big-picture planning; Jessica manages household spending and business finances; they review together quarterly. Conservative but not anxious, living within their means with cushion.

  ## Health & Wellness
  Jessica is generally healthy, with annual physicals and up-to-date screenings. She gets mild tension headaches during high-stress project phases, managed with hydration and reduced screen time. She walks three to four times a week in Rock Creek Park, about 45 minutes at a brisk pace, and takes a Saturday 9:00 AM Pilates class at Core Balance Studio. She sleeps a solid seven hours most nights, occasionally disrupted by worry about her parents. No formal therapy; she processes through Rania, long walks, and her work. No dietary restrictions for her or the family. The kids are both healthy with no ongoing issues; their pediatrician is Dr. Nina Aswad at Georgetown Family Pediatrics.

  ## Interests & Hobbies
  - Cooking and hosting: American and Mediterranean cuisine, with Sunday family dinners a full homemade production and the kids conscripted to help. Greg handles weekend breakfasts, which she lovingly critiques.
  - Dinner parties: legendary among friends, warm rather than ostentatious, hosted in the backyard under string lights in warm months.
  - Walking: brisk Rock Creek Park walks as thinking time.
  - Design culture: reads design monographs and Architectural Digest, and builds on saved inspiration spanning Mediterranean, Japanese, and Scandinavian influences.
  - Music and reading: indie folk, Chopin, and ambient electronica while working; currently reading "The Geometry of Light" by S. Hariri.

  ## Home & Living
  A four-bedroom colonial on Calvert Street NW in Woodley Park, about 2,800 square feet, purchased 2014 with a mortgage through 2044. Hardwood floors throughout and restored moldings. Jessica renovated the kitchen herself in 2022 and the primary bathroom in 2024, treating the home as a portfolio piece. The open-concept kitchen has custom cabinetry, marble counters, and a professional-grade range, and is her favorite room. Her second-floor home office holds a large drafting desk, material-library shelves, and a backyard view. The backyard has mature trees and a small patio with string lights for hosting. Two cars: her 2022 Volvo XC60 and Greg's 2020 BMW 3 Series, with garage plus street parking.

  ## Devices & Services
  - **Phone**: iPhone 15 Pro, personal line.
  - **Laptop**: MacBook Pro 16 inch (2023), her primary work machine, running AutoCAD, SketchUp, and Adobe Creative Suite.
  - **Tablet**: iPad Pro with Apple Pencil for on-site sketching and showing clients renderings.
  - **Streaming**: Netflix, HBO Max, and Spotify on a family plan.
  - **Cloud**: Google Drive (personal and business overlap) and iCloud.
  - **Business tools**: QuickBooks for invoicing, Houzz Pro for project management, and an Instagram business account (@wrightinteriors).
  - **Banking**: Capital One joint checking and savings, and Vanguard for investments including the SEP IRA.

  ## Contacts
  - **Gregory "Greg" Wright (husband)**: text, (202) 555-0134, greg.wright.dc@gmail.com. Attorney at Whitfield and Crane.
  - **Layla Wright (daughter)**: text, (202) 555-0178, layla.wright.dc@gmail.com. Age 14, has her own phone.
  - **Nabil Wright (son)**: age 11, no phone yet.
  - **Kamal Khoury (father)**: (480) 555-0041, in Arizona, Sunday calls.
  - **Dina Khoury (mother)**: (480) 555-0042, in Arizona, shares a line with Kamal.
  - **Priya Chandran (design assistant)**: (202) 555-0256, priya.chandran.dc@gmail.com, part-time at Wright Interiors.
  - **Rania Haddad (best friend)**: (301) 555-0319, rania.haddad.md@gmail.com, pediatrician in Bethesda.
  - **Claire Pemberton (key client)**: (202) 555-0387, claire.pemberton.dc@gmail.com, Georgetown townhouse project.

  ## Connected Accounts
  - **Workspace email (jessica.wright@Finthesiss.ai)**: Gmail, Google Calendar, Google Contacts, and Google Drive are all connected, used for personal correspondence, scheduling, contacts, and personal and business project folders.
  - **Work email (jessica@wrightinteriors.com)**: Not connected to OpenClaw; client communication happens there.

  ## Preferences
  - **Communication**: Email for professional matters, text for personal, WhatsApp for family. Prefers written over phone calls except with close friends.
  - **Shopping**: Deliberate and research-heavy for work materials and furnishings; efficient and decisive for personal shopping.
  - **Design taste**: Residential interiors blending Mediterranean and contemporary, drawn to natural materials, warm neutrals, and layered textures. Dislikes trends for their own sake.
  - **Coffee and drink**: Espresso in the morning as ritual, iced coffee in the afternoon as fuel, a glass of red wine with dinner, and silent judgment for instant coffee.
  - **Music**: Indie folk, Chopin, and ambient electronica while working, pop when cooking; Layla has gotten her into some indie artists.
  - **Reading**: Design monographs, Architectural Digest, and occasional literary fiction.
  - **Comfort**: Sunday calls with her parents, cooking for friends, the quiet first hour in her office before anyone wakes, and Layla practicing violin downstairs.

