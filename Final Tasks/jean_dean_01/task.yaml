  # Memory: Jean Marie Dean

  ## Personal Profile
  - **Heritage**: Irish-American with roots in County Cork through her mother's family, who emigrated in the 1960s.
  - **Parents**: Mother Kathleen "Kate" Murray is Irish-American; father Robert Dean (deceased 2020) was a white American Air Force veteran.
  - **Upbringing**: Grew up bridging her mother's warmth, superstition, and church with her father's Midwestern steadiness.
  - **Education**: AS in Dental Hygiene from Columbus State Community College (2003), licensed RDH in Ohio (DH.021847).
  - **Faith**: Raised Irish-American Catholic; keeps the practice for her mother and community rather than from conviction.
  - **Personality**: Meticulous, reserved, and quietly competitive with a dry wit around orchid-show politics.
  - **Social style**: Introverted and recharges alone in the greenhouse; warm once trust is earned, fiercely loyal.
  - **Core values**: Believes anything worth having takes time and care; distrusts shortcuts and treats family as the axis of decisions.

  ## Key Relationships
  - **Craig Dean (husband)**: 46, born March 3, 1980. Middle school math teacher at Westgrove Academy; steady and supportive.
  - **Emma Dean (daughter)**: 10, born October 8, 2015. Fifth grade at Cedarbrook Elementary; loves drawing and soccer; transitioning to middle school at Westgrove next year. The center of Jean's world.
  - **Kathleen "Kate" Murray (mother, "Mom")**: 72, born February 14, 1954. Widowed, lives alone in a condo twenty minutes away; retired florist shop owner, devoted to her parish, lonely since Robert's death. Jean manages her appointments.
  - **Robert Dean (father, deceased)**: was 68; Air Force veteran and retired postal worker; died in 2020 of pancreatic cancer. Jean and Kate still grieve him.
  - **Patrick Murray-Dean (brother)**: 40, born January 14, 1986. Pharmacist in Portland, Oregon; married with two children; visits Columbus once a year.
  - **Sarah Mitchell (best friend)**: 43, born December 3, 1982. Irish-American accountant; bonded with Jean over big Irish families; monthly dinner dates. Her husband Richard Mitchell is the family CPA.
  - **Dr. Thomas Garrett (employer)**: 50, owner of Ridgewood Family Dentistry; Jean's boss for twelve years; good professional relationship.
  - **Dorothy Kendall (orchid rival and friend)**: 62, retired professor and fellow competitive grower; a friendly rivalry that pushes them both at shows.
  - **Coach Kevin Walsh (Emma's soccer)**: 38, runs the youth league team Emma plays on.
  - **Dental colleagues**: hygienists Megan Foster and Rachel Burke, and front-desk lead Nancy Crawford.

  ## Work & Projects
  - **Current role**: Registered Dental Hygienist at Ridgewood Family Dentistry in Columbus, twelve years at the practice.
  - **Prior positions**: Polaris Family Dental (2003-2009) and Scioto Valley Dental Group (2009-2014) in Columbus.
  - **Daily work**: Sees eight to ten patients a day for cleanings, scaling, root planing, X-rays, fluoride, and patient education.
  - **Compensation**: Earns $78,000 a year, reporting to Dr. Thomas Garrett with two other hygienists and front-desk lead Nancy Crawford.
  - **CE progress**: Needs 15 CE hours by December for Ohio license renewal, currently at 6 hours completed.
  - **Orchid society role**: Vice president of the Columbus Orchid Society, keeping 200-plus orchids and competing nationally.
  - **Show highlight**: Won Best in Show at the Central Ohio Orchid Festival 2025 with a Paphiopedilum rothschildianum.
  - **Current prep**: Preparing six plants for the Midwest Regional Orchid Show in December 2026.
  - **Career concern**: Monitoring the long-term impact of bilateral carpal tunnel on her dental hygiene career.

  ## Finance
  - **Household income**: Combined gross about $132K a year, with Jean earning $78K and Craig earning $54K.
  - **Mortgage**: $1,850 a month on the Upper Arlington house, 20 years remaining at 3.5% after a 2021 refinance.
  - **Home value**: Approximately $485K, purchased in 2016 at $310K, with property tax of $4,800 a year.
  - **Monthly essentials**: Groceries $800, dining $200, utilities $260, gas and auto $280, streaming and phone $140.
  - **Family expenses**: Emma's activities $180, Mom support $300, orchid supplies $200, greenhouse utilities $120.
  - **Auto loan**: Craig's Subaru payment $340 a month with one year remaining on the balance.
  - **Insurance**: About $750 a month total; GEICO auto at $1,700 a year; orchid collection rider at $15K.
  - **Jean's 401(k)**: Balance $195K at Herongate Partners, contributing 8% with a 3% practice match.
  - **Craig's 403(b)**: Balance $88K through his school district retirement plan.
  - **Emma's 529**: Balance $42K with $350 a month contributed toward college savings.
  - **Emergency fund**: $28K in Silverpeak Credit Union HYSA at 4.1% APY, nearly at the $30K target.
  - **Tax preparation**: Handled by CPA Richard Mitchell at a family rate.

  ## Health & Wellness
  - **Carpal tunnel**: Bilateral wrist condition from hygiene work; wears night splints and does stretches between patients.
  - **Carpal tunnel care**: Considering cortisone injections with Dr. Karen Liu if physical therapy fails by year-end.
  - **Ergonomic aids**: Uses an ergonomic chair and loupes at the operatory to reduce wrist and neck strain.
  - **Migraines**: Two to three a month, triggered by weather changes, stress, and strong floral perfume.
  - **Migraine treatment**: Takes Sumatriptan 50mg as needed and Magnesium 400mg for prevention; tracks triggers in a diary.
  - **Dental care**: Cleanings every six months at Ridgewood, last completed in February 2026.
  - **Kate's osteoporosis**: Takes Alendronate 70mg weekly on Sundays and Atorvastatin 20mg daily for cholesterol.
  - **Kate's mental health**: Loneliness and mild depression worsened after Robert's death; she refuses formal therapy.
