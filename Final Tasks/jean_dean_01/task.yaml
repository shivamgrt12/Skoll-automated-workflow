  - **Reading**: Enjoys Louise Penny and Tana French mysteries, botanical references, and Irish literature by Toibin and Rooney.
  - **Yoga**: Practices twice a week at home as part of her physical wellness and stress management routine.
  - **Community**: Volunteers with the Columbus Irish Heritage Association and helps organize local Irish-American events and programming.

