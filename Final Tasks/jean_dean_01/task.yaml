  ## Interests & Hobbies
  - **Orchid growing**: Keeps 200-plus plants specializing in Phalaenopsis, Cattleya, and rare Paphiopedilum with culture notes per plant.
  - **Irish cooking**: Learned from her mother; makes stew, soda bread, shepherd's pie, colcannon, and beef and Guinness pie.
