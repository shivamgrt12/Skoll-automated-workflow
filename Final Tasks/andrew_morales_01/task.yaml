  ## MEMORY.md

  # Memory: Andrew Morales

  ## Personal Profile
  Andrew was born with melody in his blood. His grandmother sang in a San Antonio mariachi ensemble, his mother played piano in Tejano dance halls, and he learned to harmonize before he could read, carrying three generations of Latino Southern music in his throat. He is Hispanic and Latino: his mother's family is Mexican-American from San Antonio and his father's family is from El Paso, and he was born and raised in San Antonio. His father passed when Andrew was 15, and music was how he survived the grief. He earned an A.A. in Music Performance from Alamo City Community College in 2012 and attended Ridgeline School of Music songwriting workshops in 2014 and 2015 as a non-degree student. He lives in the tension between two Nashvilles, the country music machine that wants his voice but not always his face, and the Latino creative community that raised him up and keeps him grounded. He is deeply Tejano in ways Nashville does not always understand: he cooks mole from scratch, speaks Spanish with his Abuelita, treats Dia de los Muertos like a holy day, and carries hot sauce in his pocket without irony. Quietly ambitious beneath an easy charm, he wants a solo record deal, not just session work, and will not compromise his sound for a trend or turn in a song that feels dishonest even when the money is good. He is generous with his talent to a fault, and he carries the specific loneliness of being excellent at something the industry treats as secondary.

  ## Key Relationships
  - **Rosa Morales (mother, "Mamá")**: 62, born October 15, 1963. Retired school cafeteria manager in San Antonio. Andrew's emotional rock. Calls every evening, sends care packages of Tajin and pan dulce.
  - **Carlos Morales (brother)**: 37, born March 22, 1989. Construction foreman in El Paso. Protective older brother, divorced, two kids (Diego and Sofia). Supportive even if he does not get the Nashville world.
  - **Elena Morales (grandmother, "Abuelita")**: 84, born December 21, 1941. Lives in San Antonio. Former mariachi band director and Andrew's musical foundation. Health fragile, with congestive heart failure and limited mobility.
  - **Tomás Morales (father, deceased)**: born February 4, 1960, passed in 2007 of a heart attack at 47, when Andrew was 15. El Paso steelworker and weekend conjunto bassist; the silence he left is why Andrew writes.
  - **Keisha Trent**: 34, born February 9, 1992. Andrew's best friend in Nashville and a fellow session singer. Met at a recording session in 2016, inseparable since. His sounding board for everything.
  - **Derek "DT" Thompson**: 40, producer at Copperline Studios. Produces Andrew's demo EP and believes in his solo potential. Has produced tracks for several mid-tier country artists.
  - **Vanessa Holt**: 45, Andrew's contact at Silverbell Music Group. His publishing representative, who pitches his songs to artists. Professional relationship with mutual respect.
  - **Diego Morales (nephew)**: 9, born October 18, 2016. Carlos's son. Andrew's favorite person under four feet tall. FaceTimes him every Saturday and sends books.
  - **Sofia Morales (niece)**: 8, born March 5, 2018. Carlos's daughter. Obsessed with Andrew's cowboy boots, wants to be a singer like her tío.
  - **Pastor Evelyn Rhodes**: 55, senior pastor at New Harvest Fellowship, Nashville. Andrew's spiritual anchor since moving to Nashville.
  - **Terrell Boyd**: 36, sound engineer at Copperline Studios. Works most of Andrew's sessions, quiet and brilliant. Andrew has a low-key crush he will not act on because he values the working relationship.
  - **Reggie Fontenot**: 38, born February 11, 1988. Andrew's cousin in San Antonio and his closest family member his age. They grew up like siblings. High school music teacher.

  ## Work & Projects
  - **Session singing**: Sings backup and harmony at studios across Nashville, primarily Copperline Studios, also Magnolia Sound and Bluebird Track Studio. Booked through word of mouth, typically three to five sessions per week at $250 to $400 per session (three to four hours), sometimes union scale for larger productions. Known for blending into any vocal style, from mariachi belt to breathy country whisper in one take. Regular clients include producers DT Thompson, Hank Beaumont, and Lisa Nakamura.
  - **Songwriting**: Publishing deal with Silverbell Music Group since 2022; they pitch his songs to country artists. Monthly advance of $2,000 against future royalties. Three songs recorded by other artists, the biggest a track on Carly Thornton's album that reached number 42 on country radio. Co-writes two to three times a week with rotating Nashville writers, scheduled through Vanessa. Keeps all original drafts, voice memos, and timestamped lyric sheets in Drive after learning the hard way about proving authorship.
  - **Solo demo EP**: Recording a five-song demo EP at Copperline Studios with DT Thompson producing. Self-funded, budget around $8,000 total, roughly $5,200 spent. Three of five songs tracked, two remaining, targeting completion ahead of formal pitching to labels and A&R contacts beginning October 2026. Goal is to use the EP to pitch for a solo artist development deal with a label.

  ## Finance
  - **Income**: Session income around $55,000 a year (variable). Publishing advance of $2,000 a month ($24,000 a year) from Silverbell. Royalty income around $3,500 a year and growing. Total gross around $82,500 a year.
  - **Monthly outflow**: Rent $1,450 (1BR in East Nashville), utilities around $120, phone $65, Spotify $11.99, yoga $89 (Sunrise Flow unlimited), therapy copay around $120 a month (Ridgecrest Health Insurance), groceries around $350, rideshare around $200 (no car). Sends Mamá $300 a month, non-negotiable.
  - **EP costs**: Around $2,800 remaining to budget across the final tracking, mix, and master window.
  - **Savings**: Around $8,200 in checking and $4,500 in savings at Heartland Credit Union. No retirement account yet; he knows he needs to start.
  - **Stress**: Moderate. Income is decent but unpredictable, EP costs are a stretch, and there is no safety net.

  ## Health & Wellness
  - **Vocal health**: Treats his voice as a professional instrument. Vocal-cord nodule scare in 2023, resolved with rest and vocal therapy; now does daily vocal exercises to prevent recurrence. ENT checkup every six months with Dr. Brenda Gilliam at Harmony Point Medical.
  - **Physical**: Good overall. Mild acid reflux triggered by spicy food and late-night eating, managed with omeprazole as needed. Last physical November 2025 at Harmony Point Medical, next due November 2026. Dental cleaning every six months at Cumberland Smile Dental. No food allergies.
  - **Mental health**: Manages anxiety, especially around career uncertainty. Sees therapist Dr. Lorraine Hicks every other week, started after the 2023 vocal scare. Seasonal low mood in January and February through the gray Nashville winter.
  - **Fitness and sleep**: Yoga Monday, Wednesday, and Friday mornings (7:30 AM class at Sunrise Flow) for vocal-cord health and anxiety. Neighborhood walks for songwriting inspiration, occasional hiking at Radnor Lake. Sleeps seven to eight hours, but late studio sessions can push bedtime to 1 or 2 AM, then he sleeps until 9.
  - **Dietary (medical)**: No strict restrictions. Trying to eat more vegetables per his doctor. Avoids spicy and late-night food when reflux is acting up.

  ## Interests & Hobbies
  - Songwriting beyond work: carries a pocket notebook everywhere, keeps a voice-memo folder of 400-plus melodic fragments, writes two to three new songs a month minimum.
  - Cooking Tex-Mex, learned from his Abuelita Elena. Makes tamales, enchiladas, carne asada, and churros from scratch.
  - Vintage shopping for stage-worthy clothing; collects vintage cowboy boots (14 pairs) with an eye for 1970s Western wear.
  - Gardening: a small balcony herb garden of basil, thyme, rosemary, and cayenne peppers. He talks to his plants.
  - Live music: songwriter rounds at The Riverstone Listening Room and honky-tonks on lower Broadway, always taking mental notes.
  - Church singing in the choir at New Harvest Fellowship; the mariachi roots are non-negotiable.
  - Yoga, started two years ago for vocal-cord health and anxiety, three times a week.

  ## Home & Living
  - 1BR apartment in East Nashville, a creative neighborhood within walking distance of coffee shops and music venues.
  - Second-floor walk-up in a converted Victorian house, hardwood floors, high ceilings.
  - Living room doubles as a music workspace: keyboard, mic stand, wall-mounted acoustic guitar, lyric notebooks stacked on the coffee table.
  - Kitchen is his pride, with a cast iron skillet from Abuelita and a full spice rack.
  - Balcony herb garden in terra cotta pots. Vintage cowboy boot collection displayed on a shelf by the front door.
  - No car; sold it in 2024. Walks, rideshares, and borrows Keisha's truck for errands and gear transport.

  ## Devices & Services
  - MacBook Air for songwriting, email, lyric documents, and demo file management.
  - iPhone 15, primary device. Voice memos are sacred and it is always in hand.
  - JBL Bluetooth speaker, taken everywhere from kitchen to balcony to bathroom.
  - Home recording setup: audio interface and condenser mic for rough demos and voice-memo polishing.
  - Spotify Premium for research, playlist curation, and studying the market.

