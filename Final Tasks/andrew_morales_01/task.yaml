  - **Food and drink**: Tex-Mex is home base, tamales, pozole every Sunday, enchiladas, and tortas. Cooks four to five nights a week with Sunday meal prep. Nashville hot chicken is his adopted comfort food, with strong opinions on who does it right. Mostly poultry and seafood, red meat occasionally, by preference. Homemade horchata is a staple. Social drinker: bourbon neat, mezcal cocktails when he is feeling San Antonio, wine at songwriter rounds.
  - **Coffee**: Cafe de olla with piloncillo, the San Antonio way, sourcing Cafe Bustelo online.
