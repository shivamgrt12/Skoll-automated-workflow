  ## MEMORY.md

  # Memory: Brian Hall

  ## Personal Profile

  Brian carries an athlete's mindset into everything. He treats challenges like training blocks and is always chasing the next personal record, whether the arena is a patient session, a meal prep, or a clinic growth target. High energy is his baseline, and he is most productive before the sun is fully up, with a 4:45 AM alarm he treats as non-negotiable.

  He is a coach at heart: competitive but collaborative, wanting to win while lifting everyone around him. He is generous with knowledge and will teach anyone who shows up ready to learn, which is why he genuinely invests in the young physical therapists who rotate through his clinic. His Southern roots run deep, shaped by a close-knit family, a love of BBQ and backyard gatherings, and a respect for tradition.

  Education: Doctor of Physical Therapy from Piedmont University and a BS in Kinesiology from Peach State University, where he played Division 3 basketball. Faith is part of the rhythm of his week, anchored by Sunday service at Redeemer Church Midtown. He is FIRE-curious and reads Bogleheads, applying the same disciplined, long-game thinking to money that he applies to training.

  ## Key Relationships

  - **Karen Hall (wife, 36, DOB 1990-03-22)**: pharmacist at MedPlus Pharmacy, Midtown location. Manages household logistics and the twins' school routine. A great cook, lactose intolerant, the co-pilot on the home front.
  - **Ethan Hall (son, 6, DOB 2019-12-14)**: twin, first grade at Atlanta Global Academy, loves soccer. Picky eater, mostly chicken nuggets.
  - **Lily Hall (daughter, 6, DOB 2019-12-14)**: twin, first grade at Atlanta Global Academy, loves drawing and art class. Will eat anything with rice.
  - **Robert Hall (father, 67, DOB 1958-10-22)**: retired civil engineer in Houston. Calls every Sunday at 3 PM ET. Phone preferred.
  - **Linda Hall (mother, 64, DOB 1962-02-10)**: semi-retired accountant who still does tax prep, lives in Houston. Visits every 6 to 8 weeks; famous for her potato salad.
  - **Rachel Hall (sister, 33, DOB 1992-11-08)**: ER nurse at Southlake Regional Hospital in Dallas. Close but both busy; talks weekly, visits 2 to 3 times a year.
  - **Dr. Tom Anderson (associate PT)**: 3 years at the clinic, specializes in ACL rehab.
  - **Marcus Webb (associate PT)**: joined last year, former D1 athletic trainer, handles concussion protocols.
  - **Tamika Reynolds (billing specialist)**: handles insurance credentialing, including the BluePeak Health work.
  - **Darren Whitfield (contractor, Apex Build Group)**: the performance lab buildout and the upcoming patio project.
  - **Ryan Kimura (VALD Performance rep)**: equipment vendor for the performance lab.
  - **Coach Matt Baker (CrossFit Buckhead)**: his CrossFit coach.
  - **Priya Shah and DeAndre Collins (Piedmont DPT students)**: the current clinical rotation students.
  - **Jamal Hendricks (patient, 22)**: college wide receiver, post-ACL reconstruction, return-to-sport testing in progress.

  ## Work & Projects

  Brian owns Peak Performance PT, a sports rehab and performance clinic. Hours are 7:00 AM to 6:30 PM Monday to Friday and Saturday 8 AM to 12 PM on rotating coverage. He personally sees 25 to 30 of the roughly 60 patient visits per week across the practice, with sessions 7 to 12 and 2 to 6 and admin and mentoring over lunch. Staff: 3 PTs including Brian, 3 PT aides, 1 front desk coordinator, and 1 billing specialist.

  The sports performance lab buildout is the big current project: contractor Apex Build Group (Darren Whitfield), started February 15, with a $120,000 budget and about $52,000 spent, targeting late-July completion. New equipment needed: a force plate system ($18,000), NordBord hamstring testing ($9,500), an AlterG anti-gravity treadmill ($35,000), and a VALD performance testing hub ($12,000). The equipment vendor is VALD Performance, rep Ryan Kimura.

  The clinic is contracted with the Atlanta Firebirds FC academy for pre-season athlete screening. The Piedmont DPT clinical rotation takes 2 students per semester, currently Priya Shah and DeAndre Collins. Insurance credentialing recently added Aetna, with BluePeak Health still in progress under Tamika. Brian needs 40 hours of continuing education by December and has 18 done. A challenging case is Jamal Hendricks, with return-to-sport testing underway.

  ## Finance

  Household income comes from Brian (clinic owner salary plus profit distributions) and Karen (pharmacist salary). Brian's total comp is $185,000; Karen's salary is $128,000. Clinic revenue is $850,000 annually, growing 12% year over year, at a 14% profit margin that Brian is targeting to lift toward 18% with the performance lab. Mortgage: 4.2% fixed, $2,800/month, 27 years remaining (4BR in Kirkwood, bought 2022). Brian's DPT loans: $14,000 at 4.8%, $800/month. Karen's PharmD loans: $62,000 at 5.5%, $1,200/month. Emergency fund: $58,000 in Marcus savings (4.1% APY), about 6 months of expenses.

  Monthly budget: mortgage $2,800, student loans $2,000, childcare and after-school $1,800, groceries $1,100, car payment $380, dining out $400, utilities $320, CrossFit and gym $250, gas and auto $300, twins' activities $350, entertainment and streaming $150, investing $1,500, tithing and donations $400.

  CPA: Henderson & Associates, files jointly. He is exploring an SBA loan for roughly $74,500 in lab equipment, where Live Oak Bank had the best rate at 7.1%. Both Roth IRAs are maxed annually with Vanguard VTSAX as the core holding, and the twins each have a Georgia Path2College 529 funded at $250/month.

  ## Health & Wellness

  Brian is in peak condition: CrossFit 5x/week, rec basketball 2x/week, and prepping for the CrossFit Southeast Regional qualifier. CrossFit runs Monday, Tuesday, Thursday, Friday, and Saturday at the 5:15 AM class at CrossFit Buckhead; basketball is Tuesday and Thursday 7 to 9 PM at the Midtown YMCA. Previous injury: a torn right labrum (2022), surgically repaired with full recovery but still managed; he sees Dr. Alan Russo (sports medicine) annually for maintenance, next in November. Supplements: creatine 5g daily, vitamin D 4000 IU, fish oil, and magnesium glycinate at night. WHOOP recovery scores average 75 to 85%; he pushes on green days and scales on red. Last physical in February: bloodwork excellent, resting HR 48 bpm, total cholesterol 168. Sleep runs 9:30 PM to 4:45 AM.

  Diet: high-protein whole foods, about 200g protein per day, macros tracked loosely, with a large protein smoothie every morning. Meal prep Sunday covers 5 days of lunches (usually chicken, rice, and roasted vegetables).

  Family health: Karen is healthy overall, keeps a prenatal multivitamin habit from the twins, manages mild seasonal allergies, and is lactose intolerant, so always check for dairy at restaurants. The twins' pediatrician is Dr. Keisha Monroe at Peachtree Children's Medical Center, with an annual checkup in October. The family dentist is Dr. Brian Ellis in Buckhead.

  ## Interests & Hobbies

  - **CrossFit**: competes regionally, trains at CrossFit Buckhead 5x/week, eyeing the CrossFit Games qualifier path.
  - **BBQ and grilling**: signature brisket and pulled pork, hosts cookouts, learning his mom's pot roast recipe, cooks on a Big Green Egg on the patio.
  - **Basketball**: Tuesday and Thursday rec league at the Midtown YMCA; played Division 3 at Peach State.
  - **Investing and financial independence**: reads Bogleheads, tracks the portfolio in a spreadsheet, FIRE-curious.
  - **Premier League football**: a die-hard Arsenal fan who watches every match and owns a Saka jersey.
  - **Podcasts**: Iron Protocol Radio, The Rehab Roundtable, NeuroEdge Lab, and The Builder's Playbook, listened to on the commute and during morning warm-up.

  ## Home & Living

  A 4-bedroom Craftsman in the Kirkwood neighborhood, 2,400 sq ft, built 2018. Fenced backyard with a playset for the twins and a small garden (tomatoes, peppers, herbs). The garage is a converted home gym with a Rogue rack, Concept2 rower, dumbbells, and plyo boxes. Current project: a covered patio for outdoor cooking and entertaining, with the same Apex Build Group (Darren Whitfield) starting after the clinic lab finishes, a roughly $25,000 budget, and Karen handling HOA approval. Smart home: Google Nest Hub in the kitchen, Nest thermostat, Ring doorbell and backyard camera. HVAC was serviced in March. Lawn service is TruGreen at $65/month, because Brian refuses to mow when he could be training.

  Vehicles: a Toyota 4Runner (2023, Brian, paid off, with car seats, a gym bag, and resistance bands always in the back) and a Honda CR-V (2021, Karen, $380/month with 2 years remaining) used for school runs.

