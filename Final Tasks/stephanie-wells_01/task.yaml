  ## MEMORY.md
  # Memory: Stephanie Wells

  ## Personal Profile
  - **Full name**: Stephanie Wells, raised in Fremont, California, in a steady suburban household with professional parents and a younger brother
  - **Personality**: She thinks in deliverables, runs at problems before they grow, with dry tech-literate humor and no patience for fluff
  - **Competitiveness**: She competes without cruelty, a lesson the climbing wall taught her where preparation matters more than title
  - **Philosophy**: Shipping something useful and imperfect on time beats holding it for a perfection that never arrives
  - **Family priority**: She believes her father's Parkinson's is the most important problem in her life right now
  - **Inner tension**: Her career arc matters, but her family will need more from her over the next decade than the career accommodates
  - **Optimism**: A discipline she chose at eleven, when she learned her father's bad day could derail the whole household
  - **Identity**: Fundamentally American suburban, four years in San Francisco that finally feel like home, suspicious of performed cultural identity
  - **Education**: B.S. in Computer Science from Ridgewater University (2020), MBA from Bayshore School of Business (2022)

  ## Key Relationships
  - **Matt Collins**, 30. Fiancé, senior software engineer at Canopy Systems (fintech startup). Met through mutual friends at a holiday party in 2022, engaged December 2025, wedding in October 2026. Her safe harbor; the startup posture comes off at the front door. Daily, text and in person.
  - **Robert Wells ("Dad")**, 58. Father, retired mechanical engineer (Northgate Aerospace). Early-stage Parkinson's, diagnosed 2024. The quiet center of her current worry. Phone and in-person on Fremont visits.
  - **Linda Wells ("Mom")**, 55. Mother, part-time accountant and primary caretaker for Robert. Birthday January 15. Worries constantly about both kids. Phone and in-person.
  - **Kyle Wells**, 25. Brother, software engineer at Stormfield Labs in Seattle. Easygoing, calls her for career advice. FaceTime Thursdays, visits SF roughly every six weeks.
  - **Grandma**, 82. Paternal grandmother in Tucson, AZ. Birthday March 22. Sharp and opinionated; taught Stephanie to cook. Sunday morning phone calls, unmissed for four years.
  - **Stephanie's birthday**: February 12.
  - **Sarah Brennan**, 28. Best friend and maid of honor, UX researcher at Halcyon Digital, eight-year climbing partner. Text, daily-ish.
  - **Jordan Torres**, 29. Climbing partner, freelance photographer, Ridgeline regular. They push each other on V6-plus problems. Text.
  - **Megan Shaw**, 32. Close work friend and engineering lead on Northstar. Lunches together. Slack and text.
  - **Amy Davis**, 26. Cousin, medical resident at Crestwood Memorial in the Bay Area, close since childhood. Text.
  - **Tara Collins**, 27. Matt's sister, marketing manager in LA, helps with wedding planning. Text.
  - **Victor Ross**, 42. Mentor, VP Product at Meridian SaaS. Quarterly coffee sessions; wrote her Bayshore recommendation. Email.
  - **Coach Elena Vasquez**. Ridgeline climbing coach, trains her for competitions. Text.

  ## Work & Projects
  - **Employer**: Vantage Loop, a Series B project-management SaaS, roughly 180 employees.
  - **Role**: Senior Product Manager on the Growth and Analytics pod. Manager is Carlos Rivera, Director of Product.
  - **Tenure**: 2.5 years. Joined as PM in late 2023, promoted to Senior PM January 2026.
  - **Prior role**: Product manager at another Bay Area startup from 2022 to 2023, the first job after her MBA.
  - **Key project**: "Northstar," a new analytics dashboard for enterprise customers, feature freeze October 9, 2026, target ship in November 2026 (slipped from an original August target). Currently in beta with three pilot customers.
  - **Northstar team**: Megan Shaw (engineering lead), four engineers, one designer (Tomoko Hayashi), one data scientist (Ryan Iyer).
  - **Work style**: Deep-focus mornings with no meetings before 10 AM when possible; meetings clustered in the afternoon. Generally works 9 AM to 6:30 PM, later during sprint pushes. WFH two days a week.
  - **Career goal**: VP of Product within five years, eyeing the founder path eventually, increasingly through the lens of what her family will need.
  - **Mentoring**: Gives an hour every other week to an early-career PM, a deliberate rebalancing after watching qualified women get passed over.

  ## Finance
  - **Income**: Stephanie $165,000 base plus $40,000 equity (4-year vest, 1-year cliff passed). Matt $175,000. Combined household roughly $340,000 pre-tax.
  - **Housing**: Rent $3,200/month for the Mission District 1BR, split 50/50 with Matt.
  - **Debt**: Stephanie's Bayshore MBA loan, $48,000 remaining at 5.2%, $620/month, on track for payoff around 2034. Matt's loans $22,000 remaining, $350/month.
  - **Recurring support and care**: $500/month to her parents for medical expenses. Climbing gym $175/month, coaching $200/month, therapy roughly $100/month, Vyvanse copay $45/month.
  - **Living costs**: Groceries roughly $600/month and dining out roughly $400/month, both split with Matt. Car insurance $120/month (GEICO).
  - **Savings and investments**: $35,000 in a Marcus HYSA at 4.15% APY, targeting a $50,000 emergency fund. $28,000 in a Vanguard Target Retirement 2060 fund, $500/month. 401k $62,000 (4% Vantage match, she contributes 10%). Roth IRA $12,000, maxed annually.
  - **Wedding fund**: $18,000 saved jointly with Matt against a $45,000 total budget. Matt's parents contributing $15,000, hers $5,000. Wedding-planner deposit of $3,000 paid to Serafina Events (planner Lena Choi). She built the color-coded budget sheet that Lena asked twice to borrow as a template.
  - **Taxes**: Filed 2025 returns via TurboTax in February.

  ## Health & Wellness
  ### Stephanie
  - **ADHD**: Diagnosed at 22, managed with Vyvanse 40mg daily, taken mornings with breakfast. Well-managed but routine-dependent. Filled monthly at Walgreens on Market St, $45 copay.
  - **Climbing injuries**: Chronic left-shoulder impingement managed with PT exercises three times a week. Sprained right ankle in 2024, fully healed.
  - **Allergies**: Mild dust allergy, takes Zyrtec in spring.
  - **Providers**: PCP Dr. Rachel Fernandez at Embarcadero Medical Group; physical therapist Dr. Amy Chen at Bayside Sports Medicine ($40 copay); dentist Dr. Kevin Lau at Pacific Heights Dental; therapist Dr. Lisa Park, biweekly telehealth ($50 copay), focused on work stress, family caretaking anxiety, and wedding overwhelm.
  - **Sleep**: Roughly 11 PM to 6:30 AM, tracks with Sleep Cycle, struggles to wind down after late climbing sessions.

  ### Robert (Father)
  - **Parkinson's disease**: Diagnosed 2024, Stage 2, on Sinemet (carbidopa-levodopa) three times daily.
  - **Care team**: Neurologist Dr. Steven Mitchell at Fremont Neurology Associates, quarterly visits; physical therapy twice a week for mobility and balance.
  - **Trajectory**: Good days and bad days; falls risk increasing. Stephanie maintains a shared Google Sheet tracking his tremor severity, mobility, and medication timing for Dr. Mitchell. The family is discussing home modifications such as grab bars and a stair rail.

  ## Interests & Hobbies
  - **Climbing**: The first devotion. Bouldering since college, currently projecting V7, comfortable on V5 to V6, prefers overhung problems. Trains four times a week at Ridgeline Climbing Collective and competes in the regional bouldering circuit. Outdoor trips to Castle Rock, Bishop, and Yosemite.
  - **Cooking**: Learned from her grandmother in Tucson. Sunday meal prep anchors the week; her pot roast and buttermilk biscuits are reserved for Sundays with a reason.
  - **Trail running**: Three to four miles on non-climbing mornings, usually Lands End. She loves what it does for her head more than the running itself.
  - **Mentoring**: Quietly the most meaningful, sponsoring early-career PMs, especially women in tech.
  - **Hosting**: Planning to host Thanksgiving at the SF apartment for the first time in November 2026 with family and close friends.
  - **Other**: Monthly game nights (Catan, Wingspan, Codenames), daily morning-pages journaling, podcasts on the commute, and the monthly SF Product Meetup.

  ## Home & Living
  - **Apartment**: Mission District 1BR/1BA, about 750 sq ft, rent-controlled, landlord Pacific Crest Properties (responsive). No in-unit laundry (shared basement machines), street parking permit Zone S. Lease up for renewal in December 2026.
  - **Setup**: Standing desk in the living-room corner, a climbing hangboard mounted on the doorframe that visitors find alarming, white walls, and plants Matt keeps alive.
  - **Vehicle**: 2019 Honda Civic, paid off, functional and unloved, kept one more year and likely replaced after the wedding. Used mainly for Fremont visits and climbing trips.
  - **Plans**: Considering a 2BR in Outer Sunset or Daly City after the wedding, budget $3,800 to $4,200/month. Matt wants to buy eventually; they track the market casually.

  ## Devices & Services
  - MacBook Pro 16-inch M3 (work and personal profiles).
  - iPhone 15 Pro (primary mobile device).
  - Apple Watch Ultra 2 (climbing metrics and fitness).
  - AirPods Pro (commute podcasts and focus music).
  - Garmin inReach Mini (backcountry climbing safety).
  - Home: Google Nest Mini in the kitchen, Philips Hue lights, Nest thermostat.
  - Subscriptions she pays for: Spotify Premium, Strava Premium, Netflix, Hulu, Stratechery.

