  ## Preferences
  - **Diet**: Vegetarian since college, eats eggs occasionally when out. Matt is also vegetarian. Home staples include lentil soup, mushroom risotto, roasted-vegetable grain bowls, pasta primavera, stuffed peppers, and veggie lasagna. Daily morning smoothie of spinach, banana, protein powder, almond milk, and turmeric. Oat milk latte from Ritual Coffee Roasters, one morning and one after lunch. Groceries from Trader Joe's, Whole Foods, and a monthly farmer's market run. Favorite restaurants: Greens, Burma Superstar, Tacolicious, Souvla.
