  ## MEMORY.md

  # Memory: Mary Vasquez

  ## Personal Profile
  Mary was born in Guadalajara, Mexico, and immigrated to Toronto with her family at age 8 in 1989, old enough to remember Guadalajara and young enough to absorb Canada down to her vowels. She is a Canadian citizen. She holds a B.Ed. from Lakeshore University of Education, Toronto (2003) and an M.Ed. in Educational Leadership from Crestmont University (2009). She is a member in good standing of the Ontario College of Teachers (OCT registration number 478312) and has completed the Principal's Qualification Program (Parts 1 and 2) through the Ontario Principals' Council, the standard certification path for an Ontario principal.

  She is Catholic in a way that is private, structural, and deep. She crosses herself before difficult meetings without thinking about it, and her faith is quieter and more durable than performance. She holds Mexican cultural identity through food, family obligation, music, and the church, and she watches carefully that her children keep what she had: Spanish at home, abuela every day, Sunday meals as gravity.

  She speaks English (the language of her career and the inside of her own head), Spanish (fluent: the language of her mother's kitchen, family, and prayer), and French (conversational, functional for school-board communications), thinking in all three at slightly different times of day.

  Her temperament is steady, warm in a way that is real and selective, and built on diplomatic steel she came to before she came to diplomacy. She listens with her whole face and remembers what people said years ago. She believes representation matters and is more complicated than the slogans suggest, and that mentorship is a long transaction measured in a decade rather than a year. She believes every teenager deserves an adult in the building fighting for them, which is why she has stayed in public education despite better-paying offers.

  ## Key Relationships
  - **Carlos Vasquez** (born November 8, 1978), 47. Husband, married since October 11, 2007 (18 years). Civil engineer at Thornfield Infrastructure Group. Calm and steady, manages the kids' daily logistics while Mary runs the school. They are a strong team.
  - **Sofia Vasquez** (born October 19, 2009), 16. Older daughter, grade 11 at Willowdale Secondary (a deliberate choice to give her space from Mary's professional world). Academically strong, on the debate team, beginning to think about universities.
  - **Miguel Vasquez** (born March 4, 2014), 12. Son, grade 7 at Brookfield Middle School. Soccer-obsessed, plays for a competitive club team. Easygoing, makes friends everywhere.
  - **Rosa Vasquez** (born December 12, 1953), 72. Mother, retired seamstress. Lives in the basement in-law suite. Cooks most weeknight meals, watches the kids after school, and is the emotional anchor of the household. Mild arthritis, managed with medication.
  - **Eduardo Vasquez** (born November 22, 1950), 75. Father, retired taxi driver. Lives in a senior apartment in Scarborough, independent but checked on weekly. Diabetic, manageable. Proud of Mary beyond words.
  - **Lucia Vasquez-Reyes** (born February 14, 1984), 42. Younger sister, nurse at Lakeridge Community Hospital. Married to Daniel, one child (Isabella, 8), lives in Brampton. The one person Mary fully talks shop with; they speak several times a week.
  - **Daniel Reyes**, 44. Lucia's husband, IT manager at Crestwood Financial Services. Reliable, good with the kids, handles tech troubleshooting for the extended family.
  - **Grace Rivera** (born October 3, 1977), 48. Best friend since childhood, immigrated around the same time. Social worker at Northgate Family Services. Monthly lunch and book club; half book, half therapy.
  - **Dr. Patricia Hernandez**, 55. Superintendent at Maplewood School Board and Mary's direct supervisor. Supportive but politically savvy; Mary navigates the relationship carefully.
  - **James Vasquez**, 50. Mary's cousin, accountant in Mississauga. Coordinates extended family events: reunions, holidays, cultural celebrations, and handles the family's tax and event accounting.

  ## Work & Projects
  Mary is principal of Ridgewood Collegiate Institute, a public high school of roughly 1,200 students (grades 9 to 12) under the Maplewood School Board, with a diverse student body, strong academic and arts programs, and some socioeconomic challenges. She was appointed in August 2022 and is in her fourth year. Before that she was vice-principal at Brookstone Academy from August 2017 to July 2022 (five years), and before that she taught secondary English and history at Lakeside Secondary School from September 2004 to June 2017 (thirteen years, the first year as an LTO and the rest on a permanent contract). The 2003 to 2004 stretch between graduating with her B.Ed. and the Lakeside appointment was a year of supply teaching across Maplewood schools while she finished her OCT registration.

  Current projects:
  - **Equity and Inclusion Strategic Plan**: leading the school's three-year equity plan. Year 2 focus is culturally responsive pedagogy training for all staff, a student voice advisory council, and community partnership expansion. Year 3 strategy is under development for fall 2027.
  - **Grade 9 Transition Program Redesign**: overhauling orientation and support for incoming grade 9 students, piloting a peer mentorship model in October 2026.
  - **Staff Wellness Initiative**: responding to post-pandemic teacher burnout with flexible PD days, mental health resources, and workload audits.

  She is at school Monday to Friday, roughly 7:30 AM to 5:00 PM and often later, with some evenings for parent council, board meetings, and school events. She will present "Leading for Equity: Beyond the Buzzword" at the Maplewood Educational Leadership Conference on October 22, 2026, and is considering an Ed.D. starting 2028, comparing part-time executive programs at Crestmont University and Baywood College.

  ## Finance
  - **Salary**: $128,000 CAD per year (about $7,800 CAD per month net).
  - **Mortgage**: $2,400 CAD per month on a 4-bedroom detached house, joint with Carlos.
  - **Student loans**: paid off in 2019.
  - **Savings**: $42,000 CAD in high-yield savings (emergency fund target met), contributing $500 per month.
  - **Retirement**: Ontario Teachers' Pension Plan (defined benefit), plus a joint RRSP with Carlos at about $85,000 CAD.
  - **Children's education**: RESP for Sofia and Miguel, combined balance about $48,000 CAD.
  - **Monthly budget**: mortgage $2,400, savings $500, RESP $400, groceries $800, Sofia activities $250, Miguel activities $300, dining and coffee $280, transit and gas $200, phone and internet $140, subscriptions $55, Rosa's medication $80, church tithe $300, miscellaneous $250. Total $5,955, leaving a $1,845 buffer against the $7,800 net.
  - **Credit**: two cards, paid in full monthly, excellent credit. She tithes consistently and quietly, and the amount is not negotiable in her budget.
  - **Goals**: top up Sofia's university fund by 2027, fund a family trip to Mexico in summer 2027, and begin Ed.D. savings.

  ## Health & Wellness
  - **Primary care**: Dr. Evelyn Boateng at Northridge Community Health Centre. Annual physical in November; last one November 2025, all clear. Blood pressure slightly elevated, managed with diet and exercise.
  - **Dentist**: Dr. Michael Chang at Sheppard Dental Associates, every six months; last visit January 2026.
  - **Exercise**: pre-dawn power walk five mornings a week (30 to 40 minutes) and a Saturday Zumba class. She wants to add strength training but has not found the time.
  - **Sleep**: about 6.5 hours, bed near 11:00 PM and up at 5:30 AM. She reads before bed to decompress.
  - **Supplements**: Vitamin D, calcium, and a daily multivitamin.
  - **Therapy**: none currently, open to it if work stress escalates. Completed a board leadership coaching program in 2024 with personal development sessions.
  - **Diet**: omnivore, no allergies in the family. Strong Mexican food traditions alongside Canadian cuisine.
  - **Family health**: Rosa has mild arthritis (managed with medication); Eduardo is diabetic (manageable).

  ## Interests & Hobbies
  - **Cooking long Mexican dishes**: mole that takes most of a Saturday, tamales in batches of forty, pozole made the proper way her mother taught her. Seasonal and ritual; the cooking is as much the point as the eating, and she cooks when she is sad or depleted.
  - **Pre-dawn power walking**: five days a week on the same nine-year neighborhood route, with podcasts on leadership and equity. It is her daily reset.
  - **Reading**: educational leadership nonfiction, equity literature, and Mexican and Latin American fiction, about twenty books a year. Thirty minutes in bed nightly is non-negotiable.
  - **Mentorship**: investing in a handful of early-career educators, particularly women and teachers of color. Three former mentees have become vice-principals.
  - **Family photo curation**: a slow, multi-generational archiving project she expects to take another decade, at what she considers the right pace.
  - **Sunday Mass at Our Lady of Guadalupe**: older and deeper than a hobby, the thing she says keeps her sane and keeps her schedule honest.

  ## Home & Living
  - A 4-bedroom detached house with a driveway and two-car garage. Rosa lives in the finished basement in-law suite, and the backyard has a small garden Rosa tends.
  - The home is warm: terracotta and deep blues, lots of textiles, Mexican folk art on the walls (Oaxacan alebrijes, a retablo from a Mexico City market). The kitchen is the heart of the house. A small living-room altar holds a candle and a photo of her late grandmother, lit on specific days.
  - She drives a sensible mid-sized sedan, washed monthly and serviced on schedule.
  - Home projects: a kitchen renovation planned for spring 2027 (researching contractors and cabinets), and a driveway basketball hoop for Miguel that Carlos is installing.

  ## Devices & Services
  - **Phone**: iPhone 15 Pro, heavy use for email, the StaffConnect school app, WhatsApp family groups, and calendar.
  - **Laptop**: personal MacBook Air M2. Her school-issued Dell laptop is kept separate and is not connected to the assistant.
  - **Tablet**: iPad for evening reading, sermon notes, and shared kids' use.
  - **Smart home**: Google Nest thermostat, a Ring video doorbell camera, and a kitchen smart speaker.
  - **Subscriptions**: one streaming service, a music streaming service, the Toronto Compass (local news digital), and the Canadian Educational Leadership Quarterly.

