  - Hospital scheduling, Fifth Third banking transactional control, Venmo, and Facebook are not connected here.

  ## Preferences

  Courtney likes clean counters, reliable cars, reheated lunches that still taste decent, and text messages that answer the question actually asked. She prefers familiar comfort over novelty: trusted restaurants, predictable grocery routes, and a hoodie that has survived too many washes. She dislikes vague reassurance, performative urgency, avoidable rework, unclear plans, missing details, and people who force her to ask twice. She is socially capable but selective; at work she can coordinate a room quickly, while outside work she chooses fewer people and deeper trust. She travels best when plans have backup options, snack logistics, sleep realism, and known basics like pharmacy, groceries, and coffee. Her style is functional: scrubs, jeans, hoodies, sneakers, and one good date outfit. Home aesthetics lean toward washable fabrics, useful bins, and furniture nobody has to be precious around. She shops through a value lens, pays for reliability and time saved, and resents upsells on features that do not matter. She uses Target, Kroger, Amazon, Old Navy, and familiar practical vendors. Food routines include spaghetti with meat sauce, chicken stir fry, tacos, mac and cheese with broccoli, crockpot chili, granola bars, apple slices, cheese sticks, pretzels, El Meson, Dewey's Pizza, and Panera. Coffee is large drip with cream and sugar, with two cups before a shift and one on break; gas station coffee is acceptable. Alcohol is rare, usually a glass of wine on a date with Adam. She decompresses through quiet, coffee, small practical tasks, puzzles, a clean kitchen, familiar TV, and twenty minutes where nobody needs her. She likes clean laundry, mild soap, soft clothes, quiet rooms, and predictable sounds. She dislikes sticky surfaces, harsh perfume, wet socks, cluttered counters, sharp interruptions, competing voices, and the stale hospital mix of coffee and disinfectant after too many hours awake.

