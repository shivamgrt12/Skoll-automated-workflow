  ## MEMORY.md

  # Memory: Courtney Harper

  ## Personal Profile

  Courtney Harper, nee Brennan, is a practical Midwestern woman shaped by working-family values: show up, fix the loose hinge, answer the phone, and do not make reliability into a speech. She earned an Associate Degree in Nursing from Sinclair Community College in May 2010 and passed NCLEX-RN that July. She speaks English natively, with a few medical Spanish phrases picked up during hospital training. She is competent, direct, observant, and selective with trust. In public she is practical; in private she is sentimental enough to keep a child-made card in a drawer because it makes the mess feel worth it. The gap is that competence makes her look less lonely and less tired than she often is.

  She became more cautious after separation and divorce changed how she evaluates follow-through. She does not distrust everyone, but she fact-checks where she used to assume. She values competence, honesty, ownership, steadiness, and the kind of help that does not require a performance. She does not expect perfect parenting from herself, only presence, honesty, and reliability. Her best decisions usually come from asking what will still make sense tomorrow morning after the adrenaline wears off.

  ## Key Relationships

  - **Owen Harper**, son, 10, born August 22, 2015. Fifth grader at Van Buren Elementary. He likes fall soccer and Minecraft, is quieter like Courtney, and processes stress internally. Courtney worries she understands his silence too well and may still miss something because he is easy to manage.
  - **Maisie Harper**, daughter, 7, born March 14, 2019. Second grader at Van Buren Elementary. She loves drawing, gymnastics, and a stuffed rabbit named Professor, and Courtney monitors her post-divorce sleep trouble.
  - **Greg Harper**, ex-husband, 41, born April 9, 1985. Warehouse supervisor. They married August 16, 2014, separated in March 2024, and finalized divorce in January 2026. Communication stays limited to kid logistics by text. The asymmetry is practical and irritating: Courtney does the contingency planning, while Greg often participates only when the plan is already visible.
  - **Linda Brennan**, mother, 65, born November 3, 1960. Retired school secretary. She is Courtney's strongest support and backup for school breaks, sick days, and shift conflicts; they talk daily. Designated ICE contact.
  - **Rick Brennan**, father, 67, born September 24, 1958. Retired autoworker and former HVAC technician. He is quiet and practical and fixes things around Courtney's house without making a production of it.
  - **Jess Brennan**, sister, 34, born July 17, 1991. Marketing coordinator in Columbus. She is close with Courtney, texts throughout the week, and is Courtney's main person for venting about Greg. Designated secondary ICE contact.
  - **Natasha Okonkwo**, best friend and coworker, 37, born May 8, 1989. Night-shift nurse at Lakeview. They overlap during shift change and grab coffee at the hospital cafe.
  - **Dr. Michael Reeves**, unit medical director, 52. He is a respectful physician collaborator who relies on Courtney's judgment.
  - **Denise Holt**, charge nurse coordinator and Courtney's boss, 47. She supports Courtney's nurse manager interest and meets with her monthly.
  - **Adam Coretti**, dating, 42, divorced high school history teacher with one daughter. Courtney likes that he is patient, not pushy, and reads actual books, but she is cautious.

  ## Work & Projects

  Courtney is a charge nurse on the medical-surgical unit at Lakeview Medical Center. She finished her ADN in May 2010, passed NCLEX-RN that July, and worked her first roughly two years as a staff nurse at a smaller community hospital in Greene County before joining Lakeview Medical Center as a staff nurse in October 2012. She was promoted to charge nurse in 2019 and reports to Denise Holt. Her usual work pattern is rotating twelve-hour day shifts, often 7:00 AM to 7:30 PM, three on and four off, with schedules posted two weeks ahead. Current professional focus includes fall staffing pressure, training two new graduate nurses, and preparing a nurse manager application with a packet due to Denise on October 20, 2026. She is considering an online RN-to-BSN program but has not enrolled. The RN-to-BSN is an unresolved thread: ambition says yes, the custody calendar and fatigue say not yet, and she dislikes that both are true. She has 18 PTO days per year with seniority and usually saves them for school breaks and kid sick days; six days remain for 2026. Her work email is kept on the work computer and is not connected here.

  ## Finance

  Her income is about $72,000 base plus roughly $4,000 to $6,000 in shift differentials and overtime, for about $76,000 to $78,000 total. Monthly budgeted net income is about $4,600 after taxes and retirement contribution, before employer health-insurance premium. Greg owes $650 monthly in child support, but payment is inconsistent and averages about $500, so she does not count the full amount in baseline planning.

  Monthly expenses are about $3,468: rent $1,350, utilities $260, groceries $480, car payment $285, GEICO car insurance $110, gas $90, Verizon phone lines $95, employer health insurance $180, kids' activities $110, before- and after-school care during Courtney's weeks $160, subscriptions $38, dining out $80, miscellaneous $60, Fifth Third Visa minimum $150, and State Farm renter's insurance $20. She has about $1,132 monthly remaining before child support. Savings include Fifth Third checking around $3,200, Fifth Third savings around $6,500, and a Lakeview 403(b) around $42,000. Debt includes a 2020 Honda Civic loan around $8,500 at 4.5% and a Fifth Third Visa balance around $2,100 from divorce-related legal fees. Her credit is good, around 710. The private pressure is not just money but the constant need to budget as if Greg's support might be late without letting that uncertainty run the house.

  ## Health & Wellness

  Courtney has type 2 diabetes diagnosed in 2023, managed with metformin 500 mg twice daily with meals. Her last A1C in February 2026 was 6.8%, down from 7.3% at diagnosis. She has chronic lower back pain from patient lifting, managed with ibuprofen as needed, stretching when she remembers, and a lumbar support cushion in her car. Medications and supplements include metformin, ibuprofen 400 mg as needed two or three times weekly, and Vitamin D3 1000 IU daily. She has a sulfa-drug allergy that causes rash and mild seasonal allergies treated with cetirizine in spring. She wears OTC +1.25 reading glasses and needs a formal eye exam when scheduling allows. She previously saw Dr. Wendy Marsh for therapy during the 2024 separation and found it helpful, but paused when insurance changed. Primary care is with Dr. Anita Patel; dental care is with Dr. Brian Fox. Owen and Maisie share Dr. Patel's office for primary care until Courtney moves them to a dedicated pediatrician.

  ## Interests & Hobbies

  Courtney likes activities with a finished edge: jigsaw puzzles on the kitchen table, a cleaned-out school bag, or a meal plan that prevents the week from becoming a vending-machine situation. She used to run and completed a half-marathon in 2018; running still represents the version of herself with more margin. She reads thrillers in short bursts on the Kindle app when tired but still wanting plot. She last finished "The Maid" by Nita Prose in January 2026. Music is country, pop radio, and kids' music when Owen and Maisie are in the back seat. TV comfort includes "Grey's Anatomy" reruns, "Bluey" with Maisie, and "Stranger Things" with Owen. Small ordinary vices: she hate-watches smug parenting advice, buys Target bins after hard shifts, and enjoys being right about a practical concern even when she wishes she were not.

  ## Home & Living

  Courtney rents a three-bedroom, one-and-a-half-bath ranch of about 1,200 square feet in Kettering, moved into after leaving the marital home during separation. The setup is functional rather than decorated: Courtney's room has a queen bed and dresser, Owen has a twin bed and homework desk, Maisie has a twin bed and many stuffed animals, and the living room has a couch, TV, and toy bin. The kitchen is small but workable, and the crockpot is the MVP appliance. Her car is a silver 2020 Honda Civic LX with about 48,000 miles and a strong reliability record.

  ## Devices & Services

  Courtney uses an iPhone 13 bought in 2023 as her primary device. The household Chromebook was bought for school requirements and is also used at the kitchen table for email and browsing. She has no wearable. Streaming subscriptions are Netflix, Disney+, and Spotify Premium. She uses Google Calendar on her phone, synced with the kids' school calendar, and Google Sheets for budget tracking. Messaging is mainly iMessage for friends and family, with text for Greg kept strictly to logistics. She is semi-active on Facebook for mom groups and Lakeview staff groups but does not connect Facebook here. A Ring doorbell covers the front porch.

