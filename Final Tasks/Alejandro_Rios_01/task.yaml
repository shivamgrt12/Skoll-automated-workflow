  - Exercise: 4 to 5 walks or hikes per week with Maple. At-home yoga via YouTube, Mon, Wed, Fri evenings, about 30 minutes. Cross-country skiing on the VASA trail in winter. Knees prefer lower impact than the running he used to do.
  - Mental health: no diagnosis. Briefly saw a therapist after the 2025 breakup (4 sessions). Found it useful, did not continue. Solitude is temperament, not depression.
  - No known drug or food allergies.

