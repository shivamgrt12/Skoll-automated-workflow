  ## Health & Wellness

  - Plaque psoriasis since age 22. Primarily elbows, knees, scalp. Managed with topical betamethasone dipropionate cream for flares and a daily moisturizing routine. Calcipotriene cream daily during active treatment, added by Dr. Okonkwo after the January 2026 flare. Currently stable. Flare triggers: stress, cold dry weather, dairy.
