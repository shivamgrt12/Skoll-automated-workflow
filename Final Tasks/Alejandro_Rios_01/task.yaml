  ## MEMORY.md

  # Memory: Alejandro Rios

  ## Personal Profile

  Alejandro Catherine Rios, goes by Alejandro. Pronouns he/him. Born and raised in Kalamazoo, Michigan, to a GM quality-inspector father and a school-librarian mother. Older sister Sophie lives in Grand Rapids with her husband Ben and their two children. He earned an A.A.S. in Veterinary Technology from Great Lakes Community College in 2014 and has been a licensed Michigan CVT since. He moved to Traverse City in 2021 for the Birchwood Animal Hospital role and stayed by choice. Vegetarian since age 20. Single since a low-drama split in early 2025, not actively dating and not opposed. Lives quietly with Maple, his three-year-old golden retriever mix. English is his only language.

  Heritage is the Rios surname carried more than practiced, read more often as Anglo-Midwest than as Latino. He identifies more strongly with Midwestern Great Lakes culture: restraint, freshwater seasons, a quiet pride in tools and the kind of long-arc work his parents did well for decades. The father's quality-inspector trade at a downstate GM plant and the mother's years running a school library both shaped his orientation toward honest work and useful objects. He does not perform heritage, and he does not appreciate it raised at small-talk register.

  Personality: stillness, deliberation, quiet competence. He moves slowly through decisions and finishes what he starts. Dry humor turned mostly on himself, never punching down. He values usefulness over performance, and he directs credit toward the work, the dog, or the team rather than toward himself. Protective of Maple, the clinic team, and his parents in Kalamazoo in that order. He reads a room before he speaks. Solicitous tones make him retreat. Solitude is temperament for him, not symptom.

  Core philosophy: do the work, and treat the work as the love. Ritual over novelty, quality once over cheap twice, a quiet trail over a busy room. The dependable gesture matters more than the grand one.

  ## Key Relationships

  - **Karen Rios (mother, 61)**: lives in Kalamazoo. Retired school librarian. Sunday morning phone call at 10:00 AM ET, about 30 minutes. She does not text reliably. She worries about him being alone in Traverse City but respects his choice.
  - **Nathan Rios (father, 63)**: lives in Kalamazoo with Karen. Retired GM quality inspector. Quiet, handy, taught Alejandro to change a tire and read a level by feel. They communicate mostly through Karen, with a separate quiet bond over nature documentaries and weather.
  - **Sophie Rios (sister, 36)**: lives in Grand Rapids with husband Ben Rios and kids Chloe (7) and Max (4). Pediatric nurse. Structured where Alejandro is fluid. They meet halfway in Cadillac or Manistee for brunch about once a month.
  - **Maple (dog, 3)**: golden retriever mix, adopted from Grand Traverse County animal shelter at 8 months. The center of his off-clock attention.
  - **Dr. Sarah Hensley (boss, 48)**: lead veterinarian and co-owner of Birchwood Animal Hospital. Five years as direct supervisor. Trusts Alejandro's clinical judgment. They grab coffee after particularly hard days.
  - **Meg Kowalczyk (closest local friend, 29)**: Birchwood receptionist. Wednesday trivia partner at Right Brain Brewery. Texts daily. More extroverted, drags him out when he'd otherwise stay in.
  - **Brianna Torres (vet tech assistant, mentee)**: joined Birchwood February 2026. Alejandro mentors her through the early-career stretch.
  - **Dr. Rachel Okonkwo (dermatologist, 44)**: Northern Skin & Wellness, Traverse City. Manages his psoriasis. Quarterly visits. Added calcipotriene to his protocol after the January 2026 flare.
  - **Dr. Amy Lindstrom (primary care)**: Traverse Bay Medical. Annual physical each November.
  - **Dr. Mark Jansen (dentist)**: Cherry Capital Dental. Cleanings every 6 months.

  ## Work & Projects

  - Role: Certified Veterinary Technician at Birchwood Animal Hospital, a small-animal practice in Traverse City with about 12 employees.
  - Tenure: 5 years at Birchwood since 2021. Previous clinic in Kalamazoo for 6 years before that. 11 years total in the profession.
  - Education: A.A.S. Veterinary Technology, Great Lakes Community College (2014). Licensed CVT in Michigan.
  - Reports to Dr. Sarah Hensley.
  - Daily duties: blood draws, anesthesia monitoring, dental cleanings, surgical assist, client education.
  - Currently mentoring Brianna Torres, who joined as a vet tech assistant in February 2026.
  - Schedule: Mon to Fri 8:00 AM to 5:00 PM, alternating Saturdays 8:00 AM to 12:00 PM. No on-call.
  - PTO: 12 days per year plus the Birchwood holiday closure between Christmas Eve and New Year's Day. Typically takes a few days each June before peak tourist season hits Traverse City. Currently has 2 days banked.
