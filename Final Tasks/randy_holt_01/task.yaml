  # Memory: Randy Holt

  ## Personal Profile

  - **DOB**: November 18, 1979
  - **Heritage**: third-generation Tucsonan, born and raised in Barrio Viejo where Barbara still lives.
  - **Education**: BA in Political Science from Mesquite Valley University (2002), JD from Sonoran Desert School of Law (2005).
  - **Bar admission**: admitted to the Arizona State Bar in 2006 (Bar No. 026481).
  - **Faith**: Catholic by upbringing and habit, attends Mass at the historic mission most Sundays with Barbara.
  - **Family status**: divorced from Robert Holt in 2018, parenting Tyler full-time at the Sam Hughes house.
  - **Disposition**: lives at the intersection of a brutal felony docket and a volunteer life that gives back.

  ## Key Relationships

  - **Barbara Holt (mother, 72, birthday October 5)**: retired elementary school teacher, lives alone in the family house in Barrio Viejo. Sharp, opinionated, makes the best casseroles in southern Arizona. Mild arthritis and early-stage macular degeneration; refuses to slow down. Randy calls daily, visits every Sunday.
  - **Megan Holt (daughter, 22, birthday January 25)**: graduated Mesquite Valley University May 2025, social work degree, case manager at Copper Canyon Family Services in Tucson. Idealistic like her father, lives near campus with a roommate.
  - **Tyler Holt (son, 17, birthday October 22)**: senior at Saguaro Prep Academy, varsity soccer, applying to engineering programs, lives with Randy full-time, every-other-weekend at Robert's.
  - **Robert Holt (ex-spouse, 48)**: insurance adjuster at Southwest Mutual Group. Functional co-parent, pays child support, attends Tyler's soccer games.
  - **Karen Holt-Navarro (sister, 42, birthday December 3)**: dental hygienist in Phoenix, married to Daniel Navarro (electrician, 45). Kids Mateo (12, birthday November 8) and Isabella (9, birthday February 12). Calls 2-3 times a week.
  - **Rosa Maldonado (paralegal, 38)**: Randy's paralegal at the PD office for seven years, makes sure he eats lunch.
  - **Judge Patricia Moreno (61)**: Pima County Superior Court, former defence attorney, the bench Randy respects most.
  - **Diana Ochoa (55)**: executive director, Desert Bloom Women's Shelter. Nine years working together, close friend.
  - **Father Miguel Escobar (67)**: parish priest at the local historic mission, knows the family three generations deep.
  - **Ernesto Holt (father, deceased 2020)**: Randy's model of quiet integrity, still talked to in his head before tough closings.

  ## Work & Projects

  - **Current role**: Senior Public Defender at Pima County Office of the Legal Defender since 2014, with the office since 2007.
  - **Salary**: $78,000 per year from the PD office.
  - **Caseload**: 35-40 active felony files including assault, DUI, drug possession, distribution, and domestic violence defence.
  - **Team**: works with paralegal Rosa Maldonado and shares investigator Frank Dunbar with two other attorneys.
  - **Active case**: defending Alejandro Vega on a felony assault charge, complicated self-defence claim, trial set spring 2027.
  - **Conviction**: believes fiercely in the Sixth Amendment and bristles at the "helping criminals" framing.
  - **Volunteer role**: Program Coordinator at Desert Bloom Women's Shelter since 2017, eight to ten hours per week, unpaid.
  - **Shelter duties**: runs Tuesday and Thursday empowerment groups, coordinates the first-Wednesday pro bono legal clinic, trains new volunteers.
  - **Shelter leadership**: Director Diana Ochoa recruited him nine years ago, close working relationship.
  - **Current focus**: organising Desert Bloom Under the Stars fundraising gala for September 2026 at a Tucson guest ranch.

  ## Finance

  - **Total income**: annual salary $78,000 from the PD office plus child support $800/month from Robert, roughly $87,600 per year.
  - **Mortgage**: $1,450/month on the 3BR/2BA adobe in Sam Hughes, bought after the divorce in 2019.
  - **Retirement**: Arizona State Retirement System balance roughly $41,000, savings $12,500 at Sonoran Desert Credit Union, checking $2,800.
  - **Education fund**: Tyler's 529 plan at $8,200, Randy knows it is short and saves where he can.
  - **Obligations**: helped Megan through tuition until graduation, now focused on Tyler and capping shelter spend at $75-100/month.
  - **Subscriptions**: Spotify family $17, Netflix, Hulu, Audible $15.
  - **Money style**: careful out of necessity, generous toward others, frugal toward himself.

  ## Health & Wellness

  - **Primary care**: annual physical with Dr. Maria Quinones at Sonoran Health Partners, January 2026 all clear except elevated cortisol.
  - **Chronic issue**: tension headaches under heavy caseloads, managed with ibuprofen and neck stretches.
  - **Foot condition**: mild plantar fasciitis in the right foot, supportive shoes are non-negotiable.
  - **Dental**: every six months at Tucson Family Dental, last visit March 2026.
  - **Screening**: colonoscopy scheduled August 2026 at Pima Health Center, routine.
  - **Mental health**: therapy with Dr. Linda Reyes every three to four weeks for secondary trauma management.
  - **Exercise**: morning runs Tuesday, Thursday, Saturday (3 miles), Sunday desert walks 5-6 miles, yoga when time allows.
  - **Sleep**: target 10:30 PM to 5:45 AM, trial prep nights compress to 11:30 PM to 5:30 AM.

  ## Interests & Hobbies

  - **Hiking**: desert walks and nature hikes in Saguaro National Park and Sabino Canyon, tracks bloom cycles.
  - **Cooking**: comfort food from Connie's and Barbara's recipes, pot roast and mac and cheese are signature dishes.
  - **Reading**: legal thrillers, contemporary fiction and poetry, true crime, legal journals for CLE credits.
  - **Gardening**: prickly pear, agave, desert marigolds, and a small herb patch he actually uses in the kitchen.
  - **Community work**: voter registration drives in underserved neighbourhoods, mentoring pre-law students at Mesquite Valley University.
  - **Thanksgiving**: dinner at Barbara's house, Randy on pot roast duty every year.
  - **Christmas**: Christmas Eve cooking marathon with Barbara; Christmas Day Mass at the mission followed by dinner at the house in Barrio Viejo with Karen and the kids.
  - **Running**: 3 morning runs a week at 3 miles each (Tuesday, Thursday, Saturday), with the marathon hovering as a maybe.

  ## Home & Living

  - **Property**: 3BR/2BA adobe-style home in Sam Hughes, Tucson, bought 2019, modest courtyard with a mesquite tree.
  - **Bedroom**: crucifix above the bed, legal thrillers on the nightstand, framed photo of Ernesto, running shoes by the door.
  - **Kitchen**: heart of the house with spice rack, cast iron skillet, stand mixer, herbs from the garden on the sill.
  - **Tyler's room**: soccer posters, engineering textbooks, the cleaner desk in the family.
  - **Courtyard**: small patio with two chairs, string lights, Friday beer location.
  - **Commute distances**: 20 minutes to courthouse, 15 to shelter, 10 to Barbara's in Barrio Viejo, 25 to Saguaro National Park.

