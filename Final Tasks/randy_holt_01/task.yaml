  - **DoorDash** (`doordash-api`): orders dinner on shelter group nights when Randy needs food between court and the 6:30 PM session.
  - **Instacart** (`instacart-api`): runs Sunday dinner grocery orders for the house and picks up essentials for Barbara.
  - **Uber** (`uber-api`): books rides from courthouse to shelter on storm days and airport runs for Karen's family visits.
  - **Airbnb** (`airbnb-api`): books family rentals for Phoenix trips when Karen's house is full during holidays.
  - **Amadeus** (`amadeus-api`): searches flights and hotels for out-of-state CLE conference travel Randy commits to each year.

  #### Communication

  - **Slack** (`slack-api`): runs the gala committee workspace Diana set up, housing all event planning channels.
  - **Microsoft Teams** (`microsoft-teams-api`): hosts joint clinic sessions with bar association partners who run meetings on Teams.
  - **Discord** (`discord-api`): connects to Tyler's college prospect channels where he asks Randy to check updates.
  - **Telegram** (`telegram-api`): carries secure message threads with shelter contacts and international donors who prefer encrypted channels.
  - **WhatsApp** (`whatsapp-api`): carries the Karen-and-cousins family thread and shelter international donor conversations.
  - **Twilio** (`twilio-api`): sends shelter volunteer SMS reminders that Diana asked Randy to set up and maintain.
  - **SendGrid** (`sendgrid-api`): powers shelter donor newsletters and event announcements routed from the gala committee.
  - **Mailgun** (`mailgun-api`): serves as the backup email delivery service when SendGrid hits rate limits during gala outreach.
  - **Zoom** (`zoom-api`): hosts pro bono clinic intake calls with prospective clients and remote CLE session attendance.

  #### Productivity & Project Management

  - **Asana** (`asana-api`): tracks the gala steering committee's task board with deadlines, owners, and status updates.
  - **Trello** (`trello-api`): manages Tyler's college application pipeline that Randy maintains with him through senior year.
  - **Monday** (`monday-api`): supports shelter board committee coordination alongside the primary Asana workspace.
  - **Linear** (`linear-api`): tracks structured volunteer project tasks when sprint-style planning fits the workflow.
  - **Jira** (`jira-api`): manages issue tracking for the bar association's pro bono clinic coordination efforts.
  - **Calendly** (`calendly-api`): books shelter volunteer interview slots, letting candidates self-schedule from open windows.
  - **Typeform** (`typeform-api`): runs the gala RSVP form and dietary survey each year, feeding responses into planning.

  #### Marketing, CRM & Support

  - **HubSpot** (`hubspot-api`): manages the shelter donor CRM, segmented by gala year and giving tier for targeted outreach.
  - **Salesforce** (`salesforce-api`): serves as the CRM backup for shelter donor records alongside the primary HubSpot instance.
