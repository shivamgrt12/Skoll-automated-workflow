  - **ActiveCampaign** (`activecampaign-api`): runs marketing automation and drip campaigns for gala donor retention efforts.
  - **Intercom** (`intercom-api`): supports live chat on the shelter's public-facing help portal for visitor inquiries.
  - **Zendesk** (`zendesk-api`): manages ticketed intake support for the shelter's volunteer helpdesk workflow.
  - **Freshdesk** (`freshdesk-api`): handles lightweight support requests from shelter volunteers and community partners.

  #### Social & Media

  - **Instagram** (`instagram-api`): accesses the shelter feed Diana runs, resharing event photos and gala promotion posts.
  - **Twitter** (`twitter-api`): monitors bar association updates and Arizona Capitol Times feeds for legal news relevant to Randy's work.
  - **Pinterest** (`pinterest-api`): collects gala decor inspiration boards that the volunteer design team references for event planning.
  - **Reddit** (`reddit-api`): pulls r/Tucson community threads Randy references for local news, events, and neighbourhood updates.
  - **LinkedIn** (`linkedin-api`): supports mentoring Mesquite Valley pre-law students and maintains bar association professional connections.
  - **YouTube** (`youtube-api`): hosts CLE recordings, gala highlight reels, and Tucson Marathon course videos Randy reviews for training.
  - **Twitch** (`twitch-api`): streams shelter fundraising events and gala segments to reach a broader online audience.
  - **Vimeo** (`vimeo-api`): stores the gala video reel each year, shared with donors and the shelter board after the event.
