ervisor. Politically savvy, supportive of equity focus, cautious about council pushback.\n- **Amara Diallo:** Age 33. Junior planner on Ruth's team. Strong on immigrant community engagement. Ruth mentors her informally.\n- **Sophie Chen:** Age 40. Community organizer at the Plateau-Mont-Royal borough council. Key contact for neighbourhood consultations. Pragmatic, honest broker.\n- **David Ouellet:** Age 52. City councillor for the Plateau. Generally supportive of progressive planning but sensitive to constituent complaints about construction disruption.\n- **Lucie Bergeron:** Age 48. Director of Alliance Cycliste du Qu\u00e9bec's urban advocacy program. Professional ally on cycling infrastructure. Ruth serves on an advisory committee with her.\n- **Dr. Marie-Claire Dubois:** Primary care physician at Clinique Plateau. Annual November checkup. Trusted; Ruth has been with the clinic since settling in the Plateau.\n\n## Work & Projects\n\n- **Employer:** Ville de Montr\u00e9al, Service de l'urbanisme et de la mobilit\u00e9. Office at City Hall (H\u00f4tel de Ville), Old Montreal.\n- **Title:** Senior Urban Planner (Urbaniste principale). Joined the city in 2016. Promoted to senior level in 2022.\n- **Key projects:**\n  - **Projet Mobilit\u00e9 Plateau:** Lead planner for a comprehensive active transportation plan for the Plateau-Mont-Royal borough. Includes protected bike lanes, pedestrian priority zones, and transit stop redesigns. Currently in public consultation phase; contentious with some business owners concerned about parking loss.\n  - **Parc-Extension Housing Equity Study:** Co-leading an assessment of displacement and gentrification risk in the Parc-Extension neighbourhood as new transit infrastructure arrives. Involves community surveys, demographic analysis, and policy recommendations. Sensitive; immigrant communities are wary of city promises.\n  - **Montreal Climate Adaptation Framework, Green Infrastructure Module:** Contributing to the city-wide climate plan, specifically the green infrastructure component: urban tree canopy targets, bioswales, permeable surfaces, and cooling corridors. Cross-departmental collaboration required.\n- **Schedule:** Office Mon-Thu. Friday WFH or field visits. Occasional evening community consultations (1-2 per month).\n- **Professional development:** Member of the Ordre professionnel des urbanistes du Qu\u00e9bec (OPUQ). Preparing a presentation on equitable transit planning for the Institut Canadien des Urbanistes (ICU) national conference in October 2026.\n\n## Finance\n\n- **Salary:** $6,400/month net (city salary). Marc earns ~$7,200/month net.\n- **Mortgage:** $2,200/month for their condo in the Plateau. Remaining balance ~$320,000.\n- **Childcare:** After-school program Mon-Thu, $180/month. Before-school or supervised incidentals, ~$180/month. Combined ~$360/month.\n- **RESP (education savings):** $500/month for Emile. Balance ~$22,000.\n- **Savings:** $45,000 in TFSA. $28,000 in RRSP. Contributing $600/month to TFSA, $400/month to RRSP.\n- **Monthly budget (household):**\n  - Mortgage: $2,200 | RESP: $500 | TFSA: $600 | RRSP: $400 | After-school: $360\n  - Groceries: $900 | Dining out: $400 | Transport: $250\n  - Phone/internet: $180 | Subscriptions: $80 | Yoga/fitness: $120 | Therapy: $100 (after insurance)\n  - Clothing: $200 | Emile activities: $150 | Misc/household: $500\n  - Extra mortgage payment (when possible): $500\n  - **Total spend:** ~$7,440 | **Combined income:** ~$13,600 | **Buffer:** ~$6,160\n- **Credit:** One Visa (TD), paid in full monthly. Line of credit available but unused.\n- **Goals:** Pay down mortgage aggressively (extra $500/month when possible), grow RESP to $50K by Emile's 10th birthday, save for a family trip to Portugal, build an emergency fund to $30K.\n\n## Health & Wellness\n\n- **Primary care:** Dr. Marie-Claire Dubois at Clinique Plateau. Annual checkup in November. Last one November 2025, all clear.\n- **Dentist:** Centre Dentaire Plateau. Every 6 months.\n- **Exercise:** Year-round cyclist (primary commuter, 7 km to City Hall). Runs 3x/week (5-8 km along the canal). Yoga class Saturdays at Studio Zen, Plateau.\n- **Knee issue:** Mild runner's knee (right), managed with stretching and a knee sleeve. Sees a physiotherapist at Plateau Physio if it flares.\n- **Mental health:** Sees a therapist monthly. Started after Emile's birth, manages work stress and parenting balance. Values it highly.\n- **Sleep:** 7 hours target. Bed by 11 PM, up at 6:15 AM. Light sleeper; Emile still occasionally wakes at night.\n- **Supplements:** Vitamin D (essential for Montreal winters), iron (runs slightly low).\n\n## Interests & Hobbies\n\n- **Cycling**: year-round commuter cyclist (7 km City Hall \u2194 Plateau) plus weekend rides on Route Verte with Nathalie and Lucie. Member of the Alliance Cycliste du Qu\u00e9bec advisory committee.\n- **Running**: 5-8 km along the Lachine Canal Saturday mornings (knee permitting).\n- **Yoga**: Saturday 10 AM at Studio Zen, Plateau. Standing class for 5+ years.\n- **Reading**: urban-planning theory, Canadian literary fiction, nonfiction on cities and climate; reads in both English and French.\n- **Historical Montreal plans**: collects, frames, and displays antique city plans at home - auction-house finds, occasional FedEx deliveries.\n- **Urbanism blog**: dormant Webflow site she keeps meaning to revive.\n- **Gardening**: small balcony herb planters; small fruit pots when the Plateau microclimate allows.\n- **Family time**: Sunday lunches at Simone and Pierre's in Outremont; cottage weekends in the Laurentians.\n\n## Home & Living\n\n- **Condo:** 3-bedroom condo in a converted triplex on Rue Rachel, Plateau-Mont-Royal. Second floor. Small balcony with herb planters. Walking distance to Parc La Fontaine, Emile's school, and Caf\u00e9 Bellini.\n- **Home projects:** Balcony garden expansion (more herbs, cherry tomatoes). Emile's room reorganization, transitioning from toddler setup. Kitchen