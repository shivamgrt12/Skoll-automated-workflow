  \n## USER.md\n\n# User: Justin Parker\n\n## Basics\n\n- **Name**: Justin Marie Parker\n\
  - **Age**: 61\n- **DOB**: March 8, 1965\n- **Timezone**: America/New_York (Eastern)\n\
  - **Location**: Farragut, TN 37934 (312 Concord Hills Drive)\n\n## Background\n\n\
  Justin is a clinical nursing instructor at Cumberland College of Nursing in Knoxville,\
