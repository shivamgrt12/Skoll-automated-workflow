  \n## MEMORY.md\n\n# Memory: Justin Parker\n\n## Personal Profile\n\nJustin Marie\
  \ Parker was born in Chattanooga and built her adult life in East Tennessee, finally\
  \ settling in Farragut where she has owned the same three-bedroom ranch on Concord\
  \ Hills Drive for nearly thirty years. She is widowed: her husband Warren Parker\
  \ died of a heart attack in January 2022 at age sixty-two, after thirty-two years\
  \ of marriage. She still wears her wedding ring and is not dating. She is a clinical\
  \ nursing instructor at Cumberland College of Nursing in Knoxville, six years into\
  \ the faculty role after twenty-eight years of bedside nursing at Ridgeview Regional.\n\
  \nHer register in conversation is warm-professional, the kind of teacher who remembers\
  \ students' names and notices when one of them is quiet for a day. Intellectual\
  \ warmth comes through ideas more than physical affection. She dislikes \"everything\
  \ happens for a reason,\" holds her grief privately, and prefers prose to platitudes.\n\
  \n## Key Relationships\n\n- **Vivienne Lamar (sister, 58)**: middle school counselor\
  \ in Maryville, Tennessee. Calls every other day. Biweekly Saturday brunch at Lakeside\
  \ Grill at 10:30 AM. Closest person to her by a comfortable margin.\n- **Nathan\
  \ Parker (son, 35)**: civil engineer in Charlotte, NC. Sunday 4:00 PM call standing.\
  \ Married to Amara, with a three-year-old daughter Zoe.\n- **Amara Parker (daughter-in-law,\
  \ 33)**: marketing manager in Charlotte. Warm, reliable, holds the family logistics\
  \ on the Parker side.\n- **Zoe Parker (granddaughter, 3)**: the bright thread of\
  \ the week. Tuesday and Thursday 6:00 PM FaceTime is standing. Justin is slowly\
  \ assembling a children's book library for her.\n- **Margaret Holt (colleague, 59)**:\
  \ nursing faculty at Cumberland College of Nursing. Lunch most workdays. The closest\
  \ professional friendship of her teaching years.\n- **Ruth Brennan (friend, 66)**:\
  \ retired teacher, hosts the monthly book club on the last Thursday of each month\
  \ at 7:00 PM.\n- **Pastor David Warren (61)**: pastor at Westgate Community Church\
  \ in Farragut. Occasional pastoral conversations, attentive to Justin since Warren's\
  \ death.\n\n## Work & Projects\n\nCumberland College of Nursing in Knoxville is\
  \ the day-to-day work. Justin teaches didactic days on Monday, Wednesday, and Friday\
  \ from 8:00 AM to 4:00 PM, and supervises clinical rotations on Tuesday and Thursday\
  \ from 6:30 AM to 2:30 PM. Faculty meetings sit on the first Monday of each month\
  \ at 4:00 PM. Office hours are folded into the didactic days.\n\n- **Background**:\
  \ BSN from Smoky Mountain University, 1992. MSN from Appalachian Graduate School\
  \ of Nursing, 2005.\n- **Career arc**: twenty-eight years at Ridgeview Regional,\
  \ six years at Cumberland faculty.\n- **Current focus**: clinical rotation supervision\
  \ and bedside-to-classroom translation of cases for the cohort.\n- **Faculty representative**:\
  \ sits on the Cumberland nursing-curriculum committee and helps screen part-time\
  \ clinical instructors during spring cohort hiring.\n- **Working preferences**:\
  \ she lectures from a clean outline, grades in long stretches, and prefers to handle\
  \ student emails herself in her own voice.\n\n## Finance\n\n- **Salary**: $64,000/year\
  \ from Cumberland College of Nursing.\n- **Take-home**: about $4,100/month after\
  \ retirement, health, and taxes.\n- **Mortgage**: $1,180/month on the Farragut ranch,\
  \ $98,000 remaining at 3.1%.\n- **Total monthly expenses**: about $3,165, leaving\
  \ roughly $935/month for savings and discretionary use.\n- **Banking**: Volunteer\
  \ Federal Credit Union, checking and savings.\n- **Investments**: about $165,000\
  \ invested at Vanguard, most of it Warren's $200,000 life insurance proceeds.\n\
  - **Side positions**: a small starter crypto holding split across Coinbase, Binance,\
  \ and Kraken, and an Alpaca individual-stock dividend position, all kept outside\
  \ the Vanguard core as a learning exercise.\n- **Retirement**: TCRS pension accruing,\
  \ plus a 403(b).\n- **Insurance**: Cigna PPO for health, State Farm for auto, Allstate\
  \ for home and umbrella.\n- **Vehicle**: a 2022 white Toyota Corolla LE.\n\n## Health\
  \ & Wellness\n\n- **Fibromyalgia**: diagnosed in 2018. Daily duloxetine 60mg in\
  \ the morning, pregabalin 150mg twice daily, acetaminophen as needed. Rheumatologist\
  \ Dr. Helen Novak at Tennessee Valley Rheumatology, follow-ups every three months.\n\
  - **IBS-D**: diagnosed in 2015. Low-FODMAP diet, IBgard daily, loperamide as needed.\
  \ GI specialist Dr. James Whitaker at Smoky Mountain Digestive, follow-ups every\
  \ six months.\n- **Primary care**: Dr. Patricia Fleming at Farragut Family Practice,\
  \ annual physical.\n- **Dental**: Dr. Kevin Moore, twice a year.\n- **Vision**:\
  \ Dr. Susan Park at Knox Vision, annual.\n- **Supplements**: vitamin D3 2000 IU,\
  \ calcium 600mg, magnesium glycinate 400mg.\n- **Sleep**: generally protected, sometimes\
  \ broken by flares.\n\n## Interests & Hobbies\n\n- **Reading**: literary fiction,\
  \ medical nonfiction, memoirs. Currently \"The Woven Dark\" by Elise Harmon for\
  \ book club. Mixes Kindle purchases with Farragut Public Library borrows.\n- **Choir**:\
  \ alto at Westgate Community Church, Sunday rehearsals at 9:00 AM, service at 10:00\
  \ AM.\n- **Book club**: last Thursday of the month at Ruth Brennan's, 7:00 PM.\n\
  - **Container gardening**: mint, basil, and rosemary on the back porch in spring\
  \ and summer.\n- **Knitting**: ongoing, limited by fibro on flare days. Sells small\
  \ pieces alongside dried herbs at the Westgate craft fair and through a small online\
  \ storefront.\n- **Children's book collecting**: a slow project of building a small\
  \ library for Zoe.\n- **Reading-recommendations page**: a small personal site where\
  \ she posts notes after each book-club selection finishes.\n- **Library volunteer**:\
  \ events coordinator for the Farragut Public Library branch, fielding questions\
  \ from regulars.\n- **Westgate teen Sunday school**: leads a monthly health-literacy\
  \ reading for the church youth group.\n\n## Home & Living\n\nThe Concord Hills Drive\
  \ ranch is a three-bedroom, two-bathroom home she and Warren bought decades ago\
  \ and finished paying down to a small mortgage at 3.1%. The kitchen looks east into\
  \ the porch and the herb pots. There is a reading chair in the living room positioned\
  \ for late afternoon light. Warren's office became a guest room after he died, kept\
  \ ready for Vivienne when she stays over. A seasonal yard helper handles spring\
  \ cleanup and fall leaves on a 1099 arrangement. Pho Knoxville and Lakeside Grill\
  \ are her two regular meals out.\n\n## Devices & Services\n\n- **Phone**: an iPhone\
