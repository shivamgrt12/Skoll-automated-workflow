  \ on, and she dislikes language that implies a flare day is a moral failing.\n\n\
  ## Access & Authority\n\n- She has full personal authority over her finances, household,\
  \ medical decisions, and teaching responsibilities at Cumberland College of Nursing.\n\
  - She grants drafting authority for email, faculty notes, family messages, and shopping\
  \ lists, but withholds send authority on most outbound communication.\n- She delegates\
  \ clinical decisions to Dr. Helen Novak (rheumatology), Dr. James Whitaker (GI),\
  \ and Dr. Patricia Fleming (primary care).\n- She is not the legal or medical proxy\
  \ for any family member but is an informal first call for her sister Vivienne and\
  \ a regular touchpoint for her son Nathan's family.\n\n## TOOLS.md\n\n# Tools: Justin\
  \ Parker\n\n## Tool Usage\n\n### Connected Services\n\n#### Email, Calendar & Files\n\
