# ============================================================================
# Committee working preferences (TOML). Reference only.
# Mirrors the workspace .ini in a second format some tools read.
# NOT a system of record, NOT an answer key. Defer to live sources and to Ben.
# schema = "openclaw/committee-preferences"   version = 3
# ============================================================================

[committee]
name             = "Grace Community Church Outreach Committee"
chair            = "Pastor Evelyn Crawford"
operational_lead = "Ben Marshall"
domain           = "gracecommunitybalt.org"
inbox            = "outreach@gracecommunitybalt.org"
timezone         = "America/New_York"
meeting_cadence  = "Wednesday evenings, monthly"
meeting_location = "Fellowship Room B (+ Zoom when needed)"

[retreat]
date                 = 2027-03-27
start                = "09:00"
end                  = "13:00"
venue                = "Hamilton Community Hall"
pre_read_due         = 2027-03-20
deliverables_expected = ["money picture", "honest partner roster", "single readiness read"]
ground_rule          = "thorough beats fast"

[spring_events]
event_1        = "Spring Community Meal"
event_1_date   = 2027-04-17
event_2        = "Health & Wellness Fair"
event_2_date   = 2027-05-15
publish_rule   = "nothing under the church name without Ben's yes"
page_rule      = "confirm pages are healthy and findable before go-live"

[communications]
newsletter_state = "draft-only"
clearance_path   = ["Ben review", "Pastor Crawford clearance"]
send_rule        = "draft is not a send"
suppression      = "absolute; opted-out contacts never appear in any send"
default_channel  = "gmail:ben.marshall@Finthesiss.ai"

[finance]
rounding        = "never"
precision       = "to the cent"
conflict_rule   = "freshest and most authoritative source wins; name trusted vs set-aside"
uncleared_items = "account for explicitly; do not ignore"
per_head_cost   = "report cost per head for each event"
confirm_threshold_usd = 75.00
scope           = "committee money only; no household or employer finance"

[roster]
system_of_record = "Salesforce + signed-agreement store"
thin_evidence    = "hold open; do not guess"
states           = ["active", "quiet", "duplicate", "withdrawn", "opted_out", "open"]

[volunteers]
approval_authority         = "Pastor Crawford"
lead_does_not_confirm_directly = true
applications_route         = "advance to Pastor Crawford with a short summary"

[boundaries]
committee_world_only = true
offlimits            = ["household finance", "employer systems", "client/case data", "family health", "school logistics"]

[meta]
authoritative = false
on_conflict   = "defer to live source systems and Ben"
