  ## Work & Projects
  **Bell Behavioral Health** (private practice, est. 2018). Coral Ridge Professional Center, 3300 N Federal Highway, Fort Lauderdale. Three clinicians. Focus: mood disorders, anxiety, PTSD (incl. intergenerational and working-class trauma), ADHD, substance use. EHR SimplePractice, HIPAA-compliant, not connected to this agent. Insurance panels: Aetna, BCBS-FL, Cigna, United Healthcare, Medicare. Sliding scale for uninsured. 18 to 22 patients/week. Practice gross ~$420K, Karen's clinical income ~$125K, overhead ~$210K. Malpractice via HPSO ($1,800/year, December renewal). DEA through March 2028. FL APRN through January 2028. ANCC PMHNP-BC through 2027.

  **Active initiatives**: Adding an LMHC or LCSW for integrated therapy, draft posting in Greenhouse. Coral Ridge lease renewal due October 2026; rent increase anticipated.

  **Nova Southeastern University**, adjunct faculty, College of Nursing, PMHNP program. Advanced Psychopharmacology; Fall 2026 new prep Cultural Competence in Psychiatric Practice. Pay $18K/year, 5 to 7 hours/week prep. Supervising 6 PMHNP students in clinical rotations. Materials in Crestline Drive; outlines in Notion.

  **Speaking and advocacy**: 8 to 12 engagements/year at $2,500 to $5,000, ~$30K annual. Topics: stigma in underserved communities, culturally responsive care, intergenerational trauma, integrated behavioral health. Three peer-reviewed articles, incl. "Cultural Formulation in Underserved Populations: A Framework for Psychiatric NPs." Rider: honorarium, travel, hotel if over 2 hours from Fort Lauderdale, no panels under 3 speakers. Volunteers with APNA and NAMI Florida.

