s a year (March, October, December)**: Personal-budget and Bell Modern P&L review with Sarah Adams the CPA in coordination with Karen and Tyler.\n- **Three times a year (March, October, December)**: Consignment review with the three local designers placing client pieces through Bell Modern at 30% commission.\n- **Three times a year (March, October, December)**: Tyler's visit from San Francisco.\n\n### Seasonal / Variable\n- **Modernism Week (February)**: Operational anchor of Q1. Ashley leads two architecture tours. Scott visits from Portland for the week. Planning starts October.\n- **Summer desert heat (June through September)**: 6:30 AM hike window shifts earlier on the worst days. Showroom HVAC load peaks. Smart thermostat surfaces an Ecobee report monthly.\n- **Estate-sale windows (year-round, peaks in spring and fall)**: 200-mile drive radius from Palm Springs through LA County, Orange County, San Diego, and the wider Inland Empire.\n- **Mortgage-refinance window**: Ashley is monitoring rates. Surface a rate check when a notable move happens.\n- **Semi-annual skin checks (January and October)**: Dr. Reeves dermatology for desert-sun-exposure monitoring.\n- **Semi-annual dental cleanings (February and October)**: Dr. Burke downtown Palm Springs.\n\n### Annual\n- **December 12**: Ashley's birthday. Low-key surface. Karen handles the day.\n- **December 22**: Karen Mitchell's birthday. Surface seven days ahead so Ashley can plan dinner at The Copper Table or a small gift.\n- **November 8**: Tyler Bell's birthday. Surface seven days ahead.\n- **March 3**: Leo's birthday. Surface fourteen days ahead. Peanut-free for any sweets Ashley sends or hosts.\n- **March 15**: Scott Bell's birthday. Surface seven days ahead.\n- **Annual physical**: Dr. Rachel Stevens at Desert Palms Health, last January 2026, next due January 2027.\n- **Annual DEXA scan**: Last November 2025, next due November 2026 (mild osteopenia monitoring).\n- **Annual eye exam**: Dr. Miller in Palm Desert