  ## MEMORY.md

  # Memory: Chris Johnson

  ## Personal Profile
  Chris is a third-generation Irish-American whose grandparents emigrated from County Cork around 1950. He was raised in Woodlawn, the Bronx, played GAA hurling, danced at feiseanna as a kid, and married Sienna at St. Barnabas. The Irishness is not a costume; it is the wallpaper of his life. Twenty-two years in the FDNY shaped his instincts, his humor, his posture, and the nightmares he does not discuss at dinner. He is quietly devout, with Sunday Mass at St. John the Baptist in Yonkers a fixed point, and his faith stays private and never preachy. He carries controlled intensity: calm in the chaos of a working fire, then pacing the kitchen replaying it, managing his PTSD through therapy and discipline rather than denial.

  His education is field-forged. He earned an AAS in Fire Science from SUNY Empire State in 2006 and a BS in Emergency Management from John Jay College of Criminal Justice in 2012, completing the degree while on the job. He is a protective provider who grew up watching his father Pat work three jobs, and he cannot sit still when there are bills to pay and kids to launch.

  ## Key Relationships
  - **Sienna Johnson (wife, b. January 15, 1983)**: Dental office manager at Westchester Dental Associates. Splits kid-driving duties around Chris's tours and runs evening logistics. Italian-American influence on the household cooking.
  - **Declan Johnson (son, 15, b. February 8, 2011)**: Roosevelt HS, travel baseball, SAT prep with Kaplan. Counting down to his learner's permit in February; Chris takes him to practice driving in empty parking lots on off days.
  - **Fiona Johnson (daughter, 12, b. March 22, 2014)**: Sacred Heart School, competitive Irish step dance at Mulvihill-Lynch. Picky eater (plain pasta, chicken fingers phase).
  - **Liam Johnson (son, 8, b. October 30, 2017)**: 3rd grade at Sacred Heart, GAA hurling on the youth team Chris coaches, Cub Scouts. Will eat whatever Chris grills.
  - **Colleen Johnson (mother, 70, b. December 18, 1955)**: Widowed, lives alone in Woodlawn, Bronx. Independent but slowing down; daily Mass at St. Barnabas and Irish Cultural Center activities. Chris visits on off days, handles her household maintenance, and worries about her being alone.
  - **Pat Johnson (father, deceased, b. January 5, 1951)**: Died 2019 at age 68, retired NYPD with 30 years on the job. His death hit Chris hard and contributed to the PTSD diagnosis.
  - **Tommy Brennan (best friend, 46, b. March 3, 1980)**: FDNY Captain, Engine 1 in the same firehouse complex. BBQ partner in team Ladder and Smoke. Known each other since probie school; also sees a therapist.
  - **Sal Medina (friend)**: Fishing buddy; takes Chris out on his 22-foot center console from City Island.
  - **Kevin Johnson (brother, 40, b. November 25, 1985)**: NYPD officer, 46th Precinct, Bronx. Lives in Yonkers with wife and two kids; fishes with Chris occasionally.

  ## Work & Projects
  FDNY Lieutenant, Ladder Company 24, 7th Battalion, Midtown Manhattan (W 31st St between 7th and 8th Ave). Appointed 2004, promoted to Lieutenant in 2016 after passing the exam. He supervises a 5-person truck company, leads searches on the fireground, forces entry, and coordinates ventilation and rescue. He is an FDNY Incident Management Team member, deployed to major incidents and multi-alarm fires as a division supervisor.

  Shift schedule is 24 hours on and 72 hours off, rotating Group 3, with tours starting at 9:00 AM. Mutual swaps are available with Lt. Danny Kowalski (Ladder 24, Group 1). He is a UFA union delegate for Ladder 24, handling grievances and contract questions for his house. His annual FDNY Bureau of Health Services physical (last full medical March 2026) passed him fit for full duty. He is weighing the Captain's exam, next offered 2027, but has not committed.

  Adjunct teaching at John Jay College: the EMT certification course EMS 101, Tuesday and Thursday evenings, fall and spring semesters, under department chair Dr. Angela Torres. He teaches from his own field experience and the students love it. Income: $138,000 FDNY base, roughly $28,000 overtime, and roughly $12,000 adjunct salary.

  ## Finance
  Combined household income is about $250,000: Chris's FDNY base plus overtime and adjunct pay, with Sienna's $72,000 as a dental office manager. The mortgage runs about $1,665 per month in principal and interest at 3.3% fixed (30-year refinance in 2020), about $330,000 remaining on a $380,000 original loan; the house is worth about $520,000. The 2022 Chevy Tahoe runs $485 per month with about 30 payments left; the 2018 Honda Civic is paid off.

  Savings: $42,000 joint at Webster Bank, earmarked $15K emergency fund, $12K Declan's college gap, and $15K roof fund. Checking at Webster typically holds $8,000 to $12,000. Retirement rests on the FDNY defined-benefit pension (50% of final average salary at 20 years, rising with service); he is eligible now but plans to stay to at least 25 years. The 529 plans hold $28,000 (Declan), $18,000 (Fiona), and $12,000 (Liam), funded at $200 per month split three ways. A small watch-only crypto position worth a few hundred dollars, which Kevin talked him into, sits on Coinbase; no trades without approval.

  Major monthly outlays beyond the mortgage include $1,100 escrow for tax and insurance, $260 auto insurance, $1,200 groceries, $350 utilities, $280 phone and internet and streaming, $850 Sacred Heart tuition for Fiona and Liam, and the kids' activities (Fiona's dance $450, Declan's baseball $300 and SAT prep $200, Liam's GAA and Scouts $120). Health items run $380 insurance, $120 PTSD therapy copay, and $160 PT copay. He sends Colleen $300 per month and tithes $150. No credit card debt; he uses a Chase Sapphire for points and pays in full. Life insurance is $500K term through FDNY plus $250K supplemental through New York Life ($45 per month). Sienna handles taxes with CPA Maria DeLuca in Bronxville, filing jointly and claiming all three kids.

  ## Health & Wellness
  General: 5 feet 11 inches, 210 lbs, strong but carrying about 15 extra pounds that Dr. Flanagan flags at every visit.

  - **Sleep apnea** (diagnosed 2023): ResMed AirSense 11 CPAP, full face mask, nightly use. Compliance tracked via myAir; insurance requires 70% and he hits about 78%, missing some nights after late tours. Sleep study at Westchester Sleep Center under Dr. Maria Santos showed an AHI of 28 events per hour. He hates the mask, hose, and noise, but Sienna confirms he stopped snoring and his energy is better. He brings a travel CPAP for night tours. Next follow-up November 2026.
  - **Rotator cuff** (right shoulder, chronic): Partial supraspinatus tear from years of forcible entry. Physical therapy twice weekly, Mondays and Wednesdays 7:30 AM at Yonkers Physical Therapy and Sports Medicine. Orthopedist Dr. James Reilly at HSS recommends arthroscopic repair, which Chris keeps postponing because three months off active duty means desk duty and lost overtime. Managed with ice, ibuprofen 400mg as needed, and resistance-band exercises. Affects fireground overhead work, swinging a hurley, and sleeping on his right side.
  - **Tinnitus** (chronic, bilateral, worse in the left ear): From cumulative fire ground noise, PASS alarms, saws, and air horns. No treatment beyond a white noise machine at night. Audiologist Dr. Patricia Dunn at ENT Associates of Westchester found mild high-frequency loss bilaterally at the March 2026 test. Worse after working fires; he treats it as part of the job.
  - **High cholesterol** (diagnosed 2021): Rosuvastatin 10mg each evening with dinner. February 2026 lipid panel: total 212, LDL 128, HDL 52, triglycerides 160. Primary care Dr. Sean Flanagan at Westchester Medical Group wants LDL under 100 and pushes him to cut red meat and alcohol, which slips at BBQ competitions and firehouse dinners. Sienna manages it at home with more fish and less red meat.
  - **PTSD** (diagnosed 2022, active treatment): Weekly trauma-focused CBT Thursdays 11:00 AM with Dr. Rachel Kovacs, PsyD, a first-responder specialist. Processing a 2016 high-rise fire with a fatality he could not reach in time plus 22 years of cumulative exposure. Symptoms include intermittent insomnia separate from apnea, hypervigilance, and occasional intrusive thoughts and nightmares. No medication now; sertraline tried briefly in 2023 and stopped with Dr. Kovacs's guidance. Sienna joins a quarterly couples session. He is open about therapy at the firehouse and is a trained CISM peer counselor.

  ## Interests & Hobbies
  - **Irish step dance dad**: Drives Fiona, and increasingly Liam, to feiseanna across the tri-state area on weekends.
  - **GAA hurling**: Coaches the Woodlawn-based youth team at St. Barnabas GAA; played senior level in his 20s before his shoulder gave out.
  - **Home brewing**: Specializes in Irish-style dry stouts and red ales on a 5-gallon all-grain system in the basement, brewing every 5 to 6 weeks.
  - **Fishing**: Long Island Sound out of City Island with Sal Medina, 1 to 2 times a month in season.
  - **BBQ competition**: Competes as Ladder and Smoke with Tommy Brennan at KCBS events; best finish was 8th overall at the Hudson Valley BBQ Championship last year. Brisket is his (post oak, 14-hour Texas-style smoke), ribs are Tommy's department, plus chicken thighs and burnt ends.
  - **True crime**: Reads everything from Ann Rule to long-form journalism and listens to crime podcasts on his commute and overnight tours.

  ## Home & Living
  3BR/2BA colonial built 1952 in the Crestwood neighborhood, 1,800 sq ft plus a finished basement, with kitchen and bathrooms updated in 2019. Quiet, tree-lined, a 5-minute walk to the Crestwood Metro-North station, about 25 minutes to Ladder 24. The basement holds Chris's homebrew setup (all-grain system, fermentation fridge, bottling station, kegerator with two taps). The garage stores the BBQ competition rig (Weber Smokey Mountain 22-inch and a custom trailer with two offset smokers). The backyard has a Weber kettle grill and a rebound wall Chris built so Liam can practice hurling. Open work items: the roof is 18 years old and needs replacement within two years (budgeting $15K to $18K), the front porch steps are cracking, and the windows are drafty. Security is a Ring doorbell and a SimpliSafe system Sienna added after package thefts.

  ## Devices & Services
  - iPhone 15 Pro (primary), MacBook Air (John Jay course prep and family admin), iPad (kids' games and school apps).
  - ResMed AirSense 11 CPAP, used nightly.
  - Vehicles: 2022 Chevy Tahoe (family hauler for kids, BBQ rig, and hurling gear) and 2018 Honda Civic (Sienna's commuter).
  - Home systems: Nest thermostat, Ring doorbell, SimpliSafe security.
  - Streaming and entertainment: Disney+, ESPN+ (FDNY hockey league and GAA on TG4), and a Peloton bike (Sienna's, used on off days when the shoulder cooperates).

