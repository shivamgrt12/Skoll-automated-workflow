  ## MEMORY.md

  # Memory: Jesse Perez

  ## Personal Profile

  - **DOB**: November 14, 1986
  - **Heritage**: Son of Oaxacan immigrants who arrived in Queens in 1982, raised in Spanish and English braided together.
  - **Citizenship**: U.S. citizen, born in Queens, New York.
  - **Languages**: English (native), Spanish (fluent), Portuguese (conversational), basic French.
  - **Bilingual thinking**: Numbers and grief arrive in Spanish, professional vocabulary in English.
  - **Cultural identity**: Carries awareness of being Mexican-American in a predominantly white institutional art world.
  - **Education**: B.A. Art History, Williams College, 2009. M.A. Art Conservation (textile), Winterthur/University of Delaware, 2012.
  - **Fellowship**: Post-grad at the Textile Museum, Washington D.C., 2012 to 2014.
  - **Museum career**: Associate Conservator, Textile Conservation, The Metropolitan Museum of Art, July 2014 to February 2020.
  - **Career transition**: Left The Met after his father's death in October 2019 to build an independent practice in Boston.
  - **Temperament**: Patient and observant, with quiet stubbornness on matters of principle over preference.
  - **Inner critic**: Gets louder when tired, perfectionism he has spent years negotiating down to something livable.
  - **Conservation ethic**: Believes intervention should be minimal and reversible, an ethic that became a way of living.
  - **Documentation philosophy**: Believes documentation outlasts the documenter and the work matters even when unseen.
  - **Family anchor**: Family is the axis his decisions orbit, and the loss of his father remains inseparable from the leap.

  ## Key Relationships

  - **Carmen Perez**, age 65, DOB March 15, 1961. Mother. Retired seamstress who ran a small tailoring business in Jackson Heights for 30 years. Lives alone in the family apartment in Queens. Jesse calls twice weekly. Carmen is proud but does not fully understand conservation as distinct from tailoring, a gentle recurring tension.
  - **Roberto Perez**, DOB July 22, 1950, deceased October 8, 2019 at age 69, cardiac arrest. Father. Taxi driver in New York for 35 years. His death was the turning point that took Jesse from museum salary to independent practice.
  - **Maria Delgado**, age 42, DOB August 8, 1983. Older sister. Lives in Hartford, Connecticut, with her husband Carlos and two children. Works as a pharmacist. Practical, protective, the closest family relationship after Carmen.
  - **Carlos Delgado**, age 44. Maria's husband. IT manager at an insurance company. Quiet and reliable, handles Jesse's studio network when needed.
  - **Sofia Delgado**, age 14, DOB November 4, 2011, and **Diego Delgado**, age 11, DOB February 19, 2015. Niece and nephew.
  - **Dr. Elena Vasquez**, age 56. Senior textile conservator at the Museum of Fine Arts, Boston. Jesse's primary institutional client and professional mentor. Six-year collaboration. Advocates for his work inside the MFA.
  - **Samuel Okafor**, age 34. Part-time studio assistant. Graduate student at Boston University in museum studies. Works 15 hours per week on condition photography, mounting, and environmental monitoring. Reliable and eager.
  - **Claire Pemberton**, age 49. Curator of American Decorative Arts at the Peabody Essex Museum, Salem. Key client. Jesse handles all their textile conservation. Four-year relationship.
  - **Dr. Amina Rashid**, age 51. Professor of Islamic Art at Ashworth. Refers private collectors for Ottoman and Pre-Columbian textile work. Intellectual peer and occasional research collaborator.
  - **Marcus Chen**, age 38, DOB January 22, 1988. Closest friend outside work and the designated best-friend tier for routing and emergency contact. Architect, lives in Fenwick. Met at a gallery opening eight years ago. Alternating-week dinner companion and sounding board for business decisions.
  - **Priya Nair**, age 36. Fellow textile conservator in New York. Trained with Jesse at Winterthur. Regular phone calls, conference travel companion, mutual referral network.
  - **David Leung**. Accountant at Leung and Associates, Boston. Handles tax and quarterly estimates.
  - **Dr. Sarah Kim**. Primary care at Beth Israel Deaconess, Jamaica Plain practice.
  - **Dr. Robert Tran**. Dentist at JP Dental Associates.
  - **Dr. Lisa Park**. Hand therapist on an 8-week cadence.
  - **Dr. Fatima Malik**. Therapist, monthly.

  ## Work & Projects

  - **Business**: Perez Textile Conservation, sole proprietorship, ground-floor studio in Jamaica Plain with internal staircase to apartment.
  - **Equipment**: Humidification chamber, fume hood, fiber analysis microscope, UV imaging setup, archival document scanner, and archival storage.
  - **Client base**: Museums, historical societies, and private collectors across New England.
  - **Specializations**: Latin American textiles, Ottoman embroideries, and American colonial-era samplers and coverlets.
  - **Services**: Condition assessment, stabilization, cleaning, mounting, and long-term storage consultation.
  - **MFA Ottoman Embroidery Suite**: Six 17th- and 18th-century panels for the Museum of Fine Arts, stabilization and mounting phase, exhibition target December 2026.
  - **Peabody Essex Sampler Collection**: Condition survey and treatment plan for 22 American samplers (1750 to 1850), report due January 2027.
  - **Private Oaxacan Textile Commission**: 19th-century woven textile for a private collector via Dr. Amina Rashid, stitching consolidation in progress, delivery November 2026.
  - **Studio hours**: Monday through Friday, 8:30 AM to 5:30 PM, with evening and Saturday admin work.
  - **Conference**: Presenting at the AIC annual meeting in Salt Lake City, November 11, 2026, on reversible mounting techniques.

  ## Finance

  - **Income**: Variable. Around $6,800 per month average from conservation fees, consultation charges, and occasional teaching workshops. Seasonal, busier before exhibition seasons. No secondary income.
  - **Housing**: Rents the JP apartment and studio together for $2,400 per month, below market. The landlord values the quiet tenant and the studio use. Lease renewed annually each summer.
  - **Personal savings**: $42,000 at Citizens Bank. Emergency fund target $50,000. Contributing $600 per month.
  - **Business account**: Separate Citizens Bank business account, current balance around $11,500. Maintains a $4,000 minimum buffer for supplies and equipment maintenance.
  - **Tax**: Self-employed, quarterly estimated payments. Sets aside 30 percent of studio income for federal and state. Accountant David Leung at Leung and Associates handles it.
  - **Monthly budget**: ~$5,285 total against ~$6,800 income, leaving roughly $1,515 buffer. Largest lines: rent $2,400, savings $600, health insurance $480, groceries $380, conservation supplies $350. Tight months draw from buffer.
  - **Credit**: No mortgage. One business credit card paid monthly. Student loans fully paid off in 2024, a point of pride.
  - **Goals**: Build savings to $50K. Invest in a UV-Vis spectrophotometer for dye analysis (around $8,000). Fund AIC conference travel. Save for the Mexico trip with Carmen, first visit in 12 years.

  ## Health & Wellness

  - **Primary care**: Dr. Sarah Kim, Beth Israel Deaconess, JP practice. Annual checkup on February 15. Most recent February 2026, all clear.
  - **Dentist**: Dr. Robert Tran, JP Dental Associates. Every six months.
  - **Exercise**: Yoga three times per week at a JP studio, practiced for ten years. Jamaica Pond walk daily, around 30 minutes before opening the studio. Occasional Blue Hills hiking with Marcus.
  - **Hand and wrist**: Sees Dr. Lisa Park every eight weeks. Repetitive fine motor work and microscope posture are punishing. Mild right-hand carpal tunnel managed with stretches, ergonomic tools, and rest breaks.
  - **Mental health**: Sees Dr. Fatima Malik monthly. Processes grief over his father's death, the pressures of independent practice, and identity tensions in the institutional art world. Finds the work itself grounding.
  - **Sleep**: Targets 7.5 hours. Bed by 11 PM, up at 6:30 AM. Sleeps well except during grant deadline periods.
  - **Supplements**: Vitamin D, calcium, turmeric for joint health.
  - **Dietary restrictions**: Mild shellfish sensitivity. Avoids shrimp and crab. No severe allergies.

  ## Interests & Hobbies

  - **Latin American textiles (personal collection)**: Growing collection of contemporary pieces bought directly from artisans. The textiles he gets to simply love rather than save.
  - **Cooking**: Multi-year project to reproduce Carmen's mole negro from memory. Each attempt is logged and adjusted. Sunday batch-cook is part regulation, part ritual.
  - **Yoga**: Steady habit for ten years. Held loosely as practice, tightly as anchor.
  - **Reading**: Poetry at end of day. Re-reading *The House on Mango Street* (his father's favorite). Conservation texts, Latin American art history (Boone, Pasztory), fiction (Cisneros, Garcia Marquez), poetry (Neruda, Ocean Vuong).
  - **Walking**: Jamaica Pond loop most mornings, same path.
  - **Reference library**: Slowly building one in the second bedroom.
  - **Research writing**: Quietly researching Oaxacan weaving traditions toward an article. The research is genuine; whether the article ships is open.

  ## Home & Living

  - **Home**: Second-floor apartment in a triple-decker in Jamaica Plain. Two bedrooms, eat-in kitchen, small living room with a bay window. Quiet street near Jamaica Pond.
  - **Studio**: Ground floor of the same building, separate client entrance.
  - **Aesthetic at home**: Sparse but not cold. Natural materials, muted earth tones, the warmth of wood and linen. Textiles he loves displayed without ceremony. Clear surfaces. Reads as discipline or relief depending on the visitor.
  - **Transportation**: Primarily public transit. T pass plus occasional rideshare. No car ownership.
  - **Active home projects**: Studio lighting upgrade replacing fluorescent tubes with calibrated LED panels for color accuracy, targeted winter 2026 to 2027. Kitchen countertops deferred until studio investments are complete. Building the textile reference library in the second bedroom.

  ## Devices & Services

  - **Phone**: iPhone 15. Calls, WhatsApp, email, quick condition photography, environmental monitoring app linked to studio sensors.
  - **Laptop**: MacBook Pro 14-inch. Primary work machine for condition reports, imaging processing, client correspondence, research, grant writing.
  - **Studio tech**: Digital microscope with imaging software, UV photography setup, environmental monitoring system with cloud dashboard, archival document scanner.
  - **Smart home**: Minimal. Smart thermostat, studio environmental alerts linked to phone.
  - **Subscriptions owned**: Spotify, one streaming service, AIC membership, *Journal of the American Institute for Conservation* annual, Adobe Creative Cloud for imaging.

