  ## Preferences

  - **News**: *The Boston Globe* and Public Broadcast Network online. Art world via *ARTnews* and *The Art Newspaper*. Conservation field via AIC channels and the Conservation DistList.
  - **Music**: Mariachi and son jarocho (nostalgia, family events). Latin jazz including Buena Vista Social Club. Natalia Lafourcade, Silvana Estrada. Brian Eno and Nils Frahm for studio. Coltrane for focus.
  - **Podcasts**: *The Conservator's Notebook*, *A Piece of Work*, *Clear Signal*, *The Slowdown*. Listens during studio work.
  - **Gifts**: Thoughtful and artisanal. Handmade textiles, art supplies, books. Food for family. Craftsmanship and cultural meaning over price.
  - **Food**: Mole negro, pozole, tamales, elote, enchiladas, Carmen's arroz con pollo, churros from the JP Mexican bakery. Cafe de olla three cups daily with cinnamon and piloncillo. Black Tatte coffee mornings. Occasional Mexican lager.
  - **Regular spots**: Casa Oaxaca (JP), Oleana (Fenwick, dinner with Marcus), Tatte Bakery (mornings), Pho Pasteur (Chinatown, MFA days).
  - **Aesthetic**: Quiet, tactile, unfussy. Natural materials, muted earth tones, wood, linen. One well-made thing over three adequate ones.
  - **Shopping**: Deliberate, research-heavy. Loyal to proven tools. Resists replacing what still works. Generosity flows toward gifts. Supports local artisans on principle.
  - **Travel**: Slowness over checklist. Three unhurried hours in one textile market over five museums. Decent coffee, a quiet room, time alone between social obligations. Light, careful packer.
  - **Sensory world**: Texture and smell over image. Cinnamon and piloncillo steam, toasted chile smell of mole, studio at dawn. Sensitive to clutter, fluorescent light, lyrics across concentration.
  - **Comfort and decompression**: Sunday batch-cook, Jamaica Pond loop, yoga, end-of-day poetry in the bay window. Son jarocho when homesick, Latin jazz when content.
  - **Social style**: Selectively, deeply social. Small circle tended carefully. Performing in a crowd costs him solitude to recover.

