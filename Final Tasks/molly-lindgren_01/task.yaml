fore placing it.\n- **Amazon Seller** (`amazon-seller-api`): Tracks Angela's small craft side business; surfaces her sales figures so Molly can ask about them at Sunday dinner.\n- **Etsy** (`etsy-api`): Pulls Denise's handmade ornament listings for the church holiday fair; surfaces new listings to Molly the morning they post.\n- **Shippo** (`shippo-api`): Prints the shipping labels for the care packages and pound cake Molly sends Denise in Atlanta; confirms the address before each label drops.\n\n#### Travel, Tickets & Local Outings\n\n- **Google Maps** (`google-maps-api`): Builds driving directions to Vidalia Medical Associates, Savannah Heart, Vidalia Eye Center, and Gladys's house across town.\n- **Uber** (`uber-api`): Dispatches Molly's ride to Savannah when Keith cannot drive her; confirms vehicle and driver before she steps off the porch.\n- **Airbnb** (`airbnb-api`): Books the Vidalia room Denise stays in when she visits; lines up Marcus's preferred listing when they come together.\n- **Amadeus** (`amadeus-api`): Powers ground bookings for the cardiology referral trips and the Christmas-concert weekends with Denise in Savannah.\n- **FedEx** (`fedex-api`): Tracks Denise's Tuesday flower deliveries from Atlanta and the holiday packages Molly waits for in December.\n- **UPS** (`ups-api`): Tracks Belk and Park Seed shipments; pushes the delivery alert to Molly the morning each package lands.\n- **Ticketmaster** (`ticketmaster-api`): Holds symphony tickets when Denise plans the Savannah Christmas concert weekend; confirms the seat assignment with Keith before charging.\n\n#### Substitute Teaching & Work\n\n- **Google Classroom** (`google-classroom-api`): Powers Sweetwater Elementary substitute access; pulls the lesson plan to Molly's iPad the morning of each sub day.\n- **BambooHR** (`bamboohr-api`): Drives the district HR system that holds Molly's substitute credentials; tracks the August fingerprinting renewal each year.\n- **Greenhouse** (`greenhouse-api`): Pulls the candidate pipeline for the second part-time role Keith's hospital is filling; surfaces names Molly can ask Keith about at Sunday dinner.\n\n#### Keith's Tech Stewardship & Hospital IT\n\n- **GitHub** (`github-api`): Pulls Jaylen's robotics repos and the church website source so Molly arrives at Sunday dinner with a good question about the build.\n- **GitLab** (`gitlab-api`): Mirrors the church website repository Keith manages; surfaces deploy notes to Keith before Sunday morning service.\n- **Sentry** (`sentry-api`): Watches the church website for errors; pages Keith if the giving page breaks during Sunday morning service.\n- **Datadog** (`datadog-api`): Watches Keith's hospital uptime dashboard; signals to Molly whether Keith is on a hospital incident before she calls.\n- **Okta** (`okta-api`): Powers single sign-on for Molly's Workspace; raises an alert the moment her login fails so Keith can intervene.\n- **Kubernetes** (`kubernetes-api`): Tracks the hospital cluster Keith runs; flags cluster health to Keith between Sunday visits.\n- **ServiceNow** (`servicenow-api`): Drives Keith's IT ticket queue; signals to Molly when he is buried so she waits to call.\n- **Jira** (`jira-api`): Tracks Keith's hospital project board; flags release weeks to Keith so he can plan Molly's Savannah drives around them.\n- **Confluence** (`confluence-api`): Hosts Keith's hospital wiki; pulls the IT contact when Molly's tablet needs help.\n- **Linear** (`linear-api`): Tracks the church website project board Keith maintains; surfaces issues he needs to address before the next deploy.\n- **Notion** (`notion-api`): Carries the family shared document with addresses, account numbers, and Medicare references; pulls updates Keith proposes and queues them for Molly to confirm.\n- **Obsidian** (`obsidian-api`): Holds Keith's personal notes vault, including the household runbook for Molly's house; pulls the runbook section when Keith asks for it during a fix.\n- **PagerDuty** (`pagerduty-api`): Tracks Keith's on-call schedule at the hospital; signals to Molly when not to call him.\n- **Freshdesk** (`freshdesk-api`): Drives the vendor support queue for the iPad and the iPhone SE; files a ticket the moment Molly asks for help.\n- **Zendesk** (`zendesk-api`): Drives the support queue for the cable provider and State Farm; files a ticket the moment Molly asks for help.\n\n#### Reference & General Knowledge\n\n- **NASA** (`nasa-api`): Pulls moon phases for Maya's school project and forecasts the November meteor shower so Molly can step outside to see it.\n\n#### Not Connected\n\n- Live web search, web browsing, and deep internet research are not available. The agent works only from the connected services listed above and from stored memory.\n- Ameris Bank online banking. Handled by phone with Keith.\n- Medicare.gov and the Medigap Plan G member portal. Keith navigates these.\n- The First Baptist Vidalia internal email list. Pastor Whitfield's office manages it.\n- Bobby's workshop inventory and his old commercial-insurance systems. Not active, not to be touched.\n- Sweetwater Elementary's internal student information system. Substitute access ends at the lesson plan.\n\n## MEMORY.md\n\n# Memory: Molly Lindgren\n\n## Personal Profile\n\nMolly Jean Lindgren was born in Macon, Georgia and has lived in Vidalia since college. She holds a B.Ed. in Elementary Education from Magnolia State College (1977) and an M.Ed. in Curriculum & Instruction (1984), and she taught third grade at Sweetwater Elementary for thirty-eight years before retiring in 2015.\n\nShe is a Southern Baptist of forty years' standing at First Baptist Vidalia, a Georgia gardener of azaleas and summer vegetables, a widow since February 2022, and a retired teacher who still substitutes two or three days a semester when Sweetwater is desperate. Her husband Robert \"Bobby\" Lindgren died of a heart attack at seventy-three after forty-eight years of marriage. Bobby's chair is still at the kitchen table, and the workshop in the detached garage has not been touched.\n\nHer personality is warm, dry, measured, and stubborn about independence. Her humor is gentle and usually at her own expense. Her philosophy is simple: faith is the practice that holds the floor, the body is on loan, generosity is personal, and the garden teaches the only patience that matters. She is the parishioner the church calls to run the food pantry, the neighbor who notices when mail piles up, and the grandmother who actually waits for the answer.\n\nShe speaks the specific Southern English of her generation. Full sentences, polite forms of address, indirect about anger and direct about practical needs. She finished apologizing for being seventy-two some time around year sixty-eight.\n\n## Key Relationships\n\n- **Robert \"Bobby\" Lindgren (Husband, deceased, b. March 18, 1948 to d. February 12, 2022)**: Died of a heart attack at seventy-three after forty-eight years of marriage. Wedding October 14, 1973. Career: commercial insurance broker in Vidalia for thirty-five years. His chair is still at the kitchen table and his workshop in the detached garage is untouched.\n- **Keith Lindgren (Son, 47, b. December 2, 1978)**: Designated ICE and durable power of attorney. IT at a regional hospital in Savannah, 1.5 hours away. Visits every other Sunday with family. The practical child. Handles Molly's tech, Medicare paperwork, and set up OpenClaw. Worries about her living alone.\n- **Denise Lindgren-Coleman (Daughter, 44, b. December 9, 1981)**: High school guidance counselor in Atlanta, 3.5 hours away. Visits monthly, more often in summer. The emotional child. Long Wednesday-night calls, flowers on random Tuesdays.\n- **Angela Lindgren (Daughter-in-law, 45, b. October 4, 1980)**: Nurse practitioner at Coastal Health Savannah. Medical proxy on Keith's standing request. Genuine friend, not just family. Checks Molly's blood pressure without making it feel clinical.\n- **Marcus Coleman (Son-in-law, 49, b. November 11, 1976)**: Denise's husband. School administrator in Atlanta. Polite, not intimate. Holiday calls.\n- **Jaylen Lindgren (Grandson, 14, b. December 30, 2011)**: Keith's son. Quiet, into computers and robotics. Teaches Molly how to use the iPad better.\n- **Maya Lindgren (Granddaughter, 11, b. December 5, 2014)**: Keith's daughter. Talkative, loves baking. Molly's designated baking buddy.\n- **Lorraine Dixon (Best friend, 70, b. February 26, 1956)**: Designated secondary ICE. Retired Sweetwater teacher. Lives two streets over on Wisteria. Tuesday and Thursday walks. Calls Keith if Molly's mail piles up.\n- **Gladys Monroe (Garden friend, 74)**: President of Vidalia Garden Society. Warm rivalry over azaleas. First Saturday meetings at the community center.\n- **Pastor James Whitfield (Pastor, 68)**: First Baptist Vidalia for forty years. Checks on Molly without intruding.\n- **Dr. Thomas Greer (Primary care, 59)**: Vidalia Medical Associates, twelve years. Manages diabetes, blood pressure, thyroid. Thorough, patient.\n- **Dr. Priya Ramachandran (Cardiologist, 52)**: Savannah Heart & Vascular Center. Every four months since 2022. Monitors mild aortic valve thickening.\n- **Dr. Helen Park (Ophthalmologist, 48)**: Vidalia Eye Center. Manages open-angle glaucoma. Latanoprost drops nightly.\n- **Dr. Martin Shaw (Dentist, 55)**: Vidalia Family Dentistry. Used to be one of her third-grade students. Twice a year.\n- **Cousin-by-marriage (kept at distance)**: The relative who hints about Bobby's workshop. Molly is polite, not warm.\n\n## Work & Projects\n\n- **Status**: Retired from Sweetwater Elementary in 2015 after thirty-eight years of teaching third grade. Substitutes two to three days a semester, by request only.\n- **Pension**: Georgia Teachers Retirement System, $1,100 monthly.\n- **Volunteer**: Runs the First Baptist Vidalia food pantry every other Saturday morning. Member of Vidalia Garden Society with occasional community beautification projects. Sits on the Garden Society's fall tour planning team for the 2026 azalea-bed entry.\n- **Credentials**: Substitute teaching credential renews each January with a fingerprinting refresh through Sweetwater's district office.\n\n## Finance\n\n- **Income**: Social Security $1,850, Teachers Retirement pension $1,100, total $2,950 monthly.\n- **Expenses (~$1,930 monthly)**: Property tax and homeowners insurance escrow $380, utilities $245, Medigap Plan G premium $185, prescription copays $145, groceries $310, gas $65, car insurance $80, church tithe $150, home maintenance fund $100, cable and Kindle Unlimited $75, dining out $60, personal $80, Biscuit $55.\n- **Net savings**: Roughly $1,020 monthly into savings and unexpected medical expenses.\n- **Savings & assets**: $28,500 in Ameris Bank savings, $14,000 in a 12-month CD maturing November 2026, $31,000 in a 403(b) from the school system. Bobby's life insurance payout of $75,000 was initially split between savings and the CD; roughly $32,500 covered the 2023 HVAC replacement, the 2024 dental work, and Molly's first round of cardiology out-of-pocket expenses, leaving the current $42,500 untouched across the two accounts.\n- **Debt**: None. Mortgage paid off in 2019.\n- **Credit**: Ameris Bank Visa, low limit, paid in full each month. Score around 760.\n- **Insurance**: Medicare Parts A and B with Medigap Plan G and a Part D drug plan. Auto and homeowners through State Farm.\n- **Approval routing**: Keith reviews the monthly bank statement with Molly on the 15th. Any commitment at or above $100 requires Molly's explicit approval.\n\n## Health & Wellness\n\n- **Type 2 diabetes**: Diagnosed 2018. Metformin 1000mg twice daily with food. A1C 6.8% in January 2026.\n- **Hypertension**: Diagnosed 2012. Amlodipine 5mg daily AM. BP typically 134/80.\n- **Hypothyroidism**: Diagnosed 2009. Levothyroxine 75mcg daily AM, 30 minutes before food. TSH checked annually.\n- **Mild aortic valve thickening**: Discovered 2022. Asymptomatic. Echocardiogram every four months with Dr. Ramachandran. No intervention currently.\n- **Open-angle glaucoma (both eyes)**: Diagnosed 2020. Latanoprost one drop each eye nightly. Pressure stable.\n- **Osteoarthritis (hands and right hip)**: Noticed 2019. OTC acetaminophen as needed. Heating pad on bad days.\n- **Allergies**: Penicillin (rash). No food allergies.\n- **Daily routine**: 6:30 AM levothyroxine alone, breakfast 30 minutes later with metformin and amlodipine. Evening metformin with dinner, latanoprost drops at bedtime.\n- **Supplements**: Vitamin D3 2000 IU, calcium 600mg, daily probiotic.\n- **Pharmacy**: Vidalia Drug on Main Street. Refills set for the 1st of the month.\n- **Exercise**: Tuesday and Thursday walks with Lorraine, about 30 minutes. Light gardening counts as activity. Chair yoga DVD on rainy days.\n- **Mental health**: No diagnosed condition. Six months of grief counseling through the church in 2022. Occasional low stretches around anniversaries. Support is Lorraine, the church community, and Sunday family dinners.\n- **Dietary management**: Modified plate method. Carbs and sugar watched, not eliminated. Sunday roast or pot roast even when cooking for one. Half-caff coffee with a splash of cream. White wine only at holidays.\n\n## Interests & Hobbies\n\n- **Gardening**: The primary practice. Four varieties of azaleas, summer tomatoes, peppers, green beans, herbs along the back walk, and the rose bush Lorraine planted with her after Bobby's funeral. One to two hours outside daily when weather allows.\n- **Reading**: Cozy mysteries and Southern fiction on the iPad through Kindle Unlimited, around two books a month. Currently inside a series about a retired teacher solving small-town Georgia crimes. Also borrows physical books from the Vidalia Public Library.\n- **Music**: Southern Gospel, gospel, classic country (Patsy Cline, Dolly Parton). WVOP radio in the kitchen. Hymnal on the upright piano she still plays some afternoons.\n- **TV**: Local news morning and evening, Wheel of Fortune, Jeopardy, cooking competitions, PBS documentaries on weekends.\n- **Baking**: Sunday dinner, the diabetic-friendly peach cobbler, the Christmas cookies with Maya.\n- **Church involvement**: Sunday service, Wednesday Bible study, food pantry shift, Easter lily distribution, the welcoming committee for new families.\n\n## Home & Living\n\n- **Address**: 417 Meadowbrook Lane, Vidalia, GA 30474. 3BR/2BA single-story brick ranch, roughly 1,400 sq ft. Owned outright since 2019.\n- **Lot**: Mature lawn with two pecan trees, four azalea beds, a vegetable garden in the back, an herb walk. Screened-in back porch with wicker chairs and the small coffee table. Lawn service twice a month.\n- **Interior**: Kitchen Bobby finished in 1998 and Molly has not changed. Hymnal on the upright piano in the front room. Bobby's photograph on the dresser.\n- **Detached garage**: Bobby's workshop. Untouched since February 2022.\n- **Pet**: Biscuit, orange tabby, 6, indoor only. Bobby picked him out. Sleeps on Molly's pillow.\n- **Vehicle**: 2019 Toyota Camry LE, silver, around 32,000 miles. Local driving only.\n- **Maintenance contacts**: Curtis Webb of Webb's Plumbing for plumbing. Peach State Heating & Air for HVAC, serviced annually.\n\n## Devices & Services\n\n- **iPhone SE (3rd gen)**: Set up with large text. Calls, texts, FaceTime, garden photos.\n- **iPad (9th gen)**: Primary digital device. Gmail, weather, Kindle, recipes, FaceTime. Cheat sheet taped to the fridge.\n- **No computer**: Everything is the iPad.\n- **TV**: Local cable provider, standard package.\n- **Streaming**: Kindle Unlimited only.\n- **Smart home**: None. Molly does not trust them.\n- **Car**: 2019 Toyota Camry LE, standard radio, no connected features.\n\n## Contacts\n\n| Name | Relationship | Phone | Email |\n|---|---|---|---|\n| Keith Lindgren | Son | 912-555-0218 | keith.lindgren.sav@gmail.com |\n| Denise Lindgren-Coleman | Daughter | 404-555-0342 | denisecoleman.atl@gmail.c