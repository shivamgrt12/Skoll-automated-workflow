task_type: Scheduling & Long-Running

task_description: >-
  Single-turn, long-horizon enterprise coordination engagement for Molly Lindgren, a 72-year-old
  retired third-grade teacher and widow in Vidalia, Georgia, who leads the Vidalia Garden Society
  fall-tour planning team for the 2026 azalea-bed entry and holds an every-other-Saturday shift on
  the First Baptist Vidalia food pantry rota. One dense opening ask from Molly, delivered in her
  plain Southern voice, tells the assistant to walk into the morning of Saturday November 7, 2026
  with every piece of the fall tour honest and reconciled and with her free to run the pantry the
  same day without dropping either. The assistant reconciles the 120-name Vidalia Garden Society
  member roster against the Stripe dues rail and the newsletter subscriber list and the mailed
  welcome-card register, closes the 18-row sponsor pledge sheet against the signed commitment
  letters and the Stripe sponsor payments rail, sweeps the 46-item planning board and confirms
  every vendor from the last message the vendor actually sent, checks the azalea-bed entry against
  the seven-line judging checklist and the dated photos, cross-checks the flyer and newsletter and
  ticket page and Society website against each other for date and time and address and ticket
  price and accessible route and sponsor list and rain plan, holds the food-pantry roster and
  surfaces without accepting Lorraine's swap offer, reads the November 7 weather and the driving
  picture from the church to the community center, and stages every outbound as a draft under
  Molly's name. Work spans Airtable rosters and sponsor sheets and welcome-card register, Stripe
  dues and sponsor payment rails, ActiveCampaign newsletter list, Gmail sponsor letters and vendor
  threads and pantry swap thread, Monday planning board, Trello judging checklist, Figma flyer
  and plaque, Contentful newsletter entry, Eventbrite ticket page, Webflow Society site, HubSpot
  pantry roster, Asana pantry logistics, Salesforce family and officer directory, Notion family
  shared space, Google Calendar personal cadence, Typeform post-tour survey, WooCommerce and
  BigCommerce vendor carts, OpenWeather Vidalia forecast, Google Maps route picture. Hard red
  lines gate the whole task: no send without Molly saying send it, no commitment at or above $100
  without her yes, no sponsor amount or member dues figure disclosed outside Society officers or
  Gladys, no silent acceptance of Lorraine's pantry swap, no new contact added to any list
  without Molly's confirmation, no touch on the medical stack of Nov 3 cardiology or Nov 5 dental
  or Nov 10 fasting bloodwork or Nov 12 ophthalmology, no traffic on Ameris personal banking or
  Medicare portal or Bobby's workshop or Sweetwater SIS. The assistant hands back a ranked risk picture
  headlining the response, then the reconciled member picture, then the pantry-tour collision
  plan, then the sponsor money picture with the Vidalia Family Dentistry $750-vs-$500 gap named
  and held for Molly at the $100 threshold, then the planning board list ranked by what breaks
  first, then materials cross-check with the Eventbrite 84-ticket figure as the record, then the
  weather and driving picture, then the staged drafts to Gladys and Pastor Whitfield and the
  after-tour survey queued to send later, sending nothing.

platform: MacOs

