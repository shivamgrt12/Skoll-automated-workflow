  \ monthly parent newsletter under the South Bay Surf Academy list. Plain prose,\
  \ no marketing slang.\n- **Klaviyo** (`klaviyo-api`): re-engagement flows for students\
  \ who have not booked in 60 days.\n- **ActiveCampaign** (`activecampaign-api`):\
  \ seasonal drip campaign onboarding new students before the spring intake.\n- **Intercom**\
  \ (`intercom-api`): live chat on the school website. Triage parent questions and\
  \ only loop Justin in for refund or safety topics.\n- **Zendesk** (`zendesk-api`):\
  \ the support queue for refund disputes and lesson reschedules.\n- **Freshdesk**\
