  # Memory: Andrea Kaminski

  ## Personal Profile

  Born in Cleveland, Ohio to Polish-American parents who spoke Polish at home when conversations turned serious. She holds a B.S. in Marketing from Cleveland State University (May 2017) and a Google Analytics certification (2021), and is currently researching online MBA programs that fit around a full-time analyst role. She is divorced as of August 2025 after a three-year marriage to Brett Kaminski; the split was clean financially and quiet emotionally, but it sits at the center of how she is rebuilding her own time and her own house rules. She speaks English natively and understands Polish far better than she speaks it, with a quiet guilt about being the one in whom the language might thin out.

  Underneath the level, faintly amused steadiness people meet her with, hurt reaches her on a delay; she absorbs a slight, files it, and carries on so smoothly the person responsible assumes it landed soft. She is stubborn in a way she would reframe as principled, slow to confront, and slower to forgive being managed rather than dealt with straight. She would describe competence as its own form of dignity, and self-reliance as less about pride than about never again being in a position where her wellbeing depends on someone else's reliability. She circles whether the wall she has built around her own self-sufficiency is keeping her safe or just keeping her alone, and changes her mind about it depending on the week. Polish-American and Midwestern in roughly equal measure, both worn lightly and both more load-bearing than her offhand manner suggests; the loss of her father in 2019 left a gap in that lineage she notices most when the table is supposed to be full.

  ## Key Relationships

  1. **Megan Kaminski-Roth, sister, 34, DOB March 22, 1992.** Lives in Akron, OH with husband Daniel and daughter Lily. Middle school math teacher. Andrea's closest relationship and primary support during the divorce. With Megan, Andrea drops the capable-one posture; she can be petty, uncertain, and undone without it being held against her. Designated personal / ICE contact.
  2. **Daniel Roth, brother-in-law, 35, DOB July 8, 1990.** Software engineer. Quiet, easygoing, gets along well with Andrea. They bond over board games at family dinners. Useful to know what he is shipping at work so she has something specific to ask him about.
  3. **Lily Roth, niece, 3, DOB December 12, 2022.** Toddler. Andrea adores her and spoils her with books and small gifts; FaceTime is the usual channel, mostly waves and babbles. Lily is the one line item where the usual cost-benefit math quietly suspends itself.
  4. **Jan Kaminski, mother, 59, DOB September 4, 1966.** Lives in Parma, OH (Cleveland suburb). Medical-office receptionist. Widowed; Andrea's father died of a heart attack in 2019. Practical, tough, worries Andrea works too hard.
  5. **Brett Kaminski, ex-husband, 33, DOB May 19, 1993.** Account manager at a Columbus tech company; lives in Clintonville. Married 2022, separated January 2025, finalized August 2025. No animosity; they wanted different things. Text-only if logistics require it. Do not initiate contact.
  6. **Rachel Nguyen, best friend, 30, DOB April 11, 1996.** UX designer, lives in Columbus (German Village). Friends since college. Rachel knows everything and is blunt in a way Andrea appreciates.
  7. **Matt Ostrander.** Rachel's boyfriend. Friendly periphery; included in birthday and group dinners.
  8. **Chloe Park.** Friend through Rachel. Periphery of the inner circle.
  9. **Tom Hadley, supervisor, 44.** Director of Analytics at Crestline Analytics. Andrea's boss for nearly two years. Professional, supportive, an advocate for her work. Designated operational escalation contact.
  10. **Priya Chatterjee, coworker, 28.** Junior analyst on Andrea's team; Andrea informally mentors her.
  11. **Marcus Webb.** Sales lead at Crestline. Frequent cross-functional partner on client deliverables.

  ## Work & Projects

  Marketing Analyst at Crestline Analytics, a mid-size marketing analytics firm with about 120 employees and a Columbus, OH office. She joined in January 2023; her previous role was associate analyst at a smaller Cleveland firm from June 2017 to November 2022, a position she left to follow Brett's career to Columbus (roughly two-month transition before Crestline started). She reports to Tom Hadley (Director of Analytics). Her core scope is campaign performance analytics for mid-market B2B clients: dashboards, written reports, and presentation of insights to client stakeholders.

  Her current lead is the Q4 benchmarking project, a hard client deliverable due later this fall. She is also quietly building a case for sponsorship of an online MBA, which she intends to raise in her next 1:1 with Tom. Work schedule is hybrid: in-office Tuesday, Wednesday, Thursday and remote Monday and Friday. She has 8 PTO days remaining for 2026 and is reserving some for Megan visits and the solo trip she keeps half-planning.

  ## Finance

  Base salary is $68,000 per year, with a 5 to 8 percent annual bonus paid in March (roughly $3,400 to $5,440). Monthly take-home after taxes and 401k contribution is approximately $4,250. The divorce closed cleanly: no alimony, no shared debt, no shared property. She kept her savings and her retirement; Brett kept his.

  Monthly outlays, approximate:
  - Rent (1BR apartment): $1,285
  - Utilities (electric, water, internet): $155
  - Mazda CX-30 payment: $340
  - Auto insurance (Progressive): $95
  - Groceries: $300
  - Dining out: $120
  - Gas: $80
  - Phone (Verizon): $55
  - Health insurance (employer-subsidized, Anthem PPO): $360
  - Peloton app: $13
  - Streaming and cloud (Netflix, Hulu, Spotify, cloud): $48
  - Personal and miscellaneous: $100
  - Niece gifts and incidentals: $40
  - Total: ~$2,991

  Roughly $1,259 a month routes to savings, the travel fund, and MBA research. Liquid savings: $14,500 at Buckeye Federal Credit Union; goal is a $20,000 emergency fund by end of 2026, which requires about $786 per month from June onward and is well inside the surplus. 401k through Crestline holds about $28,000, contributing 6 percent with a 4 percent match. Primary credit card is Discover, paid in full monthly; credit score around 755. She knows she should get renter's insurance and has researched it (Lemonade quoted $12 a month for $30K personal property) and has not pulled the trigger.

  ## Health & Wellness

  Generally healthy, no chronic conditions, no daily prescription medications. Daily multivitamin; occasional melatonin on restless nights; OTC loratadine through spring pollen season. Primary care: Dr. Sarah Feldman at Heartland Family Medicine in Westerville (designated medical escalation contact). Dental: Dr. James Cho at Polaris Dental Group in Columbus. Vision is unaided.

  Exercise is a steady three runs a week, 3 to 4 miles on the neighborhood loop or the Alum Creek trail, plus two Peloton-app bodyweight sessions at home. No gym membership by choice. She saw Dr. Karen Luce at Meridian Counseling for about six months during the separation in 2025 and is no longer in regular therapy; she manages the occasional "did I make the right call" wave with a run and a phone call to Megan. Sleep is engineered: blackout curtains, weighted blanket, and a bedroom built entirely around her own rest. Sound is where she is most easily frayed; she uses music as acoustic management more than as entertainment. No food or drug allergies.

  ## Interests & Hobbies

  Running is the closest thing she has to a devotion, though she would resist the word; what she is actually after on the early-morning loops is the particular emptiness of a body doing one repetitive thing while the mind sorts itself out unsupervised. Reading sits in a more complicated place; she moves between business nonfiction she half-treats as professional maintenance and literary fiction she slightly guards, reading more of it during the harder stretches without consciously deciding to. Cooking is a small daily experiment, mostly sheet pan dinners, stir-fry, pasta, and an Instant Pot she has converted to. She rewatches cooking competition shows for the low, undemanding hum of competence on a screen. Underneath all of it runs a quiet, half-spoken wish for some pursuit that is purely hers and answers to nothing.

  ## Home & Living

  Apartment at 485 Sunbury Road, Unit 2C, Westerville, OH 43081. One bedroom, one bath, roughly 650 square feet on the second floor of a small complex of about 30 units. Balcony overlooks a parking lot but gets morning sun. Living room holds a small desk for remote workdays and bookshelves with a mix of marketing books and novels. Kitchen is tight but functional; she has made peace with it. Bedroom is her favorite room: blackout curtains, good sheets, weighted blanket. Parking is one assigned spot included with rent. She is quietly comparing Columbus-metro neighborhoods for a house purchase in the next 18 to 24 months.

  Vehicle: 2023 Mazda CX-30 Select, dark blue, roughly 18,000 miles. Auto loan through Buckeye Federal Credit Union.

