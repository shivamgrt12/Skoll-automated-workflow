  Personal: MacBook Air 15-inch, iPhone 15 Pro, iPad for bedside UpToDate reference. Home: Nest thermostat, Ring doorbell, Amazon Echo in the kitchen. Vehicles: 2023 Toyota Highlander, 2019 Honda Civic. Medical reference: UpToDate, PubMed, ACOG Practice Bulletins. Entertainment: Spotify, Netflix, Disney+, YouTube. Financial accounts: Fidelity (401k, brokerage), Vanguard (529s), Laurel Road (loans), Marcus by Goldman Sachs (HYSA), Chase (checking), Northwestern Mutual (life), Guardian (disability), Progressive (auto, home).

