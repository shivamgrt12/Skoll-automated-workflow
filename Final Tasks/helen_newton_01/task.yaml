  ## MEMORY.md

  # Memory: Helen Newton

  ## Personal Profile

  Helen Newton is a Bristol-born British woman who has lived in Gothenburg for most of her adult life, and her identity now sits in the long overlap between the two places. She is a registered midwife (barnmorska) with ten years of clinical experience, steady and precise by temperament, with a tenderness she protects through evidence and careful language rather than armour. Off duty she is dry and quietly funny, wittier with close friends than with patients.

  - **Education**: Bachelor's in Nursing (sjuksköterskeexamen), Gothenburg University of Health Sciences, 2013; Master's in Midwifery (barnmorskeexamen), 2016; advanced certification in water birth and physiological birth management, 2022.
  - **Languages**: English (native), Swedish (fluent, essential for work and daily life), Norwegian (conversational), basic Spanish from a semester in Barcelona.
  - **Citizenship and roots**: British citizen, born in Bristol. Moved to Gothenburg for university and stayed. Follows the Guardian and certain BBC shows, returns to Bristol two or three times a year. Holds her British identity with affection and her Swedish identity as the one that shapes daily life.
  - **Cultural rhythm**: At home in the Swedish public-healthcare model, the consensus work culture, the Friday fika ritual, and the seasonal markers of Allhelgonadagen, Lucia, and Jul. Conscious of being an immigrant and takes it seriously.
  - **Philosophy**: Believes birth is one of the most consequential, intimate moments in a life and that those supporting it owe the birthing person full attention, honest evidence, and space. Believes in physiological birth, informed choice, and public healthcare as a moral good. Not formally religious; her sense of meaning runs through work, close relationships, and the natural year. Her counsellor calls this her practical theology.

  ## Key Relationships

  - **Lars Bergström**, 37, DOB 1988-12-12. Partner of five years. Marine engineer at Göta Shipping, works shifts and is sometimes away for two to three day stretches. Steady, supportive, handles her irregular hours without complaint. They live together and have discussed children, planning for 2027. With him she is unguardedly herself.
  - **Margaret Newton**, 63, DOB 1962-10-04. Mother. Retired primary-school teacher in Bristol. Warm, practical, calls every Sunday. Widowed since Helen's father died of cardiac arrest in 2018. Helen watches over her.
  - **David Newton**, 38, DOB 1988-03-17. Older brother. Physiotherapist in Manchester, married to Claire, one daughter Lily (4). Close despite the distance, monthly video calls.
  - **Claire Newton (née Lindberg)**, 36, DOB 1989-11-26. David's wife. Architect. They text about design and home-renovation ideas.
  - **Astrid Nilsson**, 34, DOB 1991-10-30. Best friend since the university nursing program. Midwife at Göteborg Central Hospital. They debrief after hard shifts, run together, and travel together annually.
  - **Dr. Henrik Olsson**, 48. Senior obstetrician at the hospital. Trusted colleague Helen consults on complex cases; he values midwifery autonomy.
  - **Malin Eriksson**, 40. Team lead midwife and Helen's direct supervisor. Supportive and experienced, monthly one-on-ones.
  - **Frida Holm**, 32. Fellow midwife and frequent shift partner. Close, increasingly personal work friendship; shares Helen's physiological-birth philosophy.
  - **Agnes Lindqvist**, 67. Retired midwife and Helen's early clinical mentor. Lives in Kungsbacka; quarterly fika and emotional grounding.
  - **Oscar Svensson**, 35. Lars's best friend and Helen's friend by extension. Electrician, partner of Hanna. The four socialize regularly.

  ## Work & Projects

  - **Role**: Registered midwife at Västra Götaland University Hospital, delivery ward (förlossningen). Manages labour, delivery, and immediate postpartum care; handles 8 to 12 deliveries per week depending on shift pattern. Specializes in physiological birth and water birth management.
  - **Shift pattern**: Rotating. Day shifts 07:00 to 15:30, evening shifts 14:30 to 22:00, night shifts 21:30 to 07:30. Approximately 38.25 hours per week. Schedule published monthly via the hospital Heroma system.
  - **Water Birth Protocol Development**: Leading a working group to update the hospital's water birth guidelines (evidence review, staff training plan, equipment assessment). Target: approved protocol by December 2026. Incorporating feedback from Dr. Henrik Olsson and senior midwives, with an outstanding evidence gap on neonatal outcomes.
  - **Midwifery Mentorship Program**: Co-designing a structured mentorship program for newly qualified midwives with Malin Eriksson. Pilot launch October 2026.
  - **IBCLC certification**: Studying for the International Board Certified Lactation Consultant exam through self-study and online modules, with three intensive study weekends mapped against shifts.
  - **Professional development**: Considering a PhD in midwifery science at Gothenburg University of Health Sciences, exploring options for 2027 to 2028.

  ## Finance

  - **Income**: Approximately 38,000 SEK per month gross including OB-tillägg shift supplements, net approximately 29,500 SEK. Lars earns approximately 42,000 SEK gross and 32,000 net. Combined household net approximately 61,500 SEK per month.
  - **Housing cost**: Rents a 75 sqm Majorna apartment at 9,800 SEK per month. Eight years into the Gothenburg bostadsrätt queue, hoping to buy within two to three years.
  - **Savings**: 285,000 SEK in ISK at Avanza; 120,000 SEK in a Handelsbanken savings account; joint apartment fund with Lars at 380,000 SEK, contributing 8,000 SEK per month combined. Personal pension savings 2,000 SEK per month to Avanza, plus tjänstepension through Region Västra Götaland.
  - **Spending**: Careful and conscientious with a strong saver's discipline. Tracks subscriptions and audits them quarterly. Willing to invest in continuing education such as IBCLC materials and conferences. No debt; one Handelsbanken Mastercard paid monthly.
  - **Goals**: Buy a bostadsrätt by 2028, complete IBCLC certification, build a travel fund (annual trip with Astrid, targeting Japan in 2027), and start a family fund.

  ## Health & Wellness

  - **Primary care**: Dr. Maria Svensson at Majorna Vårdcentral. Annual checkup in February, last in February 2026, all clear.
  - **Dentist**: Folktandvården Majorna, every six months.
  - **Exercise**: Running 6 to 8 km along the Göta älv path three times a week, training quietly toward a half-marathon. Yoga twice a week at Majorna Yoga. Occasional hiking on the west coast and in Jämtland.
  - **Body maintenance**: Monthly massage with Anna Kraft for chronic shoulder and lower-back tension from shift work.
  - **Mental health**: Sees counsellor Per Lund every six weeks for professional processing, including birth trauma, stillbirth, and ethical dilemmas. No diagnosed conditions; values reflective practice and debriefs with Astrid.
  - **Sleep**: Highly variable with rotating shifts. Targets 7 to 8 hours, uses blackout curtains, occasional melatonin. Recovery days after night blocks are fiercely protected.
  - **Dietary restrictions (medical)**: Mild lactose intolerance, uses laktosfri dairy. Lars is allergic to shellfish.
  - **Supplements**: Vitamin D for the Swedish winter, periodic iron for heavy menstruation, omega-3.

  ## Interests & Hobbies

  - **Midwifery beyond the shift**: Reads professional journals, follows international midwifery debates, and is building toward IBCLC because lactation support is where she feels most useful postpartum.
  - **Running**: The longest-standing personal practice, and the rhythm is part of how she thinks. Likes the quiet of the river path before a day shift, when the city is not yet awake.
  - **Yoga**: A separate, interior practice, twice a week, now more for her head than her back.
  - **Photography**: Carries a small Fujifilm camera on walks and trips, building an unhurried, uncommercial portfolio of west-coast Swedish landscapes and Gothenburg street scenes.
  - **Reading**: Voracious, in concentrated bursts on recovery days. Midwifery texts, British crime fiction, feminist nonfiction, nature writing, and poetry.

  ## Home & Living

  - **Home**: 75 sqm renovated apartment in Majorna, two bedrooms, open kitchen-living room, small balcony facing the Göta älv. Scandinavian minimalist style, light wood, white walls, plants. Shared with Lars.
  - **Aesthetic**: Quietly Scandinavian, clean lines, natural materials, restrained colour. Wardrobe of dark jeans, soft jumpers in navy, charcoal, oatmeal, and forest green, plus a beloved Barbour-style jacket from England. No interest in luxury labels; favours objects that age well.
  - **Home projects**: Balcony renovation with new planters and outdoor seating, bedroom bookshelf installation, and a kitchen upgrade with a new countertop and lighting. Lars is handy and does most of the work.
  - **Neighbourhood life**: Majorna, walking distance to the river path and the Saluhallen market hall. Bikes to the hospital.

  ## Devices & Services

  - **Phone**: iPhone 15, used for calls, iMessage, WhatsApp, email, running apps, camera, and scheduling.
  - **Laptop**: MacBook Air M2, used for IBCLC study, email, research, photo editing, and personal admin.
  - **Camera**: Fujifilm X-T4 with 23mm and 56mm lenses for landscapes, city scenes, and travel.
  - **Smart home**: Minimal. Philips Hue lighting for shift-adapted wake-up, a Sonos speaker for music and podcasts, and a Ring door camera for package alerts.
  - **Subscriptions**: Spotify, Netflix, SVT Play, Strava Premium, Majorna Yoga membership, and Jordemodern (the Swedish midwifery journal).

