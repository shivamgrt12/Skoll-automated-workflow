  ## Preferences

  - **News**: The Guardian and Göteborgs-Posten online; midwifery news via Jordemodern and the Swedish Midwives' Association; health policy via The Lancet.
  - **Music**: British indie (Florence and the Machine, Radiohead, The xx), folk (Laura Marling, Nick Drake), ambient for study (Ólafur Arnalds, Nils Frahm), and classic British pop on night shifts.
  - **Podcasts**: Barnmorskan berättar, Desert Island Discs, Orden, and The Birth Room. Listens on runs and commutes.
  - **Reading**: Ina May Gaskin and Sheila Kitzinger, British crime fiction (Tana French, Kate Atkinson), feminist nonfiction, nature writing, and poetry. Books in the original English when she can get them.
  - **Food and drink (non-medical)**: Flexitarian with British comfort favourites: fish and chips, shepherd's pie, Sunday roasts, crumpets, and scones with cream and jam. Strong black coffee, three cups daily; craft beer occasionally; wine with weekend dinners; avoids spirits. Favourite spots: Da Matteo, Sjöbaren, Koka, Café Husaren, and the Saluhallen market hall.
