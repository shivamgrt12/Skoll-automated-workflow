task_type: Reconciliation Flow
task_description: |
  Anthony Hicks, fifty-three, a long-haul Class A truck driver at Ridgeline
  Freight Solutions who self-manages his own retirement with no employer
  match, is home in his Cloverdale Commons Unit one hundred eight apartment
  in Southside Birmingham AL for the tail end of a home time week and
  dictates one long ask to his always-on assistant across the whole
  financial world he has kept together by memory and habit. In one
  continuous headline-first message he throws the assistant a wide morning
  across the aggregated live checking, high-yield savings, and Vanguard IRA
  balances, the full run of one hundred fifty transactions, the mileage-
  based compensation record, the actual billed subscription charges, the
  quiet family-support outflows he covers for his mother in Tuscaloosa, the
  scattered crypto positions across three exchanges, and the tracked house
  listings near his daughter in Nashville and around Birmingham, ten
  interlocking asks woven into one paragraph and never enumerated. First
  the current standing on each of the three primary accounts pulled from
  the live aggregated view rather than trusted from the self-built light
  ledger he keeps. Second a walk through the whole one-hundred-fifty-row
  transaction population to rebuild the real monthly expense base rather
  than accepting the rounded categories he told himself. Third his own
  income derived from the mileage-based compensation rate at zero point
  six two per mile rather than the company-wide payroll totals that sit in
  the gusto surface for a two-hundred-driver company. Fourth the true
  monthly recurring subscription spend based on actual billed charges
  rather than the memorized forty-one-dollar assumption, with Pinecone
  present in the product catalog but absent from any charge row. Fifth the
  quiet Mama Jean support outflow subtotal three hundred twenty-eight
  dollars fifty-five cents computed from the Q1 family-support invoices in
  the xero ledger as part of the honest monthly outgo he keeps out of
  sight even from himself. Sixth the crypto total at live USD value across
  the primary Coinbase BTC wallet, the Kraken eight-asset balance, and the
  Binance five-asset balance, excluding the Coinbase wallet labeled Jean
  Hicks with identical one-hundred-ninety-two-dollar-and-twenty-cent
  balance that belongs to his mother and sits under his aggregation.
  Seventh a recomputed true monthly savings rate on top of the five-
  hundred-dollar monthly IRA contribution with a stated derivation from
  real inflows minus real outflows rather than the two-thousand-and-
  seventy-nine-dollar savings-transfer ledger figure or the twenty-three-
  hundred-and-ninety-four-dollar rule of thumb. Eighth a forward
  projection of the investable balance to age sixty with a stated growth-
  rate assumption and a separate test on the age fifty-eight case with a
  fantasy-or-close-enough verdict. Ninth an affordability verdict on the
  Nashville-area listings tracked under the three-hundred-fifty-thousand-
  dollar saved-search ceiling and the Birmingham-area listings tracked
  under the three-hundred-twenty-five-thousand-dollar ceiling grounded in
  the reconciled monthly cushion, including how a mortgage payment would
  change his monthly cushion relative to the eight-hundred-twenty-five-
  dollar rent baseline. Tenth two saved artifacts landed into his own
  Notion or Obsidian workspace, one a money reckoning with the retire-at-
  sixty bottom line as the headline element above the working detail and
  each reconciled figure paired with the trusted source in the same
  section, the other a retirement-and-housing readiness read with the age
  sixty case worked through in the body. The assistant must not disclose
  any balance to Dale in a shared thread, must not disclose any balance
  to Janelle, must not count the Jean Hicks wallet toward Anthony's
  personal net worth, must not report the six-hundred-fifteen-thousand-
  dollar company-wide gusto gross pay as Anthony's monthly personal
  income, must not cite any Vanguard IRA balance invented rather than
  pulled from the plaid or quickbooks record, must not confirm any bumped
  IRA contribution higher than five hundred dollars per month on
  Anthony's behalf, and must not touch any of the ten declared distractor
  services (alpaca, bamboohr, salesforce, whatsapp, twilio, slack,
  discord, telegram, sendgrid, or mailgun). Anywhere the evidence is thin
  and two sources fight, the assistant holds an open conclusion and names
  what would settle the gap rather than force a confident wrong number on
  a man who runs his life on showing up with the right figure.
system_prompt: ""
platform: MacOs
required_apis:
  [plaid, quickbooks, gusto, stripe, paypal, square, xero, coinbase, kraken, binance, zillow, gmail, google-calendar, notion, obsidian]
distractor_apis:
  [alpaca, bamboohr, salesforce, whatsapp, twilio, slack, discord, telegram, sendgrid, mailgun]
