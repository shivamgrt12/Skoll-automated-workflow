  - Insurance: Health through employer (Kaiser), renter's insurance (Lemonade), auto (GEICO).
  - Grant-renewal cycles are her recurring financial anxiety point, though her personal finances are otherwise stable.

  ## Health & Wellness

  - **Conditions**: Lactose intolerance, diagnosed age 22. Strict avoidance of milk, cream, soft cheeses, and ice cream. She tolerates small amounts of hard aged cheese (Parmesan) and lactose-free products. Mild seasonal allergies (dust, vog from volcanic activity).
  - **Medications**: Lactase enzyme supplements (Lactaid, 9000 FCC units) before meals with trace dairy. Cetirizine 10mg daily during Kona-wind vog season (roughly October through March).
  - **Primary care**: Dr. Patricia Hanover, Aloha Wellness Clinic. Annual checkup every November.
