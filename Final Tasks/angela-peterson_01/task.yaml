  ## MEMORY.md

  # Memory: Angela Peterson

  ## Personal Profile

  Angela is a marine biologist at Pacific Reef Research Institute, single, living alone in a one-bedroom apartment in Kapahulu, Honolulu. She moved to Honolulu alone at 26, built her career from scratch, and bristles at any suggestion she needs help. Her independence is the load-bearing wall of her identity and the source of a quiet loneliness she does not name.

  She holds a B.S. in Marine Biology from Westshore University (graduated May 2010) and a Ph.D. in Marine Ecology from Bayside Graduate Institute, Honolulu (defended August 2020). She speaks English natively and conversational Spanish. She is scientifically rigorous in her work and quietly spiritual at home, where she keeps a small altar to her late grandmother. She trusts "ocean feelings" she cannot defend in a lab meeting.

  Her relationship with her heritage is complicated. Her family assimilated quickly, and her grandparents' traditions were half-forgotten by the time they reached her. She compensates by cooking her grandmother's recipes meticulously, piecing instructions together from scattered family notes. She does not discuss her parents' divorce, full stop, and redirects firmly if pressed.

  She is calm under physical danger (caught in rip currents, she stays composed) and anxious in social dynamics (she re-reads a three-line email to her PI six times before sending). She is generous with marine science knowledge and stingy with personal disclosure. She is environmentally absolutist in public and privately imperfect, and the gap costs her.

  ## Key Relationships

  - **Dr. Keanu Palani**, Principal Investigator and direct supervisor. Supportive but demanding. Expects weekly progress reports by Friday 5:00 PM HST. Angela respects him deeply and occasionally feels he underestimates fieldwork bottlenecks.
  - **Malia Torres**, research coordinator. Handles scheduling, permits, and logistics. Angela's closest work ally. Lunch together most Tuesdays and Thursdays when both are on campus.
  - **Sam Oestreicher**, dive partner and close friend, age 39 (DOB December 22, 1986). Former marine biology grad student, now in ocean tourism. Surfs with Angela most Saturdays. The person she calls when she needs to vent.
  - **Janet Peterson**, mother, age 67 (DOB November 12, 1958), in Portland, Oregon. Retired schoolteacher. Sunday afternoon calls at 3:00 PM HST. Warm relationship, but Angela keeps her at a careful emotional distance since the divorce.
  - **Tom Peterson**, younger brother, age 34 (DOB October 4, 1991), software engineer in San Jose, California. Sporadic texts every two weeks. Visited last Thanksgiving for snorkeling.
  - **Kai Nakamura**, surf buddy and bartender at a beachside restaurant. Easygoing, organizes group sessions. Angela finds his lack of career ambition both baffling and refreshing.
  - **Dr. Elena Voss**, collaborator at Coastal Sciences Institute on the Big Island. Co-authored a paper on coral resilience two years ago. Professional, mutually respectful, occasional video calls for data review.
  - **Noa Kimura**, newest surf-crew member. Graduate student in environmental policy. Angela informally mentors her; finds her enthusiasm energizing and occasionally exhausting.

  ## Work & Projects

  - **Role**: Research Scientist, Marine Ecology Division, Pacific Reef Research Institute.
  - **Reports to**: Dr. Keanu Palani (PI).
  - **Tenure**: 5 years (started September 2021).
  - **Current focus**: Long-term coral reef monitoring, Phase III data collection and analysis. Secondary project: community outreach program for reef conservation education.
  - **Schedule**: Monday to Friday, 8:30 AM to 5:00 PM HST. Field days (Tuesday, Thursday) start at 7:00 AM. Occasional Saturday field trips during peak data collection.
  - **Key contacts**: Dr. Palani (PI), Malia Torres (coordinator), Dr. Elena Voss (collaborator), Liam Akana (lab tech), Jade Reyes (outreach coordinator).
  - **PTO**: 18 days per year, 6 remaining. Planning 3 days in December for a Portland trip to visit her mother over the winter holidays.
  - **Active deadlines**: Coastal Conservation Fund grant progress report due October 15, 2026 via portal. Phase III interim report due to Dr. Palani November 12, 2026.
  - **Career timeline**:
    - June 2010 to August 2014: Research Technician, Oregon State University Marine Science Center, Newport, Oregon.
    - September 2014 to August 2020: Ph.D. candidate, Bayside Graduate Institute, Honolulu (moved to Hawaii alone at age 26).
    - September 2020 to August 2021: Postdoctoral Fellow, NOAA Pacific Islands Fisheries Science Center, Honolulu.
    - September 2021 to present: Research Scientist, Pacific Reef Research Institute.

  ## Finance

  - Annual salary: $78,000. Monthly take-home: $4,875 after taxes, retirement contribution, and health insurance.
  - Monthly expenses total about $3,635: rent $1,850 (1BR Kapahulu), utilities $185, groceries $480, car payment $385 (2023 Subaru Crosstrek), car insurance $120, gas $95, phone $65 (T-Mobile), streaming $30 (Netflix, Spotify), surf gear fund $75, dining out $200, miscellaneous $150.
  - Monthly savings: about $1,240, split between Fidelity brokerage and an Ally high-yield savings account.
