  - **Exercise**: Surfing on Saturdays, sometimes Sundays, 2 to 3 hours. Swimming 3 times per week at the institute pool. Occasional YouTube yoga at home.
  - **Allergies**: Dust mites, vog particulates. No drug allergies and no food allergies beyond lactose intolerance.
  - **Mental health**: Generally stable. Low-grade anxiety around grant renewal deadlines. Intermittent use of Insight Timer meditation app. No therapist currently.

