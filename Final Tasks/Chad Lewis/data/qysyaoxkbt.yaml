# Woodshop project - "Carter's Birdhouse" - Christmas gift 2026
# Chad Lewis / garage workshop / 217 Elmwood Dr
# Started planning: Oct 12, 2026 (rainy Sunday afternoon)
# Target ready: Dec 20 (drive to Louisville Dec 24 with Norma)
# Carter turns 10 Nov 20 - this is the CHRISTMAS gift, not the birthday gift
# (birthday gift is the Zebco 33 Chad already picked up at Bass Pro on the Oct 24 Mason trip)

project:
  name: Eastern Bluebird Nest Box - Carter's Christmas 2026
  recipient: Carter Lewis (grandson, age 9 turning 10)
  gift_occasion: Christmas 2026
  design_source: NABS-approved bluebird box, modified with cedar shake roof
  finish: exterior clear tung oil, no stain (Norma vetoed the walnut stain, said kid-safe)
  chad_notes: |
    Left-hand grip has been dropping things - Dale's screw gun is heavier than
    mine and I fumbled it twice last time. Slow down on the drill press.
    Rest the neuropathy hand between cuts. If it gets bad, quit for the day
    and come back Tuesday. This is a Christmas gift, not a race.
    Do the burn-in of Carter's name last - one shot, on a Saturday when I'm fresh.

materials:
  primary_stock: 1x8 rough cedar fence board
  board_source: Rural King Paducah (bought 10/14, receipt in workshop tin, $22.40 four boards)
  fasteners: 1-5/8" GRK exterior trim head screws (already on the pegboard)
  hardware:
    - eye hook 1/4" x 1 (for mounting)
    - stainless hinge 1-1/2" x 1 (roof)
    - copper drainage grommet x 4 (floor)
  finish_supplies:
    - Formby's tung oil 8oz (garage cabinet, half full)
    - 220 grit sandpaper (buy new pack, current pack too worn)
    - shop rags (Norma's old dish towels)

cut_list:
  - part: back
    qty: 1
    dims_inches: "9-1/2 L x 5-1/2 W x 3/4 T"
    notes: "extends 1 inch above roof for mounting"
  - part: front
    qty: 1
    dims_inches: "9 L x 5-1/2 W x 3/4 T"
    notes: "1-1/2 in entrance hole, center 1-1/4 in from top edge"
  - part: sides
    qty: 2
    dims_inches: "8-1/4 L (front) tapered to 9-1/2 L (back) x 4 W x 3/4 T"
    notes: "angle cut for roof pitch, drill 2 vent holes 1/4in each near top"
  - part: floor
    qty: 1
    dims_inches: "4 L x 4 W x 3/4 T"
    notes: "corners nipped 1/2 in for drainage, plus 4 copper grommets"
  - part: roof
    qty: 1
    dims_inches: "8 L x 7 W x 3/4 T"
    notes: "hinged on one side for cleanout, cedar shake glued on top layer"

steps:
  - id: 01
    day: Sat Oct 25
    task: Rough cut all six parts on the miter saw
    duration_hr: 1.0
    status: done
    notes: "Wore the leather glove on the left hand. Grip held."
  - id: 02
    day: Sat Nov 1
    task: Plane and sand smooth, mark hole centers
    duration_hr: 1.5
    status: pending
  - id: 03
    day: Sat Nov 8
    task: Drill 1-1/2 in entrance hole (forstner bit), vent holes, drainage
    duration_hr: 1.0
    status: pending
    notes: "Brunch with Norma at Corkscrew that morning at 10a - do this AFTER"
  - id: 04
    day: Sat Nov 15
    task: SKIP - crappie tournament KY Lake
    duration_hr: 0
    status: skip
    notes: "Norma reminded me: no workshop after 8 hours on the water. Knees."
  - id: 05
    day: Sat Nov 22
    task: SKIP - Louisville for Carter's 10th birthday party
    duration_hr: 0
    status: skip
    notes: "Give him the fishing rod (Zebco 33) then. Birdhouse is for Christmas."
  - id: 06
    day: Sat Nov 29
    task: Assemble box, pre-drill all screw holes, dry fit before glue
    duration_hr: 2.0
    status: pending
  - id: 07
    day: Sat Dec 6
    task: Final assembly, hinge the roof, install eye hook
    duration_hr: 1.5
    status: pending
  - id: 08
    day: Sat Dec 13
    task: Tung oil coat 1, let cure in the garage overnight
    duration_hr: 0.75
    status: pending
  - id: 09
    day: Sat Dec 20
    task: Tung oil coat 2, burn CARTER on the back inside face with the woodburning pen
    duration_hr: 1.0
    status: pending
    notes: "Fresh, rested hands. Coffee only, no gabapentin dose right before."
  - id: 10
    day: Thu Dec 24
    task: Wrap in the Kraft paper Norma keeps, load in truck for Louisville drive
    duration_hr: 0.25
    status: pending

budget_estimate_usd:
  cedar_boards: 22.40
  hardware: 8.15
  copper_grommets: 4.20
  sandpaper_pack: 6.99
  cedar_shake_scrap: 0.00  # leftover from Dale's roof job 2024
  finish_tung_oil: 0.00    # have half a can
  woodburning_pen: 0.00    # have it since 2019
  total: 41.74
  under_100_threshold: true
  norma_notified: no  # nothing to notify, under $100

hand_off:
  wrap_paper: kraft brown, Norma's twine
  gift_tag: "For Carter - from Papaw. Watch it in the spring. -Chad"
  installation_note_for_brett: |
    Mount on a metal pole 5-6 ft off the ground, at least 100 ft from
    the house, facing east or northeast. NABS says away from brush.
    Clean it out every February before the bluebirds come back.
