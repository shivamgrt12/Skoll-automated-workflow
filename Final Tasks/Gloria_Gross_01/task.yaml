  \ journals, plus non-fiction on maritime exploration and indigenous rights.\n- Gifts:\
  \ practical and meaningful; quality outdoor gear, rare academic books, Northern\
  \ German artisan crafts. Erik gets sailing or marine biology gear, Astrid gets books\
  \ and the occasional surprise transfer, Lars gets carefully researched climbing\
  \ gear.\n- Shopping: buys slowly and keeps things for decades; quality is the long\
