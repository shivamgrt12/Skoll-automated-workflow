  \ daily to support active lifestyle and dive fitness.\n\n## Interests & Hobbies\n\
  \n- **Dawn swimming**: Twenty years of lap swimming at the Alster pool; builds dive\
  \ endurance and resets difficult weeks.\n- **Cross-country skiing**: Surviving piece\
  \ of her Baltic childhood; empties her professional mind completely, with or without\
