  \ any connected service.\n- Erik's institute systems and the personal accounts of\
  \ Astrid, Lars, and her parents are not connected.\n\n## MEMORY.md\n\n# Memory:\
  \ Gloria Gross\n\n## Personal Profile\n\n- **DOB**: March 7, 1974\n- **Birthplace**:\
  \ Born in Kiel, raised near the Baltic coast in Schleswig-Holstein, moved to Hamburg\
  \ for doctoral studies and stayed.\n- **Citizenship**: German citizen who identifies\
  \ strongly as a Schleswig-Holstein person who happens to live in Hamburg.\n- **Undergraduate\
  \ degree**: B.A. in Archaeology from Schleswig-Holstein University, completed in\
  \ 1996 as foundation for maritime career.\n- **Master's degree**: M.A. in Maritime\
  \ Archaeology from Leiden Maritime Academy in the Netherlands, completed in 1999.\n\
  - **Doctoral degree**: Ph.D. in Marine Archaeology from Nordmeer Maritime University,\
  \ 2006, dissertation on medieval Hanseatic trading routes.\n- **Languages**: German\
  \ native speaker (Northern dialect), fluent English and Dutch, strong Danish comprehension,\
  \ conversational Low German improving actively.\n- **Temperament**: Quiet confidence\
  \ and deep German practicality; keeps schedules rigorously, maintains equipment\
  \ proactively, rejects academic theater and gatekeeping.\n- **Integrity**: Refused\
  \ three documentary projects over treasure-hunting framing; never softens methodological\
  \ standards for career convenience.\n- **Social style**: Warm with inner circle,\
  \ formally respectful with others; makes friends slowly and keeps them for life.\n\
  - **Recovery needs**: Small-group person who recharges after large-group events\
  \ with quiet evenings at home and personal follow-ups.\n- **Philosophy**: Rigor\
  \ is respect owed to evidence; the sea demands honesty, not romanticism; collaboration\
  \ is the only ethical research mode.\n- **Heiligabend**: Annual Christmas Eve family\
  \ celebration on December 24, a standard German family tradition.\n- **Consortium\
  \ meeting**: North Sea Coastal Heritage annual consortium meeting at Hamburg Maritime\
  \ Museum on November 12, a key professional commitment.\n- **Climate urgency**:\
  \ Views the climate emergency as an archaeological emergency; sites surviving a\
  \ thousand years disappear in one generation.\n\n## Key Relationships\n\n- **Erik\
  \ Gross** (55): husband of 22 years; marine biologist at the Northern Seas Research\
  \ Institute (Meeresforschung Nord), Hamburg office. Calm and practical; they met\
  \ on a research vessel in 2001. Reads beside her in the evenings and finds her funnier\
  \ than her colleagues would guess. Birthday July 18. Has been lobbying for a Ferienhaus\
  \ near Sylt for years.\n- **Astrid Gross** (19): daughter; first-year Political\
  \ Science student at Rheinland University in Cologne, her first time away from home.\
  \ Independent and opinionated. Receives EUR 400 monthly support.\n- **Lars Gross**\
  \ (16): son; secondary school in Hamburg. Avid climber and skier, considering marine\
  \ biology like his father. Quiet and thoughtful.\n- **Sigrid Gross** (80): mother;\
  \ former librarian in Kiel. Sharp mind, increasingly limited mobility.\n- **Björn\
  \ Gross** (82): father; retired fisherman, lives with Sigrid in Kiel. Encyclopedic\
  \ knowledge of northern German coastal waters and an invaluable oral history source.\n\
  - **Dr. Karin Henriksen** (48): colleague and close friend at Nordmeer Maritime\
  \ University; terrestrial archaeologist. They share an office, co-teach, and push\
  \ each other's research forward.\n- **Nils Johansen** (45): dive master and field\
  \ operations lead for her expeditions, based in Hamburg. Experienced technical diver,\
  \ fiercely safety-conscious; some fifteen years of working together.\n- **Dr. Frida\
  \ Moe** (55): Curator of Maritime Collections at Hamburg Maritime Museum. Key collaborator\
  \ on artifact conservation and exhibitions; professional relationship with personal\
  \ warmth.\n- **Ailo Reimer** (50): Frisian cultural liaison and historian from Aurich;\
  \ consults on projects affecting Frisian heritage waters. Mutual respect built over\
  \ years of careful collaboration; she knows the trust was earned slowly and is not\
  \ transferable.\n- **Professor James Whitfield** (60): marine archaeologist at Caledonia\
  \ Maritime University; international collaborator on North Sea and Atlantic comparative\
  \ studies, with three co-authored papers.\n- **Anja, Thomas, and Marit**: her three\
  \ Ph.D. candidates. She also supervises two master's students.\n- **Low German tutor**:\
  \ community tutor in Hamburg for the Plattdeutsch lessons she began in January 2026.\n\
  \n## Work & Projects\n\n- **Employer**: Nordmeer Maritime University, Department\
  \ of Archaeology, associate professor since 2016 with permanent position since 2010.\n\
  - **Career path**: Joined as postdoc in 2006, earned permanent position in 2010,\
  \ promoted to associate professor in 2016.\n- **North Frisian Survey**: Lead PI\
  \ on DFG-funded multi-year survey of medieval Hanseatic vessel remains off the North\
  \ Frisian Islands.\n- **Phase 3 completed**: Ran June through August 2025 with detailed\
  \ excavation of a 14th-century wreck at Site NF-7.\n- **Phase 4 planning**: Extended\
  \ NF-7 documentation and adjacent sonar anomaly investigation set for summer 2027\
  \ with Husum base camp.\n- **Vessel charter**: Nordkai Marine Services is the preferred\
  \ survey vessel charter; master checklist carries Phase 3 lessons learned.\n- **Coastal\
  \ Heritage Mapping**: Co-PI with Hamburg Maritime Museum mapping submerged cultural\
  \ heritage along the Schleswig-Holstein coast, year 2 of 4.\n- **Community engagement**:\
  \ Consultation protocol developed with Ailo Reimer ensures genuine Frisian community\
  \ partnership rather than performative inclusion.\n- **Climate study**: Joint project\
  \ with Whitfield at Caledonia Maritime University studying warming North Sea effects\
