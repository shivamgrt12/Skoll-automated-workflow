  \ February 2026, now under review; two US-based freelancers support the project\
  \ on monthly contracts.\n- **Teaching load**: One graduate seminar per semester\
  \ in Maritime Archaeology Methods, plus supervision of three Ph.D. candidates.\n\
  - **Monograph progress**: Comprehensive publication of North Frisian survey findings\
  \ underway, target draft completion by spring 2027.\n- **Seasonal overlap**: Summer\
  \ fieldwork overlaps Erik's birthday and Astrid's break, requiring careful family\
  \ coordination each season.\n\n## Finance\n\n- **Salary**: EUR 72,000 per year (about\
  \ $78,000 USD), standard German academic pay at the associate professor level.\n\
  - **Mortgage**: EUR 1,200 per month on the Hafencity apartment with approximately\
  \ 10 years remaining on the loan.\n- **Savings**: EUR 58,000 at Deutsche Bank serving\
  \ as a healthy emergency fund for the household.\n- **Retirement**: German public\
  \ pension (Deutsche Rentenversicherung) plus Allianz private plan with balance around\
  \ EUR 120,000.\n- **Monthly budget**: About EUR 4,290 covering mortgage, groceries,\
  \ utilities, insurance, car, children's support, dining, fitness, and miscellaneous.\n\
  - **Crypto experiment**: Joint experiment with Erik, roughly EUR 1,500 across Coinbase,\
  \ Binance, and Kraken, kept outside retirement planning.\n- **Debt status**: One\
  \ credit card paid in full monthly with no outstanding consumer debt.\n- **Financial\
  \ goals**: Pay off mortgage early, fund Astrid's university, build department equipment\
