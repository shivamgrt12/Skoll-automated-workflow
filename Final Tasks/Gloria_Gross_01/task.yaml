  \ voices, often reading alongside Erik.\n- **Baking tradition**: Sunday Butterkuchen\
  \ baking with Lars using her grandmother's unchanged recipe as a weekly family ritual.\n\
  - **Summer hiking**: Coastal hiking during warmer months often woven into site visits\
  \ for ongoing archaeological survey fieldwork.\n\n## Home & Living\n\n- **Residence**:\
  \ 3-bedroom apartment in Hafencity, Hamburg, with harbor views and the Kohlbrandbrucke\
  \ visible from the windows.\n- **Interior style**: Northern German modern furnishing\
  \ mixed with inherited Kiel pieces; bookshelves share space with marine specimens\
