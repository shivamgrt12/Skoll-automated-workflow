  \ color; she wants improved home office shelving for field journals.\n- **Ferienhaus\
  \ plans**: Ongoing discussion about purchasing a holiday house near Sylt, with Erik\
  \ leading the lobbying effort.\n- **Vehicle**: Sensible German station wagon that\
  \ hauls dive gear for fieldwork and does not announce itself.\n\n## Devices & Services\n\
  \n- iPhone 15 Pro in a mandatory rugged case; field communication, site photography,\
  \ quick reference.\n- Lenovo ThinkPad X1 Carbon, university issued; primary machine\
  \ for writing, data analysis, and GIS mapping.\n- iPad Air with Apple Pencil for\
  \ annotating field drawings and reading papers.\n- Minimal smart home: a smart thermostat,\
  \ a Ring door camera at the apartment entrance, and a charging station for dive\
  \ equipment batteries.\n- Long-serving gear: a waterproof watch on year twelve,\
  \ a dive computer on its third battery, a thrice-resoled wool winter coat.\n- Subscriptions:\
  \ Nordic Journal of Maritime Archaeology, International Journal of Nautical Archaeology,\
  \ Hamburger Abendblatt digital, ARD streaming.\n\n## Contacts\n\n- Gloria's own\
  \ mobile: +49 171 555 7700.\n- Erik Gross: phone/text, +49 171 555 7701, erik.gross.marine@gmail.com\n\
