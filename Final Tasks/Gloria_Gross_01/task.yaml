  \ Johansen: WhatsApp/call, +49 171 555 7707, nils.johansen.dive@gmail.com\n- Dr.\
  \ Frida Moe: email, +49 40 555 7708, f.moe@hamburgmuseum.de\n- Ailo Reimer: phone\
  \ call, +49 171 555 7709, ailo.reimer.heritage@gmail.com\n- Professor James Whitfield:\
  \ email, +44 131 555 7710, j.whitfield@caledoniamaritime.ac.uk\n\n## Connected Accounts\n\
  \n- Gmail, Google Calendar, and Google Drive: gloria.gross@gmail.com\n- WhatsApp:\
  \ connected, linked to her mobile +49 171 555 7700.\n- Additional research, project,\
  \ logistics, finance, and media services are connected as listed in the tools configuration.\n\
  \n## Preferences\n\n- Food: Northern German traditional with a seafood emphasis;\
  \ cod, salmon, and plaice are staples, with game meat in autumn. Favorites: Fischbrötchen,\
  \ Labskaus, Matjes herring, Scholle dishes, Rote Grütze. Both she and Erik cook;\
  \ he is the better fish cook, she makes excellent Labskaus.\n- Regular spots: Fischereihafen\
  \ for special occasions, Kaffee & Brot near campus, Nordkai Bistro for the Friday\
  \ dinner.\n- Coffee: strong black filtered, 3 to 4 cups daily, beans from Hamburg\
  \ Kaffeerösterei. Alcohol in moderation: red wine with dinner, occasional Korn,\
  \ an appreciation for German craft beer.\n- News: Hamburger Abendblatt and ARD every\
  \ morning; follows North Sea policy, climate research, heritage preservation, Frisian\
  \ minority rights, and regional politics.\n- Music: German folk (Faun, Schandmaul),\
  \ Bach and Beethoven, ambient and electronic for writing focus, NDR Radio in the\
  \ kitchen.\n- Podcasts: Digging the Past, In Deep Time, Wissen und Entdeckung, usually\
