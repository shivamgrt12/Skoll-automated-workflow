  \ in cold water at depth. Genuinely uncomfortable with conspicuous consumption;\
  \ prefers hosting small dinners to corporate evenings.\n- Style: Northern German\
  \ practical; well-made wool, field layers aged into ordinary wear, a few good pieces\
  \ for university and conferences. Hanseatic restraint, function first, durability\
  \ second.\n- Travel: a one-bag traveler with a packing list unchanged in fifteen\
  \ years; the field duffel lives partly packed year-round. Erik plans family trips,\
  \ and she brings the patience to enjoy them.\n- Sensory: notices temperature first\
  \ in any environment. Loves harbor air through the window, strong filter coffee\
  \ at 6:15 AM, late-summer light on the harbor, the smell of wet neoprene at the\
  \ end of a dive day, and cold seawater at descent followed by thermos coffee. Hates\
