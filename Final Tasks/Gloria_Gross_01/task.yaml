  \ Gross: text, +49 171 555 7703, lars.gross.climb@gmail.com\n- Sigrid Gross: phone\
  \ call, +49 431 555 7704 (Kiel home line), sigrid.gross.kiel@gmail.com\n- Björn\
  \ Gross: phone call, +49 170 555 7705, bjorn.gross.fisher@gmail.com\n- Dr. Karin\
