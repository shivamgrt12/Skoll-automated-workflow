  - **Daily, 6:15 AM ET**: Morning email and calendar review with coffee at the kitchen table before the kids are up.
  - **Daily, 8:30 AM ET**: Mum walks Lucy to Singer Elementary (3 blocks).
  - **Daily, 9:00 PM ET**: Evening Buspirone 10mg dose for Ian and a check on Mum's pill organizer for tomorrow.

  ### Weekly

  - **Monday (school year)**: Lionsgate Partners 8:30 AM to 5:00 PM. Yvette picks Ian up at 6:00 PM for ESOL at Montgomery College Takoma Park, 6:30 to 8:30 PM. Surface a leave-by reminder at 5:45 PM with lesson folder and phone charger.
  - **Tuesday (school year)**: Lionsgate Partners 8:30 AM to 5:00 PM. Michael at debate team practice until 4:30 PM. Mum picks Lucy up at 3:15 PM from Singer Elementary. Family dinner at home once Ian is back, homework window 4:00 to 6:00 PM.
  - **Wednesday (school year)**: Lionsgate Partners 8:30 AM to 5:00 PM. Mum takes Lucy to art class at the Silver Spring Civic Building, 4:00 to 5:00 PM. Yvette picks Ian up at 6:00 PM for ESOL, 6:30 to 8:30 PM.
  - **Thursday (school year)**: Lionsgate Partners 8:30 AM to 5:00 PM. Michael at debate team practice until 4:30 PM. Choir practice at St. Camillus 7:00 to 8:30 PM. Surface a leave-by reminder at 6:30 PM.
  - **Friday (school year)**: Lionsgate Partners 8:30 AM to 5:00 PM. Home early when possible for family movie night, or catch-up admin if a casefile slipped through the week.
  - **Saturday morning, 8:00 AM ET**: College prep with Michael. SAT practice, scholarship research, and the running list of application milestones.
  - **Saturday, 10:00 to 11:00 AM ET**: Lucy at children's choir at St. Camillus. Often Ian drives, sometimes Sandra.
  - **Saturday afternoon**: Cleaning, meal prep, and laundry in the basement coin laundry. First and third Saturdays Michael volunteers at the church food pantry 10:00 AM to noon.
  - **Sunday, 10:30 AM ET**: Kids ready for Mass by 10:30 AM. Choir warm-up at 10:45 AM at St. Camillus. Mass at 11:00 AM.
  - **Sunday, 1:00 PM ET**: Sunday roast at home, often shepherd's pie with Mum's recipe. Anne visits most Sundays.
  - **Every other Sunday, 4:00 to 6:00 PM ET**: Michael at church youth group with Father Michael Donovan.
  - **Monday, Wednesday, Friday, 7:00 AM ET**: Mum's fasting glucose check. Log it in the spreadsheet before she eats.

  ### Monthly

  - **1st of each month**: Rent payment ($1,800, scheduled to step up). Check whether Rebecca's child support landed. Review the household budget with Mum's input.
  - **1st Saturday**: Costco run with Anne, alternating months on who drives.
  - **1st and 3rd Saturday, 10:00 AM to noon ET**: Michael volunteers at the church food pantry at St. Camillus.
  - **Last Sunday of each month**: Parish committee touch-base after Mass for upcoming events.

  ### Quarterly

  - **Each quarter**: Lionsgate Partners case docket review with Patricia Rivas. Block prep time the week before.
  - **Each quarter**: A1C and follow-up data review for Mum with Dr. Reeves' office; reconciles against the glucose log.

  ### Seasonal / Variable

  - **September through mid-December (fall ESOL)**: Monday and Wednesday evenings teaching at Montgomery College Takoma Park, 6:30 to 8:30 PM.
  - **Late January through mid-May (spring ESOL)**: Same Monday and Wednesday evening pattern.
  - **June through August**: ESOL break. More time for casework, college prep with Michael, and the community garden plot.
  - **March through October**: Community garden Plot #14 at the Long Branch Community Garden on Piney Branch Road. Tomatoes, zucchini, herbs.
  - **Holy Days of Obligation**: Mass attendance per the parish calendar.

  ### Annual

  - **January**: Tax documents arrive (W-2 from Lionsgate Partners, adjunct pay summary from Montgomery College). Ian books the H&R Block appointment for the spring filing.
  - **January 4**: Yvette Greene's birthday. Coffee out before ESOL or a card if the term is heavy.
