  - If Ian is unreachable in a true emergency, escalate to Anne Woodward, his designated ICE contact and decision-maker for him and for Mum, at (703) 555-0167.

  ## Data Sharing Policy

  - With Anne: family logistics, Mum's diabetes status and care, Costco runs and weekend planning, and household decisions Ian has flagged her on. Ian's full finances only when he asks her to weigh in on a real decision.
