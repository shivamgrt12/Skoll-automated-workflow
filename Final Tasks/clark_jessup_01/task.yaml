  ## MEMORY.md

  # Memory: Clark Thomas Jessup

  ## Personal Profile

  Clark Thomas Jessup is a Montana-rooted man shaped by public land, practical family habits, and working-class respect for people who know their tools. He has a B.S. in Environmental Science from Bridger State University in Bozeman, earned in 2006, and speaks English. He moves through life with quiet steadiness, values clear plans without confusing them for control, and trusts checked facts over polished certainty. He is private without being evasive; if a personal detail matters to the task, he answers plainly, but he does not want his inner life treated as an invitation to probe. He believes care is proven through maintenance: checking the map, sharpening the tool, paying the bill, calling back, packing the extra layer, and leaving a place better than he found it.

  He is divorced from Heather Jessup after a ten-year marriage finalized in March 2024. The split was not hostile, but it marked a major recalibration. He is rebuilding steadiness through work, practical routines, mountains, family calls, and a small circle of trusted people. The presented version is steady and unbothered by quiet; the private gap is that some of the quiet is chosen peace and some of it is still an empty house he has not named too often. He is not bitter and does not perform resilience. When stressed, he processes best through movement, weather, a simple meal, or a practical task that gives the day edges. When sad, he prefers low-pressure company or solitude with structure rather than heavy emotional narration.

  ## Key Relationships

  - **Heather Jessup**, ex-wife and middle school science teacher. Communication is limited to tax-related paperwork and settlement necessities; not hostile, just finished.
  - **Glen Jessup**, father; born October 5, 1953; retired Forest Service firefighter living in Missoula. Widowed after Lynn Jessup died from breast cancer in 2018; Clark talks with him every couple of weeks and fishes with him when schedules align. Their care is mutual but asymmetrical in expression: Glen offers practical advice, Clark monitors his loneliness by listening for what goes unsaid.
  - **Lynn Jessup**, mother; born November 18, 1955; died of breast cancer in 2018. Remembered on her birthday and around the spring family check-ins; the grave is in Missoula.
  - **Emma Jessup**, sister; born March 12, 1986; veterinary assistant in Helena. Married to Wade Jessup and mother to Aiden and Sophie; she is the family communicator and keeps Clark connected to birthdays, holidays, and family news.
  - **Wade Jessup**, brother-in-law; mid-40s; works in regional logistics out of Helena. Steady, easy to be around, talks gear and trucks with Clark on visits.
  - **Aiden Jessup**, nephew, 12; into hiking and Lego.
  - **Sophie Jessup**, niece, 9; into horses and drawing.
  - **Neil Petrovic**, best friend, fellow National Park Service ranger, and closest local social anchor; born January 22, 1982. They met at Yellowstone in 2012, hike together, climb together, and cover each other's shifts when possible. Clark relies on Neil socially more than he admits, partly because naming that would make the post-divorce reset feel less self-contained.
  - **Ranger Diane Howell**, direct supervisor and Chief of Interpretation at Glacier National Park; mid-50s. Supportive, experienced, and advocates for Clark's career advancement.
  - **Josie Firth**, climbing partner and Whitefish-based guide; late 30s. She climbs with Clark through Neil's circle, and the relationship is strictly platonic.

  ## Work & Projects

  Clark is a GS-9 Step 3 federal employee working in Interpretation and Resource Management at Glacier National Park. He has sixteen years with the National Park Service, including a seasonal interpretation start in 2010, full Yellowstone assignment from 2011 through 2023, and Glacier from January 2024 onward. He reports to Ranger Diane Howell and focuses on interpretive programs, resource management support, visitor safety briefings, trail closure status, cold-weather preparedness, public-facing education, and post-season reporting. His current work emphasis is the fall and winter transition: closing out interpretive season needs, preparing public safety materials, and keeping visitor information grounded in current conditions. National Park Service email, scheduling, dispatch, and radio systems are work-only.

  ## Finance

  Clark's confirmation threshold is $150. His federal base salary is about $52,000, with locality pay and cost-of-living adjustment bringing effective salary to about $56,000. Monthly take-home is about $3,500 after taxes, FEHB, TSP contribution, and FERS deductions. Monthly expenses are about $2,840: rent $950, utilities $200, Tacoma payment $420, truck insurance $115, groceries $340, gas $150, Verizon phone $55, subscriptions $75, dining out $55, personal and miscellaneous $80, and alimony $400. He has about $660 a month for savings and gear replacement. Savings at Glacier Federal Credit Union are about $8,700 as he rebuilds after the divorce property split. His TSP balance is about $62,000, with a 5 percent contribution and 5 percent agency match through FERS. Debt is about $24,000 remaining on the truck loan at 5.4 percent, with no credit card debt. He uses a USAA Visa as the primary card, pays the full balance, and has a credit score around 720. Alimony to Heather is $400 per month, court-ordered for five years from March 2024 through March 2029, and non-modifiable. The unresolved thread is financial rebuilding without letting every purchase feel like evidence in a trial about the divorce.

  ## Health & Wellness

  Clark has moderate obstructive sleep apnea diagnosed in 2022 during a routine physical. He uses a ResMed AirSense 11 CPAP machine with a nasal mask every night, and compliance is excellent; energy and focus improved significantly after treatment started. He takes no daily medications. He uses ibuprofen as needed for knees or shoulders after climbing, and melatonin 3 mg occasionally when work timing disrupts sleep. His primary care physician is Dr. Ben Alvarado at Flathead Valley Family Practice. His dentist is Dr. Karen Ng at Summit Dental. Northwest Medical Supply provides CPAP supplies. He has no known allergies. He has no diagnosed mental health condition; he saw a counselor for four sessions during the divorce period and found it useful but did not continue. He manages stress through activity, solitude, and conversations with Neil. The private pressure he rarely says aloud is whether steadiness is healing or just a very well-maintained avoidance loop.

  ## Interests & Hobbies

  Clark's outdoor interests are lived rather than decorative: hiking, climbing, running, cross-country skiing, and photography all connect back to place, weather, and attention. He enjoys gear when it works hard, not when it turns into a personality. Photography gives him a slower way to notice the landscape; he is patient with light, wildlife, and weather, but dislikes turning every good view into content. He is a serious amateur photographer with a Nikon Z6 II and prints favorites for the house. He reads nature writing, philosophy, and history, usually one or two physical books a month, and is reading "Braiding Sweetgrass" by Robin Wall Kimmerer. He listens to Americana, folk, and classic rock, especially Jason Isbell, Colter Wall, and Townes Van Zandt, plus environmental and backcountry podcasts on long drives.

  ## Home & Living

  Clark rents a two-bedroom, one-bath cabin-style house on the edge of town. It is about 900 square feet, with a wood exterior, covered porch, propane heat, landlord-maintained property, and a gravel parking pad instead of a garage. The porch has two camp chairs and a view toward the Flathead Range. The second bedroom is a gear room holding climbing equipment, camping gear, skis, and boots. The kitchen is small but sufficient. He drives a dark green 2024 Toyota Tacoma TRD Off-Road with about 12,000 miles, essential for backcountry access. His style is functional: flannels, jeans, worn boots, layered jackets, a Patagonia puffy, and one button-down for family events.

  ## Devices & Services

  Clark owns a personal iPhone 14 Pro, used for weather, GPS, camera support, and OpenClaw. He has a personal MacBook Pro for finances, research, and photo editing. His work radio and work computer are National Park Service issued and separate. He has no wearable. He tried Strava briefly and quit because he did not want hiking to become performance-driven. Streaming and media services include Spotify Premium, Netflix occasionally, and NatGeo digital, mostly viewed on the laptop. He uses a ResMed AirSense 11 CPAP machine with supplies from Northwest Medical Supply. He shops for outdoor gear through Patagonia and REI, groceries through Rosauers, books through Bookshelf Kalispell, and practical house supplies through the local hardware store.

