  ## MEMORY.md

  # Memory: Mark Campbell

  ## Personal Profile

  Mark Edward Campbell is a Philadelphia-based wedding and event planner who built Campbell Events from scratch in 2012 and has run it for 14 years. He grew up Episcopalian in a family where faith structured the calendar even when belief was uncertain; he maintains the traditions (Sunday dinners when the kids are home, Christmas, Easter) as a rhythm rather than a practice, and carries a low-grade guilt about the distance from it without enough discomfort to change. His cultural identity is deeply Philadelphian: the city's mixture of blue-collar pragmatism and old-money pretension mirrors his own experience of straddling worlds, serving wealthy clients while running a middle-class household, doing creative work inside the economics of a small company. He holds a B.A. in Communications from Ridgemont College (completed circa 1995) and a Certificate in Event Management from the Philadelphia Institute of Hospitality (completed circa 1998). He speaks basic French (menus and pleasantries, not fluent). He has been married 24 years to Julia Campbell.

  His personality is organized around a central tension: he is extraordinarily competent professionally and privately depleted by it. He gives his best energy to strangers' most important days and returns home with what is left. He knows this; it troubles him more than he admits. He is not good at letting himself be helped, and not good at choosing his own enjoyment over the next client. The question of what "enough" looks like in his business and his life is one he returns to without resolution. He believes that the details matter as a governing principle extending from wedding timelines to how he loads the dishwasher. He believes care shows in small things, that most problems are solvable if broken into components, and that reliability is the most underrated virtue. These beliefs have made him excellent at his job and occasionally difficult to live with.

  ## Key Relationships

  - **Julia Campbell** - Wife, age 54. DOB: November 14, 1971. Married 24 years. Steadier than Mark in the domestic register; she cooks most weeknights, she is the person who suggested he see a therapist after his October 2025 burnout (he agreed and did not follow through). She has told him more than once that not everything is an event that needs a coordinator. Their quality time together is rare and matters to both of them. Her schedule should be protected when a possible date night appears.
  - **Sophie Campbell** - Daughter, age 20. DOB: March 7, 2006. At Beacon Hill College in Boston. Psychology major, was considering switching to neuroscience; credits transfer discussion was pending as of their last Wednesday call. Weekly FaceTime Wednesdays at 7:30 PM.
  - **Ethan Campbell** - Son, age 18. DOB: December 14, 2007. At college in Pittsburgh. The younger child; the empty nest hit harder when he left. Mark is proud and at a loose end for how to stay connected. End-of-semester pickups are coordinated with Julia.
  - **Becca Hartwell** - Part-time assistant at Campbell Events, age 26. DOB: November 19, 1999. Manages social media (@campbell.events), day-of coordination support, Monday kickoffs and Friday wrap-ups with Mark. Has view access to the business calendar and wedding folders, not to financial records or private client notes.
  - **Linda Brooks** - Best friend for 15 years. Real estate agent in Philadelphia. DOB: February 4, 1974. Monthly lunch first Tuesday at Cafe Soleille. One of the few people Mark can talk to without performing competence.
  - **Diane Williams** - Julia's mother, age 78. DOB: February 12, 1948. Lives in Cherry Hill, NJ. Mark and Julia visit every other Saturday. She calls Sunday mornings around 10:00 AM.
  - **Marco Pellegrini** - Preferred caterer and long-time vendor partner. Phone: (215) 555-9014. Email: marco@outlook.com. Trusted.
  - **Tessa Byrne** - Preferred florist, owns Byrne and Bloom. Phone: (267) 555-3328. Email: tessa@yahoo.com. One of the vendors Mark trusts most.
  - **James Campbell** - Mark's brother, age 49. DOB: December 18, 1976. Lives in Baltimore, MD. Close in the way of siblings who don't talk often but pick up without preamble.
  - **Pastor John Henderson** - Pastor at St. Thomas Episcopal Church, Mark's childhood church. Phone: (215) 555-1184.
  - **Phil Greenbaum** - Accountant at Greenbaum and Associates. Handles Campbell Events quarterly and annual filings; monthly expense reconciliation.

  ## Work & Projects

  Mark is sole owner and lead planner of Campbell Events, founded 2012 (14 years). Pre-2012 career: event coordinator at Whitman and Reed Hospitality (Philadelphia) 1995 to 2005 (junior 1995 to 1998, senior 1998 to 2005); director of weddings at Old City Events Group (Philadelphia) 2005 to 2011; brief solo consultancy late 2011 transitioning into Campbell Events in 2012. Operates as a one-person shop with Becca Hartwell as a part-time contractor. Annual gross revenue approximately $210,000 (2025 was $198,000). Business is seasonal: April through October is peak wedding season; January through early February is near-dormant. He takes PTO in January; January 2026 he and Julia went to Cancun for a week. He works Monday through Friday, typically 9:00 AM to 6:00 PM ET, from a home office plus occasional co-working space on Germantown Ave. Saturdays are wedding days during season: on-site 8:00 AM through cleanup. Manages 3 to 4 weddings per month during peak season. Currently booked wedding clients (signed contracts, deposits cleared, dated late 2026 through fall 2027): Chen-Morrison, DiStefano-Grant, Holloway-Park, Kaplan-Rivera. Regular business meetings: Monday 9:30 AM kickoff with Becca (30 min), Wednesday 11:00 AM client check-in calls (rotating, 2 to 3 per Wednesday), Friday 3:00 PM wrap-up with Becca (45 min, includes Saturday event prep). Uses Airtable as the working CRM; Notion for all event documentation. Member of the Greater Philadelphia Event Planners Association; attends monthly networking events (finds them more obligatory than useful).

  ## Finance

  Annual gross business revenue approximately $210,000 (2025: $198,000). Owner's draw pre-tax approximately $105,000 annually, netting approximately $6,800 per month after estimated taxes. Julia's take-home approximately $4,600 per month after taxes. Combined monthly household take-home approximately $11,400. Monthly expenses total $9,277 (surplus approximately $2,123). Full breakdown: mortgage $2,250, utilities $320, groceries $680, Julia's car payment $420, Mark's car insurance $145, Julia's car insurance $140, gas $200, phones $110, Sophie's college contribution $750, Ethan's college contribution $650, streaming $42, dining out $280, dog care $120, business expenses $450, Becca's pay $1,800, home maintenance $200, Mark's ACA health insurance $520, miscellaneous $200. Savings: $58,000 joint at PNC; $35,000 business emergency fund (separate PNC business account); Julia has approximately $120,000 in her 403(b). Credit: Chase Sapphire Reserve (personal, paid monthly); Business Amex (Campbell Events, paid monthly). Insurance: home and auto through Allstate; business liability through Hartford. Mark carries financial anxiety as a baseline even in strong months; variable income means every purchase passes through a slow-season mental filter. Accountant: Phil Greenbaum, Greenbaum and Associates.

  ## Health & Wellness

  Mild hypertension diagnosed 3 years ago, managed with Amlodipine 5mg daily (taken with morning coffee). Chronic tension headaches during peak wedding season; managed with Sumatriptan 50mg as needed (max 2 per week) and Magnesium glycinate 400mg nightly for prevention. Seasonal allergies (tree pollen, spring); cetirizine 10mg as needed. Primary care: Dr. Rebecca Torres, Chestnut Hill Wellness Group; annual physical every January. Neurologist: Dr. Nathan Graves, Philadelphia Headache and Neurology Center; twice-yearly appointments (February and November) bracket peak wedding season and manage headache protocol. Exercise: daily 30-minute morning walk with Benny. Occasional Pilates at Align Pilates on free Saturdays. High stress tolerance but genuine burnout vulnerability. Significant burnout episode in October 2025 (4 weddings in 3 weekends); Julia suggested therapy; he agreed and did not follow through. Manages stress primarily through physical and repetitive activity: walking, loading the dishwasher, organizing his desk. Does not process stress through conversation until he has finished doing something with his hands first.

  ## Interests & Hobbies

  Sunday morning biscuit-making is a near-spiritual ritual: buttermilk biscuits from his mother's recipe, made with attention to the physical process (cutting butter into flour by hand, the specific fold-and-turn motion, the oven heat). He takes this seriously and does not rush it. Morning walks with Benny are the only unscheduled, agenda-free part of his day; the route's familiarity is the point. He was a serious amateur photographer in his twenties and still has the compositional eye; the Canon DSLR lives in a closet he rarely opens. Event planning killed photography as pleasure and the not-returning to it has become a small grief. He reads history and biography in bed for about 20 minutes before sleeping, looking for patterns in how other people managed complexity under pressure. Cooking shows have his genuine attention (Chopped, Great British Bake Off): the combination of skill, time pressure, and presentation speaks to the event planner in him. He loves the moment at a wedding when the couple first sees each other and everything he planned becomes irrelevant because what's happening is real.

  ## Home & Living

  Address: 923 Sycamore Hill Drive, Chestnut Hill, Philadelphia, PA 19118. Four-bedroom colonial built 1952; kitchen and bathrooms renovated 2019. Two stories plus finished basement. First floor: living room, dining room, kitchen open to breakfast nook, Mark's home office, half bath. Second floor: master bedroom with en suite, Sophie's room (kept ready), Ethan's room (kept ready), guest room. Basement: Julia's TV room and exercise area (treadmill). Backyard: fenced patio with grill, Benny's domain. Mark's home office has a large corkboard wall covered in wedding timelines, fabric swatches, and vendor cards. Vehicles: 2021 Volvo XC60 (Mark, dark gray); 2024 Honda CR-V (Julia, white). Dog: Benny, 7-year-old golden retriever, gentle, sheds constantly, leans against Mark's leg on the porch.

  ## Devices & Services

  Primary phone: iPhone 15 Pro Max, T-Mobile family plan. Primary work machine: MacBook Pro 16 inch. On-site event management: iPad Pro. Smart home: Nest thermostat; Ring doorbell at front door. Streaming: Netflix, Hulu (no ads), Spotify Family. Kitchen: Nespresso Vertuo machine (lungo with oat milk, every morning); second coffee from Brewster's Coffee near the office (medium oat milk latte). Creative tools: Cricut machine for custom event signage. Photography backup: Canon DSLR (rarely used for personal photography, occasionally pressed into service for event documentation).

