  ## MEMORY.md

  # Memory: Lucia Weaver

  ## Personal Profile

  Lucia was born in Portland, Oregon, in 1983 to Dorothy, a music teacher, and Robert, a small-press editor who died in 2018 of a sudden heart attack. She arrived in Sweden at 19 in 2002 on a literature exchange and never left, and she was naturalised as a Swedish citizen in 2008 while keeping her American citizenship. Her identity sits comfortably in both places: American by temperament in directness and humour, Swedish by daily life and seasonal sensibility.

  She holds an M.A. in Comparative Literature from Uppsala University (2008), spent a 2005 exchange term in Edinburgh, and completed the Företagsrådgivarna small-business owner course, a 12-week evening programme in Uppsala, in 2010 before opening the shop. She reads in English, Swedish, German, and slow French. She is privately reserved, not shy, with a dry American humour she lets surface only when the room is right. She processed her father's death over a year of therapy in 2018 and 2019 and manages well now, though early summer can still feel heavy.

  She is unmarried, no children, no romantic partner at present, and content with that arrangement. She owns one good dress, one good coat, and very little else she does not use weekly.

  **Physical**: About 168 cm (5'6"), lean build from daily walking and cycling. Ash-brown hair worn shoulder length, often pinned up at the shop. Grey-blue eyes. Small silver reading glasses on a thin leather cord. A faint ink stain on the left hand on journal weekdays. Dresses in dark wool roll-necks and trousers in winter, linen blouses and dark skirts in summer, a single navy wool coat, leather lace-up boots year round, and the canvas shoulder bag she has carried since her master's years.

  **Big Five (working read)**: Openness 8/10 (reads widely across languages, curates with nuance), Conscientiousness 8/10 (fifteen years of solo operation with careful records), Extraversion 4/10 (reserved by default, warm with regulars and close circle), Agreeableness 6/10 (warm but holds clear lines on suppliers and customers), Neuroticism 4/10 (steady after the 2018 and 2019 therapy work, early summer still carries weight).

  ## Key Relationships

  - **Dorothy Weaver**, 72 (DOB 1953-09-14), mother, retired music teacher in Portland, widowed since 2018, lives alone in the family house. Phone calls twice weekly on Sunday mornings Sweden time. Visits three to four times a year. Warm but occasionally tense around Lucia's distance and unmarried status. Dorothy worries quietly; Lucia answers patiently.
  - **Andrew Weaver**, 46 (DOB 1979-11-08), older brother, architect in Gothenburg, married with two children, Elsa (13, DOB 2013-05-22) and Oskar (9, DOB 2017-03-19). Monthly contact, lower frequency but steady. Easy relationship, less emotional weight than Dorothy. Designated emergency contact and next-of-kin inside Sweden.
  - **Linnea Ekström**, 24, part-time employee at the shop since 2024, Uppsala University literature student. Works afternoons 13:00 to 18:00 weekdays and 10:00 to 16:00 Saturdays. Lucia mentors her informally, pays slightly above market rate, treats her as the apprentice the shop has needed for years. Sharp reader, quietly ambitious.
  - **Henrik Johansson**, 45, owner of Kaffestugan cafe two doors down on Svartbäcksgatan. Closest local friend. Divorced, dry wit, daily morning coffee with Lucia before the shop opens. Business neighbour first, friend second, both real.
  - **Professor Astrid Lindén**, 58, Comparative Literature at Uppsala University. Long-time customer, co-host on several author conversations a year, intellectual peer Lucia respects deeply.
  - **Camilla Ström**, 41 (DOB 1985-02-26), best friend since university, publishing at Nordström Förlag in Stockholm. Monthly meetups in Stockholm or Uppsala. The person Lucia tells things to first.
  - **Lars Petersson**, 50, accountant. Quarterly meetings, sober and competent, has handled the shop's books since 2014.
  - **Sofia Nyman**, 39, local author with two novels at Ekblad Förlag, third in progress. The shop hosted her debut launch in 2019. Friendly professional relationship, occasional dinners.
  - **Dr. Eva Karlsson**, 48, GP at Uppsala Vårdcentral, has seen Lucia since 2016.
  - **Karin Sjögren**, 67, retired librarian, weekly customer buying two to three books a month. Lucia keeps a private mental note of her tastes (Nordic mysteries, biographies of women composers) and orders ahead for her quietly.

  ## Work & Projects

  Lucia owns and runs **Weaver & Book**, an independent literary bookshop on Svartbäcksgatan in central Uppsala. She opened it in 2011 with savings, a small inheritance, and an unused business line of credit at Handelsbanken she has never had to draw. The shop holds roughly 4,000 titles across literary fiction, contemporary fiction, poetry, and curated non-fiction in English, Swedish, German, and a small French shelf. Hours are Tuesday to Saturday, 10:00 to 18:00, extended to 20:00 on event evenings. Closed Sunday and Monday.

  The shop rent is 18,000 kr per month on a 5-year lease renewed in 2024, basement storage included. Annual gross revenue is roughly 2.4 million kr. Lucia draws about 45,000 kr per month net. Strong sales September to December (university term, prize season, Christmas), weak June to August (summer quiet).

  She works with 8 to 10 Swedish and international distributors. Publishing relationships are personal, built on fifteen years of careful ordering and event partnerships. Spring and autumn publisher catalogues drive the two main ordering windows.

  Current projects in motion: the new website with a freelance designer (Webflow, Stripe, target launch October 16, 2026); a cultural fund grant application for an author event series (deadline October 2, 2026); the 15th anniversary celebration on October 17, 2026 with an author panel and local press; a quiet evaluation of a monthly bookshop newsletter under the Weaver & Book name. Long-running side practice: translating a German novella into English at roughly a paragraph a week, kept private, not for publication.

  Customer-facing initiatives Lucia protects: the lending shelf for regulars, student discounts, careful small-press pricing, and co-hosted events with the Uppsala University literature department and the municipal library.

  ## Finance

  - Savings account at Handelsbanken: roughly 380,000 kr.
  - ISK at Avanza: roughly 220,000 kr in Swedish and global index funds.
  - Business reserve: roughly 150,000 kr, treated as a six month buffer.
  - Monthly contributions: 5,000 kr to personal savings, 3,000 kr to investments.
  - No debt. Unused business line of credit at Handelsbanken kept as insurance.
  - Goals: 500,000 kr personal savings, 250,000 kr business reserve, 40,000 kr for the website redesign, long-term goal of buying a small Uppsala apartment, and an ongoing line item to support Dorothy if needed.
  - Monthly personal budget (~37,400 kr): rent 8,500, savings and investments 8,000, groceries 4,000, dining 2,500, transport 1,200, utilities 1,500, phone and internet and streaming 900, yoga 800, clothing 1,000, books 1,500, health 800, travel fund 2,000, Dorothy visits 1,000, insurance 2,200, miscellaneous 1,500.
  - Bookkeeping in Fortnox. Lars Petersson reviews quarterly.

  ## Health & Wellness

  - GP Dr. Eva Karlsson at Uppsala Vårdcentral. Annual checkup in November, last visit November 2025 with results clean overall.
  - Slightly elevated cholesterol, managed by diet, not medication.
  - Dentist at Folktandvården Uppsala, annual visit.
  - Yoga Tuesday and Thursday at 8:00 AM at the Kungsgatan studio. Has held the same slot for years.
  - Walks and cycles for all daily transport, no car.
  - Sunday forest hikes in the Uppland forests when weather and season allow.
  - Massage every 6 to 8 weeks for neck and shoulder tension that builds from shop work.
  - Sleep target 7.5 hours, in bed by 11:00 PM, up at 7:00 AM, with 30 to 45 minutes of reading before sleep.
  - Mild seasonal pattern in winter: SAD lamp from November to February, Vitamin D and omega-3 supplements through the dark months.
  - No known allergies.
  - Year of therapy in 2018 and 2019 after Robert's death. Manages well now; early summer can still carry weight.

  ## Interests & Hobbies

  - Reads 80 to 100 books a year in English, Swedish, and German. Currently reading Marta Kowalska, Anders Lilja, Nora Clement, and Sara Stridsberg.
  - Keeps a reading journal in a Leuchtturm1917 notebook, continuous since 2005.
  - Translating a German novella into English at roughly a paragraph a week, long form, not for publication.
  - Walking practice along the Fyris river stretch. Sunday hikes when weather allows.
  - Cooks simple food well: open-faced sandwiches, roast chicken with cranberry, smoked salmon, shrimp toast, butternut squash soup in autumn, split pea soup on Thursdays in winter, cinnamon rolls for shop events.
  - Music: classical at low volume in the shop during the day; jazz at home (Bill Evans, Esbjörn Svensson Trio); ambient piano in the evening (Nils Frahm, Ólafur Arnalds); American folk for nostalgic moments; near silence while reading.
  - Podcasts: The Book Review, Unread Pages, The Literary Desk, Fresh Air.
  - News: The Guardian and The London Review online daily, Uppsala Nya Tidning culture section weekly, The Book Trade Gazette and Publishers Weekly for trade reading.

  ## Home & Living

  - 2-room apartment on Sysslomansgatan in the Luthagen neighbourhood, lived in for 12 years.
  - Rent 8,500 kr per month, rent controlled.
  - Roughly 10 minutes on foot to the shop on Svartbäcksgatan.
  - Aesthetic: muted European and Scandinavian. Dark wood, linen, wool textiles in winter, books on every wall, one good reading chair, one good kitchen, very little decorative clutter.
  - Cooks at home most evenings. Eats out with Henrik or Camilla, never alone.
  - Restaurants and places: Kaffestugan for daily coffee, Hambergs Fisk for special occasions, Tzatziki for casual meals with Linnea, Güntherska Hovkonditori for weekend fika, ICA Kvantum Stenhagen for the weekly grocery shop.
  - Coffee: 3 to 4 cups a day, strong filter, never espresso based.
