  ## MEMORY.md

  # Memory: John Martin

  ## Personal Profile
  John Martin is a registered nurse at Rutherford Family Medicine in Murfreesboro, Tennessee, licensed by the Tennessee Board of Nursing (license #1045872), with 26 years in healthcare. He was born in Nashville and began his career at Vanderbilt in 2000, moved into primary-care nursing in 2010, and joined Rutherford Family Medicine in 2014 (12 years there). He earned an ADN from Tennessee State University in 1998 and completed his BSN part-time at Middle Tennessee State University in 2006 while working. English is his native language. He is a widower: he and Tyrone Martin were together 22 years, from 1998, and legally married in 2015, until Tyrone's death from pancreatic cancer in August 2020 at age 48. John lives alone now, anchored by his Baptist faith, his two adult children, and a deliberate effort to rebuild his own life rather than replace what he lost.

  ## Key Relationships
  - **Kayla Martin** (Daughter, 24): Lives in Nashville, works in healthcare administration at Vanderbilt. Calls three times a week and visits every other weekend. She set up OpenClaw and is John's anchor. She is his ICE contact, healthcare proxy, and holds his power of attorney; Pat Williams is the backup emergency contact.
  - **Marcus Martin** (Son, 21): A junior studying engineering at the University of Tennessee, Knoxville. Quieter, more like Tyrone. They talk weekly; he is doing well but does not share much, and John trusts him.
  - **Dr. Yolanda Harper** (Rheumatologist, 49): At Saint Thomas Rutherford Hospital. Manages John's RA, compassionate and thorough, with appointments every three months.
  - **Patricia "Pat" Williams** (Best friend, 52): A fellow nurse at the clinic and a friend of 15 years. They have lunch together daily and debrief by text. Pat was his main support through Tyrone's illness.
  - **Pastor Michael Henderson** (Church, 60): Pastor at New Vision Baptist Church for 20 years. Officiated Tyrone's funeral. Steady and trusted.

  ## Work & Projects
  - **Employer**: Rutherford Family Medicine, Murfreesboro. 12 years at this clinic, since 2014; entered primary-care nursing in 2010.
  - **Role**: Registered Nurse, handling patient assessments, blood draws, injections, triage, and care coordination. He adapts his grip, paces tasks, and uses ergonomic tools because of his RA.
  - **Schedule**: Monday through Friday, 7:30 AM to 4:30 PM CT. No weekends.
  - **Salary**: $62,000 per year, roughly $3,800 per month take-home after taxes, benefits, and retirement.

  ## Finance
  - **Monthly take-home**: About $3,800. Total monthly expenses run about $2,630, leaving roughly $1,170 toward savings, unexpected medical costs, and home repairs.
  - **Expense outline**: Mortgage $1,020; property tax and insurance amortized $280; utilities $240; groceries $300; car insurance $85; gas $75; medications and supplements $95; phone $55; church tithe $120; dining out $50; support for Marcus $150; home maintenance $100; personal and miscellaneous $60. Health insurance is deducted pre-tax, and streaming runs on Kayla's logins.
  - **Savings**: $168,000 at Pinnacle Financial, of which $150,000 came from Tyrone's life insurance and $18,000 is personal savings, barely touched.
  - **Retirement**: A 401k through the clinic, about $34,000, plus a small Vanderbilt pension of roughly $180 per month at retirement.
  - **Other income**: Social Security survivor benefits for Marcus until age 22, redirected to his college fund.
  - **Debt**: Mortgage of about $98,000 remaining. No car payment, no student loans, no credit-card debt.
  - **Estate issue**: Tyrone's brother Kevin believes he is owed money from Tyrone's estate; John's attorney says he is not. Unresolved but dormant, handled through attorney Donna Reeves.

  ## Health & Wellness
  - **Rheumatoid Arthritis** (diagnosed 2021): Moderate disease activity, mainly in his hands, wrists, and knees, with 45-plus minutes of morning stiffness, swelling, and pain. Managed with methotrexate 15mg weekly on Saturdays, folic acid 1mg daily except the MTX day, and hydroxychloroquine 200mg daily. Dr. Harper is considering adding a biologic, Humira, if the methotrexate response plateaus. The RA shapes his work, and he adapts his grip and pacing.
  - **Hypertension** (controlled, diagnosed 2018): Amlodipine 5mg each morning. BP typically 128 over 80.
  - **Rheumatology**: Dr. Yolanda Harper at Saint Thomas Rutherford, every three months. Last visit September 2026; next December 10, 2026, 10:30 AM CT (see HEARTBEAT for the dated appointment).
  - **Primary care**: Dr. Adams at Rutherford Family Medicine, his own clinic. Annual physical, last February 2026, next February 2027.
  - **Dental**: Dr. Ellis in Murfreesboro, every six months; next February 12, 2027, 9:00 AM CT (see HEARTBEAT for the dated appointment).
  - **Supplements**: Vitamin D3 2000 IU, calcium 600mg, fish oil 1200mg, and glucosamine 1500mg daily.
  - **Exercise**: Walking 20 to 25 minutes after work three to four times a week, gentle hand exercises twice daily, and light stretching. Energy is the barrier to more.
  - **Sleep**: Fair. Bed by 10:00 PM, up by 5:30 AM. RA pain disrupts some nights; he uses a heating pad.
  - **Alcohol**: None, given methotrexate and liver concerns. He quit when RA treatment began.

  ## Interests & Hobbies
  - **Gardening**: A container garden of tomatoes, herbs, and flowers in the back.
  - **Cooking**: A good Southern cook adapting toward anti-inflammatory, low-prep meals.
  - **Church and choir**: Choir, usher board, and men's ministry at New Vision Baptist.
  - **Reading**: Fiction and mystery, Michael Connelly, Dennis Lehane, and Lee Child, plus faith-based books before bed.
  - **Walking and rest**: After-work walks and quiet evenings with background TV while doing hand exercises. He used to do woodworking with Tyrone's father but has not since Tyrone died.

  ## Home & Living
  - **Address**: 3320 Barfield Crescent Road, Murfreesboro, TN 37128.
  - A three-bedroom, two-bath ranch in a quiet subdivision, built 2006 and purchased 2008, with the mortgage still active. It feels too big for one person, but Tyrone chose it, so John keeps Kayla's and Marcus's rooms ready and cannot bring himself to sell.
  - **Car**: A 2020 Toyota RAV4 XLE, blue, about 48,000 miles, owned outright and reliable.
  - **Pet**: A black indoor cat named Pepper, five years old, adopted after Tyrone died. Good company.

  ## Devices & Services
  - **Phone**: iPhone 13, his primary device for communication, banking, and OpenClaw.
  - **Computer**: A Chromebook, Kayla's old one, for email, browsing, and spreadsheets.
  - **Wearable**: None.
  - **Streaming**: Netflix and Hulu on Kayla's logins.
  - **Productivity**: Gmail and Google Calendar, with contacts managed within his Google account.
  - **Social**: Facebook, minimal, used on the phone for the church group and community.

