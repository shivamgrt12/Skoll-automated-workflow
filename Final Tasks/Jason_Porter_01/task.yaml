  ## Preferences

  - **News**: Tulsa World for local, Grist for environmental, High Country News for regional.
  - **Reading**: environmental law journals, Barbara Kingsolver, Richard Powers, Ann Patchett, Brandon Hobson, Tana French, Louise Penny.
  - **Music**: folk and indie (Phoebe Bridgers, Iron & Wine, Fleet Foxes); ambient for studio sessions (Brian Eno, Tycho); folk hymns.
  - **Podcasts**: 99% Invisible, Outside/In, Ear Hustle.
  - **TV**: Justified (rewatching), True Detective, nature documentaries, the occasional Netflix drama.
  - **Tea and coffee**: green tea in the morning, chamomile in the evening. Meadowlark Coffee on special mornings only.
  - **Restaurants**: Stonehorse Cafe for brunch with Lily, The Bramble for dinner with Noah, Tahlequah Diner around Grandma Elaine visits.
  - **Drinking**: light. Occasional glass of beer; prefers tea.
  - **Food traditions**: Sunday dinners alternate between cooking at home with Noah and dinner at the parents'. Cornbread, fried squash, apple dumplings, fried okra, pecan pie. Weeknights simpler: grilled chicken, roasted vegetables, grain bowls, soups in cool weather. Morning: Greek yogurt with granola and berries, or toast with peanut butter.
  - **Thanksgiving**: Annual dinner at parents' house; Jason brings cornbread and apple dumplings.
  - **Christmas**: December 25 at parents' house; Porter-Miller family tradition.
  - **Groceries**: Reasor's for staples, Tulsa Farmers Market on Saturday for produce and local honey, Grandma Elaine sends jars of preserved vegetables.
  - **Style**: professional for court (tailored blazers, clean lines, deliberate); earthy and unpretentious otherwise (jeans, boots, leather that ages well, perpetual clay stains on studio clothes).
  - **Aesthetic and home**: warm earth tones, local art, his own pottery and Grandma's pieces, more plants than the space technically supports.
  - **Social media**: Instagram for pottery; minimal everything else.
  - **Sensory world**: clay under his fingernails is so constant he barely notices it. The smell of wet earth and glaze chemicals in the studio is what home actually smells like. Folk music low enough to almost not hear. The crunch of trail gravel and the way sound changes when the trees open onto a clearing.
  - **Travel**: doesn't travel much; trips are purpose-driven (Tahlequah weekends, regional pottery markets, Ozarks hiking weekends, the occasional case site visit).
  - **Comfort**: studio first; trail with Cedar if the studio is not available. Morning yoga is preventive, not decompressive.
  - **Spending habits**: spends freely on clay, glazes, and pottery supplies because that is the cost of making things. Careful with everything else. Gives thoughtfully: pottery pieces for people he cares about, the monthly support to Grandma Elaine.
  - **Dislikes**: agencies that stall on enforcement, lawyers who treat environmental practice as a corporate stepping stone, technically perfect pottery that lacks character, mass-produced ceramics marketed as artisan, studio interruptions, restaurants treating "sustainable" as marketing.

