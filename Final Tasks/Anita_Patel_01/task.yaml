  ## MEMORY.md

  # Memory: Anita Patel

  ## Personal Profile

  Anita James Patel is second-generation Indian-American, daughter of a father who arrived from northern India at twenty-two and built a quiet, careful life in Columbus, Ohio. She holds a B.F.A. in Visual Communication Design from Buckeye School of Art and Design, conferred 2009. She speaks English natively and understands more Hindi than she speaks, a gap that surfaces as a small grief when her parents call. She is single in the legal sense and partnered in the daily one, sixteen months in with Sylvie Martens. A previous three-year relationship ended in 2024, mutually. No children.

  She moves between two registers without always meaning to: a precise, lightly ironic professional voice at Meridian, and a softer, more deferential cadence the moment her mother is on the line. The philosophical thread underneath everything is that good care is mostly the removal of friction. Anticipate the obstacle, clear it quietly, let the other person move on with their day. She values deliberation as a form of respect, and she has begun to notice when deliberation is really avoidance wearing better clothes. She is loyal in showing up rather than declaring. The open question she circles, and circles, is where her responsibility for other people's comfort actually ends.

  She is the friend who ends up planning things, who knew which restaurant could seat eight without anyone shouting, who quietly introduced the two people who later became close. Bringing people together is one of the few things she does without second-guessing. And then it ends, and she needs the apartment to herself with an intensity that has surprised more than one person.

  ## Key Relationships

  - **Sylvie Martens, 35, DOB April 8, 1991, girlfriend**: Veterinary technician in Broad Ripple, fifteen minutes from Anita. Met at a friend's birthday party in June 2025. They see each other several times a week and do not live together. Direct, funny, patient with Anita's deliberative nature. Sylvie's bluntness cuts through Anita's hedging in a way Anita has come to depend on.
  - **Dan Patel, 67, DOB October 22, 1958, father**: Retired accountant in Columbus, Ohio. Immigrated at twenty-two. Quiet, practical, proud of Anita in actions rather than words. Stays in touch by a monthly Sunday call.
  - **Hana Patel, 64, DOB March 3, 1962, mother**: Part-time ESL teacher in Columbus. More expressive than Dan. Talks with Anita weekly. Worries about the Crohn's, the diet, whether Anita is eating enough. Wants to meet Sylvie.
  - **Nathan Patel, 33, DOB September 17, 1992, brother**: Software developer in Chicago. Close. They text daily and play online games together weekly. Visited in February 2026 and immediately liked Sylvie. Shares the Bollywood playlist that runs as a private joke between them.
  - **Leah Rubin, 38, DOB November 26, 1987, best friend**: UX researcher at a different firm. Met at a design conference eight years ago. Anita's sounding board for career and relationship decisions. Brutally honest. They share a monthly dinner at rotating restaurants.
  - **Jason Pike, 40, DOB February 11, 1986, close friend**: Product manager at a tech startup. Friends from college. Weekly basketball partner. Jason introduced Anita to Sylvie's friend group.
  - **Lila Fontaine, design director and direct manager**: At Meridian UX Group. Trusted, fair, expects clean handoffs. Holds a standing weekly one-to-one with Anita.
  - **Raj Mehta and Tanya Brooks, junior designers on Anita's team**: She mentors both across the active engagements.
  - **Cass Leung, UX researcher**: Partners with Anita across full client engagements.
  - **Dr. Priti Iyer, 44, gastroenterologist**: At Crossroads GI Associates, Indianapolis. Has managed the Crohn's since Anita transferred care. Anita trusts her judgment completely.
  - **Dr. Alan Marsh, primary care**: At Fountain Square Family Practice. Annual physical in January.
  - **Dr. Kevin Ross, dentist**: At Mass Ave Dental. Twice-yearly cleanings.

  ## Work & Projects

  Anita is a senior UX designer at Meridian UX Group, a mid-size Indianapolis design consultancy of about forty-five employees. Career timeline: B.F.A. in Visual Communication Design from Buckeye School of Art and Design (Columbus, Ohio), conferred 2009. Three years as a junior visual designer at Pivot & Press, a small Columbus brand agency, from June 2009 to August 2012. Five years at Vector Health Systems in Columbus from September 2012 to June 2017, where she pivoted from print and visual into product UX on an early patient-facing platform. Moved to Indianapolis in July 2017 for a UX-designer role at Centerline SaaS through October 2021. Took a three-month break at the end of 2021 to manage a Crohn's flare and reset. Joined Meridian UX Group in January 2022, promoted to senior in October 2024. Her focus is enterprise SaaS design for healthcare and fintech clients. She currently leads a redesign of a patient portal for a major healthcare client, with delivery scheduled for mid-December 2026. Her schedule is Monday through Friday, 9:00 AM to 5:30 PM Eastern, hybrid with in-office days Tuesday, Wednesday, and Thursday, remote on Monday and Friday. She reports to Lila Fontaine and works closely with junior designers Raj Mehta and Tanya Brooks and UX researcher Cass Leung. Her work email is `apatel@meridianuxgroup.com` and lives only on the work laptop. The patient-portal redesign is the load-bearing project of the second half of 2026. She is treating Q3 as the build phase and Q4 as polish and stakeholder review.

  ## Finance

  - Salary $92,000 per year. Monthly take-home approximately $5,600 after federal and Indiana state tax.
  - Monthly expenses approximately $3,838, leaving roughly $1,762 a month for savings and investment.
  - Fixed monthly costs: mortgage on the Fountain Square 2BR condo $1,340, HOA $285, utilities $165, groceries $380, Subaru Outback payment $350, car insurance $130, gas $90, employer health insurance $195, Google Fi $65, subscriptions (Netflix, Spotify, Adobe Creative Cloud, NYT) $58, dining out $200, Crohn's medication copays $140, personal and miscellaneous $150, federal student loans $290.
  - Savings: $22,000 emergency fund at Ally Bank. $18,000 in a Vanguard Roth IRA. $35,000 in the Meridian 401(k).
  - Debt: $16,500 remaining on federal student loans at 4.5%. $178,000 remaining on the condo mortgage, 30-year, 5.8%.
  - Accounts: Ally Bank checking and savings, Vanguard Roth IRA, Chase Sapphire Preferred as primary card.
  - Credit score approximately 755.

  ## Health & Wellness

  - Crohn's disease (ileocolonic), diagnosed 2011 at age 24. Managed with adalimumab (Humira) 40mg biweekly self-injection on Fridays and azathioprine 100mg daily in the morning. Vitamin B12 1000mcg daily and vitamin D3 2000 IU daily for malabsorption prevention. Currently in clinical remission. Last flare October 2025, moderate, two-week prednisone course. Calprotectin levels checked quarterly. Colonoscopy every two years, last November 2025 (mild inflammation in the terminal ileum, stable), next November 2027.
  - Gastroenterology: Dr. Priti Iyer, Crossroads GI Associates, Indianapolis. Last visit February 2026, routine remission follow-up. Next November 2026.
  - Primary care: Dr. Alan Marsh, Fountain Square Family Practice. Last visit January 2026.
