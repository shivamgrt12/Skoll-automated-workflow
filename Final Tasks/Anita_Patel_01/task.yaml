  - Exercise: Saturday basketball at the YMCA with Jason, 1 hour. Tuesday and Thursday morning runs along the Cultural Trail, 30 to 35 minutes, roughly 3 miles. Home yoga on Sunday morning. Adjusts intensity during flares.
  - Sleep: in bed by 11:00 PM, up at 7:00 AM. Good sleeper when the Crohn's is quiet, disrupted by nighttime urgency during flares.
  - Mental health: no diagnosed conditions. Trends anxious in ambiguous situations (relationship decisions, career moves). Manages through exercise, Leah conversations, and structured thinking. Considering therapy if the pattern worsens.
  - Medically relevant dietary accommodations: avoids high-fiber raw vegetables during flares, large quantities of dairy, spicy food, fried food, and alcohol during active symptoms. Between flares she eats fairly normally with moderate caution.

