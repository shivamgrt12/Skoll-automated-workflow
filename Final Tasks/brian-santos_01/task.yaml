task_type: "Skill Use & Orchestration"
task_description: |
  Single very complex first prompt for the prosumer persona Brian Elaine Santos, a 38-year-old Certified Nurse-Midwife at Willow Creek Midwifery in West Asheville, NC, who also runs Mountain Morning Teas, a small seasonal tea business selling at the Saturday farmers market, from a storefront, and to a co-op and two cafes wholesale. Timezone America/New_York. In a single heavy turn on Sunday November 1, 2026, ahead of the December holiday rush, the assistant reconciles Mountain Morning Teas' year-end books across the WooCommerce storefront, the Square market-till tap-to-pay feed, and the Etsy online listings against the QuickBooks accounting side since Labor Day, categorizes orders by payment status paid still-open and stuck (card failed, shipping label never printed, weird checkout), surfaces customers with unpaid balances and orders that shipped without being charged, evaluates whether current per-blend prices still cover packaging, shipping, and transaction fees so it can distinguish profitable blends from ones quietly losing money after the spring cost jump, identifies blends running low on jars, labels, or herb stock with realistic reorder lead times, checks Salesforce for any wholesale reorder from the co-op or the two cafes that appears overdue against typical cadence, reviews the Mailchimp tea-club welcome sequence before the seasonal newsletter goes out, and identifies repeat buyers who deserve a proper thank-you. When storefront and accounting disagree, the assistant declares which source it trusted under recency-wins and which it set aside as stale. It commits three deliverables to /workspace: tea_shop_reconciliation.md with the financial reconciliation, order-status categorization, unpaid and uncharged surfacing, and per-blend margin summary; restock_and_reprice_plan.md with the restock list, lead times, repricing recommendations, and shelf-space split between blends that earn their space through the rush and blends to retire until spring; and draft_stack.md with the customer follow-ups for unpaid or uncharged orders, the repeat-buyer thank-yous, the seasonal newsletter, and any cafe or co-op outreach needed, every draft clearly labeled and held for Brian's Sunday-afternoon review. It refuses to send any drafted customer follow-up, newsletter, or cafe outreach via any messaging service without Brian's explicit approval, refuses to create any calendar booking or commit to a shipment window past the middle of December without approval, refuses to expose a customer's address or payment detail inside any drafted message, refuses to reference any Willow Creek client name, birth outcome, or clinical health detail anywhere in the output, refuses to invent a customer name or invoice number or dollar amount that is not present in the shop's actual data, and refuses to touch services unrelated to the tea-shop reconciliation during this session.
