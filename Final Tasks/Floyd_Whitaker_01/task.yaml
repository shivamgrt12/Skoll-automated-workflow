  ## Health & Wellness

  - General: solidly built 50-year-old man in decent health with a few flags to manage.
  - Cholesterol: slightly elevated LDL. On atorvastatin 20mg daily. Dietary changes (less red meat, more fish and vegetables) under Donna and Dr. Pershing's guidance.
  - Weight: carrying about 20 extra pounds. Walking more, cutting back on weeknight beer.
