<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Log of Megan Turner</title>
<style>
  :root{--cream:#fbf6ec;--ink:#3a3128;--maroon:#7a2e2e;--maroon-d:#5e2222;--olive:#8a7d3a;--line:#e3d8c2;}
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Palatino Linotype','Book Antiqua',Georgia,serif;background:var(--cream);color:var(--ink);}
  header{text-align:center;padding:34px 18px 26px;background:var(--maroon);color:#f7ecdc;}
  header h1{margin:0;font-size:30px;font-variant:small-caps;letter-spacing:1px;}
  header p{margin:8px 0 0;font-style:italic;color:#e9d2c2;}
  .rule{height:4px;background:var(--olive);}
  nav{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:16px;background:#f1e7d2;}
  nav button{font-family:inherit;cursor:pointer;background:transparent;border:1px solid var(--maroon);color:var(--maroon-d);border-radius:4px;padding:7px 16px;font-size:14px;}
  nav button.active{background:var(--maroon);color:#fbf6ec;}
  main{max-width:820px;margin:0 auto;padding:24px 20px;}
  .shelf{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;}
  .book{background:#fff;border:1px solid var(--line);border-left:6px solid var(--olive);border-radius:6px;padding:14px;}
  .book h3{margin:0 0 4px;font-size:17px;color:var(--maroon-d);}
  .book .auth{font-style:italic;color:#6b5f4d;font-size:14px;}
  .book .meta{margin-top:8px;font-size:13px;color:#7a6e58;}
  .tag{display:inline-block;font-size:11px;background:#f1e7d2;border-radius:10px;padding:2px 9px;margin-top:8px;color:#5e2222;}
  .stars{color:var(--olive);letter-spacing:2px;}
  footer{text-align:center;padding:20px;font-size:13px;color:#6b5f4d;border-top:3px solid var(--olive);background:#f1e7d2;}
  @media (max-width:520px){header h1{font-size:24px;}}
</style>
</head>
<body>
<header>
  <h1>The Reading Log</h1>
  <p>Two books a week from the Thomaston Public Library, kept by Megan Turner</p>
</header>
<div class="rule"></div>
<nav>
  <button class="active" data-cat="all" onclick="filter(this,'all')">All</button>
  <button data-cat="History" onclick="filter(this,'History')">History and Biography</button>
  <button data-cat="Fiction" onclick="filter(this,'Fiction')">Historical Fiction</button>
  <button data-cat="Mystery" onclick="filter(this,'Mystery')">Mystery</button>
</nav>
<main>
  <div class="shelf" id="shelf"></div>
</main>
<footer>Borrowed and read at 48 Elm Street, Thomaston, Connecticut. Log spans October 2025 to February 2026. Holds placed through the library catalog.</footer>
<script>
  var books=[
    {t:'Grant',a:'Ron Chernow',cat:'History',rating:5,fin:'January 2026'},
    {t:'The Lincoln Highway',a:'Amor Towles',cat:'Fiction',rating:5,fin:'October 2025'},
    {t:'Team of Rivals',a:'Doris Kearns Goodwin',cat:'History',rating:5,fin:'November 2025'},
    {t:'A Gentleman in Moscow',a:'Amor Towles',cat:'Fiction',rating:4,fin:'December 2025'},
    {t:'Say Nothing',a:'Patrick Radden Keefe',cat:'Mystery',rating:4,fin:'February 2026'},
    {t:'John Adams',a:'David McCullough',cat:'History',rating:5,fin:'November 2025'},
    {t:'The Pillars of the Earth',a:'Ken Follett',cat:'Fiction',rating:4,fin:'December 2025'},
    {t:'All the Light We Cannot See',a:'Anthony Doerr',cat:'Fiction',rating:4,fin:'January 2026'},
    {t:'Tess of the d’Urbervilles',a:'Thomas Hardy',cat:'Fiction',rating:5,fin:'February 2026'}
  ];
  function stars(n){return '★'.repeat(n)+'☆'.repeat(5-n);}
  function render(list){
    var html='';
    list.forEach(function(b){
      html+='<div class="book"><h3>'+b.t+'</h3><div class="auth">'+b.a+'</div>'+
            '<div class="stars">'+stars(b.rating)+'</div>'+
            '<div class="meta">Finished '+b.fin+'</div>'+
            '<span class="tag">'+b.cat+'</span></div>';
    });
    document.getElementById('shelf').innerHTML=html;
  }
  function filter(btn,cat){
    document.querySelectorAll('nav button').forEach(function(b){b.classList.remove('active');});
    btn.classList.add('active');
    render(cat==='all'?books:books.filter(function(b){return b.cat===cat;}));
  }
  render(books);
</script>
</body>
</html>
