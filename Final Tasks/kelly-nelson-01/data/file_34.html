<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lighting the Way, RSVP</title>
<style>
body{font-family:'Segoe UI',Arial,sans-serif;background:#1f2d3d;color:#23282d;margin:0;}
.card{max-width:620px;margin:36px auto;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,.3);}
.head{background:#2c6e7f;color:#fff;padding:30px 32px;}
.head h1{margin:0;font-size:26px;}
.head p{margin:8px 0 0;color:#d6e6ea;font-size:14px;}
form{padding:28px 32px 34px;}
label{display:block;font-size:13px;font-weight:600;color:#444;margin:16px 0 6px;}
input,select,textarea{width:100%;padding:11px 12px;border:1px solid #c8d0d6;border-radius:6px;font-size:14px;font-family:inherit;}
.two{display:flex;gap:16px;}
.two>div{flex:1;}
.check{display:flex;align-items:center;gap:8px;margin-top:14px;font-size:14px;color:#444;}
.check input{width:auto;}
.btn{margin-top:24px;width:100%;background:#c89b3c;color:#1a1a1a;border:none;padding:14px;border-radius:6px;font-size:16px;font-weight:bold;cursor:pointer;}
.note{font-size:12px;color:#888;margin-top:14px;}
fieldset{border:none;padding:0;margin:0;}
</style>
</head>
<body>
<div class="card">
  <div class="head">
    <h1>Lighting the Way Gala</h1>
    <p>Saturday, October 17, 2026, doors 6:00 PM, Grace Community Church Hall, Hartford. Tickets $50.</p>
  </div>
  <form action="#" method="post">
    <fieldset>
      <div class="two">
        <div><label for="fn">First name</label><input id="fn" name="first" type="text" required></div>
        <div><label for="ln">Last name</label><input id="ln" name="last" type="text" required></div>
      </div>
      <label for="em">Email</label>
      <input id="em" name="email" type="email" required>
      <div class="two">
        <div>
          <label for="qty">Tickets at $50</label>
          <select id="qty" name="tickets">
            <option>1</option><option>2</option><option>4</option><option>6 (half table)</option><option>10 (full table)</option>
          </select>
        </div>
        <div>
          <label for="tier">Sponsorship tier</label>
          <select id="tier" name="tier">
            <option>None</option><option>Spark, up to $249</option><option>Lantern, $250 to $999</option>
            <option>Beacon, $1,000 to $2,499</option><option>Guiding Light, $2,500 and up</option>
          </select>
        </div>
      </div>
      <label for="pledge">Paddle raise pledge in dollars, optional</label>
      <input id="pledge" name="pledge" type="number" min="0" step="25">
      <label for="diet">Dietary notes for the plated dinner</label>
      <textarea id="diet" name="diet" rows="2"></textarea>
      <div class="check"><input id="news" type="checkbox" name="news" checked><label for="news" style="margin:0;font-weight:400;">Add me to the newsletter</label></div>
      <button class="btn" type="submit">Reserve my seat</button>
      <p class="note">Proceeds support the monthly youth group and year round advocacy. Questions go to hartfordfosterfutures@gmail.com.</p>
    </fieldset>
  </form>
</div>
</body>
</html>
