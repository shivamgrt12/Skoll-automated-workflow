task_type: Productivity Flow

task_description: |-
  Brandon Wright is a 22-year-old nursing student in his final year of a bachelor of science in nursing program in Minneapolis who also races cross-country skiing competitively, and with his financial-aid renewal coming due he wants one honest, rebuilt read on his money that starts from what actually moved through his accounts rather than the running totals he has been carrying in his head. He needs his North Star Community Credit Union checking and savings pulled so every real deposit is accounted for, and he wants the pay from his certified nursing assistant work at the hospital measured from the deposits that genuinely landed across the run since the ski season opened rather than from an assumed shift or two a week, then lined up against his employment record and his hourly rate so the hours and the dollars agree, with a plain note of which figure he trusted and which he set aside wherever they pull apart. His merit award and his nursing grant are meant to post on a steady rhythm, and he wants confirmation of what truly posted down to the cent. The full spending side is to be worked across every month on record and grouped the way a person actually lives, covering rent and the split with his roommate, insurance, the phone, the discount grocery runs, gas, ski wax and race entry fees, and the single campus coffee, with anything recurring that he forgot he was still paying or that is quietly billing him twice called out, and with his race-entry receipts matched against the entry charges that actually cleared so no citizen race was charged to him twice over. He wants the tuition payment-plan draft checked so it is still coming off on the intended day at the intended amount, with a loud warning for any pull that missed or came through wrong, and he wants the small investing account looked at and reported as it stands. From all of this he wants a trusted reconciliation that shows what really came in against what he believed, spending grouped and totaled, the tuition draws verified, the net tuition after posted awards, his true monthly gap, and how many months his savings would carry him if outside help stopped, with the arithmetic left visible. On top of that he wants a financial-aid renewal packet prepared from the reconciled figures, an income summary paired with the renewal form filled in and staged for his own signature, left unsigned and unsent so he signs and sends it under his own hand, and he wants the whole picture kept to himself alone and presented reconciliation first with the renewal packet built on top.

system_prompt: ""

platform: linux

required_apis: [plaid, gusto, bamboohr, xero, quickbooks, stripe, paypal, square, alpaca, docusign, gmail, google-calendar]

distractor_apis: [strava, myfitnesspal, spotify, instagram, whatsapp, discord, uber, eventbrite]
