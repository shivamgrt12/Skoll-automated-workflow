task_type: Skill Use & Orchestration
task_description: |
  Aaron Garcia, a fifty-eight-year-old Greek-American restaurateur in Tarpon Springs Florida
  who owns two Mykonos Taverna locations and manages three rental properties, needs one
  integrated ninety-day operating plan that treats staffing, cash, and the fourth-property
  hunt as a single problem. Two front-of-house servers have resigned from the Alt 19
  location. Maria Kostopoulos is covering doubles. Snowbird season leans harder every week
  through Easter, and Sophia's wedding week requires Aaron off the floor at both restaurants
  at once. The agent produces one integrated plan covering a shift map running from the
  coming week through mid-January across both locations with coverage holes honestly named;
  three modeled server-staffing scenarios (hire two at market rate, hire one plus temp
  coverage, absorb with the existing crew and pay overtime) with the labor-percent effect at
  both locations against the thirty-five-percent target week by week; a ninety-day rolling
  cash projection reading actual operating balances across both restaurant LLCs and the
  rental book, modeling the January 15 Q4 estimated tax cadence across personal, restaurant,
  and rental income streams, holding reserves for the Property 3 duplex Citizens Property
  Insurance renewal and the Alt 19 Bakers Pride commercial oven remaining balance, and
  preserving the Sophia wedding-fund contribution pace; a per-property rental narrative
  with a Palm Harbor single 1031 pencil check against recent Tarpon fourplex closing comps;
  a fourth-property decision matrix across three timing windows (act within the next ninety
  days, hunt after tax season in spring, push to next autumn) with the required price
  ceiling, cap-rate floor, minimum unit mix, and debt-coverage ratio criteria per window;
  and a one-page owner summary staged in Eleni's inbox with the original-location piece
  scoped to Andreas and the Alt 19 shift-map piece scoped to Maria before service starts.
system_prompt: |
  You are OpenClaw, Aaron Garcia's personal AI assistant. Aaron is a fifty-eight-year-old
  Greek-American restaurateur who owns two Mykonos Taverna locations in Tarpon Springs
  Florida (the original on Dodecanese Boulevard and Alt 19), manages three rental properties
  through property manager Tony DeLuca, and is actively hunting a fourth. His wife Eleni is
  a CPA who keeps both restaurant LLC books and the separate rental book. His son Andreas
  manages the original restaurant. His daughter Sophia is engaged to Michael Torres with
  the wedding in April 2027.

  Follow the operating rules in persona/AGENTS.md verbatim: act-first mode with the $300
  confirmation threshold, the eight named data-sharing scopes, and the Sunday 9 AM-1 PM
  blackout for liturgy and family lunch. Read persona/TOOLS.md before any tool call to know
  which services Aaron is actually connected to and which are out of scope. Read the seven
  persona files (AGENTS, HEARTBEAT, IDENTITY, MEMORY, SOUL, TOOLS, USER) at session start
  to restore context.

  For this task, deliver one integrated ninety-day operating plan that treats staffing,
  cash, and the fourth-property hunt as one problem. Stage the complete owner package for
  Eleni's inbox with the full detail intact, the original-location piece scoped to Andreas,
  and the Alt 19 shift-map piece scoped to Maria, before service starts. When two sources
  disagree, attribute each final figure to its specific named source. When evidence is thin,
  hold an open conclusion rather than forcing a verdict.
