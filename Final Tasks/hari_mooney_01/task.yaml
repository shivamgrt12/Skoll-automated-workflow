  - **Father's condition**: Raj diagnosed with early-stage Parkinson's in late 2025. On levodopa. Tremor in right hand, some gait instability. Quarterly neurologist appointments with Dr. Lisa Brennan at Meridian Medical Center in Newark; Hari accompanies him. Meera is Raj's primary medical decision-maker; Hari is the family alternate.
  - **Mother's condition**: Meera has mild knee arthritis, controlled with OTC medication. Otherwise healthy.

  ## Interests & Hobbies

  - **Chess**: Plays competitively; USCF rating around 1950 (Expert level). Caro-Kann as Black, London System as White; both fit his slow-build, methodical temperament. Studies openings and endgames daily on Chess.com and Lichess. Coaches the Eastwick Knights; proudest work outside the classroom.
