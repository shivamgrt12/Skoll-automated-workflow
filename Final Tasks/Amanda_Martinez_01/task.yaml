  and stale Trello export Nov 15 (message and release anchors win); Greenleaf monthly
  retainer $4,500 in planning note vs QuickBooks invoice INV-GL-1106 at $4,200 (posted
  accounting line wins with one-line trust); Yemi vocal revision take 3 in WhatsApp
  conv-yemi Nov 11 vs stale studio export note in flat data (live message thread wins);
  November cash timing across QuickBooks, Plaid posted movement, and Stripe beat-store
  receipts with timing risk before Nov 13 release; and calendar RRULE noise on one-off
