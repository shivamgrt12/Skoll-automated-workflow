  ## MEMORY.md

  # Memory: Gerald Ellison

  ## Personal Profile
  Gerald Thomas Ellison is the oldest of four in a working-class Anglo-American family with roots in Ohio and Harlan County, Kentucky. He carries quiet golden-child weight: parents lean on him, siblings look up to him, and adults relax around him without him having to ask for it. His public face is steady, cheerful, and gracious; his private side keeps poems, half-finished songs, and the Lakemont question in a corner of the iPhone notes app that family does not see. He is competitive but never bitter, congratulates winners sincerely, then practices twice as hard the next morning. His word is currency he refuses to inflate. When stress hits, his jaw tightens, his Kentucky accent thickens, and he gets quieter rather than louder.

  His music is sacred ground. Bluegrass is an inheritance from Grandpa Walter and the Harlan County visits, not a costume or a quaint Appalachian footnote. He has played fiddle since age seven and picked up mandolin at twelve. Family is the bedrock; faith is real rather than performative; the 1969 Camaro Pinterest board is a secret he half-jokes about. He has not yet been on an airplane. The Camry trips to Kentucky are his favorite version of being alive.

  ## Key Relationships
  - **Bob (Robert) Ellison, father, age 44: Construction foreman at Bellcroft Industries, earning roughly $52,000 a year. Early riser, hands-on, expects his son to take the steady path. Watches Buckeyes football with Gerald on fall Saturdays. Does not know about Lakemont.
  - **Karen Mitchell Ellison, mother, age 42: Manages Mitchell's Bakehouse, earning roughly $28,000 a year. Closes most weekday afternoons, which is why Gerald handles Emma's daycare pickup on Tuesdays and Thursdays. Slips Gerald $50 to $80 in cash on Saturdays in exchange for bakehouse help. Does not know about Lakemont.
  - **Megan Ellison, sister, age 15: Sophomore at Ridgewood, plays flute in the school band, covers for Gerald when he needs to leave the house for audition prep. Knows something is up with the college decision but has not pressed.
  - **Tyler Ellison, brother, age 12, DOB 2013-12-04**: Middle school, basketball obsessed, lives on YouTube, shares the bunk-bed room with Gerald. Plays Madden and Smash Bros with him in the evenings. Sees Gerald as the standard.
  - **Emma Ellison, sister, age 3, DOB 2023-02-08**: Youngest, at daycare on weekdays. Gerald picks her up on Tuesdays and Thursdays. She is half of the reason he second-guesses leaving Columbus.
  - **Grandma Dorothy Ellison, grandmother, DOB 1955-03-22**: In Harlan County, Kentucky. Sunday 1 PM FaceTime caller. The brisket recipe and the dry rub are hers. Wants Gerald close.
  - **Grandpa Walter Ellison, grandfather, DOB 1953-06-30**: In Harlan County, Kentucky. Where the fiddle started. Quiet about the future, supportive about the music.
  - **Mr. David Crawford, bluegrass director and mentor**: Runs the Ridgewood music program and The Ridgewood Ramblers. Knows about Lakemont. Helping with audition prep, recommendation letter, and the Cedarbrook decision. Treats Gerald like a peer in a quiet way.
  - **Sarah Henderson, best friend, age 17: Banjo player in the Ramblers, applying to Ironwood College nursing. The only peer who knows about the Lakemont plan. Drives Gerald around when the Camry is with Bob.
  - **Jake JT Thompson, friend, age 17**: Upright bass in the Ramblers, class clown, keeps Gerald loose. Does not know about Lakemont.
  - **Ashley Morgan, close friend and crush, age 17**: Country line dancing, plays guitar casually, in his Instagram DMs more than anywhere else. Gerald has not said anything; she may or may not know.
  - **Pastor James Whitfield, First Methodist Columbus**: Has known Gerald since the baptism, still calls him 'Gerry-boy' from time to time. Family pastor, not a confidant.
  - **Mrs. Patricia Nelson, AP English Lit teacher**: Writing one of his college recommendation letters. Knows about Cedarbrook, knows a little about Lakemont but not the full plan.

  ## Work & Projects
  - **Ridgewood High School senior**: Class rank around 28 out of 320, GPA 3.78 out of 4.0, SAT 1280 from October 2025. Course load is AP English Lit with Mrs. Nelson, AP Calc AB with Mrs. Patel, Physics, US Government, Bluegrass Ensemble with Mr. Crawford, and Creative Writing. Graduates Saturday May 29, 2027 at the Ohio Expo Center, 10 AM.
  - **First fiddle and student director, The Ridgewood Ramblers**: Fourteen-member bluegrass ensemble with three fiddles, two banjos, one mandolin, one upright bass, two guitars, and five vocalists across soprano, alto, tenor, and bass parts. Rehearsals Monday, Wednesday, and Friday from 3:30 to 5:30 PM in the band room, plus Saturday 9 AM to 12 PM during competition season. Finished second at regionals last year.
  - **Cedarbrook University engineering, family plan**: Accepted, $200 deposit due April 30, 2027. Affordable, close to home, parents prefer it. Gerald has not committed in his head.
