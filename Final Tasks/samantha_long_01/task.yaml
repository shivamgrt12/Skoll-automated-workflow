  # Memory: Samantha Long

  ## Personal Profile

  Samantha Thomas Long lives alone in a one-bedroom apartment in Edgewood, Cranston, Rhode Island. She retired in 2019 after thirty years as a USPS letter carrier on Route 106 in Edgewood and Cranston. She is measured, precise, and slightly old-fashioned in diction, with a dry deadpan humour. She manages systemic lupus and lupus-related peripheral neuropathy with practised discipline, walks three mornings a week with her best friend Frank, and reads several books a month. Her daughter Beth is her primary family contact and the person who set up OpenClaw.

  ## Key Relationships

  - **Beth Long-Moreau** (daughter, 40): speech-language pathologist in Warwick, Rhode Island. Primary family contact, calls three times a week, visits every other Sunday with Lily and Jack. Born March 16, 1986.
  - **Paul Moreau** (son-in-law, 41): high school history teacher. Quiet, respectful, helps with apartment maintenance. Genuine fondness between them.
  - **Lily Moreau** (granddaughter, 9): 4th grader. Bookish like Samantha; they swap library recommendations. Birthday December 7.
  - **Jack Moreau** (grandson, 8): 2nd grader. Active, silly, follows Samantha around the garden asking about bugs. Birthday March 14.
  - **Tom Long** (son, 36): logistics for a shipping company in Denver. Calls monthly, visits twice a year. Single. Birthday February 22.
  - **Frank Corsetti** (best friend, 69): retired USPS carrier from the same route territory. Walks together Monday, Wednesday, and Friday, lunch every Friday at Chelo's. Closest confidant. Birthday October 4.
  - **Sean Long** (ex-husband, 64, no contact): lives in East Providence, remarried. Alimony ends December 2026. Never to be contacted by OpenClaw under any circumstance.

  ## Work & Projects

  Samantha is retired. Her career was thirty years as a USPS letter carrier (1989-2019), final assignment Route 106, walking 8-12 miles a day for three decades. She retired with a full FERS pension. Post-retirement work is informal: a community garden plot at Edgewood Community Garden, monthly volunteering at the Cranston Public Library for book sorting and shelving, and the annual library book sale shift in May.

  ## Finance

  - USPS pension: $2,900/month (FERS, 30-year career).
  - Social Security: $1,800/month.
  - Combined monthly income: $4,700.
  - Rent on the Edgewood 1BR apartment: $1,250/month.
  - Utilities (electric, heat, internet): $175/month.
  - Groceries: $320/month.
  - Car insurance: $110/month; gas: $80/month.
  - Medicare supplement plus prescriptions: $380/month.
  - Phone (Consumer Cellular): $55/month.
  - Subscriptions (Kindle Unlimited, NYT digital, PBS Passport): $45/month.
  - Dining out: $80/month; personal and miscellaneous: $100/month.
  - Alimony to Sean: $600/month, ending December 2026.
  - Home maintenance and miscellaneous: $75/month.
  - Total monthly expenses: ~$3,270, leaving ~$1,430/month for savings, grandchildren, and garden supplies.
  - Savings: $31,000 at Navigant Credit Union plus $58,000 in TSP, combined ~$89,000.
  - Debt: none. Vehicle: 2017 Toyota Corolla LE, white, 44,000 miles, owned outright.
  - Credit: Navigant CU Visa, paid in full monthly. Score ~790.

  ## Health & Wellness

  - Systemic lupus erythematosus, diagnosed 2018. Managed with hydroxychloroquine 200mg twice daily and prednisone 5mg daily. Quarterly bloodwork (CBC, CMP, complement). Currently stable; no major flares since 2024. Sun sensitivity requires hat and long sleeves outdoors.
  - Lupus-related peripheral neuropathy, diagnosed 2022. Numbness and reduced sensation in the feet, cane on bad days. Managed with gabapentin 300mg nightly and daily balance exercises.
  - Other medications: calcium citrate 600mg + D3 daily (bone protection for prednisone), folic acid 1mg daily, fish oil 1200mg daily.
  - Primary care: Dr. Rami Anwar, Edgewood Medical Associates. Last visit February 2026.
  - Rheumatology: Dr. Joan Tierney, Providence Rheumatology Group. Last January 2026.
  - Dental: Dr. Steven Massa, Cranston Dental. Every six months; last December 2025.
  - Vision: Dr. Patricia Lopes, Edgewood Eye Associates. Annual exam plus hydroxychloroquine retinal screening; last November 2025, next November 2026.
  - Sleep: 10:00 PM to 5:45 AM; gabapentin helps the neuropathy-related disruption.
  - Mental health: stable and content. The years after the divorce were difficult; she read her way through them.

  ## Interests & Hobbies

  - Reading: history, philosophy, biography, literary fiction. Four to five books a month from the Cranston Public Library and Kindle Unlimited. Currently reading "Iron and Olive".
  - Gardening: tomatoes, peppers, lettuce, herbs, zucchini at plot 14 of the Edgewood Community Garden. Surplus to Frank and Beth.
  - Music: jazz (Coltrane, Monk, Miles Davis) and classical piano sonatas through a Bluetooth speaker; WGBH for the long listen.
