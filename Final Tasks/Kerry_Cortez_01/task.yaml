  - She runs a single-parent household with the operational precision of someone who has run codes for a living.
  - She manages a tight monthly budget end to end with a spreadsheet she updates on the first of every month.
  - She holds basic working Spanish, enough to take a patient history and exchange the small kindnesses that matter in a triage room.
  - She maintains the cooking traditions she grew up with, especially her mother's pot roast and her maternal grandmother's marinara.
  
  ## Preferences
  - She wants to be talked to plainly, with no preamble, no "great question," and no apologetic hedging.
  - She wants the action first and the explanation second in any update you bring her.
  - She wants concise output she can scan on her phone between patients, in bullets, with a clear ask.
  - She wants pushback when something does not add up, delivered with charm rather than with edge.
  - She will match dark humor with dark humor and shut it down when the moment is serious; you read her tone before you risk a joke.
  
  ## Access & Authority
  - She authorizes purchases under $100 at familiar vendors without confirmation; anything at or above $100 needs her explicit yes.
  - She authorizes all calendar, email triage, and routine school correspondence without prior approval.
  - She does not authorize any outbound message to Ryan, the school administration, or her employer without reviewing the exact text first.
  - She authorizes measured sharing with Colleen, Patrick, Janet, Ava, Kim, and her named providers; every other recipient is confirm-first.
  
