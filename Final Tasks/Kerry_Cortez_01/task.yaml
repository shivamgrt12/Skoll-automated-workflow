  ## MEMORY.md
  
  # Memory: Kerry Cortez
  
  ## Personal Profile
  
  Kerry is a Boston-raised, working-class-rooted, second-generation-on-her-father's-side American woman who has stayed close to where she came from while building a life shaped by all the ways her own kids' world will not be like hers was. Her father's family came from somewhere in northern Spain a long time ago and that strand of the story has dimmed over the generations until what is left is a name, a few recipes, a vague sense of inheritance. Her real cultural identity is closer in: the Catholic-adjacent, Quincy-Boston, Sunday-pot-roast, hockey-in-winter, Cape-in-summer specificity of the place she grew up.
  
  She holds herself together by holding everyone else together first. She is the one who notices when a patient's family member has not eaten, when her son is quiet in a way that means something, when the babysitter is studying for finals and might need a softer week. The noticing is constant. The acting on it is constant. The recovering from it happens in the parking lot at 7:15 AM in a dark blue Subaru with the engine off.
  
  She is sharper than she looks and softer than she acts. The sharpness comes out in the wit, fast and dry and occasionally surprising people who only know her as the calm one. The softness lives in places few people see: a box of letters from her early relationship with her ex she has not been able to throw away, the cards Chloe draws her after a hard week, the way her voice changes when her mother calls and she has not slept and pretends she has. The dark humor she developed in the ER is essential to her, a pressure valve and not callousness.
  
  She decided years ago she would not be someone who needed rescuing, and she has held to that past the point where it serves her. She knows this. The closest she gets to therapy is venting to Janet at the nurses' station at 3 AM and calling it good.
  
  Education: B.S.N. from UMass Boston (2006); M.S.N. as a Family Nurse Practitioner from MGH Institute of Health Professions (2014). Marital status: divorced March 2023. Languages: English native, basic Spanish enough for patient assessments.
  
  She believes in showing up. She believes words are weather and actions are climate. She believes children deserve adults who do the hard things in front of them. She believes loyalty is built slowly and broken instantly. She does not believe a face mask will fix her life. She believes in the radical decency of a hot meal made for someone who is having a hard day, and in the small, repeatable forms of love.
  
  ## Key Relationships
  
  - **Liam Cortez** (son, 12, DOB November 5, 2013, derived). Seventh grader at Holy Name Parish School in West Roxbury. Defenseman on the Holy Name Bobcats. Quiet, thoughtful, starting into pre-teen moodiness. Protective of Chloe; has taken on a "man of the house" stance Kerry finds both sweet and heartbreaking. Does not talk about his dad much. Mild peanut sensitivity, carries an EpiPen.
  - **Chloe Cortez** (daughter, 9, DOB August 22, 2016, derived). Fourth grader at Holy Name Parish School. Creative, talkative, loves art and Girl Scouts. Asks when Dad is coming more than Liam does, and Kerry handles those questions honestly and carefully. Makes handmade cards after tough shifts; Kerry keeps every one.
  - **Ryan Cortez** (ex-husband, 44, DOB September 14, 1981, derived). Sales rep in Providence, RI. Marriage ended after Kerry discovered hidden debt and financial dishonesty. Has the kids two weekends a month when he follows through; cancellation rate around 30%. Court-ordered child support is $1,400/month; actual average received is $900. Kerry communicates by email only and keeps a paper trail for her lawyer.
  - **Colleen Cortez** (mother, 67, DOB December 3, 1958, derived). Retired dental assistant in Quincy, MA, about twenty minutes away. Widowed 2019. Emergency backup for childcare and the person Kerry calls at her breaking point. Thinks Kerry pushes herself too hard and is not wrong. Kerry protects her from the worst of it.
  - **Patrick Cortez** (brother, 39, DOB April 18, 1987, derived). Firefighter in Worcester, MA. Married, two kids. Teasing relationship with Kerry. Offered to "talk to" Ryan after the divorce; Kerry declined but appreciated the offer. Roughhouses with Liam and Chloe at family gatherings.
  - **Ava Kolesnik** (babysitter, 19, DOB February 11, 2007, derived). Sophomore at Bunker Hill Community College studying elementary education. Babysits Kerry's three work nights a week. The kids love her. Kerry pays $120 a night and considers her irreplaceable. Finals in May and limited summer availability are an unresolved logistics problem.
  - **Dr. Janet Okafor** (closest friend and colleague, 38, DOB May 9, 1988, derived). ER attending at Boston Medical Center, married, husband travels. Three years of overlapping night shifts. The only person who fully gets Kerry's dark humor. Texts, memes, vent sessions, occasional girls' night out.
  - **Kim Vasquez** (neighbor, 45, DOB October 26, 1980, derived). Single mom next door at 76 Chestnut Hill Road; son Marco, 10. Informal mutual-aid pact for school pickups and emergency contacts. Reliable ally, not a deep friend.
  
