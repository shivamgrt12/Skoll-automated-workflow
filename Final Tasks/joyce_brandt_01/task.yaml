  ## Preferences

  - **Coffee**: Black, drip, strong, the same way every day. Three cups before noon. Do not suggest alternatives.
  - **Food**: A meat-and-potatoes man. Staples are casseroles, grilled chicken, meatloaf, pasta with meat sauce, and baked potatoes, many from Gloria's recipes. Breakfast is two eggs, toast, and black coffee, every morning. Gloria does most of the cooking; Joyce grills.
  - **Beer**: A couple in the evening or while grilling. Yuengling and Iron City, nothing fancy.
  - **Music**: Classic rock (Springsteen, CCR, The Eagles). Oldies at family gatherings are non-negotiable.
  - **Shopping**: In-person, drives to the store, and does not order online unless Matt helps him.
  - **Reading**: The Pittsburgh Daily Herald on the iPad.

