recipes:
- name: Nani's Samosas
  source: Nani Mehta
  category: appetizer
  notes: The secret is the cumin-coriander ratio. Nani showed Priya but not me. Used
    for every family gathering and the BBQ.
  prep_time: 90 min
  serves: makes about 40
- name: Dad's Biryani
  source: Vikram Jefferson
  category: main
  notes: I can make it but not as good as his. He layers the rice differently. Restaurant
    version is slightly different from home version.
  prep_time: 2 hours
  serves: 8-10
- name: Karen's Potato Salad
  source: Karen Jefferson
  category: side
  notes: Mom's American-style. Always at BBQs. Mustard-based, no mayo.
  prep_time: 45 min
  serves: '12'
- name: Masala Chai
  source: family recipe
  category: beverage
  notes: Loose-leaf with whole spices. Cardamom heavy, little black pepper. Mom's
    mix. Shop setup. At least 2 cups daily.
  prep_time: 15 min
  serves: 4 cups
