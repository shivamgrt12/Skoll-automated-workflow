  ## MEMORY.md

  # Memory: Jean Mullen

  ## Personal Profile

  - **Origin**: Born in Cork, Ireland. Irish citizen, long-term visa holder for India. Moved to Chennai in 2005; over twenty years resident.
  - **Education**: MA Performing Arts, UCC (2004). Munster-tradition training under Margaret O'Brien from age 6. IDTA certification (2003). Kalakshetra Foundation short course (2007).
  - **Languages**: English (native), Irish (conversational), Tamil (intermediate), Hindi (basic).
  - **Temperament**: Calm, exacting, patient with honest effort. Forgives nerves; does not forgive carelessness with tradition. Trust earned slowly, held durably.
  - **Cultural identity**: Irish sharpened by distance. Cork in her speech when tired, cooking when homesick. Twenty Chennai years: Tamil learned earnestly, vegetarianism settled, local and Irish calendars held equally.
  - **Philosophy**: Art is not decoration. Tradition is living, not preserved. Community is currency. Family is the quiet axis.
  - **Social style**: Selective, not shy. Commands a hall, goes home to people who require no performance. Circle runs deep, not wide.

  ## Key Relationships

  - **Brendan Mullen** (46, husband; DOB March 14, 1980; married June 14, 2008, 18 years). Irish, born in Cork, met Jean during the UCC years before they moved to Chennai together. Senior software architect at a major SaaS company in Chennai. Steady, supportive, handles family financial planning. Quietly proud of her artistry. Designated ICE and medical proxy.
  - **Siobhan Mullen** (15, daughter; DOB September 12, 2010). Pallavan International School. Learning contemporary dance under Jean, talented but still deciding. Also drawn to graphic design.
  - **Declan Mullen** (11, son; DOB August 24, 2014). Pallavan International School. Plays cricket. Not interested in dance, which Jean accepts with good humor. Mildly lactose-sensitive.
  - **Sean Walsh** (74, father; DOB October 12, 1951). Retired secondary-school teacher in Cork. Quiet, gentle; the source of her literary taste.
  - **Eileen Walsh** (71, mother; DOB February 8, 1955). Retired nurse in Cork. The kitchen voice in Jean's head; her colcannon recipe traces directly to Eileen's.
  - **Niamh Walsh** (42, sister; DOB December 18, 1983). Primary-school teacher in Cork. Closest family tie beyond parents; coordinates the Cork end of the annual February trip.
  - **Margaret O'Brien** (72, mentor; DOB March 19, 1954). Semi-retired, lives in Cork. Weekly Thursday video call. Visited Chennai in 2023. Every major artistic decision filters through this connection.
  - **Fiona Gallagher** (42, closest friend, fellow expat dancer; DOB April 27, 1984). Runs her own ballet school in Chennai. Shares the particular loneliness of building an academy far from home. Designated secondary ICE behind Brendan.
  - **Patrick Doyle** (50, bodhrán). Primary percussionist for over a decade. Reliable, intuitive, understands her rhythmic vocabulary implicitly.
  - **Aoife Brennan** (38, vocalist). Lead singer for five years. Exceptional voice, occasionally temperamental about scheduling.
  - **Colm Fitzgerald** (55, fiddle). Based in Pondicherry. Collaborates on special productions, travels for rehearsals.
  - **Dr. S. Richardson** (63, Secretary, Riverside Arts Hall). Six consecutive December seasons featured Jean. Key professional relationship.
  - **Kathleen Walsh** (48, parent of senior student Emma; no relation to Jean's family Walshes). Active in academy community. Helpful, occasionally overbearing.
  - **Dr. Laura Patterson** (GP, Greenfield Health Clinic, Mylapore; British expat). Annual February checkup. Standing clinical contact for medical proxy.
  - **Dr. K. Connolly** (orthopedic, Kaveri Orthopaedic Centre; Irish expat, Cork network). Manages her chronic right-ankle condition.
  - **Claire Nolan** (physiotherapist, PhysioActive, Alwarpet; Irish expat).

  ## Work & Projects

  - **Academy**: Céilí Mór Academy of Dance, founded 2012. Rented first-floor studio, Mylapore. 35 students, ages 6 to adult. Three levels. Annual Day performance at Kalaivanar Auditorium each October. Founder, artistic director, primary advanced instructor.
  - **Career**: 2004 MA at UCC. 2005 moved to Chennai. 2005 to 2012 independent practice, workshops, guest collaborations. 2012 to present academy founder and artistic director, fourteen continuous years.
  - **Five Elements**: Full-length contemporary Irish dance work, five aspects of nature. Chennai Arts Festival premiere, winter season opening slot. Most ambitious work to date.
  - **Emma Walsh Solo Debut**: Senior student (17), Kalaivanar Auditorium. Reflects on Jean as teacher. Intensive private coaching ongoing.
  - **Metro Arts Commission**: Dance-inspired installation for Mylapore Metro station inauguration. Blends traditional movement with digital projection.
  - **Riverside solo recital**: Off-season series slot at Riverside Arts Hall, full programme. Extends the six-year performance relationship with Dr. Richardson beyond the December season.
  - **Professional development**: Visiting artist, Academy of Performing Arts (annual). Lecture-demonstration on storytelling in choreography, Chennai Arts Festival conference.
  - **Operating posture**: Performance season peaks November through January.

  ## Finance

  - **Academy tuition**: approximately Rs 1,20,000 per month.
  - **Performance fees**: Rs 50,000 to Rs 2,00,000 per show depending on venue and prestige.
  - **Brendan's income**: Rs 2,80,000 per month net.
  - **Studio rent**: Rs 35,000 per month (annual lease renewal in August).
  - **Home rent**: Rs 45,000 per month (3BHK apartment in Mylapore).
  - **Children education**: Rs 25,000 per month combined. Education savings: Rs 8,00,000 in fixed deposit.
  - **Savings**: Rs 12,00,000 in savings, Rs 15,00,000 in mutual funds (SIP Rs 20,000 per month), Rs 5,00,000 in gold.
  - **Monthly outflow**: Rs 1,97,500. Combined base inflow: Rs 4,00,000 (academy Rs 1,20,000 plus Brendan Rs 2,80,000). Buffer: Rs 2,02,500 plus performance fees.
  - **Credit**: One HDFC credit card, paid in full monthly. Conservative with debt; no loans.
  - **Goals**: Own studio space within three years. Build education corpus to Rs 25,00,000. Fund Five Elements fully (budget Rs 8,00,000). Continue annual Cork family trip.
  - **Spending temperament**: Deliberate. Researches, dislikes waste, waits for the right item. Spends without flinching on costumes, music collaborators, and references that serve the work. Strong buy-local instinct.

  ## Health & Wellness

  - **Primary care**: Dr. Laura Patterson, Greenfield Health Clinic, Mylapore. February 2026 checkup clear; iron slightly low, supplementing.
  - **Orthopedic**: Dr. K. Connolly, Kaveri Orthopaedic Centre. Manages chronic right-ankle strain from a 2019 performance injury.
  - **Physiotherapy**: Claire Nolan, PhysioActive, Alwarpet. Ankle strengthening and dancer maintenance.
  - **Movement**: Dance practice is primary exercise, 2 to 3 hours of intensive movement daily. Morning Ashtanga-based yoga (30 minutes) and evening walks in Mylapore.
  - **Mental health**: No formal therapy. Processes stress through morning meditation, dance, and conversations with Fiona. Winter festival season is the most intense stress period.
  - **Sleep**: 7-hour target. Bed by 10:30 PM, up at 5:30 AM.
  - **Supplements**: Iron tablets (prescribed), Vitamin D, chamomile tea at bedtime.
  - **Dietary medical**: Strict lacto-vegetarian. No eggs, no meat, no fish. Periodic Friday fasting (Catholic). No allergies. Declan is mildly lactose-sensitive; household keeps alternatives.

  ## Interests & Hobbies

  - **Balcony garden**: Herbs, jasmine, rosemary. Pinching rosemary at dawn resets a mind wound tight by rehearsal.
  - **Journaling**: Early dark, before the day makes demands. Reflection, planning, or simply holding the page while thoughts settle.
  - **Archival project**: Digitizing old VHS recordings of Margaret O'Brien's performances, coordinated remotely with Margaret's family in Cork. Closer to a devotional act than logistics.
  - **Reading**: Scholarly dance treatises (slowly, often more than once), Irish literature (Colm Tóibín, Sebastian Barry), spiritual texts (Celtic prayers, Yeats), mythology retellings (Juliet Marillier).
  - **Listening**: Traditional Irish and Celtic (The Chieftains, Planxty, Martin Hayes for contemporary voice). Van Morrison. Distinguishes between music she studies and music she simply needs.
  - **Cooking as decompression**: Colcannon, soda bread, vegetable stew, potato soup. Irish comfort food translated through local ingredients.

  ## Home & Living

  - **Apartment**: 3BHK first-floor flat in Mylapore, walking distance to St. Patrick's Church and the academy studio. Cork family photographs share wall space with Chennai arts prints. A meditation corner is the still center.
  - **Aesthetic**: Considered and textured over flashy. Natural fibers, muted and warm tones, handcraft over machine-perfect finish. Drawn to Celtic motifs and handwoven things with a story.
  - **Home projects**: Siobhan's graphic-design workspace setup. Balcony garden. Kitchen renovation planned for late 2026.
  - **Vehicle**: One family car, shared with Brendan. Auto-rickshaws for solo studio commutes when faster.
  - **Neighborhood**: Mylapore. Near St. Patrick's Church. Favorite spots: Chamiers Café (Alwarpet), Amethyst (R.A. Puram), The Green Table (Mylapore, vegetarian-friendly).

  ## Devices & Services

  - **Phone**: iPhone 13. Calls, WhatsApp, email, calendar, music for practice.
  - **Laptop**: MacBook Air (personal). Choreography notes, rehearsal video editing, research.
  - **Tablet**: iPad for rehearsal review and reading.
  - **Smart home**: Minimal. One smart speaker for practice music. Ring doorbell on the studio entrance.
  - **Subscriptions**: Spotify (family plan), Amazon Prime, *Irish Dancing Magazine* digital, *The Irish Times* digital.

