 Dance Academy.\n\n#### Studio Build-Out: Storefront & Shipping\n- **WordPress** (`wordpress-api`): Build draft site for Amanda's Dance Academy with class catalog and instructor bio pages live.\n- **Webflow** (`webflow-api`): Compare storefront drafts against WordPress for the studio launch decision with responsive design preview testing.\n- **WooCommerce** (`woocommerce-api`): Sell class packs and merchandise tied to WordPress draft for Amanda's Dance Academy public launch.\n- **BigCommerce** (`bigcommerce-api`): Compare storefront draft against WooCommerce for studio launch decision and merchandise catalog setup testing.\n- **Amazon Seller** (`amazon-seller-api`): List branded studio tote bags, shirts, and warm-up gear after Amanda's Dance Academy launches publicly.\n- **Etsy** (`etsy-api`): Source hand-painted dance-shoe bags, showcase posters, and studio decor from independent artists Amanda likes.\n- **Shippo** (`shippo-api`): Ship studio merchandise orders, showcase ticket packets, and Grandma Ruth's care package returns reliably each month.\n- **FedEx** (`fedex-api`): Track costume-vendor shipments, dance equipment orders, and Grandma Ruth's care packages from Sarasota weekly.\n- **UPS** (`ups-api`): Track costume-vendor shipments, dance equipment orders, and outbound studio merch deliveries each week diligently.\n- **Algolia** (`algolia-api`): Power class catalog search on studio site so students find dance offerings by skill level.\n\n#### Local Errands, Travel & Housing\n- **Google Maps** (`google-maps-api`): Route between hospital, studio, Schuylkill trail access points, and Carol's south Reading apartment daily.\n- **Yelp** (`yelp-api`): Find Reading Thai places, small diners, and travel restaurants when visiting Sarasota or Lancaster trips.\n- **Uber** (`uber-api`): Book late-shift rideshare home when Civic is at the dealer and on rare nights with Jess.\n- **DoorDash** (`doordash-api`): Order post-night-shift comfort food when cooking is too much, bounded by under-$125 default approval rule.\n- **Instacart** (`instacart-api`): Order Sunday-cooking groceries when schedule is tight, deferring to in-person Reading market by default preference.\n- **Airbnb** (`airbnb-api`): Search Lancaster-area stays for Jess's wedding and West Coast dance trip lookups, confirmation always required.\n- **Amadeus** (`amadeus-api`): Compare flights for Sarasota visits to Grandma Ruth and West Coast dance trip planning lookups.\n- **Zillow** (`zillow-api`): Scout Reading commercial listings for Amanda's Dance Academy studio space within walking distance of Wyomissing.\n\n#### Studio Site: Engineering, Analytics, Support & Reliability\n- **GitHub** (`github-api`): Review studio website draft repo where contractor friend builds Amanda's Dance Academy site iteratively each sprint.\n- **GitLab** (`gitlab-api`): Mirror access to studio website repo because contractor pushes to both platforms during ongoing development cycles.\n- **Figma** (`figma-api`): Design studio-site mockups, showcase posters, and Amanda's Dance Academy brand exploration with iterative feedback rounds.\n- **Google Analytics** (`google-analytics-api`): Track Amanda's Dance Academy draft site traffic, class page views, and contact form conversion rates.\n- **Mixpanel** (`mixpanel-api`): Track class-page funnel events on the studio website to optimize registration conversion for new students.\n- **Amplitude** (`amplitude-api`): Analyze student journey across class registration, attendance, and showcase ticketing for Amanda's Dance Academy continuously.\n- **PostHog** (`posthog-api`): Self-host product analytics for studio site features and class signup behaviors with strict privacy controls.\n- **Segment** (`segment-api`): Route analytics events from studio website to chosen platform with consistent student identity tracking continuously.\n- **Zendesk** (`zendesk-api`): Handle studio support tickets from students about classes, payments, and showcase tickets as the roster grows.\n- **Freshdesk** (`freshdesk-api`): Manage alternative studio support ticket queue, comparing routing experience against Zendesk for final platform selection.\n- **Sentry** (`sentry-api`): Monitor errors on draft studio site previews, alerting Amanda when contractor builds throw exceptions during deployment.\n- **Datadog** (`datadog-api`): Monitor studio site uptime, performance metrics, and infrastructure health for Amanda's Dance Academy continuous launch.\n- **PagerDuty** (`pagerduty-api`): Page Amanda on critical studio site outages once Amanda's Dance Academy launches publicly online for students.\n- **Kubernetes** (`kubernetes-api`): Scale studio site cluster pods during showcase ticket releases and live-stream class events with traffic spikes.\n- **Cloudflare** (`cloudflare-api`): Manage DNS and CDN for Amanda's Dance Academy domain with performance optimization for student visitors globally.\n- **Okta** (`okta-api`): Manage identity and admin login for Amanda's Dance Academy site with secure access for instructor staff.\n- **ServiceNow** (`servicenow-api`): Submit IT requests for studio site infrastructure issues and admin tooling support during launch phase operations.\n\n### Boundaries & Off-Limits\n- Laurel Creek hospital systems (EMR, scheduling, payroll, staff messaging) are reserved for hospital workstations.\n- iMessage stays on Amanda's phone for the Webb Family group and the nursing-friends thread.\n- TikTok stays on Amanda's phone at @amanda.dance for personal posting and casual viewing only.\n- Facebook stays on Amanda's phone and laptop for family and Reading community events.\n- Venmo stays on Amanda's phone at @Amanda-Webb for class payments and informal personal transfers.\n- Carlos Mejia's private accounts, Carol's accounts, and any other person's private surfaces stay off-limits.\n\n## MEMORY.md\n\n# Memory: Amanda Webb\n\n## Personal Profile\n\n- Full name: Amanda Webb.\n- Pronouns: she/her.\n- Identity: Straight woman; first in her family to attend college, carries south Reading childhood as both pride and pressure.\n- Ethnicity and background: American with Spanish-language Pe\u00f1a heritage on her mother's side; south Reading, Pennsylvania working-class roots; understands more Spanish than she speaks.\n- Faith: Unfussy Christian faith learned from a working mother; small cross necklace stays on; Grace Community Church attended some weeks and not others.\n- Education: B.S. Nursing, Keystone Valley University, 2014; Emergency Nursing Certification (CEN), 2018.\n- Occupation: Emergency Department RN at Laurel Creek Regional Medical Center since 2014, last five years as senior staff nurse; also dance instructor renting space at Rhythm Dance Studio.\n- Specialization: Emergency nursing at a Level II trauma center; contemporary dance instruction and choreography.\n- Marital status: Single, never married. Most significant recent relationship was Carlos Mejia, two years, ended February 2026, mutual and mostly amicable.\n- Temperament and philosophy: Calm under load, electric on a dance floor, quiet at home; humor as a relief valve; financial independence treated as a moral category; presence with the people who raised her non-negotiable.\n\n## Key Relationships\n\n- **Carol Webb** (mother, 58, DOB March 22, 1968). Housekeeper at Berkshire Motor Lodge, does alterations on the side. Lives in a 2-bedroom apartment in south Reading, fifteen minutes from Amanda. Anchor of Amanda's life. They talk daily, eat together Sundays and most Wednesdays. Carol worries about night shifts and wants Amanda to slow down and find a husband. Amanda adores her and pushes back gently on the traditional expectations. Prefers phone calls, never texts.\n- **Aunt Linda Pena** (maternal aunt, 62). Carol's older sister, lives in Reading, retired factory worker. Helped Carol back on her feet after the divorce. Amanda's source for no-nonsense advice. Family gatherings and holidays.\n- **Uncle Hector Ramos** (uncle by marriage, 64). Linda's husband, retired Reading SEPTA driver. Quiet, kind, carves the turkey at Thanksgiving. Attends Carol's family meals with Linda.\n- **Grandma Ruth Pena** (maternal grandmother, 84). Lives in Sarasota, Florida. Amanda is named after her middle name. They FaceTime every other Sunday at 4:00 PM. Care packages with homemade cookies and hand-knitted items.\n- **Jessica \"Jess\" Reyes** (best friend, 32, DOB July 7, 1994). RN in the ICU at Laurel Creek. Met in nursing school at Keystone Valley. Engaged to Miguel; Amanda is maid of honor at their October wedding. Ride-or-die. The friend who texts \"u up\" at the right hour.\n- **Natalie \"Nat\" Taveras** (dance partner and friend, 29). Assistant instructor at Rhythm Dance Studio. Talented dancer, less reliable with scheduling. Performs with Amanda at showcases and covers Saturday class when Amanda is out. Pushes Amanda toward competing more seriously.\n- **Carlos Mejia** (ex-boyfriend, 35). Firefighter at Reading Fire Station 4. Two-year relationship ended February 2026, mutual and mostly amicable. He wanted to settle down faster. They still text occasionally, but Amanda is cautious about contact.\n- **Denise Calloway** (nurse manager, 47). ER nurse manager at Laurel Creek. Fair, protective of her nurses. Mutual respect with Amanda.\n- **Dr. Thomas Aguilar** (ER attending physician, 40). Works with Amanda often. Professional respect; he has encouraged her FNP path.\n- **Maribel Santos** (dance studio owner, 50). Owns Rhythm Dance Studio where Amanda rents space. Warm, business-savvy. Gives Amanda a favorable rate because the classes bring in students. Trusts Amanda with the after-hours key.\n- **Derek Webb** (cousin, 28). Carol's nephew, moved to Reading from out of state two years ago. Amanda helped him settle in. Warehouse work. Comes to family dinners.\n- **Dr. Patricia Delgado** (primary care physician). Reading Community Health Center. Annual checkup provider.\n- **Luna** (cat, 4). Tabby. Sleeps on Amanda's pillow. Named after a TV character. Functionally an emotional support animal even if not formally.\n\n## Work & Projects\n\n- **Laurel Creek Regional Medical Center, Emergency Department RN**. Twelve years in the ER since 2014, the last five as a senior staff nurse. Three 12-hour shifts per week on a rotating day/night schedule. Level II trauma center, about 180 patients per day. Credentials: BSN (Keystone Valley, 2014), CEN (2018), ACLS, PALS, TNCC.\n- **Rhythm Dance Studio, Dance Instructor**. Rents space from Maribel Santos. Standing classes: Monday 7:00 to 8:00 PM (Beginner), Wednesday 7:00 to 8:30 PM (Intermediate), Thursday 8:00 to 9:30 PM (Contemporary Fusion), Saturday 11:00 AM to 12:30 PM (Open). Forty to fifty regular students across the four classes. Nat assists Thursday and Saturday.\n- **Amanda's Dance Academy** (planned). The studio she intends to open within two to three years. Capital target $25,000 to $30,000. Business plan outlined in February 2026, location comparison spreadsheet started in January 2026, three candidate spaces scoped, two within walking distance of Wyomissing.\n- **Continuing education**. Possible FNP master's under consideration but not committed. CEN recertification due March 2027.\n- **Grants and small-business research**. Five women-entrepreneur grant programs identified, deadlines stretching through 2027.\n\n## Finance\n\n- **Monthly income (approximate)**: ER nursing $5,200 after taxes (includes shift differentials). Dance classes $1,200 to $1,600 depending on attendance. Performance fees $100 to $200 when they happen. Total around $6,500 to $7,000.\n- **Monthly expenses (approximate)**: Rent (Wyomissing 1-bedroom) $1,150. Studio rental to Maribel $500. Honda Civic payment $320. Car insurance $140. Groceries $350. Employer health insurance $120. Keystone Valley student loan $280. Utilities and internet $160. Streaming $30. Phone plan $75. Gym $45. Helping Carol $200 informal. Dance studio savings $400. Miscellaneous/personal savings $300 to $500.\n- **Savings**: about $12,000 toward the dance studio dream, $6,500 in a general emergency fund.\n- **Debt**: Keystone Valley student loans, roughly three years remaining.\n- **Notes**: Disciplined budgeting. The studio capital is the structuring financial goal. Researching small business loans and women-entrepreneur grants. The 2 AM Amazon weakness exists and is bounded.\n\n## Health & Wellness\n\n- **Primary care**: Dr. Patricia Delgado at Reading Community Health Center. Annual checkups. Last visit normal.\n- **Fitness**: Three runs per week along the Schuylkill River Trail, three to four miles. Yoga via online classes on rest days. Combination of ER hustle and dance keeps her in strong condition.\n- **Sleep**: Chronic disruption from rotating day/night shifts is her largest health issue. Blackout curtains, melatonin, and a strict pre-sleep routine on night blocks.\n- **Medications/supplements**: Daily multivitamin and vitamin D.\n- **Mental health**: Occasional anxiety managed with journaling, running, and breathing techniques from a hospital wellness workshop. Therapy considered, not yet started.\n- **Injuries**: Right ankle sprained at a dance showcase in 2024, fully healed. Cautious with high-impact choreography.\n- **Emotional load**: Pediatric ER cases stay with her. Journaling and Jess are her primary outlets.\n- **Immunizations**: Annual flu shot and all hospital-required immunizations current.\n- **Dietary**: No medical restrictions. Coffee non-negotiable, alcohol minimal and never before shifts.\n\n## Interests & Hobbies\n\n- **Contemporary dance and instruction**: The center of her life outside nursing. Started at 15 in community events, formal training in her 20s, now teaches three to four classes a week and choreographs her own pieces. Performs at showcases and the occasional festival.\n- **Jazz and hip-hop**: Social dancing at studios and community events. Does not teach these.\n- **Running**: Maintenance, three times a week, the same Schuylkill trail. Familiarity is the point.\n- **Yoga**: Off-day movement, online classes only. She will not pay for a studio.\n- **Cooking**: Her mother's tradition. Chicken pot pie, beef stew, mac and cheese, casseroles, brownies. Sundays at Carol's are sacred.\n- **Music curation**: Builds playlists by BPM and emotional arc for class, run, cooking, and post-shift wind-down. Deep knowledge of contemporary dance music.\n- **Journaling**: Processes hard shifts. Private, not shared.\n- **Streaming**: Drama series, true crime docuseries, occasional rom-coms and reality dating shows for guilty-pleasure decompression.\n\n## Home & Living\n\n- **Residence**: 1-bedroom second-floor apartment in Wyomissing, a quieter suburb of Reading. Small but warm. String lights, dance posters and showcase programs framed, fridge photos of Carol, Luna, and students. Small functional kitchen with the counter always clear. Luna's cat tree by the living room window.\n- **Vehicle**: 2021 Honda Civic, silver. Unnamed, deliberately. Hospital, studio, and Carol's place are its job description.\n- **Neighborhood**: Wyomissing chosen for safety and Schuylkill trail proximity. She misses the south Reading energy and visits Carol's neighborhood often.\n- **Atmosphere**: Coffee, whatever is cooking, music from the Echo Dot. Dance shoes by the door. Framed photo of Grandma Ruth beside a small cross on the shelf.\n\n## Devices & Services\n\n- **Phone**: iPhone 14 Pro with a bright coral case. Always on her, vibrate during shifts.\n- **Laptop**: HP Pavilion. Dance planning, budgeting, continuing-education modules, streaming.\n- **Earbuds**: AirPods Pro. Worn during runs, cooking, journaling, and most transit.\n- **Smart speaker**: Amazon Echo Dot in the kitchen for music and timers.\n- **Doorbell**: Ring video doorbell at the Wyomissing apartment for Amazon deliveries and late-shift arrivals.\n- **Wearable**: None currently.\n- **Key personal apps installed**: Google Workspace, iMessage, Instagram, Spotify, Venmo, TikTok, Facebook, banking apps.\n\n## Contacts\n\n| Name | Relationship | Phone | Email |\n|---|---|---|---|\n| Carol Webb | Mother | (610) 555-2847 | (none) |\n| Aunt Linda Pena | Aunt | (610) 555-6103 | (none) |\n| Grandma Ruth Pena | Grandmother (FL) | (941) 555-4428 | (none) |\n| Jessica Reyes | Best friend | (610) 555-3915 | jessica.reyes@gmail.com |\n| Natalie Taveras | Dance partner | (610) 555-7782 | natalie.taveras@gmail.com |\n| Carlos Mejia | Ex-boyfriend | (610) 555-8206 | carlos.mejia@gmail.com |\n| Denise Calloway | Nurse manager | (610) 555-1493 | denise.calloway@gmail.com |\n| Dr. Thomas Aguilar | ER physician | (610) 555-5270 | thomas.aguilar@gmail.com |\n| Maribel Santos | Studio owner | (610) 555-4031 | maribel.santos@gmail.com |\n| Derek Webb | Cousin | (610) 555-9654 | (none) |\n| Dr. Patricia Delgado | Primary care | (610) 555-0817 | patricia.delgado@gmail.com |\n\n- **Mailing**: Amanda's apartment, Wyomissing, PA (street address on file).\n- **Carol's address**: south Reading apartment, PA (full address on file).\n\n## Connected Accounts\n\n- **Primary email**: amanda.webb@Finthesiss.ai. Connected Gmail, Google Calendar, Google Drive, Google Contacts.\n- **Google Calendar**: ER shift schedule, dance class times, family events, personal appointments.\n- **Google Drive**: Dance studio business documents (budget, rosters, choreography notes), CEU tracking, personal budget spreadsheets.\n- **Instagram**: @dance.amanda, around 4,200 followers, dance-focused.\n- **TikTok**: @amanda.dance, occasional dance clips, light posting.\n- **Facebook**: Family and Reading community use only.\n- **Spotify**: Premium. Dance class, running, cooking, and wind-down playlists.\n- **Venmo**: @Amanda-Webb. Dance class payments and informal transfers.\n- **Banking**: First Keystone checking and savings. Dance studio savings line. Mobile-only access.\n\n## Preferences\n\n- **Music taste**: Contemporary dance, pop, R&B, hip-hop. Taylor Swift, Dua Lipa, Lizzo, SZA, Beyonce in personal rotation. Indie and acoustic for yoga and cool-downs.\n- **Reading**: Light. Memoirs by women and self-help or business books tied to the studio dream. Currently \"Build Your Stage\" by Carolyn Vega.\n- **TV and film**: Drama series (Grey's Anatomy reruns), true crime, rom-coms, reality dating shows for guilty pleasure.\n- **Shopping**: Zara, H&M, and thrift stores for everyday. Capezio for dance shoes, no compromise there. Late-night Amazon weakness, bounded.\n- **Food and drink**: Home cooking by default. Comfort food after hard shifts: meatloaf, mashed potatoes, roasted chicken, casseroles. Eats clean when intentional. Strong black coffee, multiple times a day, Carol's coffee as the standard. Weakness for good Thai. Wine or craft beer occasionally, never before shifts.\n- **Aesthetic**: String lights, dance posters, photographs of people she loves. Wardrobe is scrubs and the rest, with athleisure that doubles as going-out and thrifted jeans that fit. Leather jacket rewaxed twice.\n- **Travel**: Light packer, plays packed, dance outfit in the bag. Cheap stay near the action over nice stay far from it. Sarasota for Grandma Ruth is the route she knows. Dream trip is three to four weeks on the West Coast watching choreographers.\n- **Gifts**: Gives baked goods and personalized playlists. Receives candles, dance-related items, Amazon wishlist items well.\n- **Sensory world**: Loves the smell of coffee before 5:00 AM, her mother's kitchen, betadine and wood-rosin as twin \"home\" cues, the sound of forty pairs of feet hitting a beat. Strong aversion to fluorescent light outside the hospital, loud perfume, restaurants playing music two notches too loud.\n- **Pet peeves**: People who treat dance as \"just a hobby,\" hospital visitors who take fear out on nursing staff, the phrase \"you must be tired,\" group texts that did not need to be group texts.\n\n## Silent Replies\nWhen you have nothing to say, respond with ONLY: %%SILENT%%\n