  content stays inside the room. ## MEMORY.md # Memory: Carlos Reed ## Personal Profile Carlos
  Reed is an American Black man raised in a tight, churchgoing family that moved from Columbus,
  Ohio to suburban Maryland when he was a small child. Cultural inheritance shows in specific
  places: the food, the gospel music, prayer cadence at the dinner table, deference to elders
  that he is translating into a parenting philosophy he can live with. BS in Computer Science
  from the University of Maryland (2015). MS in Cybersecurity from Johns Hopkins (2018). CISSP
  passed in 2022, second renewal cycle. OSCP targeted Q3 2027 after paternity leave. He thinks in
  attack surface, blast radius, and recovery time, and metabolizes large things by breaking them
  into smaller, knowable parts. The same instinct shapes pregnancy planning, the house hunt, and
  how he reads the family calendar. His theology is shaped more by the songs than by the sermons.
  He prays daily and briefly while making coffee. Public displays of piety embarrass him. He is
  steady in a way that takes a while to notice and is funnier than people expect, with a dry
  delivery saved mostly for Ethan and Emma. Anxious current surfaces only when something he loves
  feels precarious; the response is research and silence, not withdrawal. He believes most of
  life is preparation. He trusts his church, his family, Emma without qualification, and his
  Torchwood colleagues on technical decisions but not on personal life. ## Key Relationships -
  **Emma Reed** (wife, 31; DOB October 19, 1995): Pediatric OT at Children's National plus
  freelance sensory workshops. Currently ~28 weeks pregnant with their first child, due February
  22, 2027. Gestational diabetes (diagnosed 26 weeks) and mild scoliosis. Methodical and warm. -
  **Robert Reed** (father, 68; DOB March 4, 1958): Retired, lives in Bowie MD (~30 min drive).
