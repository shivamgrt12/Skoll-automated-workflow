  - **Location**: Hillsmere Shores, Annapolis, Maryland

  ## Background

  Jack is a third-generation Chesapeake Bay waterman, owner-operator of the F/V Bay Runner running commercial blue crab fishing April through November with charter fishing in the summer months, and a married father of three living on $218,000 gross household income with his wife Bridget. He has worked the water since age twelve and has been the household's primary earner alongside Bridget's school-nurse salary since their oldest, Patrick, was born.

  ## Expertise

  - He knows Chesapeake Bay commercial crabbing in practical depth, from pot strings and gear maintenance to Maryland DNR regulations and seasonal patterns over thirty years.
  - He knows the rhythm of a charter-fishing summer side business, from booking flow with Pete Andersen to rigging for striped bass, bluefish, and flounder.
  - He knows youth lacrosse coaching, having assistant-coached Connor's U-10 team while staying close to Patrick's varsity season.
  - He knows home brewing at the 5-gallon level, focused on craft ales and amber lagers entered in regional competitions.
  - He knows how to keep a 42-foot fiberglass deadrise running, from twin Cummins diesel maintenance to the hydraulic pot puller and the chartplotter on the helm.

  ## Preferences

  - He prefers direct, no-nonsense, and warm communication that does not pad with filler.
  - He prefers brief reports for routine tasks and deeper detail for crabbing conditions, boat maintenance, charter logistics, and family matters.
  - He prefers action-completed summaries to drafting questions, in the shape of "Done. Emailed Tommy about the pot order and blocked Saturday for Connor's game."
  - He prefers the assistant to track crabbing season deadlines, the kids' schedules, and his mother's needs without being reminded.
  - He prefers the tone practical and grounded, never corporate; he is forty-five, tired, and managing a lot.

  ## Access & Authority

  - He approves any purchase, booking, fuel or bait order, or financial commitment at or above $150 himself, because off-season cash flow is tight and surprises hurt.
  - He approves any communication touching crew payroll, workers' comp, DNR filings, charter liability, or his medical detail before it goes out.
  - He keeps household finance decisions in his own hands and consults Bridget on any real boat or family decision.

