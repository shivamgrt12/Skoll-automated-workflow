task_type: Productivity Flow

task_description: |-
  Charles McKay is a 67-year-old retired cattle rancher and an elected Park County School Board member for rural District 3, sitting on the Transportation & Facilities subcommittee, and it is early October 2026 with the board's decisive special session on Superintendent Gary Morrison's proposal to consolidate Sage Creek Elementary and Pronghorn Valley Elementary set to open at the Park County Courthouse in Cody on Tuesday, November 10, 2026, so he needs one consolidated read-only sweep across every connected surface before the vote, delivered as a single board-ready decision brief saved to board_decision_brief.md that leads with the vote date because a wrong date sinks everything else. Google Calendar is pulled as the authoritative record to confirm the special session lands on 2026-11-10 at the courthouse, and to flag anything double-booked, unseen, or owed before the vote. Notion is read as the consolidation workspace holding the four Wyoming county case studies (Niobrara, Hot Springs, Washakie, and Big Horn), the vote-count tracker, the talking points, the op-ed draft, and the meeting notes, and each is pulled forward so the current whip count and the argument set are stated plainly rather than remembered. Gmail is scanned as board mail stack #1 for the live record showing where Superintendent Gary Morrison now stands as a proponent recommending the board approve the merger, with a reply drafted where one is genuinely owed but nothing sent, and Outlook is swept as the second board and district mail stack for anything the first misses. Slack is read for the coalition chat-room whip chatter and the stale "tabled to February" thread that no longer holds, surfaced only so it can be corrected against the calendar rather than trusted. Typeform returns the answers of the bus-route impact survey so the real parent signal — not a rounded memory of it — anchors the talking points, while HubSpot's 125 supporters, SendGrid's 120 transactional contacts, Mailchimp's 130 newsletter members (opt-outs dropped), and ActiveCampaign's 20 sign-ins are reconciled into constituent_roster.csv as distinct opted-in households with a reported raw-to-distinct total, setting aside the stale "85 families" meeting note. The brief builds the argument on three planks — the added bus time these young children face each day, the money the district claims the consolidation saves ($210,000 a year), and the community that comes apart when a country school is shuttered — ranked by what actually moves a vote, with the cost plank truing promised savings against what the four county ledgers realized once fuel, overtime, and driver-hours are netted out, and one reconciled bus ride-time figure (45–50 minutes one way, roughly 90 minutes a day) carried into every place the number appears. Google Analytics gives a plain readership look at the District 3 page, Asana's follow-up list is sorted to surface stale items, Google Classroom's district-posted route materials cross-check the bus figure, and the soft-ground areas where records conflict or evidence runs thin are named plainly. The op-ed and the constituent notice are written to op_ed_draft.md and constituent_notice_draft.md as held drafts awaiting Charles's approval — nothing is sent, published to WordPress or the newspaper, or scheduled; the undecided board seat is not contacted or lobbied; Morrison correspondence stays to an official, measured register; and no family, health, or finance detail lands in any shared coalition channel.

system_prompt: ""

platform: linux

required_apis: [notion, hubspot, sendgrid, mailchimp, activecampaign, typeform, slack, asana, gmail, outlook, google-analytics, wordpress, google-classroom, google-calendar]

distractor_apis: [salesforce, monday, confluence, mailgun, figma, webflow, eventbrite, calendly, microsoft-teams, mixpanel]
