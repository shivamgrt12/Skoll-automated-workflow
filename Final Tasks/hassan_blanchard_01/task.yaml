  ## Preferences

  - **Music**: Lo-fi hip-hop for studying, Atlanta rap (21 Savage, JID, EarthGang) for energy, gospel on Sundays out of habit, and a quiet fondness for the 90s R&B he inherited from his mom.
  - **Entertainment**: Documentaries, anime via Marcus (Attack on Titan and Vinland Saga are the favorites), YouTube cooking channels, and Hawks games.
  - **Food and drink**: Cooks healthier Southern comfort food: baked chicken, turkey bacon in the greens, brown rice. Mostly avoids fast food, but Chick-fil-A is the weakness and Waffle House is for bad days. Keeps a small dorm spice collection. Coffee black, sometimes with sugar, and the habit is growing. Skips breakfast when running late to 8 AM classes.
  - **Shopping**: Amazon for basics, Aldi and Walmart for groceries. Brand-loyal only where he has researched: Nike sneakers, CeraVe, the refurbished-store MacBook. Everything else gets bought on "good enough and cheap." Tracks every dollar.
  - **Gifts**: Small and specific: budget-exact Mother's Day flowers, the candy Mabel liked when she was younger, a dollar-store dinosaur for his little cousin. The noticing is the gift.
  - **Social media**: Instagram to scroll but rarely post, Twitter for news and NBA takes, TikTok for cooking videos and study tips. No Facebook.
  - **Study environment**: Library, late night, noise-canceling headphones on. He needs quiet to focus.
  - **Comfort and decompression**: The late-night library or dorm kitchen when pressure builds; a call to Mabel when the comfort needed is gentler; a long campus walk with lo-fi or Atlanta rap when the weight is heavier. Her oxtail stew after church is the comfort food he keeps chasing.
  - **Sensory world**: He notices sound first in any space. He loves the smell of garlic and bay leaf simmering at midnight and the specific smell of Mabel's house; he cannot stand fluorescent buzz in hallways, synthetic cleaner smell in the dining hall on Saturday mornings, or the dorm's cheap polyester sheets. The after-midnight quiet is the sensory hour he most wants to keep.
  - **Travel**: Barely traveled; one flight, the high school orchestra trip to Washington D.C., and he remembers everything about it. Wants to see New Orleans and drive across the South with Jamal someday. Flies cheap and rarely, with lingering check-in anxiety. Fully fluent in MARTA-and-bus Atlanta.
  - **Pet peeves**: Group projects where his careful effort gets treated as a free ride, 7 AM fluorescent hallways, and the Saturday morning dining hall plating.

