  ## MEMORY.md

  # Memory: James Hoffman

  ## Personal Profile

  James Hoffman is an American man, ethnically and culturally rooted in the working-class agricultural world of the Yakima Valley. He grew up around farms and built his own certified organic operation on 12 acres of leased land, and the dirt under his nails is a point of pride. He completed an AAS in Agricultural Science from Yakima Valley Technical College in 2002, started Hoffman Organics in 2007 on Bridwell-family ground, and earned the farm's USDA Organic Certification in 2019, renewed annually since.

  There is a particular calm that comes from twenty years of watching things grow, fail, and grow again. His optimism is structural, not naive: he plants again every spring because the alternative is not planting, and that is not a real alternative. He runs hot about his family and cool about almost everything else. A crop failure gets a shrug and a revised plan, but a comment about his parenting or Catherine's stress gets a sharper response than people expect.

  His Appalachian musical heritage, brought west two generations ago, lives in the band, in the hymns at Grace Lutheran, and in the way he teaches Ryan guitar. His faith is woven through but not displayed: church on Sundays, prayer before planting season, grace before meals. His late father Arthur's memory lives in the same space as that faith, and he does not distinguish between honoring one and practicing the other. He believes in honest work, honest food, and honest relationships.

  ## Key Relationships

  - **Catherine Hoffman**, wife, 40, born March 22, 1986, elementary school teacher at Ridgeview Elementary; married James June 14, 2008. She handles family finances and the kids' school logistics, steady and organized where James is spontaneous. She watches the calendar so he does not book himself into exhaustion.
  - **Emily Hoffman**, daughter, 15, born December 8, 2010, sophomore at Ridgeview High School. Honor roll, varsity volleyball, wants to study environmental science, helps on the farm reluctantly, currently in a vegetarian phase.
  - **Ryan Hoffman**, son, 12, born March 4, 2014, 7th grade at Cascade Valley Middle School. Plays travel soccer, learning guitar from James, starting to sit in with the band at rehearsals.
  - **Lily Hoffman**, daughter, 6 1st grade at Ridgeview Elementary. Loves animals and the farm, follows James everywhere, has her own row of sunflowers, picky about textures.
  - **Margaret Hoffman**, mother, 70 lives in Yakima (moved from Spokane in 2015 after her husband Arthur passed in May of that year). Devout Lutheran, helps with childcare, has rheumatoid arthritis managed with Methotrexate.
  - **Mark Hoffman**, older brother, 47, born December 14, 1978, runs an auto shop in Spokane, Tyler's father. He and James talk monthly and gather at Margaret's for the holidays.
  - **Dan Fletcher**, best friend, 45 owns Fletcher Landscaping in Yakima. Godfather to Ryan, fishing and soccer buddy.
  - **Kevin \"Sully\" Sullivan**, band co-founder, 47, fiddle player who works at a Yakima auto shop. Has played with James for 15 years.
  - **Linda Carter**, restaurant buyer, 52, owner of The Harvest Table in Yakima. Buys James's produce weekly.
  - **Tom Bridwell**, farmers market manager, 58, manages the Yakima Saturday Market and is James's primary market contact. His family leases the farmland to James.
  - **Pastor David Reynolds**, pastor at Grace Lutheran Church, baptized all three children.
  - **Dr. Robert Graves**, primary care physician at Yakima Valley Community Health, treats both James and Margaret.
  - **Dr. Karen Ishida**, Margaret's rheumatologist.
  - **Tyler Hoffman**, nephew (Mark's son), 19, part-time year-round farm helper and the band's dobro player.
  - **George and Carol Navarro**, in-laws (Catherine's parents), live in Portland.

  ## Work & Projects

  James owns and operates Hoffman Organics, a 12-acre certified organic farm leased from the Bridwell family for $1,800 per month, three miles outside Yakima. It has been USDA Certified Organic since 2019, with the annual inspection completed February 2026 and the next due February 2027. Crops include heirloom and roma tomatoes, peppers, tomatillos, summer squash, zucchini, and herbs, plus a two-acre stone fruit orchard of peaches and cherries. The growing season runs March (greenhouse starts) through October (last harvest).

  Sales channels: the Yakima Saturday Market (April through October, booth #14, the largest revenue source), the Ellensburg Wednesday Market (May through September), the Sunnyside Market (June through August, biweekly, new for 2026), The Harvest Table restaurant (weekly delivery, about $400/week), Cascadia Farm Table in Ellensburg (biweekly, about $250/delivery), and a CSA program of 35 household shares at $500/season with Saturday farm pickup. Employees are two full-time seasonal workers (April through October), Jake Ruiz and Tomas Perez, plus part-time year-round help from nephew Tyler Hoffman. Gross revenue runs about $165,000/year with net take-home around $72,000. Current concerns: a water rights dispute with a neighboring commercial farm, replacing the greenhouse plastic before next spring, and expanding the cherry orchard by 0.5 acres.

  He also leads The Yakima Valley Ramblers, a seven-piece bluegrass band: James on upright bass and vocals, Sully Sullivan on fiddle, Mike Torres on banjo, Chris Davis on mandolin, Amy Castillo on fiddle and vocals, Jesse Morales on guitar, and Tyler Hoffman on dobro. They play three to four gigs a month (barn dances, weddings, festivals) at rates of $800 to $1,500 per gig, with James's annual share around $17,000. Rehearsals are Wednesday 7:00 to 9:00 PM in his barn. The band van is a 2008 Ford E-350 that needs brakes (about $600).

  ## Finance

  - **Income**: farm net about $72,000/year (good year $85K, bad year $55K); band about $17,000/year; Catherine $52,000/year; combined about $141,000/year.
  - **Housing and land**: mortgage $1,650/month at 4.25% fixed, 22 years remaining, on a 3-bed ranch on a half-acre in West Yakima; farmland lease $1,800/month to the Bridwell family.
  - **Monthly expenses**: mortgage $1,650, farm lease $1,800, amortized farm operating costs about $2,200, groceries $700 (supplemented by farm produce), utilities $260, Catherine's van payment $380, truck insurance and gas $350, kids' activities $300, church tithe $400, phone and internet $140, Margaret's medication copays about $120, band expenses about $100, miscellaneous $200.
  - **Savings**: about $28,000 in a Herongate Partners high-yield savings account at 3.8% APY.
  - **Retirement**: Catherine's 403(b) through the school district at $45,000; James has a Roth IRA at $18,000, contributing $200/month when cash flow allows.
  - **Insurance**: $200,000 term life each for James and Catherine through her school district benefits.
  - **Debt**: $12,000 remaining on the John Deere tractor loan (0% through dealer, 18 months left).
  - **Emergency fund**: goal of six months of expenses (about $45K); currently at about 3.7 months.
  - **Taxes**: prepared by Karen Estrada, CPA, in Yakima; 2025 farm and personal returns filed on time.
  - **College**: Catherine is leading research on 529 plans and scholarships for Emily.

  ## Health & Wellness

  - **Lower back pain**: chronic from farming; ibuprofen 400mg as needed (3 to 4 days/week in season); physical therapy recommended but not started.
  - **Skin cancer awareness**: annual skin check with Dr. Graves, SPF 50 and a wide-brimmed hat daily; last check February 2026, all clear.
  - **Cholesterol**: borderline high LDL (148 mg/dL), addressing with diet before medication; Catherine adding more fish.
  - **Dental**: Dr. Lena Park in Yakima, next cleaning due October 2026.
  - **Annual physical**: completed February 2026 with Dr. Graves, next due February 2027.
  - **Sleep**: 9:30 PM to 4:30 AM in growing season, 10:00 PM to 6:00 AM in winter.
  - **Margaret (mother)**: rheumatoid arthritis on Methotrexate 15mg weekly plus folic acid; hypertension on Amlodipine 5mg; rheumatologist Dr. Karen Ishida.

  ## Interests & Hobbies

  - **Bluegrass music**: plays upright bass and sings, leads The Yakima Valley Ramblers, performs three to four gigs a month. The music and the farming are tangled together for him, both practices more than products.
  - **Organic farming and soil science**: experiments with cover crops, companion planting, and natural pest management; attends agricultural extension workshops at the WSU Yakima office.
  - **Cooking**: weekend territory by mutual agreement, with the smoker and the pie crust his domain. Makes his own barbecue sauces (apple-smoked is his signature) and smokes brisket on a twelve-hour process.
  - **Woodworking**: builds raised beds, farm structures, and the family's dining table in the small barn shop.
  - **Fishing**: steelhead on the Yakima River, two to three times in fall and winter, usually with Dan.
  - **Soccer**: plays in the Yakima Valley adult league on Sunday mornings and coaches Lily's peewee team in fall.

  ## Home & Living

  - A 3-bedroom ranch on a half-acre in West Yakima, 1,600 square feet, built 1978.
  - Backyard: Margaret's herb garden, Lily's sunflower row, and a small chicken coop with six hens.
  - Barn and workshop: band rehearsal space, woodworking shop, and farm tool storage, with string lights for band nights.
  - Kitchen: Catherine's weekday domain, James's on weekends; large cast iron Dutch oven, smoker, and cast iron throughout.
  - Needs work: the roof has about five years left, the back porch is sagging, and the barn door needs replacing (about $400).
  - Living room: family photo wall and a fireplace mantel with Arthur's flag case, maintained by Margaret.

  ## Devices & Services

  - iPhone 13 and a Chromebook used for farm records, email, and market coordination.
  - Ford F-250 (2018) farm truck, 140K miles, dusty and dented but reliable, which James will not trade.
  - Honda Odyssey (2021), Catherine's van and the family vehicle.
  - A basic weather station on the farm alongside the Weather Underground app, both checked by James directly.
  - A John Deere 3025E compact tractor and a drip irrigation system installed in 2023.
  - Ring doorbell and Nest thermostat at the house.

