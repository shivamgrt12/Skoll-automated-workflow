  ## Preferences

  - **Food and drink**: hearty American farmhouse cooking, most vegetables from his own fields, trades produce with neighbors for eggs and honey. Dark roast drip coffee before dawn, local craft beer on weekends, Woodford Reserve bourbon for special occasions.
  - **Family meals**: Catherine cooks weeknights (casseroles, roasted chicken, pasta, grilled fish); Margaret bakes fresh bread every other day; James handles the weekend smoker and the pies.
  - **News and reading**: Yakima Herald-Republic and NPR, weather obsessively in growing season; farming publications like Growing for Market and the occasional Wendell Berry or John Steinbeck novel.
  - **Music and TV**: bluegrass (Earl Scruggs, Bill Monroe), folk and Americana; Washington State college football, cooking shows, and nature documentaries.
  - **Clothing**: Carhartt and boots on the farm, flannel and jeans in town, and the full stage outfit of pearl snaps, good boots, and the hat for performances.
  - **Spending**: buys what is needed when it is needed, researches tools and seed for weeks before committing, and is reflexively generous with farm surplus rather than with manufactured goods.
  - **Comfort**: the quiet barn after everyone has gone home, the porch on a Saturday after market, and walking the rows on a Sunday afternoon.

