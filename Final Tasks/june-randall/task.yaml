  # Memory: June Marie Randall

  ## Personal Profile

  June Marie Randall is an American woman born and raised in Richmond, Virginia, who has built her adult life in Baltimore, Maryland, since moving there in 2002. She holds a BSc in Nursing from Cresthaven University (Richmond, VA, 1998) and an MSN as a Family Nurse Practitioner from Mapleton University (Baltimore, 2008). She is methodist in faith, Sunday-morning-without-exception Methodist. Her faith is structural, not decorative: it shapes how she treats patients, parents her children, handles loss, and makes decisions. She prays before difficult conversations. She tithes. She serves. She married Samuel Randall in 1999 and they have been together for twenty-seven years. English is her only language, spoken at a fluent professional level. Her personality is defined by a combination of calm authority, deep loyalty, and a fatigue she does not complain about because she considers complaints a luxury.

  ## Key Relationships

  1. **Samuel Randall** (Husband, 53): Electrical engineer at Crestfield Power Systems. Steady, pragmatic, defers to June on household decisions but holds firm on finances. Their partnership is built on shared faith and shared sacrifice. He is quieter than June but his opinion carries equal weight. He has been pushing for a vacation alone together for the first time in years.

  2. **Lauren "Laurie" Randall** (Daughter, 24): BFA in Studio Art from Ridgewater University (2024). Lives in Chicago, freelancing as a graphic designer and illustrator. June is proud of her talent but anxious about her financial stability. Lauren is independent, somewhat defensive about her career choices, and communicates with June in careful doses. Their relationship is loving but tense around the topic of next steps. Lauren recently secured a freelance branding contract with a startup (confirmed February 2026).

  3. **Marcus Randall** (Son, 20): Pre-med sophomore at Ridgewater University. Studious, focused, and the child June trusts most to be on track. He calls every Sunday after church. June worries he is too serious and does not have enough fun, which is an irony she recognizes.

  4. **Brianna "Bri" Randall** (Daughter, 16): Junior at Westbrook Academy, Baltimore. Headstrong, social, testing every boundary June sets. Interested in debate team and social media. June and Brianna clash regularly about phone time, curfews, and choices. June sees herself in Brianna's stubbornness and is trying, with mixed results, to be less controlling.

  5. **Dorothy Mitchell** (Mother, 78): Lives in Richmond, VA with June's younger sister Karen. Has diabetes and hypertension managed by local doctors. June calls every Wednesday and Saturday. Sends $300 monthly. June is considering having her move to Baltimore for an extended stay but the logistics are daunting.

  6. **Karen Mitchell** (Sister, 45): Lives in Richmond, VA, near their mother. Schoolteacher. She and June are close despite the distance. Karen is the on-the-ground point of contact for Dorothy's health and day-to-day situation. They text daily.

  7. **Samuel Randall Sr.** (Father-in-law, 79): Lives in Silver Spring, MD with his second wife. Samuel visits monthly. June has a respectful but not close relationship with him.

  8. **Pastor David Holloway** (Church, ~60): Senior pastor at New Covenant Methodist Church, Baltimore. June has attended since 2006. He is a trusted spiritual advisor she sometimes calls for counsel on family matters.

  9. **Loretta Simms** (Church Committee, 55): Co-chair of the hospitality committee with June. Reliable, organized, a solid working relationship. They coordinate all major events together.

  10. **Dr. Priscilla Hartwell** (Clinic Director, 58): June's supervisor at Community Care Health Center. Supportive of June's clinical expertise and community connections. They have worked together for eleven years.

  11. **Raymond Watts** (Colleague, 42): Registered nurse at Community Care. He and June share a patient load and have an efficient, friendly working relationship. He covers for her when she takes time off.

  ## Work & Projects

  - **Title**: Family Nurse Practitioner (FNP-BC)
  - **Employer**: Community Care Health Center, Baltimore
  - **Work address**: Park Heights neighborhood, Baltimore
  - **Hours**: Monday through Friday, 8:00 AM to 5:00 PM. One Saturday morning walk-in clinic shift per month (8:00 AM to 12:00 PM).
  - **Patient load**: 18 to 22 patients per day. Primarily adult primary care, chronic disease management, and women's health.
  - **Supervisor**: Dr. Priscilla Hartwell (Clinic Director)
  - **Mission**: Community Care serves a predominantly low-income neighborhood in Baltimore. June takes this mission personally and advocates for patients within systems that frequently fail them.
  - **License renewal**: Maryland NP license renewal due October 31, 2026. Needs 30 CEU hours total; has completed 18 as of March 2026. Enrolled in one online chronic disease management course in February 2026 after researching options. Still needs 12 hours.
  - **Career stance**: Content at her current level. Not seeking promotion. She wants to remain in direct patient care. She precepts NP students once a year.
  - **Work stress**: Manageable but chronic. Insurance denials, understaffing, and patient no-shows weigh on her. She handles it but carries some of it home.

  ## Finance

  - **Combined household income**: approximately $195,000 per year. June salary: $105,000 per year (approximately $6,200 per month take-home). Samuel salary: $90,000 per year (approximately $5,500 per month take-home).
  - **Monthly fixed expenses**: Mortgage $1,800; property tax escrow $380; homeowner's insurance $150; utilities $320; groceries $900; car insurance two cars $240; gas $180; Samuel's car payment (2023 Toyota Camry) $350; church tithe $975; money to Dorothy $300; Brianna's Westbrook Academy fees $800; Marcus's college contribution $500; streaming $30; dining out $200; clothing and personal $150; miscellaneous $250. Total fixed approximately $7,525.
  - **Combined take-home**: approximately $11,700 per month. Monthly savings approximately $4,175 across categories.
  - **Savings breakdown**: Emergency fund $800 per month (balance $32,000 in Fidelity HYSA). June 403(b) pre-tax contribution at 6% of gross salary: $525 per month (balance $185,000; employer adds 3% match). Samuel 401(k) pre-tax contribution estimated 10% of gross salary: $750 per month (balance $160,000). Lauren support fund $300 per month. Brianna 529 plan $400 per month (balance $28,000). Vacation fund $200 per month (balance $2,400). Home maintenance fund $300 per month (balance $5,200). Combined life and disability insurance premiums: $300 per month. Joint taxable investment account (Fidelity): $600 per month. Total: approximately $4,175 per month.
  - **Debt**: Mortgage $142,000 remaining. Samuel's car loan approximately $12,000 remaining. No credit card debt. June pays credit cards in full monthly.
  - **Financial style**: Disciplined and values-driven. Tithe is non-negotiable. Supporting Dorothy and Lauren is non-negotiable. Everything else is planned and tracked in a spreadsheet Samuel maintains.

  ## Health & Wellness

  - **General health**: Good for her age. Manages stress through faith and community, though she does not always acknowledge when she is overextended.
  - **Primary care**: Dr. Yolanda Banks at Chesapeake Internal Medicine. Annual physical in March; last one March 2026, all clear.
  - **Blood pressure**: Borderline (130/85). Dr. Banks is monitoring. June has reduced sodium; stress reduction remains a work in progress.
  - **Knees**: Mild osteoarthritis in both knees. Manages with occasional ibuprofen and a morning stretching routine. Stairs are becoming uncomfortable.
  - **Mental health**: No formal therapy. Processes through prayer, sporadic journaling, and conversations with Pastor David. Samuel has gently suggested professional support for the stress load. She is considering it.
  - **Sleep**: 10:30 PM to 5:30 AM. Early riser. Sleeps well most nights but wakes occasionally thinking about Dorothy or Lauren.
  - **Exercise**: 30-minute morning walk most days before work. Occasional yoga DVD at home. Nothing structured beyond that.
  - **Medications**: Daily multivitamin. Ibuprofen as needed for knees.
  - **Dental**: Dr. Kevin Palmer at Harbour Dental Group. Every six months; next appointment December 9, 2026.
  - **Dietary restrictions**: No food allergies. Avoids pork (personal preference, not religious restriction).

