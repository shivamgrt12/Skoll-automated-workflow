  - **Home**: 4-bedroom Colonial row house in Woodlawn, Baltimore. Owned since 2010. Well-maintained; June keeps a meticulous house and Samuel handles repairs.
  - **Rooms**: Master bedroom, Brianna's room, Marcus's room (empty during the school year), and a guest room that doubles as June's prayer and reading space.
