  - **Cooking**: Family recipes are her default and her comfort. Pot roast, baked mac and cheese (a point of pride), cornbread, collard greens, lemon herb chicken, and fried rice for gatherings. Family dinners at least four nights per week when everyone is home are important to her.
  - **Reading**: Faith-based books, health journals, and occasional literary fiction. Currently reading *A House of Many Rooms* by C. Whitfield. Active in the women's church book study group.
  - **Music**: Gospel, old-school R&B, and classic soul. CeCe Winans is her favorite artist. Plays gospel in the kitchen while cooking.
