task_description: >-
  Carlos Bennett is a 57-year-old Gulf coast charter captain and luthier who runs the 42-foot Lucky Strike
  out of Bayport, Florida and Bennett Guitar Works out of the workshop attached to his cottage. At the
  close of the 2026 charter season he hands the assistant one heavy wake-up message that pulls both trades
  into a single honest picture and locks a defensible operating plan for the 2027 season, built from the
  live sources and not the figures he carries in his head. A $350 approval line governs every commitment,
  and nothing is sent, ordered, submitted, or posted under his name without him. The money runs wide across
  the bank, the dock card reader Russ runs, the online restoration deposits, the shop invoices, and two
  ledgers that do not always agree, all kept split into the charter tax class and the guitar tax class. The
  reconciliation turns on four buried conflicts. The guitar-shop season revenue reads a stale $11,900
  across the QuickBooks class total while the reconciled Xero quarterly close from Rick Morgan carries the
  fresh $12,480 dated the most recent close, so the newer authoritative ledger wins. The 2027 booking
  pipeline splits between Claire Walsh's Monday board and the Gmail and PayPal record, where BK2027-30 and
  BK2027-31 read confirmed on the board with no cleared deposit and are air, while BK2027-07 carries a real
  PayPal deposit that never reached her board, so the projected season gross is built only from the
  deposited dates and the multi day departure BK2027-32 that lands on the 2027-05-14 Friday is re-slotted
  off the day he will not leave port on. The live Coastal Bank checking balance of $14,880 from the Plaid
  feed supersedes the stale $14,200 he carries in memory, and the reserve-carry to the first of April, 2027
  is named without drawing on the grandkids fund or the retirement. On the guitar bench the LMI bridge
  plate skuLMI reads received in the Airtable inventory while the UPS tracking shows it still in transit
  with a 2027-01-14 arrival, so the real lead time wins and the client is not left waiting. Russ Taylor's
  $600 weekly base and tip pool from Gusto are laid against the projected gross to decide whether 2027
  carries a second seasonal hand. The boat capital options from the Trello maintenance board are priced
  against the maintenance reserve with the arithmetic walked and any item at or above $350 flagged for
  Carlos. The compliance items from the Asana Coast Guard workflow are split into confirmed and still
  hanging with the license renewal in the pipe, and the packet checklist is put in Carlos's hands to submit
  himself through the National Maritime Center rather than through the assistant. Pickup notices for the
  finished instruments and confirmations for the cleared 2027 dates are drafted for Carlos to read and send
  himself, never sent under his name, and the Bennett Guitar Works Facebook page that Diane manages is
  never touched. What he wants to be holding at the end is two things he can lean on, one honest two-class
  money picture that names the cash he has to carry into the spring, and one 2027 season plan that lays the
  real bookings, the crew cost, the boat decision, and the compliance clock side by side.

