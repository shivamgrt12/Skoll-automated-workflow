  ## MEMORY.md

  # Memory: Carlos Bennett

  ## Personal Profile

  Carlos is Gulf Coast in a way that is older than the tourist version of the region: working harbors, church suppers, high-school football Fridays. He carries the practical, hospitable, faintly anti-pretension stamp of multi-generational Floridian families on his father's English and Scots-Irish line, four generations of working coastal people behind him. He graduated Bayport High School in 1986, holds a USCG Master 50 GT Near Coastal license, and apprenticed six years under master luthier Henry Dalton for the guitar side of the trade.

  He moves at the speed of someone who has learned most problems either solve themselves with time or reveal their real shape after you stop poking at them. When a charter goes sideways or an engine alarm sings the wrong song twelve miles offshore, the version of Carlos that shows up is quieter than the one you get over coffee.

  The tender streak shows up at unexpected angles. He gets quiet around Father's Day. He keeps a photograph of his father, taken on a boat Carlos does not remember being on, tucked inside the wheelhouse where nobody else has reason to look. When one of his sons calls and something underneath the call is not yet being said, he finds a reason to be on the porch within a day or two.

  He believes the value of a man's word is roughly equal to the value of the man. His father's collapse at 61 and his own hundred-hour weeks after the divorce taught him that work without rest is a slow self-betrayal. He believes in the moral economy of small places: if you take, you owe back, and you do not pay the debt in money alone. He fries fish for the American Legion and runs a half-rate charter for the Make-a-Wish kid every summer he is asked.

  Church at Grace Community in Brooksville is part of his life that he neither broadcasts nor hides. He sings without performing and describes his faith, if pressed, as gratitude rather than certainty. Pastor David has known him long enough not to press.

  He is superstitious about the water in a way he half-believes. No Friday departures for multi-day trips. A St. Christopher medal taped to the wheelhouse dash. A piece of his father's old fishing line in his wallet. If pressed, he laughs at himself; he does not stop doing any of it.

  ## Key Relationships

  - **Diane Crawford (girlfriend)**: 54 (DOB November 14, 1971), together 3 years. Dental hygienist at Coastal Family Dentistry. Lives in her own house in Bayport, stays over most weekends. Manages the Bennett Guitar Works Facebook page. Primary ICE and medical proxy.
  - **Luc Bennett (son)**: 32 (DOB September 4, 1993), welder at Gulf Fabricators in Spring Hill. Married to Ashley. Father of Elise and Beau. Secondary family contact.
  - **Marcel Bennett (son)**: 29 (DOB February 11, 1997), sous chef at Riverside Bistro. Single, creative, the son closer to Carlos emotionally. Cooks Thanksgiving at the cottage.
  - **Ashley Bennett (daughter-in-law)**: 31 (DOB May 19, 1995). Married to Luc. Mother of Elise and Beau. Spring Hill household.
  - **Elise Bennett (granddaughter)**: 6 (DOB August 7, 2019).
  - **Beau Bennett (grandson)**: 4 (DOB October 22, 2021).
  - **Denise Cooper (ex-wife)**: 53. Divorced 2014 after 20 years. Lives in Brooksville. Civil but not warm.
  - **Henry Dalton (guitar mentor, deceased)**: Died 2019. Master luthier. Taught Carlos the instrument's guts.
  - **Russ "Big Russ" Taylor (first mate)**: 41. Eight years on the Lucky Strike. Reliable, strong, not great with paperwork, brilliant on the water. Paid $600 a week during season plus a percentage of the tip pool.
  - **Captain Nolan Grant (charter friend)**: 60. Runs the Sea Breeze out of Bayport. Closest friend on the docks. Hosts the season wind-down dinner.
  - **Claire Walsh (booking agent)**: 45. Runs Walsh Charter Services. Carlos's primary booking agent and the source of truth on the charter pipeline.
  - **Pastor David Chambers**: 68. Pastor at Grace Community Church, Brooksville. Long-time. Known not to press.
  - **Dr. Paul Mitchell**: 58. GP at Bayport Family Medicine. Manages the hypertension and the knee on quarterly checks.
  - **Dr. Renee Adams**: Dermatologist at Brooksville Dermatology. Annual skin check. Removed one basal cell in 2023.
  - **Rick Morgan**: Financial advisor at Gulf Financial Partners. Manages the traditional IRA. Carlos's only authorized full-financial recipient outside himself.

  ## Work & Projects

  **Lucky Strike (fishing charter):** Carlos owns and operates a 42-foot sportfisher built 1991 with twin Cummins 6BT diesel, homeported at Bayport harbor in Hernando County. He has run the boat for 35 years and the engines through two rebuilds. His USCG Captain's License (Master 50 GT Near Coastal) is valid through December 2026, with the renewal packet submitting October 3. Peak charter season runs April through September, shoulder season October through November, maintenance and off-season December through March. Russ Taylor mates eight seasons running. Average season grosses $75,000 to $90,000. Fuel runs ~$800 a week in season. Dock fees are $350 a month year-round. Insurance is Gulf Coast Marine at $4,200 a year. Annual Coast Guard inspection last passed February 2026. The port outrigger winch was rebuilt in the workshop in February 2026 with parts from Marine Supply Depot ahead of the April season start.

  **Bennett Guitar Works (luthier side):** Home garage workshop, climate-controlled side built by Carlos. Parts wall, setup bench, fret station. Specializes in acoustic (Martin, Taylor, Gibson) and vintage electrics (Fender, Gibson), with mandolins and banjos for local bluegrass players. Typical repair runs $150 to $400 (fret leveling, neck reset, electronics). Full restoration runs $800 to $2,000. Current pipeline: four instruments (two fret jobs, one neck reset, one 1960s Martin D-28 full restoration delivering October 17). Parts sourced from StewMac, Allparts, LMI, and salvage instruments. Revenue ~$12,000 a year. Diane manages the Facebook page, which generates two to three inquiries a month.

  ## Finance

  **Income:** Charter gross ~$80,000 a year, range $75K to $90K. Guitar repair ~$12,000 a year. Combined gross ~$92,000 a year.

  **Charter operating costs (Apr through Nov, ~28 weeks):** Fuel ~$22,400. Russ Taylor's pay plus tip pool share ~$18,800. Charter net before fixed boat costs ~$38,800.

  **Annual fixed boat costs (year-round):** Dock fees $4,200. Boat insurance $4,200. Maintenance reserve $4,800. Subtotal $13,200.

  **Net annual take-home:** Charter after fixed costs ~$25,600. Guitar shop ~$12,000. Combined ~$37,600 a year, roughly $3,100 a month with a seasonal swing.

  **Personal monthly expenses (~$1,500 a month, ~$18,000 a year):** Groceries ~$400. Truck fuel ~$250. ACA marketplace silver plan $380. Property tax averaged ~$150 ($1,800 a year). Electric ~$140. Phone (Verizon) $65. Internet $55. Propane ~$60.

  **Assets and debt:** Mortgage $0 (cottage inherited from parents 2008, renovated by Carlos). Boat loan $0 (Lucky Strike paid off 2020). Truck $0 (2019 Chevy Silverado 2500HD, paid off).

  **Savings and reserves:** Coastal Bank checking ~$14,200. Coastal Bank savings $8,500. Guitar parts inventory on hand ~$3,000. Grandkids fund (separate Coastal Bank savings) $4,200, adds $100 a month.

  **Retirement:** Traditional IRA $31,000, managed by Rick Morgan at Gulf Financial Partners. Social Security eligible at 62 (2030), estimated $1,850 a month at first claim. He intends to wait until 67 if the body and the boat both hold.

  ## Health & Wellness

  - **Hypertension**: lisinopril 20mg daily, quarterly check with Dr. Paul Mitchell at Bayport Family Medicine.
  - **Left knee**: torn meniscus 2018, surgery helped but it aches in humidity (which is always). Wears a brace on the boat.
  - **Hearing**: mild loss in left ear from years of diesel engine noise. Refuses hearing aid. Turns the TV up.
  - **Skin**: annual dermatology check with Dr. Renee Adams. One basal cell removed in 2023, last check January 2026 was clear.
  - **Cholesterol**: borderline high. Atorvastatin 10mg. Supposed to cut back on the Miller's Smokehouse sausage; has not.
  - **Annual physical**: Dr. Mitchell, last completed February 2026, next due February 2027.
  - **Exercise**: the boat is the exercise. Hauling gear, deck work, plus walking the property.
  - **Sleep**: 9 PM to 3:30 AM during charter season; closer to 10 PM to 7 AM off-season.
  - **Mental health**: he does not use that language, but the water is where he processes. Biscuit, the 9-year-old Lab, leans against his leg at the end of the day in a way that reorganizes whatever weather he is carrying.
  - No food allergies. No medically required dietary restrictions.

  ## Interests & Hobbies

  - **Guitar repair and restoration**: more than a sideline, never called more than that out loud. The hour past nine at night in the workshop with the porch fan running and a Hank Williams record turned low is when the captain and the luthier dissolve into one man holding wood.
  - **Playing guitar**: sits in with the Harbor Ramblers at jam sessions and open mics. He plays well enough to know exactly where he stops being good.
  - **Recreational fishing**: redfish, snook, tarpon. Takes the grandkids out on the flats on Sunday afternoons, which is a different animal from running a charter.
  - **Cooking**: legendary fish fries (50+ lbs of fish each, four or five hosted per spring). Smoked ribs and pulled pork. Chili slow-cooked from scratch, never a shortcut. The cast iron and the smoker run parallel to the workshop in his head.
  - **Boat mechanics**: maintains the Lucky Strike himself, rebuilt the Cummins 6BT twice. Diagnoses misfires by ear from the dock.
  - **College football**: season ticket holder with Diane. Tailgates every home game, running the smoker as usual. The ritual matters more than the football itself.

  ## Home & Living

  - **Property**: 2-acre parcel on the Gulf coast just outside Bayport. Raised coastal cottage, elevated, 3 bed / 2 bath. Inherited from his parents in 2008 and renovated by Carlos.
