  ## MEMORY.md

  # Memory: Dana Serrano

  ## Personal Profile

  Dana Elena Serrano is a first-generation Mexican-American internal medicine resident at Stonebridge Healthcare in Denver, currently a PGY-2. She was born in San Antonio, Texas, to Roberto and Carmen Serrano, who immigrated from Guadalajara, Jalisco. She finished her MD at Oakridge University in 2025 and started her residency on July 1, 2025. She lives in a 2BR walk-up in Capitol Hill with surgery intern Jess Kowalski and walks fifteen minutes to the hospital. She is single, bilingual in English and Spanish, and code-switches by emotional register.

  She runs on the kind of intensity her co-residents recognize because they share it: the baseline alertness, the ability to function on inadequate sleep, the reflex to prioritize. What is hers alone is the immigrant-family weight and a quiet, persistent homesickness for San Antonio kitchens and Guadalajara light. Her default off-duty mode is cafe de olla on a weekend morning, Vicente Fernandez on the kitchen speaker, and the rebozo shawl from Mama on her shoulders.

  ## Key Relationships

  - **Carmen Serrano (Mama, 55)**: part-time librarian at San Antonio Public Library. Daily walk-home call, biweekly care packages of frozen Mexican food and handwritten notes. Closest emotional contact.
  - **Roberto Serrano (Papa, 58)**: civil engineer at Clearwave Digital, structural division, San Antonio office. Quieter parent, sends WhatsApp news clippings, joins Sunday calls.
  - **Valeria Serrano (Val, 29)**: product manager at Ashdale Technologies, San Francisco. Engaged to Marco Delgado. Closest confidant, daily texts, FaceTime two to three times a week.
  - **Marco Delgado (30)**: software engineer at Foxpoint Innovations, SF. Kind, Dana likes him, light contact through Val.
  - **Abuelita Rosa (maternal grandmother, 80)**: Guadalajara. Sunday morning video call. Cataracts worsening, health declining. Emotional anchor.
  - **Tia Lupe (maternal aunt, 52)**: Austin, Texas. Holds the Mexican holiday gatherings. Source of "when are you getting married" pressure.
  - **Dr. Sarah Whitmore (attending, mentor, 42)**: internal medicine attending at Stonebridge Healthcare. Supervises clinical work and the case report. Rigorous but supportive.
  - **Dr. Kevin O'Brien (program director, 50)**: runs the IM residency program at Stonebridge Healthcare. Fair but demanding.
  - **Dr. James Park (senior resident, PGY-3)**: current block senior on General Medicine Team B.
  - **Dr. Lena Marchetti (program counselor)**: wellness sessions, two so far, may continue.
  - **Luis Escobar (co-resident, 26)**: PGY-1 at Stonebridge Healthcare, also Mexican-American, from El Paso. Bond over shared cultural references and mutual exhaustion.
  - **Sofia Reyes (med school best friend, 25)**: dermatology resident at Meridian Medical, Philadelphia. Daily texts, Friday 8 PM check-in.
  - **Jess Kowalski (roommate, 26)**: PGY-1 surgery resident at Stonebridge Healthcare. Shares the apartment, rarely home at the same time, leaves leftovers.

  ## Work & Projects

  Internal medicine resident at Stonebridge Healthcare, Denver. Started July 1, 2025; now in the PGY-2 year. Rotating blocks across inpatient wards, ICU, ambulatory clinic, night float, and electives. Current block is General Medicine, Team B: 6:30 AM to 6 PM typical, q4 call until 10 PM, attending Dr. Sarah Whitmore, senior Dr. James Park. The next block is ambulatory clinic with predictable 8 AM to 5 PM hours.

  - **Salary**: $67,000/year gross at the resident pay step.
  - **Case report with Dr. Whitmore**: "Atypical Presentation of Cardiac Sarcoidosis in a Hispanic Patient." Journal submission window in late October.
  - **IRB application**: retrospective chart review on Latino immigrant health disparities. Submission window in early November.
  - **Long-range research interest**: health disparities among Latino immigrant communities, with intent to develop a longitudinal project across residency.

  ## Finance

  - **Resident salary**: $67,000/year gross, roughly $4,200/month after taxes and deductions.
  - **Medical school loans**: $218,000 total from Oakridge University, on income-driven repayment (REPAYE). Currently $0/month under grace transition. Payments start October 2026 at roughly $350/month. Interest accruing at about $600/month.
  - **Rent**: $1,350/month, half of the $2,700 2BR in Capitol Hill with Jess.
  - **Utilities**: about $80/month split with Jess.
  - **RTD pass**: $90/month, subsidized through Stonebridge Healthcare.
  - **Phone**: $55/month, own plan since starting residency.
  - **Streaming and tools**: Spotify Premium $11.99, Netflix shared with Val, renter's insurance $18/month.
  - **Groceries**: about $300/month, weighted toward Aurora Latin grocery and Trader Joe's basics.
  - **Savings**: roughly $4,500 in checking and $2,000 in savings at Brightpath Financial. No retirement contributions yet, planned now that PGY-2 has started.
  - **Parental Venmo support**: $200 to $300/month from Mama, sent without being asked.
  - **Val and Marco wedding contribution**: roughly $1,500 to $2,000 across dress, gifts, and travel.

  ## Health & Wellness

  - **Physical**: generally good, but residency is taking a toll. Chronic sleep deprivation on inpatient blocks (5 to 6 hours), lower back pain from standing 10+ hours, uses a lumbar cushion at home.
  - **Vision**: contact lenses (-3.25 both eyes), glasses at home.
  - **Mental health**: high-functioning anxiety, not formally diagnosed. Two wellness sessions with Dr. Lena Marchetti, may continue. Stress peaks during ICU and night float.
  - **PCP**: overdue. Last physical pre-residency June 2025 at Greenleaf Health, San Antonio. Three Denver PCP options identified, none scheduled.
  - **Dental**: last cleaning November 2025 at a Denver office, next due November 14, 2026.
  - **Exercise**: Sloan's Lake run, three to five miles, three early mornings a week. Skips during night float.
  - **Diet**: Mexican home cooking when time allows, hospital cafeteria and granola bars on inpatient blocks. Mama's biweekly care packages. Vegetarian three to four days a week by default. No allergies.

  ## Interests & Hobbies

  - **Latin American literature**: Sandra Cisneros and Gabriel Garcia Marquez in rotation, "The House on Mango Street" on the nightstand. Currently reading "When Breath Becomes Air" by Paul Kalanithi.
  - **Folklorico dance**: twelve years through high school under Tia Lupe's church-hall group. No time now, muscle memory still there.
  - **Cooking Mexican food**: pozole, mole negro, carnitas from Mama's recipe. Aurora Latin grocery every two weeks.
  - **Running**: Sloan's Lake loop three mornings a week, one half marathon in 2024.
  - **Journaling**: Moleskine, ten minutes before bed, English and Spanish mix.
  - **Telenovelas**: La Casa de las Flores with Val over FaceTime on rare free evenings.
  - **Podcasts**: The Curbsiders and Clinical Problem Solvers on the commute, Wait Wait Don't Tell Me for comedy.

  ## Home & Living

  A 1960s brick walk-up on the third floor of a Capitol Hill building, 2 bedrooms and 1 bath, shared with Jess. Dana's room has a twin bed, a desk, a bookshelf, and a framed photo of Abuelita and her old folklorico group. The kitchen holds Mexican spices, an Instant Pot from Mama, a rice cooker, and a small ofrenda-style shelf with photos and votives. No elevator, laundry in the basement. The apartment is fifteen minutes on foot from Stonebridge Healthcare.

  ## Devices & Services

  - **Phone**: iPhone 15 on a $55/month plan. Always on silent during clinical hours.
  - **Computer**: MacBook Air for research, email, and journaling outside the hospital.
  - **Tablet**: iPad mini for reading, podcasts, and FaceTime with family.
  - **Streaming**: Spotify Premium, Netflix shared with Val, Disney+ for classic movies.
  - **No car**: walks to the hospital, RTD for everything else, occasional Uber to DEN airport.
  - **Ring cameras**: building-entry and apartment-side cameras installed spring 2026 after a package theft.

