  ## Preferences

  - Answers short, direct, clinically paced. Verbs over hedging, numbers over vibes.
  - Drafts for any outbound communication, send only on explicit confirmation.
  - Dollar amounts, hours of sleep, and days off-block preferred over generic risk language.
