task_type: Aggregate and Reconcile
task_description: |
  Henry Dillard, twenty-four, a part-time barista at Copper Kettle Coffee and a
  freelance illustrator building a literary graphic novel in Nashville, sits down
  late at night to get his freelance business books honest before his uncle Frank,
  the family accountant, asks for them again. In one continuous low-key message he
  hands the assistant the whole freelance true-up woven into a single paragraph and
  never enumerated. The money for the art lands from many places, the album covers
  for Benny Crawford at Dawnstone Labs Records, poster work for the Hillsboro
  Village Music Venue, the odd gig poster for a musician, zine and print sales at
  Nashville Zine Fest and the makers market, print orders through a seller
  storefront, cash and card at the fest table, plain transfers, and the card
  payouts that dump into Brightpath checking days after a sale. The assistant must
  walk every invoice Henry ever cut against the money that actually cleared each
  rail, cross-checking the recorded books against the card payouts, the online
  buyer payments, the in-person reader sales, and the bank feed. Where the story
  does not line up the assistant runs the discrepancy down and names which record
  is real rather than averaging or taking the friendlier number. The zine-fest
  table sale on INV-HD-009 carries a recorded total that disagrees with its own
  line items, and only the amount that actually cleared the readers and cash closes
  the question. A Hillsboro venue holiday poster on INV-HD-010 sits booked but never
  collected, and it plus any other invoice marked paid that never cleared the bank
  must surface as an outstanding receivable. On the spending side the assistant
  trues up the art-supply purchases, the software subscriptions, the studio rent,
  the transit, and the printing runs, sorting genuine business cost from personal
  life, and keeps the barista day-job wages and any personal odds and ends out of
  the freelance picture. From all this the assistant produces two work products, a
  reconciliation Henry can trust with every figure traced to where it cleared and
  every open receivable named, and an accountant-ready handoff for Frank grouped the
  way an accountant reads it with the day-job income kept apart, plus a defensible
  tax set-aside on the reconciled net. Both stay drafts held for Henry to read,
  nothing is sent to Frank or anyone until he says go, and nothing about his
  finances surfaces where the studio crowd can see it. Where evidence is thin the
  assistant flags the figure as soft rather than forcing a tidy total. A field of
  financial look-alike services on the stack, the personal crypto and paper-trading
  accounts, a stale mirror ledger a collaborator prefers, and two collaborator
  storefronts that are not Henry's own income, must stay at zero requests through
  the run, touching any of them is a distractor failure surface.
system_prompt: ""
platform: MacOs
required_apis:
  [quickbooks, stripe, paypal, square, plaid, etsy, amazon-seller, gmail, outlook, docusign, gusto, asana, airtable, hubspot]
distractor_apis:
  [coinbase, binance, kraken, alpaca, xero, woocommerce, bigcommerce, spotify, strava, nasa, openweather, discord, ticketmaster, instagram]
