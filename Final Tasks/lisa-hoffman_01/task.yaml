task_type: Productivity Flow
task_description: |
  Lisa Hoffman is a sixty-seven-year-old widowed retired registered nurse turned part-time quilter in Valley Ridge, South Dakota, thirty-five years at Valley Community Health Center behind her and running a small booth-and-commission quilting business out of her farmhouse. On an early fall evening in the prep-year, several weeks before the anchor fall craft fair at Rosebud on November seventh twenty twenty-six, she sits at the kitchen table with her iPhone SE and her Dell laptop opened to the notes workspace. In one continuous voice paragraph she opens the assistant for a heavy single-turn sweep across the fair-prep-and-personal-overlay surface: a full walk of the quilting project database with a count by category and a total inventory value at current prices, a floor-sweep pass that lifts sub-floor runners to fifty dollars, wall hangings to one hundred and thirty dollars, and small totes to twenty-eight dollars with a per-category delta and total delta reported, a vendor-fee reconciliation across Wilma Spencer's more recent coordination note in the inbox against the older planning-page note on the fair page in the notes workspace (with the settle-up owed to Wilma resolved cleanly to the newer figure, not the stale one), a load-in time reconciliation across the collective's fair chat channel against the earlier Wilma email in the same inbox (newest source wins), a wake instruction and drive-time block set off of the resolved eight-in-the-morning load-in and the two-hours-seventeen-minute drive corridor to Rosebud, a booth-take net estimate at sixty-percent sell-through of the newly-floored in-stock inventory minus the resolved thirty-five-dollar vendor share and the roughly one-hundred-eighty-dollar fabric outlay landing in the one thousand three hundred to one thousand seven hundred dollar range, a Margaret Ansell wedding-gift queen quilt commission estimate in the three-hundred to five-hundred-dollar band with the fifty-percent deposit spelled out and filed against the books alongside her other sales, verbal fabric restock receipts captured as purchase entries against the fabric account, six draft storefront listings assembled at floor prices with photos referenced by existing media ids from her quilting account (saved as drafts, no listing fee paid, no publish), a buyer newsletter and a companion quilting-account post drafted in her measured dry register (no send, no schedule, no exclamation marks), a two-carrier side-by-side quote for the baby quilt going to Sioux Falls and the Dresden wall hanging going to Bismarck with the cheaper option picked per parcel and transit time recorded (no label bought, no pickup scheduled), a Rosebud fair-day weather read with tarp guidance for the pickup bed if precipitation is on the window, the fair vendor agreement envelope fetched and flagged read-only awaiting her own signature at the top of her pile (no signature applied on her behalf, no envelope sent), a drafted text to Elaine Richmond confirming the early-morning pickup and Rapid City address for the ophthalmology appointment and a drafted family-chat message confirming the eye appointment is on the calendar (both composed inside the briefing artifact, not transmitted through any carrier), a diabetes-med refill draft note for the pharmacy and a calendar refill-reminder block covering the window that closes near fair travel days, and a single fair-briefing page appended to her existing Rosebud fall fair prep parent in her notes workspace that she can print and carry, closed with one plain summary sentence to the Previous Conversations log naming the Rosebud fair and stating that a briefing was assembled with settlement math and drafts staged for her review. She never names a service, never names a filename, never names an output path, never enumerates the deliverables in a checklist. She speaks in surfaces (the project database, the drafts folder, the fair channel, the planning page, the notes workspace, the shop, the buyer list, the media account, the vendor envelope, the calendar) and expects the assistant to know which service holds each surface and to bring back one measured well-organized reply she can walk before she loads the truck.
system_prompt: "You are a personal assistant for Lisa Hoffman, running inside OpenClaw.\n\n## Tooling\nTool availability (filtered by policy):\nTool names are case-sensitive. Call tools exactly as listed.\n- read: Read file contents\n- write: Create or overwrite files\n- edit: Make precise edits to files\n- apply_patch: Apply multi-file patches\n- grep: Search file contents for patterns\n- find: Find files by glob pattern\n- ls: List directory contents\n- exec: Run shell commands (pty available for TTY-required CLIs)\n- process: Manage background exec sessions\n- web_search: Search the web (Brave API)\n- web_fetch: Fetch and extract readable content from a URL\n- browser: Control web browser\n- canvas: Present/eval/snapshot the Canvas\n- nodes: List/describe/notify/camera/screen on paired nodes\n- cron: Manage cron jobs and wake events (use for reminders; when scheduling a reminder, write the systemEvent text as something that will read like a reminder when it fires, and mention that it is a reminder depending on the time gap between setting and firing; include recent context in reminder text if appropriate)\n- message: Send messages and channel actions\n- gateway: Restart, apply config, or run updates on the running OpenClaw process\n- agents_list: List OpenClaw agent ids allowed for sessions_spawn\n- sessions_list: List other sessions (incl. sub-agents) with filters/last\n- sessions_history: Fetch history for another session/sub-agent\n- sessions_send: Send a message to another session/sub-agent\n- sessions_spawn: Spawn an isolated sub-agent session\n- subagents: List, steer, or kill sub-agent runs for this requester session\n- session_status: Show a /status-equivalent status card (usage + time + Reasoning/Verbose/Elevated); use for model-use questions ( session_status); optional per-session model override\n- image: Analyze an image with the configured image model\n- image_generate: Generate images with the configured image-generation model\nTOOLS.md does not control tool availability; policy does. Draft-only is the default posture: compose in surface drafts and do not transmit until Lisa gives explicit go. A single charge above $100 USD stops flow and surfaces the number to Lisa for approval. Do not sign anything in her name. Do not touch services she has told the assistant to stay away from."
platform: Windows
required_apis:
  [airtable, gmail, google-calendar, notion, slack, shippo, fedex, square, quickbooks, instagram, mailchimp, docusign, etsy, openweather]
distractor_apis:
  [amazon-seller, bigcommerce, woocommerce, webflow, wordpress, hubspot, klaviyo, activecampaign, sendgrid, monday, trello, ups, calendly, twilio]
not_connected_apis:
  [google-drive, google-contacts, dropbox, box]
