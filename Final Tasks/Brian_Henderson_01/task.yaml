  IVF cost estimates $15K to $20K per cycle plus $3K to $5K medication. Windbridge insurance covers diagnostics and some monitoring, $25K lifetime fertility benefit cap. Sarah's ACA plan covers nothing fertility-related. Researching Progyny if Windbridge adds it, plus Baby Quest, Cade, and Pay It Forward Fertility Foundation grants.

