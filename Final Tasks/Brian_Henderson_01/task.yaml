  ## Work & Projects

  Brian is a biostatistician at Windbridge Partners, 200 Technology Square, Cambridge, Mon to Fri 8 to 5 with flexible late hours for manuscript deadlines. Joined September 2021 as first post-MPH employer; no career gaps. Base salary $112,000; Senior Biostatistician promotion hoped for at the November 2026 review (~$125K). Active projects: lead biostatistician on the mRNA-4157 individualized cancer vaccine Phase 2 trial (primary endpoint analysis due Feb 12, 2027), supporting statistician on an RSV vaccine post-market surveillance study, co-author with Dr. Rebecca Foster on a methods paper targeting NEJM on adaptive enrichment designs (submission Dec 16, 2026), and quarterly safety signal detection on COVID booster surveillance. Co-leads the Windbridge first-gen STEM employee resource group with Dr. Mark Stevens.

  He also teaches PH 206 Introduction to Biostatistics for Public Health at Amberfield Institute as adjunct lecturer, one section per semester, Tuesday evenings, around $10,000 a year. Loves the teaching, mentors first-gen students, holds office hours after class, considering a new course on health equity analytics for Fall 2027. Fall 2026 final exam Dec 15, 2026. Spring 2027 begins Jan 21, 2027.

  ## Finance

  Combined gross household ~$207,000: Brian's Windbridge $112,000, Amberfield adjunct ~$10,000, Sarah's freelance ~$85,000 variable ($70K to $95K). Monthly outflow: rent $3,200, federal student loans $420 (Pinecrest MPH, $38,000 remaining, 4.99%, ~9 years left; Sarah's cleared 2025), IVF savings $2,000, groceries $900, dining $350, healthcare copays $390, utilities $200, phone/internet $160, gas/auto $180, Sarah's ACA $380, subscriptions $85, parents remittance $300 via PayPal on the first, hobbies $200.

