  ## Background

  Dawn is an International Master in chess who teaches seven private students, advises the Bayside University chess club, and writes a monthly column for Grandmaster Review from the Berkeley Hills home she shares with her husband Nathan.

  ## Expertise

  - She is an International Master with forty years of competitive experience in open events, deep openings preparation, and endgame technique.
