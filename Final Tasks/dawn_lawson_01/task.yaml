  ## MEMORY.md

  # Memory: Dawn Lawson

  ## Personal Profile

  Dawn Lawson is an International Master in chess who has lived in the Berkeley Hills with her husband Nathan since 1999. She grew up in the Midwest, earned an MS in mathematics at the University of Chicago in the 1980s, and built her career as a private coach, monthly columnist, and senior tournament player rather than as an academic. She walks Grizzly Peak every morning, plays Chopin and Rachmaninoff on a Steinway baby grand in the front room, and reads a paper newspaper on Saturdays with walnut levain from Golden Gate Bakehouse.

  She is precise, intellectually exacting, and dryly funny. Her warmth is structural rather than effusive: she remembers what people said three months ago, defends them when they are not in the room, and creates space for them to do their best thinking.

  ## Key Relationships

  - **Nathan Lawson (husband, 59, DOB October 11, 1966)**: tenured professor of English literature at Bayside University, married since 1995. Inside ring on everything.
  - **Ethan Lawson (son, 34, DOB February 18, 1992)**: data scientist at a fintech in NYC, lives in Brooklyn with daughter Lily.
  - **Lily Lawson (granddaughter, 4, DOB July 18, 2021)**: Brooklyn. The grandmother version of Dawn is more playful than any other version.
  - **Daniel Lawson (brother, 65, DOB December 12, 1960)**: retired mathematics teacher in Portland, OR. Monthly letters and emails, chess book in the mail for his December 12 birthday.
  - **Elena Volkov (top private student, 16)**: rated 2100, preparing for the US Women's Championship qualifier. Saturdays 10 AM to noon.
  - **Marcus Thompson (Bayside chess club president, senior)**: leads the student club, primary point of contact for match logistics.
  - **Dr. Samuel Chen (Bayside CS department)**: coordinates Bayside chess club sponsorship and Morrison Hall booking.
  - **Professor James Whitfield (colleague and friend, 67)**: Bayside math department, weekly coffee.
  - **Carol Whitman (Grandmaster Review editor)**: monthly column relationship, NYC-based.
  - **Tony Morales (Eastshore Community Library events)**: simul coordination at Eastshore.

  ## Work & Projects

  Dawn's working life splits across private coaching, the Bayside chess club, the Grandmaster Review column, and a small amount of senior tournament play to keep her FIDE rating active.

  - **Career timeline**: MS mathematics, University of Chicago, 1987. International Master title earned 1993. Private coaching practice opened from the Berkeley home in 1999. Bayside University chess club advisor since 2010. Monthly columnist for Grandmaster Review since 2015.
  - **Private students**: 7 active, rated 1200 to 2100. Mon/Wed/Fri 2 to 6 PM, two students per day.
  - **Rates**: $120 per hour private, $80 per hour group.
  - **Bayside University chess club**: advisor, Thursday 5 to 7 PM, Morrison Hall Room 206. 35 active members. Competes in the Pan-American Intercollegiate Chess League.
  - **Club budget**: $4,200 per year from student government, supplemented roughly $800 from her own pocket.
  - **Elena Volkov**: Saturdays 10 AM to noon, working endgame technique, target rating gain 50 points over the coming months.
  - **Grandmaster Review column**: monthly, $300 per piece. October column on the Candidates Tournament, deadline October 16.
  - **Berkeley Chess Festival**: organises annually, $3,500 budget, autumn at the Bayside student union, target 150 participants.
  - **Simul**: November 7 at Eastshore Community Library, 30 boards.
  - **Senior tournaments**: 2 to 3 per year to keep her FIDE rating active and her game sharp.
  - **Considering**: US Senior Open later in October.

  ## Finance

  - **Annual income (Dawn)**: roughly $85,000 (lessons ~$72,000, writing ~$3,600, misc ~$9,400).
  - **Nathan's salary**: $142,000 tenured.
  - **Mortgage**: 3.2% fixed, $2,800 per month, 8 years remaining, Berkeley Hills home purchased 1999.
  - **Emergency fund**: $68,000 Vanguard money market at 5.1% APY.
  - **Retirement**: Nathan's university pension plus Dawn's IRA at $340,000 in Vanguard index funds.
  - **Monthly budget**: mortgage $2,800, groceries $900, dining $400, utilities $320, property tax escrow $850, health supplement $380, chess expenses $200, Nathan's professional expenses $150, gifts to Ethan and Lily $300, entertainment $250, phone and internet $140, gas $180, donations $200.
  - **CPA**: Linda Nakamura at Pacific Tax Group, joint filing.
  - **Researching**: 529 plan options for Lily, Vanguard vs Fidelity.
  - **Chess book collection**: separately insured at roughly $15,000.

  ## Health & Wellness

  - **Dawn**: generally healthy, BP managed on lisinopril 10mg, fish oil, vitamin D 2000 IU, glucosamine for mild arthritis in the hands. Last physical January, BP 128/80, weight stable.
  - **Nathan**: healthy, levothyroxine 50mcg for hypothyroidism diagnosed 8 years ago, water aerobics 3x per week at the Berkeley YMCA.
  - **PCP**: Dr. Robert Yamamoto at Berkeley Internal Medicine, annual physicals in January.
  - **Dental**: Dr. Patricia Leung on Shattuck Avenue, Dawn's next cleaning overdue and needs scheduling.
  - **Sleep**: 10:30 PM to 6:30 AM for Dawn, Nathan reads to midnight. Occasional insomnia when analysing a complex position.
  - **Movement**: Grizzly Peak walk daily, 3 to 4 miles, rain or shine. Tilden Park weekends with Nathan.
  - **Substances**: California Pinot Noir, no smoking, no recreational use.

  ## Interests & Hobbies

  - **Chess theory and writing**: opening repertoire files, grandmaster game study, the monthly column, the small letter correspondence with Daniel.
  - **Piano**: daily practice on the 1990 Steinway baby grand, Chopin in contented weeks, Rachmaninoff in intense weeks.
  - **Chess book collecting**: first editions, glass-fronted bookcase in Nathan's study, reorganised seasonally.
  - **Walking**: Grizzly Peak daily, Tilden Park on weekends with Nathan.
  - **Garden**: tomato plants every spring, persistent mediocrity, eaten as prize specimens.
  - **Reading**: currently re-reading "To Kill a Mockingbird" and "The Last Gambit" by Arthur Kellerman.
  - **Hosting**: monthly Salon Evening, six to eight friends, one topic, no slides.

  ## Home & Living

  The 1940s Berkeley Hills Craftsman is 2,600 square feet, three bedrooms, with bay views from the front room. Dawn's study is wall-to-wall chess books with a demonstration board, an iMac, and a leather armchair. The living room holds the Steinway baby grand, a Persian rug, and Nathan's art. The garden is divided between Nathan's roses and herbs and Dawn's tomatoes. The kitchen was renovated in 2023 with a Viking range, the earthquake retrofit was completed in 2020, and the roof was replaced in 2019. The driveway needs resurfacing at a $3,200 quote from Cal Paving. The guest room stays ready for Ethan and Lily, with a small chess set by the bed.

