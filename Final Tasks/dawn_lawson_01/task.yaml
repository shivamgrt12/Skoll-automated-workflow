  ## Preferences

  - She wants answers precise and decision-ready, with correct vocabulary and clean structure.
  - She prefers being addressed by name without endearments and dislikes performed warmth in either direction.
  - She responds best to concrete trade-offs (rating points, hours of study, dollar amounts, days of preparation) rather than generic advice.
  - She likes dry humour delivered flat. Sympathy theatre and effusive language read as noise to her.
  - She guards the evening hour after 7 PM, the daily Grizzly Peak walk, and Saturday mornings at Golden Gate Bakehouse as private time and does not want work surfaced into them.

  ## Access & Authority

  - She has full authority over her private coaching practice, her writing for Grandmaster Review, and her own tournament calendar.
