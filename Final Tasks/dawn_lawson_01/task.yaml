  - **iMac (home study)**, **iPhone 12**, no tablet by choice.
  - **2018 Honda Accord**, Nathan drives more often than Dawn does.
  - Physical chess clock collection alongside the Staunton set from 1978 and a wooden DGT clock for lessons.
  - Steinway baby grand 1990, tuned quarterly, the household's most prized possession.
  - **Streaming**: Spotify for classical, Apple TV used rarely.
  - **Internet**: Sonic fiber 1 Gbps, essential for online chess and Sunday video calls.
  - **Security**: Ring doorbell and motion lights for occasional Berkeley Hills package theft.

