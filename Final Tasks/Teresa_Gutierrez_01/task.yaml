  ## Preferences

  - **Reading**: Prefers doing to reading. Occasional thriller or outdoor magazine in the evening. Paper only.
  - **Music**: Classic rock (Springsteen, AC/DC, Fleetwood Mac) and country. Truck radio. Spotify for the kids' playlists at home.
  - **TV**: NFL (Patriots), hockey (Bruins), cooking competition shows with Brian, Disney movies with the kids.
