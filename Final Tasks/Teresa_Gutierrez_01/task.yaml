  ## MEMORY.md

  # Memory: Teresa Gutierrez

  ## Personal Profile

  - Full name: Teresa Gutierrez.
  - Pronouns: she/her.
  - Identity: Cisgender straight woman; Catholic in a steady, low-volume way; quietly proud IBEW Local 567 member, not one she leads with around people who would misunderstand it.
  - Ethnicity and background: Mixed heritage, Mexican grandmother and French-Canadian grandfather; working-class Bangor childhood; parents spoke English at home while Spanish stayed in Abuela's kitchen.
  - Languages: English (native). Understands more Spanish than she speaks and has stopped apologizing for the gap.
  - Education: Brewer High School diploma, 2006. IBEW Local 567 apprenticeship completed 2011. Journeyman electrician license.
  - Occupation: Journeyman electrician at Penobscot Electrical Contractors, Bangor; twenty years total at the same shop across apprenticeship and journeyman work.
  - Specialization: Commercial and residential electrical work; currently leading a downtown Bangor commercial rewiring project, October 2026 through January 2027.
  - Marital status: Married to Brian Gutierrez since 2012. Steady marriage where Brian plans and Teresa executes.
  - Faith and practice: Sunday Mass at the parish church because Brian likes it and the kids are growing up inside the rhythm. Belief and household practice have stopped being separate things.
  - Temperament: The steadiness of someone who works with live current for a living and learned early that panic gets people hurt. When the day gets loud, she gets quieter. Does not perform effort.
  - Humor: Lives in the body more than in the mouth: a raised eyebrow, a beat-too-long pause, an answer that is technically correct in a way that makes the room laugh later.
  - Stress response: Retreats into doing when something scares her, mostly the vertigo and what it might be saying about the next ten years. Porch boards, bathroom tile, the workbench reorganized for the fourth time this season.
  - Social style: Small circle on purpose. Friendly with everyone, close to almost no one, by deliberate choice. Does not see this as a problem.
  - Philosophy: Believes love is in what gets done, that a good life is built out of small repeatable structures, that capability is a moral category, and that she chose this life rather than landed in it. She has been to other places. She came back here on purpose.

  ## Key Relationships

  1. **Brian Gutierrez (husband, 37, born December 22, 1988)**: Office manager at a Bangor dental practice. Organized, warm, runs the family's social calendar and finances. Date nights are rare and both want to fix that. Daily logistics by text; planning conversations in person.
  2. **Sophie Gutierrez (daughter, 9, born November 8, 2016)**: Third grader. Reads constantly, loves animals, strong opinions about fairness. Teresa's soft spot; can be talked into things with a well-constructed argument.
  3. **Luc Gutierrez (son, 6, born October 3, 2019)**: First grader. Energetic, physical, follows Teresa everywhere. Wants to "do wires" like Mom. They build things in the garage on rainy weekends.
  4. **Pauline Gutierrez (mother, 66, born January 12, 1960)**: Retired school bus driver in Brewer, ten minutes away. Widowed in 2019 (Armand, heart attack). Watches the kids three afternoons a week. Fiercely independent. Teresa checks on her house regularly.
  5. **Marc Gutierrez (brother, 35, born March 28, 1991)**: Plumber in Bangor. Married, one kid. Annual winter ice-fishing trip on the Penobscot. They work on each other's houses and do not talk much on the river.
  6. **Danny Burgess (best friend and coworker, 40, born November 7, 1985)**: Fellow journeyman at Penobscot Electrical, at the next bench since her apprenticeship. Friday beers at Geaghan's two or three times a month. Knows about the Menieres and clears the work area when her face goes a certain shade.
  7. **Dr. Elaine Kimball (ENT and Menieres specialist, 53)**: Northern Maine Ear & Balance Clinic. Quarterly during active flares; longer intervals when stable.
  8. **Dr. Russell Graves (primary care)**: Penobscot Family Medicine, Bangor. Annual physical in August.
  9. **Dr. Doyle (dentist)**: Bangor Dental Group, which is Brian's boss's practice. Twice yearly.
  10. **Steve Gilmore (foreman, Penobscot Electrical)**: Direct supervisor. Reliable, plainspoken, treats her as a peer.

  ## Work & Projects

  Journeyman electrician at Penobscot Electrical Contractors, a roughly 45-person commercial and residential shop in Bangor. Twenty years total at the company across the apprenticeship and the journeyman stretch. Reports to Steve Gilmore. IBEW Local 567 member; dues paid monthly. Currently leading a commercial rewiring project at a downtown Bangor office building from October 2026 through January 2027, with residential service calls two or three days a week between project phases. Shift is Monday through Friday, 7:00 AM to 3:30 PM, with occasional voluntary overtime at time-and-a-half during project crunches.

  **PTO**: Union contract gives her 15 days a year on a calendar-year reset. 10 days remaining for 2026. She plans to spend a couple of half-days at year-end on medical and a school event and to roll the rest of the ski week onto the 2027 allotment for Sugarloaf.
  **Work email**: `tgutierrez@penobscotelectrical.com`, accessed on the work phone.

  ## Finance

  - **Income**: $62,000 base on union scale (Teresa). Brian earns about $44,000. Household combined about $106,000.
  - **Teresa's monthly take-home**: about $4,000.
  - **Teresa's monthly expense share**: mortgage $1,340; utilities $275; truck payment (2023 Ford F-150) $365; auto insurance (both vehicles) $130; groceries $440; gas $120; phone $60; health insurance $310; prescriptions $55; subscriptions $38; dining out $85; kids activities $130; personal $95; home maintenance $75. Total about $3,518.
  - **Remaining**: about $482 a month into savings.
  - **Brian covers**: his car costs, summer-camp daycare gap, clothing and gifts, and the rest of the shared household.
  - **Savings**: Bangor Savings Bank joint checking and savings, $13,500 saved. Target $20,000.
  - **Retirement**: Union pension, vested. Roth IRA at Fidelity, $11,200.
  - **Debts**: Mortgage $198,000 remaining. Truck loan $22,000 remaining. No credit card debt.
  - **Credit**: Bangor Savings Visa. Pays full balance. Credit score about 740.

  ## Health & Wellness

  - **Menieres disease (left ear), diagnosed 2023**: Episodes of vertigo, tinnitus in the left ear, and intermittent hearing loss. Episodes run 20 minutes to 2 hours, one or two a month, unpredictable. Triggers: high sodium, stress, fatigue, weather changes. Managed with betahistine 16mg three times daily, low-sodium diet, vestibular rehab exercises. Last severe episode February 2026 at work; she sat in the truck for 45 minutes until it passed. Milder spells since but nothing that has kept her off the job. She calls it "a dizzy spell" to coworkers.
  - **Medications**: Betahistine 16mg three times daily. Meclizine 25mg as needed for acute episodes; carries it in her work bag. Vitamin D3 1000 IU daily.
  - **ENT**: Dr. Elaine Kimball, Northern Maine Ear & Balance. Quarterly during active flares; on a longer interval now. Last: February 2026.
  - **Primary care**: Dr. Russell Graves, Penobscot Family Medicine. Annual physical in August. Last: August 2025.
  - **Dental**: Dr. Doyle, Bangor Dental Group. Twice yearly. Last: January 2026.
  - **Dietary restrictions tied to care**: Low-sodium diet recommended for Menieres. Followed loosely; reduced salt at home with Brian cooking accordingly. Caffeine after noon avoided as a precaution.
  - **Exercise**: Coaches Luc's youth soccer Saturdays. Acadia-area hikes two or three weekends from May through October. Garage workouts twice a week, pull-up bar and free weights. Avoids movements with sudden head changes.
  - **Allergies**: None known.

  ## Interests & Hobbies

  The garage is hers, with a workbench against the back wall organized to a level her kitchen will never reach: pegboard with every tool outlined in Sharpie, drawers labeled in faded blue masking tape, a coffee can of spare wire nuts she has been adding to since the apprenticeship. The light over the bench is the one she rewired her first week as a journeyman, and it has never flickered.

  The pellet smoker came home one summer and changed the rhythm of weekends. She built the side table for the wood pellets and keeps a notebook in the truck glove compartment with the cook time, wood type, and a one-line review of every brisket and pork butt she has finished. Fishing is older: her father took her to the Penobscot at eight, and she still uses the Fenwick rod he gave her at fourteen, re-wrapped twice and not retiring in her lifetime. Marc fishes with her now. They do not talk much on the river. Coaching Luc's soccer started as a logistics solution and turned into something else; she can teach a six-year-old to dribble with his eyes up in a way that sticks.

  ## Home & Living

  - **Address**: 87 Birch Street, Bangor, ME 04401, in the Broadway area.
  - **Layout**: 3BR / 2BA Cape Cod, about 1,500 sq ft. Detached two-car garage. Fenced backyard with a swingset. Covered front porch.
  - **Notable**: Garage has Teresa's workbench and tools, organized meticulously. Pellet smoker on the back deck. Kids' artwork covers the kitchen fridge. The upstairs bathroom needs re-tiling and is perpetually next on the project list.
  - **Heating**: Oil furnace with a pellet stove in the living room.
  - **Vehicles**: 2023 Ford F-150 XLT (Teresa). 2021 Subaru Forester (Brian). Truck is kept clean and on a maintenance schedule logged in a small notebook in the glove box.

  ## Devices & Services

  - **Phone**: iPhone 14 (personal). Work phone is a basic Samsung from Penobscot Electrical, calls and texts only.
  - **Computer**: Family HP laptop, shared with Brian. Teresa uses her phone for most things.
  - **TV**: 55-inch smart TV in the living room. Netflix, Disney+, ESPN+.
  - **Smart home**: Ring doorbell. No voice assistant.
  - **Workshop**: Pellet smoker on the back deck. Workbench tools, hand and power, all owned outright.

