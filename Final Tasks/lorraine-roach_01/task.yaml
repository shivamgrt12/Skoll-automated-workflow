  - **Marcus Roach**, 35, older brother. Marine surveyor in Seattle.
  - **Jenna Paredes**, 29, best friend and fellow marine biologist at Reef Guardians Alliance.
  - **Dr. Leilani Kamaka**, 48, Director of Coral Futures Institute and Lorraine's supervisor.
  - **Keoni Mahoe**, 40, local fisherman and community liaison for the Kaneohe Bay project.
  - **Dr. Raymond Carter**, 52, M.S. thesis advisor at Seaview Graduate Institute.

  ## Work & Projects
  Marine Conservation Biologist at Coral Futures Institute since 2020. Primary project: Kaneohe Bay Coral Resilience Study, Year 3. Co-developed Reef Monitoring Program with Keoni Mahoe. Contributing author on Pacific Marine Protected Area policy brief. GIS certification course targeting completion December 2026. PhD plans for 2028.

  ## Finance
  Annual salary $62,000, approximately $4,100 per month after taxes. Rent $1,650. Student loans $22,000 remaining at $310 per month. Savings $14,500 in HYSA, targeting $18,000 at $250 per month. 403(b) balance approximately $28,000. Monthly expenses approximately $3,455 with $645 buffer.

