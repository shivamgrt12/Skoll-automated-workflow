 Plans train routes, clinic addresses, restaurant directions, and weekend trip routing.\n- **Yelp** (`yelp-api`): Scouts Montclair, Edison, and Newark restaurants; filters for quiet rooms and noise tolerance.\n- **OpenWeather** (`openweather-api`): Pulls barometric pressure alerts for migraine planning and flags a pressure drop the night before.\n\n#### Media, Social & Discovery\n\n- **YouTube** (`youtube-api`): Pulls classic rock concerts, Springsteen archives, pasta technique videos, and legal commentary.\n- **Vimeo** (`vimeo-api`): Watches indie film entries Priya recommends.\n- **Spotify** (`spotify-api`): Runs the family plan with Priya; Springsteen, Stevie Ray Vaughan, Coltrane, jazz on the commute.\n- **Twitch** (`twitch-api`): Follows an NJ-music livestream and a Mets fan stream during games.\n- **TMDB** (`tmdb-api`): Looks up movies and series before pulling something up on Netflix.\n- **Twitter** (`twitter-api`): Follows legal commentary, Giants beat reporters, and Springsteen tour updates.\n- **LinkedIn** (`linkedin-api`): Maintains his profile for partnership announcements and CLE invitations.\n- **Reddit** (`reddit-api`): Follows r/migraine for new treatments and r/NYGiants for game threads.\n- **Pinterest** (`pinterest-api`): Saves the house-project ideas Priya shares from her boards.\n- **Instagram** (`instagram-api`): Follows family photos, especially from Sean and Michelle and the kids.\n- **Ticketmaster** (`ticketmaster-api`): Books Mets and Giants tickets; surfaces Springsteen tour alerts the moment they post.\n- **NASA** (`nasa-api`): Tracks solar weather alongside barometric pressure to refine migraine planning.\n\n#### Not Connected\n\n- Live web search, web browsing, and deep internet research are not available. The agent works only from the connected services listed above and from stored memory.\n- `dwells@oakbridgelaw.com` (firm Outlook). Lives on the work laptop. Never draft, read, or impersonate from here.\n- Clio (firm case management). Work laptop only. All case files, billing, and matter notes stay there.\n- Banking and investment apps (Ally checking, savings, IVF fund, Fidelity 401(k)s and IRAs, Chase Sapphire Preferred). Phone only.\n- Priya's private accounts (Broadleaf Tech work email, her personal banking, her private medical portals). Off limits unless she shares explicitly.\n- Wells and Menon family members' private accounts. Coordinate through Danny or through WhatsApp threads he is on.\n\n## MEMORY.md\n\n# Memory: Danny Wells\n\n## Personal Profile\n\n- **Full Name**: Danny Patrick Wells\n- **Born and raised**: Newark, New Jersey. Family home is still in North Newark.\n- **Residence**: Montclair, NJ. 3BR/2BA end-unit townhouse, owned, purchased 2021.\n- **Occupation**: Senior Associate Attorney, Commercial Litigation group at Oakbridge Law (mid-size firm, ~90 attorneys, Newark office).\n- **Education**: B.A. Political Science, Ridgemont University (New Jersey, 2008); J.D., Atlantic Coast Law School (Newark, 2011). Admitted to NJ and NY bars.\n- **Languages**: English (native), enough Spanish to get by on vacation (not functional).\n- **Marital Status**: Married to Priya Menon-Wells since October 2019. Together since 2016. No children; actively undergoing fertility treatment (IUI, considering IVF).\n\n## Key Relationships\n\n1. **Priya Menon-Wells (Wife, 37, DOB November 15, 1988)**: Product manager at Broadleaf Tech (SaaS, Hoboken). Indian-American, grew up in Edison. Driven, organized, emotionally sharper than Danny on most days. The fertility journey has been hardest on her physically; Danny carries the emotional logistics. Date night on Fridays when possible.\n2. **Eileen Wells (Mother, 67, DOB February 14, 1959)**: Retired school secretary. Lives in the family home in North Newark with Patrick. Warm and worried. Calls Danny twice a week. Does not know about the fertility treatments; Danny and Priya agreed to keep it private until there is something to share.\n3. **Patrick Wells (Father, 69, DOB December 3, 1956)**: Retired NJ Transit bus driver. Shows love through presence: shows up to every family gathering, helps with house projects, does not talk about feelings directly. Danny resembles him more than either of them acknowledges.\n4. **Sean Wells (Brother, 36, DOB January 22, 1990)**: HVAC technician in Clifton, NJ. Married to Michelle, two kids (Liam 8, Colleen 4). Sean and Danny are close: beers, games, furniture-moving help. Sean having kids makes the fertility situation harder for Danny in ways he has not fully processed.\n5. **Shalini Menon (Mother-in-law, 68, DOB January 18, 1958)** and **Ravi Menon (Father-in-law, 70, DOB November 5, 1955)**: Live in Edison, NJ. Retired teacher (Shalini), retired pharmacist (Ravi). Warm, welcoming, slightly more hands-on than the Wells side. Monthly Sunday dinner at their house. They also do not know about the fertility treatments.\n6. **Danny Reese (Best friend, 40, DOB March 7, 1986)**: Works in commercial insurance. Friends since college. Monthly lunch in Newark, usually second Thursday at 12:30 PM. The one friend Danny has told about the fertility situation, carefully, with a request for total discretion.\n7. **Catherine Ware (Supervising Partner, 52)**: Head of commercial litigation at Oakbridge. Danny's mentor and the gatekeeper to partnership consideration. Demanding, fair, respects Danny's work. The relationship is professional-warm.\n8. **Dr. Angela Ferraro (Neurologist, 46)**: Garden State Neurology, Montclair. Manages Danny's chronic migraines. Appointments every 4 months.\n9. **Dr. Lisa Strand (Reproductive Endocrinologist, 50)**: Northern NJ Fertility Center, Morristown. Manages the fertility treatment. Appointments as needed during cycles.\n10. **Dr. Michael Costas (Primary care, 45)**: Montclair Family Practice. Annual physical.\n11. **Dr. Sarah Bellinger (Dentist)**: Montclair Dental Associates. Annual cleaning, scheduled each January.\n\n## Work & Projects\n\n- **Role**: Senior Associate, Commercial Litigation, Oakbridge Law (around 90 attorneys, Newark office). Focuses on breach of contract, business torts, and partnership disputes.\n- **Reports to**: Catherine Ware (Supervising Partner).\n- **Tenure**: 8 years at Oakbridge (started 2018, lateraled from a smaller firm). On track for partnership consideration in 2027 to 2028.\n- **Lead matter**: Meridian Properties v. Coastal Development (breach of contract, $4.2M dispute, trial prep Q3 2026).\n- **Second chair**: A partnership dissolution case currently in mediation.\n- **Supervises**: Two junior associates on document review projects.\n- **Schedule**: Mon to Fri, 8:30 AM to 6:00 PM ET minimum. Stays later during trial prep or briefing deadlines. In-office 4 days (Mon to Thu), remote Friday. 25-minute NJ Transit commute, Montclair to Newark.\n- **Firm tools (work laptop only)**: Outlook email, Clio case management, firm calendar.\n\n## Finance\n\n- **Income**: Salary $195,000 base. Annual bonus $20,000 to $40,000 (performance-based). Priya's salary $135,000.\n- **Combined monthly take-home**: About $17,800 (Danny about $10,500, Priya about $7,300).\n- **Monthly expenses**: Mortgage $3,200 (escrow included); utilities $340; groceries $720; Danny's BMW payment $520; Priya's Honda owned outright; car insurance $240; gas and transit $280; health insurance net $380; migraine-related (neuro copays, Rx amortized) $95; fertility treatment (IUI cycle amortized, partial Aetna coverage via Priya) $450; subscriptions $92; dining out $380; phone $120; personal spending $400; savings and investments $3,500. Total about $10,717.\n- **Monthly surplus**: About $7,083 flows to additional savings, IVF fund, travel, and discretionary.\n- **Savings**: Emergency fund $42,000 (joint, Ally high-yield). IVF fund $18,000 in a separate savings account, building in case IUI fails. IVF costs run $15K to $25K per cycle with partial insurance coverage. Both maxing 401(k) employer match. Roth IRA $7,000 each. Combined retirement about $320,000.\n- **Debt**: Mortgage $410,000 remaining (30-year fixed, 5.8%). Auto loan $22,000. Law school loans $38,000 (income-driven, refinanced at 4.2%). No credit card debt.\n- **Accounts**: Ally (joint checking, savings, IVF fund), Fidelity (401(k)s, IRAs), Chase Sapphire Preferred (paid monthly). Credit score about 780.\n\n## Health & Wellness\n\n- **Chronic migraine**: Diagnosed 2018. Average 2 to 3 migraines per month, some with aura. Triggers: sleep disruption, stress, weather pressure changes, aged cheese, processed meats and nitrates, red wine, dehydration. Severe episodes can last 12 to 24 hours and require a dark room and nausea care.\n- **Migraine management**: Sumatriptan 50mg PRN at onset and topiramate 50mg daily as preventive. Dr. Ferraro has discussed switching the preventive to a CGRP inhibitor (Aimovig, Ajovy, or Emgality) if frequency does not drop.\n- **Fertility**: Currently in IUI cycle 3 with Dr. Lisa Strand at Northern NJ Fertility Center. If unsuccessful, IVF consultation is scheduled for late summer 2026. Some months bring weekly appointments during active cycles.\n- **Medications and supplements**: Topiramate 50mg (daily, evening), sumatriptan 50mg (PRN at onset), CoQ10 200mg (daily, migraine support), magnesium glycinate 400mg (nightly), Vitamin D3 2000 IU (daily).\n- **Exercise**: Runs 3x per week, Tue/Thu/Sat (3 to 4 miles, Montclair neighborhood or Branch Brook Park). Weight training 3x per week, Mon/Wed/Fri, 45 minutes at Montclair Athletic Club before work. Weekend walks with Priya.\n- **Sleep**: 7-hour target. Bedtime 11:00 PM, alarm 6:00 AM. Sleep hygiene is migraine management. Blackout curtains in the master, no screens 30 minutes before bed.\n- **Dietary medical**: No afternoon caffeine; trigger foods listed above are avoided.\n\n## Interests & Hobbies\n\n- **Music**: Springsteen and the Jersey music tradition. Vinyl collection growing at home; Priya gave him a turntable for his birthday.\n- **Cooking**: Pasta from scratch using his grandmother's technique. Grilling on the patio at 73 Claremont.\n- **Sports fandom**: Giants football and Mets baseball. Watches with Sean or Danny Reese when possible. Fantasy football league with college friends.\n- **Fitness**: Running and weight training as both fitness and migraine management.\n- **Reading**: Legal thrillers, political nonfiction, and history. Two books a month on the iPad Kindle app. Currently reading \"The Arbitration\" by Thomas Kessler.\n\n## Home & Living\n\n- **Address**: 73 Claremont Avenue, Montclair, NJ 07042.\n- **Layout**: 3BR/2BA end-unit townhouse, about 1,600 sq ft, built 2005. Small backyard patio. Owned, purchased 2021. Third bedroom is currently a home office and may convert to a nursery.\n- **Setup**: Standing desk and dual monitors in the home office for remote Fridays. Blackout curtains in the master for migraine management. Well-equipped kitchen; both Danny and Priya cook.\n- **Cars**: 2023 BMW 330i (Danny, charcoal). 2022 Honda Accord Sport (Priya, white, owned outright).\n- **Commute**: 25-minute NJ Transit ride between Montclair and Newark on weekday mornings.\n\n## Devices & Services\n\n- **Phones**: iPhone 15 Pro (personal) and a firm-issued iPhone (work). Carries both.\n- **Computer**: MacBook Pro 14\" (firm-issued, used for personal tasks on remote Fridays). iPad for reading.\n- **Wearable**: Apple Watch Ultra. Fitness, notifications, migraine tracking.\n- **Streaming**: Netflix, Spotify Premium (family plan with Priya), HBO Max (Priya's account).\n- **Productivity**: Google Calendar and Gmail on the personal Google Workspace. Outlook and Clio on the firm laptop.\n- **Messaging**: WhatsApp for family chat and Priya. iMessage for friends.\n- **Fitness apps**: Strava (phone only). Apple Health on iPhone and Apple Watch.\n\n## Contacts\n\n| Name | Relationship | Phone | Email |\n|------|-------------|-------|-------|\n| Priya Menon-Wells | Wife | 973-555-0142 | priya.menon.wells@gmail.com |\n| Eileen Wells