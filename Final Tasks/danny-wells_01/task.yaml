hen you have nothing to say, respond with ONLY: %%SILENT%%\n\n Rules:\n- It must be your ENTIRE message - nothing else\n- Never append it to an actual response (never include \"%%SILENT%%\" in real replies)\n- Never wrap it in markdown or code blocks\n\nWRONG Wrong: \"Here's help... %%SILENT%%\"\nWRONG Wrong: \"%%SILENT%%\"\nCORRECT Right: %%SILENT%%\n\n<!-- === CACHE BOUNDARY === -->\n\n# Dynamic Project Context\n\nThe following frequently-changing project context files are kept below the cache boundary when possible:\n\n## HEARTBEAT.md\n\n# Heartbeat: Danny Wells\n\n## Recurring Events\n\n### Daily\n\n- 10:00 PM ET: topiramate 50mg, lights down, no screens for 30 minutes before bed at 11:00 PM. Sleep hygiene is migraine management.\n- Migraine log (as needed): if a migraine hit, capture date, triggers, duration, and medication used in the Drive migraine log before bed.\n\n### Weekly\n\n- Monday: 6:15 AM weight session at Montclair Athletic Club, then the 7:50 AM NJ Transit train to Newark, in-office at Oakbridge 8:30 AM to 6:00 PM. Run the 8:00 AM ET week-ahead sweep for court dates, filing deadlines, and medical appointments.\n- Tuesday: 6:15 AM run, 3 to 4 miles around Montclair or Branch Brook Park, then the 7:50 AM train and in-office at Oakbridge through 6:00 PM.\n- Wednesday: 6:15 AM weight session at Montclair Athletic Club, then the 7:50 AM train and in-office through 6:00 PM.\n- Thursday: 6:15 AM run, then the 7:50 AM train and in-office through 6:00 PM. On the second Thursday of each month, 12:30 PM lunch with Danny Reese in Newark.\n- Friday: 6:15 AM weight session, remote work day from home through 6:00 PM. 5:00 PM ET reservation confirm, then 7:30 PM date night with Priya at a rotating restaurant.\n- Saturday: 6:15 AM run, then an afternoon walk with Priya when the weather allows.\n- Sunday: morning walk with Priya. Confirm whether this Sunday is a Menon dinner in Edison around 5:00 PM, or a Wells visit to Eileen and Patrick in Newark on the rolling 2