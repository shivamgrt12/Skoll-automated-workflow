  ## Preferences

  - **News**: Mail & Guardian and Daily Maverick every morning before the show. Follows South African politics, the media industry, and Johannesburg city news closely.
  - **Music listening**: Latin jazz, salsa, cumbia, selective reggaeton, Afro-Latin fusion, neo-soul. Celia Cruz and Buena Vista Social Club classics.
  - **Podcasts**: The Broad Experience, Africa Daily, Radio Diaries. Listens during runs.
  - **Reading**: South African nonfiction (Mark Gevisser, Sisonke Msimang, Jonny Steinberg); fiction by Damon Galgut and Mohale Mashigo; industry reads on broadcast trends.
  - **Food**: Omnivore favoring home-cooked meals, adventurous with new restaurants. Favorites: arroz con pollo, empanadas (crispy edges, properly sealed, no leaking), tamales, arepas, tres leches cake. Carmen's sancocho is the ultimate comfort food; it simply tastes like home.
  - **Regular spots**: Cafe on 7th for morning coffee, Lucky Bean for brunch, Braam Social for dinners with Kagiso, Lakeside Kitchen at Zoo Lake for special occasions.
  - **Coffee**: Strong flat whites, 2 to 3 daily, beans from Roastsmith Coffee Co. She can tell a blend change by the first inhale.
  - **Drinks**: Social drinker. South African wine, favoring Pinotage and Chenin Blanc; occasional gin and tonic.
  - **Style**: Bold color and clean lines: African-print fabrics, structured jackets, intentional statement jewelry, South African designers mixed with altered thrift finds, and more leather boots than she would admit.
  - **Travel**: Travels to absorb rather than escape; cities with live music, street food, and complicated histories. Wishlist includes Nairobi, Havana, Lisbon, and Salvador da Bahia. Nervous flyer who manages with deep breathing and loud podcasts and needs the window seat. Within South Africa she drives.
  - **Comfort**: Heavy weeks end in sensory simplicity: hot shower, soft clothing, the couch, music low enough to be felt. No talking, no performing; people close to her recognize those evenings without being told. Slow weekend mornings are fiercely protected.
  - **Gifts**: Gives experiences: concert tickets, restaurant vouchers, spa days. For Carmen, always something practical and meaningful.
  - **Sensory world**: Sound dominates; she notices ambient noise the way a chef notices seasoning, and a too-loud restaurant ruins the meal. Drawn to natural fabrics and trusted touch. The gold late-afternoon Johannesburg light lands physically.
  - **Dislikes**: Interviewers who talk over their subjects, performative wokeness, unacknowledged lateness, unsolicited advice about her relationship timeline, corporate sponsorship language bleeding into editorial, her own recorded voice played back unexpectedly, and "where are you really from."
  - **Small joys**: The first sip of coffee in a dark kitchen, guests who surprise themselves, October jacaranda purple, rain on a tin roof (a Soweto childhood sound), finding an artist before anyone else, listeners calling in with unfindable stories, Kagiso's caught-off-guard laugh, and her mother saying her name the way only she does.

  ## HEARTBEAT.md

  # Heartbeat: Asha Gallegos

  ## Recurring Events

  ### Weekly

  - **Monday through Friday, 4:15 AM**: Show-day wake-up. Check overnight news before leaving, arrive at the station by 5:00 AM for prep, on air 6:00 to 9:00 AM.
  - **Monday, Wednesday, and Friday, 2:00 PM**: Afternoon run, usually the Emmarentia Dam loop, currently doubling as half-marathon training.
