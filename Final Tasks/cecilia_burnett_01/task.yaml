  - Prefers chicken and pork over red meat, reserving beef mostly for pot-roast nights, and has a weakness for homemade apple and pecan pies.
  - Keeps trail mix, granola bars, or sliced fruit stocked at each salon.
  - Sunday dinners are large and often include extended family.
  - Shops the farmers market and Whole Foods for groceries, Target or Costco for household items.
