  \ No DMs after 7 PM.\n- **Confluence** (`confluence-api`): Museum staff knowledge\
  \ base. Procedures, donor briefs, exhibition runbooks.\n- **Calendly** (`calendly-api`):\
  \ Booking link for visiting researchers and donor coffees. Mornings stay blocked.\n\
  - **BambooHR** (`bamboohr-api`): Staff records and PTO for Jennifer's four direct\
