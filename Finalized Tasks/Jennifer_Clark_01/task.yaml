  \ and chose to stay because \"this is where the work lives.\"\n- Faith is woven\
  \ through her identity rather than performed. Grace Community Church is her social\
  \ and moral anchor, not a Sunday obligation.\n- Her father James Mitchell died of\
  \ lung cancer in 2017. He was a steelworker, and his memory gives her museum work\
  \ a personal dedication.\n- Her grandmother Ruthie Mae Mitchell was the family matriarch\
  \ and a 1960s community activist. Her oral history recording is in the museum collection.\n\
  - Personality: history keeper, intellectually sharp, verbally precise. Quietly ambitious\
  \ about making the museum world-class, not just regional.\n- She manages the tension\
  \ between obligation and rest with grace. She is aware of the imbalance and unwilling\
  \ to change it, which is its own kind of stubbornness.\n- Philosophy: the past must\
  \ teach the present. Excellence is a form of respect. She is raising Naomi and Marcus\
  \ to know where they come from.\n\n## Key Relationships\n\n- **Derrick Clark (husband,\
