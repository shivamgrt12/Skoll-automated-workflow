  \ only inbox.\n\n## MEMORY.md\n\n# Memory: Jennifer Clark\n\n## Personal Profile\n\
  \n- Ethnicity: Black/African American. Maternal family roots in Birmingham going\
  \ back four generations; paternal family from rural Shelby County, Alabama. The\
