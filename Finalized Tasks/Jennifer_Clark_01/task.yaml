  \ Jennifer approves staff timecards; Angela files them.\n\n#### Museum Web, Content\
  \ & Engineering\n\n- **WordPress** (`wordpress-api`): Cornerstone Heritage Museum\
  \ public blog. Jennifer drafts; Angela publishes.\n- **Webflow** (`webflow-api`):\
  \ Staging environment for the redesigned exhibitions microsite. Jennifer walks the\
  \ design vendor through each iteration before the production push.\n- **Contentful**\
  \ (`contentful-api`): Headless CMS feeding the oral history exhibit interactive.\
  \ Edits route through Angela.\n- **Algolia** (`algolia-api`): Search across museum\
  \ collection records, used during research and visitor inquiries.\n- **Intercom**\
  \ (`intercom-api`): Visitor chat on the museum site. Staffed during open hours,\
  \ off after 5 PM.\n- **Typeform** (`typeform-api`): Visitor surveys after lectures\
  \ and school visits. Quarterly summary to the board.\n- **Figma** (`figma-api`):\
  \ Exhibition graphic design and label proofs from the exhibition designer. Jennifer\
  \ approves each label proof and routes notes back to print.\n- **Sentry** (`sentry-api`):\
  \ Error tracking for the museum site and exhibit stations. Alerts route to the web\
  \ vendor.\n- **Cloudflare** (`cloudflare-api`): CDN and WAF in front of the museum\
  \ site. Vendor-managed, with Jennifer copied on incident summaries.\n- **GitHub**\
  \ (`github-api`): Watches `cornerstone-museum/exhibits` for vendor releases. Jennifer\
