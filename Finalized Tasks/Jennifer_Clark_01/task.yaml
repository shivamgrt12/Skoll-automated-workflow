  \ PDFs, board packets, and Community Voices Choir competition tracks. Angela mirrors\
  \ the museum archive into it each Friday.\n- **Box** (`box-api`): Museum archive\
  \ mirror for high-resolution scans, accessed through Angela's shared folder.\n-\
  \ **OpenLibrary** (`openlibrary-api`): Source lookups for exhibition labels and\
  \ lecture prep. Jennifer cross-checks every citation before a wall panel goes to\
  \ print.\n- **NASA** (`nasa-api`): Imagery and education programming for the museum's\
  \ quarterly family STEM Saturdays.\n- **OpenWeather** (`openweather-api`): Choir\
  \ outdoor events, Friday night football, and the morning walk forecast.\n\n####\
  \ Project Management, Internal Comms & Staff Ops\n\n- **Asana** (`asana-api`): \"\
  Voices of the Past\" master tracker. Tasks owned by Angela; Jennifer reviews each\
