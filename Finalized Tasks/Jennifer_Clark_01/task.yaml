  \ (`gitlab-api`): Mirrors the digitization vendor's working repo. Jennifer checks\
  \ the weekly changelog against the National Preservation Grant fieldwork timeline.\n\
  \n#### Analytics & Infrastructure Ops\n\n- **Google Analytics** (`google-analytics-api`):\
  \ Museum site traffic and exhibition page funnels. Monthly summary to the board.\n\
  - **Mixpanel** (`mixpanel-api`): Interactive exhibit engagement, kiosk session length,\
  \ and station drop-off.\n- **Amplitude** (`amplitude-api`): Cross-cohort engagement\
  \ for school field trip portal users.\n- **PostHog** (`posthog-api`): Self-hosted\
  \ analytics for the oral history stations on the gallery floor.\n- **Segment** (`segment-api`):\
  \ Event pipeline routing exhibit telemetry into the museum's analytics stack.\n\
  - **Datadog** (`datadog-api`): Infrastructure monitoring for the kiosks and the\
  \ donation portal.\n- **Kubernetes** (`kubernetes-api`): Container orchestration\
