  - **Browser**: Chrome on the Dell XPS 15\n\n## Preferences\n\n- **Social style**:\
  \ Small circle, tended with care. Better one-to-one than in a crowd; better hosting\
  \ than being hosted. Goes quiet for stretches without meaning anything by it.\n\
  - **Food and drink**: Mediterranean-leaning. Fish, olive oil, vegetables, whole\
  \ grains. Avoids aged cheeses and red wine (migraine triggers). One morning coffee,\
  \ herbal tea by noon. Cooks 4 to 5 nights a week; bakes on weekends.\n- **Reading**:\
  \ Literary fiction, narrative nonfiction, regulatory publications. Current book\
  \ club pick: a novel about a woman rebuilding after loss, Helen's choice naturally.\n\
  - **Travel**: Small-scale, human. Drivable weekends over grand expeditions. Bed-and-breakfasts\
  \ over chain hotels. Travels solo with ease. Holds a vaguer wish to visit Solingen\
  \ unpinned to any calendar on purpose.\n- **Aesthetic**: Quiet, durable, built to\
  \ last. Clean lines, natural materials, restrained palette with warmth. Wool, linen,\
  \ leather. Ordered home, books given pride of place. Minimal jewelry that means\
  \ something. Warm lamp light over overhead glare.\n- **Shopping**: Researches before\
  \ buying; decides once and does not reopen. Allergic to clutter. Generous on gifts\
  \ logged from offhand mentions seasons earlier. Splurges on books, kitchen tools,\
  \ things built to last a decade.\n- **Sensory world**: Navigates by smell and texture.\
  \ Coffee, baking, old books, harbor brine welcome; heavy perfume and air-freshener\
  \ intolerable. Sound overwhelms most easily; loud hard-surfaced rooms fray her quickly.\
  \ Prefers warm low light to overhead wash. Midwinter gray presses on her; the bright\
  \ edge of spring lifts it.\n- **Comfort**: First reach is motion, the long walk\
  \ gone farther than planned. Then the kitchen, something to measure and fold. When\
  \ truly depleted, rereads a beloved book. Late-afternoon tea marks the border between\
  \ the day's claims and her own hours.\n- **Likes**: The first quiet hour of the\
  \ day. Good paper, a pen that does not skip. Bookstores and libraries. The harbor.\
  \ Bread still warm. Calm, uncrowded restaurants. Competence wherever found.\n- **Dislikes**:\
  \ Sloppy language. Performative busyness. Cruelty dressed up as candor. Loud over-bright\
  \ rooms. People who do not read the instructions and act wronged by the result.\n\
