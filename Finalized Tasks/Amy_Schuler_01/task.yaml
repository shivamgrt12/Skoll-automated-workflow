  \ Mark uses. Off-limits without exception.\n\n## MEMORY.md\n\n# Memory: Amy Schuler\n\
  \n## Personal Profile\n\nBorn Amy Renate Hoffmann in Baltimore, Maryland, on November\
  \ 12, 1965, the only child of Erich Hoffmann (1939 to 2011), a Maryland public-school\
  \ history teacher, and Margarethe Hoffmann née Sauer (1942 to 2018), a Baltimore\
  \ librarian and the carrier of the German-American thread that still surfaces in\
  \ Amy's holiday kitchen. Amy took Schuler at her 1994 marriage and kept it through\
  \ the 2020 divorce, partly out of inertia and partly because changing it back would\
  \ have meant signaling something to Hanna she did not want to signal. Pronouns:\
  \ she/her. Languages: English natively; conversational German at the kitchen-table\
  \ level inherited through her grandmother Hannelore Sauer.\n\nShe is a Baltimorean\
  \ to the bone, the kind earned by a lifetime in the place. The flattened vowels\
  \ she trained out of her work voice, the loyalty to a city outsiders write off,\
  \ the sense that the harbor and the row houses and the particular gray of the winters\
  \ are simply what the world is supposed to look like. The German thread has thinned\
  \ with the generations and she feels it thin most around the holidays.\n\nShe holds\
  \ a B.A. in Political Science from Chesapeake State University (1988) and an MBA\
  \ with a compliance focus from Bayside Graduate School of Business (1995, evening\
  \ program while she worked). She also holds the Certified Regulatory Compliance\
  \ Manager (CRCM) credential, earned through the American Bankers Association in\
  \ 2010 and maintained through continuing education since.\n\nAmy meets the world\
  \ with a stillness most read as confidence; the stillness is where she does her\
  \ thinking, and she would rather be thought aloof than caught speaking before she\
  \ is sure. She has a long fuse and a longer memory. She does not erupt; what she\
  \ does instead is go cool, and people who have felt the cooling describe it as worse\
  \ than anger. Being rushed undoes her; given time she is deliberate and sure, deprived\
  \ of it she gets brittle. Her creed: attention is the truest form of care; reliability\
  \ is moral; the small kept promise outweighs the large unkept one. She holds privacy\
  \ as near sacred, would rather be slowly trusted than quickly liked, and lives with\
  \ a self-sufficiency she cannot always tell from strength. The estrangement from\
  \ her son Kyle is the unresolved thing she circles.\n\n## Key Relationships\n\n\
  - **Kyle Schuler, son**. DOB February 14, 1995; age 31. Estranged. Philadelphia;\
  \ commercial real estate. Sided with his father after the 2020 divorce. Last real\
  \ conversation Christmas 2023, ended in an argument about the settlement. Stopped\
  \ returning calls. Amy mailed a birthday card February 2026; no response. The wound\
  \ she carries most carefully and talks about least.\n- **Hanna Schuler, daughter**.\
  \ DOB June 19, 1997; age 28 (turns 29 on June 19, 2026). Baltimore; graphic designer\
  \ at Fulcrum Creative. Maintained both parental relationships after the divorce;\
  \ the unofficial mediator between Amy and Kyle. Dinner with Amy every other Sunday\
  \ at 6:00 PM. **Holds Amy's medical proxy and durable financial POA; primary emergency\
  \ contact.** WhatsApp for short threads, email for anything substantive.\n- **Mark\
  \ Schuler, ex-husband**. DOB October 22, 1964; age 61. Divorced 2020 after 26 years.\
  \ Commercial real estate developer in Baltimore. Zero contact; unresolved resentment.\n\
  - **Miriam Osei, best friend**. DOB March 14, 1969; age 57. Retired Baltimore County\
  \ school administrator. Towson. Friends since their kids were in elementary school.\
  \ The person Amy calls when struggling. **Secondary emergency contact.** Standing\
  \ Saturday coffee, 10:00 AM, rotating locations.\n- **Adrienne Colbert, colleague\
  \ and friend**. DOB November 30, 1973; age 52. Deputy General Counsel at Harborfield.\
  \ Daily lunch; institutional gossip. **Internal escalation contact for Harborfield\
  \ matters.**\n- **Helen Tsai, book club friend**. DOB September 8, 1962; age 63.\
  \ Retired English professor (Loyola Maryland). Runs the 8-year book club; picks\
  \ most of the books.\n- **Erich Hoffmann, father (deceased)**. DOB March 8, 1939;\
  \ d. November 4, 2011, age 72, stroke. Maryland public-school history teacher. Loudon\
  \ Park Cemetery, Baltimore.\n- **Margarethe Hoffmann née Sauer, mother (deceased)**.\
  \ DOB December 17, 1942; d. December 17, 2018, on her 76th birthday, pancreatic\
  \ cancer. Baltimore librarian; bearer of the German thread. Buried with Erich.\n\
  - **Hannelore Sauer, maternal grandmother (d. 1991)**. The German-speaking grandmother\
  \ whose accent and recipes still carry. Born Solingen, North Rhine-Westphalia; emigrated\
  \ 1947.\n- **Ingrid Schuler, former mother-in-law**. Cordial. Holiday cards and\
  \ the occasional call.\n- **Patricia Hale, 4th-floor neighbor**. Friendly; watches\
  \ each other's packages.\n- **Janet Yoo, Pilates instructor at Forma Studio**. Knows\
  \ Amy's left knee history.\n- **Siblings**: none. Amy is an only child.\n\n## Work\
  \ & Projects\n\nEmployer: Harborfield Financial Group, a mid-size Baltimore financial\
  \ services firm (~400 employees). Role: Director of Compliance, reporting to the\
  \ Chief Legal Officer. Manages four compliance analysts; owns regulatory filings,\
  \ audit coordination, internal policy enforcement, and training. Tenure 11 years\
  \ (hired 2015 as Compliance Manager; promoted to Director January 2021). Work email\
  \ `aschuler@harborfield.com` is not connected to OpenClaw. Hours Monday to Friday,\
  \ 8:00 AM to 5:30 PM, with occasional evening work before audit deadlines. Structured,\
  \ methodical, documentation-heavy; known for catching errors others miss. Current\
  \ major deliverable: a regulatory-updates panel for the Mid-Atlantic Compliance\
  \ Conference.\n\nCareer before Harborfield (continuous):\n- **1988 to 1991**: Legislative\
  \ aide, Maryland State Senate banking and consumer-finance subcommittee, Annapolis.\
  \ First job out of Chesapeake State.\n- **1991 to 1995**: Compliance assistant,\
  \ Patapsco Federal Savings (Baltimore community bank). Concurrent evening MBA at\
  \ Bayside, 1993 to 1995.\n- **1995 to 2007**: Compliance Officer then Senior Compliance\
  \ Officer (2002), Patapsco / Mid-Atlantic Bancorp.\n- **2007 to 2015**: Compliance\
  \ Manager, Pratt Street Securities (Baltimore broker-dealer). Three FINRA examinations\
  \ clean.\n- **2015 to present**: Harborfield (Compliance Manager 2015 to 2021; Director\
  \ 2021 to present).\n\nOutside Harborfield she sits on the board of the Baltimore\
  \ Literacy Foundation, a volunteer commitment of roughly four hours a month. She\
  \ is the board treasurer in fact if not in title, reviewing quarterly financials,\
  \ and the annual gala is her largest yearly board responsibility.\n\n## Finance\n\
