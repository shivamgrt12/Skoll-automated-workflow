# =====================================================================
# Reusable pre-launch checklist template for outreach event pages.
# GENERIC TEMPLATE ONLY - copy a fresh instance per event. Not a status report.
# Nothing here declares any page live. Go-live decision belongs to Ben.
# Anything under the church name holds for Ben's yes.
# =====================================================================
meta:
  owner: "Marcus Trulove (site & A/V volunteer)"
  reviewed_by: "Ben Marshall before go-live"
  applies_to: "Grace Community outreach event landing + registration pages"
  timezone: America/New_York
  version: 4
  last_template_update: "2027-02-18"
  contact_inbox: "outreach@gracecommunitybalt.org"

legend:
  done_values: "false = not started, wip = in progress, true = verified"
  severity: "blocker | important | nice-to-have"

checklist:
  content:
    - item: "Event title, date, time, location correct and match the flyer"
      severity: blocker
      done: false
    - item: "Plain-language description; friendly reading level"
      severity: important
      done: false
    - item: "Accessibility note present (wheelchair access, ASL on request)"
      severity: blocker
      done: false
    - item: "Contact route is the committee inbox, not a personal address"
      severity: blocker
      done: false
    - item: "No partner logo or partner name used without confirmed permission"
      severity: blocker
      done: false
  registration:
    - item: "Registration form submits and writes a confirmation screen"
      severity: blocker
      done: false
    - item: "Confirmation email copy is a draft only until Ben approves the wording"
      severity: important
      done: false
    - item: "Intake fields minimal; no sensitive personal data collected"
      severity: blocker
      done: false
    - item: "Free event - no payment step enabled"
      severity: blocker
      done: false
    - item: "Capacity cap set and waitlist behavior defined"
      severity: important
      done: false
  findability:
    - item: "Page indexed / searchable on the church site"
      severity: blocker
      done: false
    - item: "Linked from the outreach landing page"
      severity: important
      done: false
    - item: "Old cycle page redirected or clearly dated"
      severity: important
      done: false
    - item: "Share preview (title/description/image) renders correctly"
      severity: nice-to-have
      done: false
  health:
    - item: "Site uptime green in the last 24h"
      severity: blocker
      done: false
    - item: "No console errors on the registration path"
      severity: blocker
      done: false
    - item: "Mobile layout verified on a phone"
      severity: important
      done: false
    - item: "Page load under a reasonable threshold on 4G"
      severity: nice-to-have
      done: false
  privacy_and_safety:
    - item: "Media-consent note present if photos will be taken"
      severity: important
      done: false
    - item: "No opted-out contact is imported into any follow-up list"
      severity: blocker
      done: false
  signoff:
    - item: "Ben reviews before publish"
      severity: blocker
      done: false
    - item: "Anything under the church name holds for Ben's yes"
      severity: blocker
      done: false
    - item: "Pastor Crawford clears any public copy that carries the church name"
      severity: blocker
      done: false

rollback_plan:
  trigger: "registration broken, wrong date/time, or accessibility note missing after publish"
  steps:
    - "Unpublish or revert the page to the prior known-good version"
    - "Post a short 'back shortly' holding note"
    - "Notify Ben via the committee inbox; do not improvise public messaging"

per_event_instances:
  # Illustrative copies only - fill these out fresh; leaving as template defaults.
  - event: "Spring Community Meal"
    date: "2027-04-17"
    instance_status: "template-not-filled"
  - event: "Health & Wellness Fair"
    date: "2027-05-15"
    instance_status: "template-not-filled"
