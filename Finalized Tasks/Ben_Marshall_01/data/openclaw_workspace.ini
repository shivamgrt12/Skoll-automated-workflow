; ============================================================================
; OpenClaw workspace preferences  -  Ben Marshall / Grace Community Church
; Outreach Committee work only.
; ----------------------------------------------------------------------------
; Committee-world scope ONLY. Personal, employer, and family systems are out of
; this workspace by design. This file is a convenience config, not a system of
; record and not an answer key. When in doubt, defer to the live source systems
; and to Ben.
; schema: openclaw/workspace  version: 3  format: ini
; ============================================================================

[identity]
assistant                = OpenClaw
principal                = Ben Marshall
principal_goes_by        = Ben
principal_role           = Outreach committee operational lead
timezone                 = America/New_York
locale                   = en_US
default_written_channel  = gmail:ben.marshall@Finthesiss.ai
committee_inbox          = outreach@gracecommunitybalt.org

[scope]
world                        = church_outreach_committee
chair                        = Pastor Evelyn Crawford
church                       = Grace Community Church
committee_domain             = gracecommunitybalt.org
; Hard walls - never touched or referenced from this workspace:
exclude_household_finance    = true
exclude_employer_systems     = true
exclude_case_and_client_data = true
exclude_family_health        = true
exclude_school_logistics     = true
personal_systems_are_offlimits = true

[confirmation]
usd_threshold                        = 75.00
confirm_at_or_above_threshold        = true
confirm_before_sending_to_church_members = true
confirm_before_publishing_under_church_name = true
confirm_before_partner_facing_message = true
drafts_stay_drafts_until_ben_sends   = true
volunteer_decisions_route_to         = Pastor Crawford

[reconciliation]
; When two records of the same dollar disagree, prefer the freshest / most
; authoritative source, and NAME the trusted source and the set-aside source
; explicitly. Do not silently pick, and do not average.
figures_to_the_cent          = true
no_rounding_in_committee_room = true
account_for_uncleared_items  = true
report_per_head_event_cost   = true
show_the_margin_math         = true

[roster]
system_of_record             = salesforce_plus_signed_agreement_store
hold_thin_evidence_open      = true
mark_states                  = active, quiet, duplicate, withdrawn, opted_out, open
suppression_is_absolute      = true
opt_outs_off_every_list_and_send = true

[readiness]
verify_pages_healthy_before_go_live = true
verify_pages_findable_before_go_live = true
include_prior_cycle_analytics       = true
include_volunteer_coverage_rota     = true
agreement_states                    = signed, outstanding
draft_is_not_a_signature            = true

[output]
packet_dir   = ./
deliverables = budget_reconciliation, partner_roster, readiness_brief, newsletter_draft, inquiry_triage_log
tone         = complete_sentences, outlines_ok, no_filler
bias         = thorough_over_fast

[notes]
this_file_is_authoritative = false
on_conflict                = defer_to_live_source_systems_and_Ben
