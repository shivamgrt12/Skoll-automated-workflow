  # Memory: Andrew Pham\n\n## Personal Profile\n\nAndrew is the son of a Saigon woman,\
  \ Hoa, who took the long road to Houston, and a father who died when he was still\
  \ in elementary school. The Vietnamese-American identity is the structure of his\
  \ interior life, not a hyphen he holds at arm's length. He has spent his early fifties\
  \ figuring out how to pass it to children who grew up American in a way he did not.\
  \ Lily speaks Vietnamese fluently and tells him she dreams in it. Marcus understands\
  \ more than he speaks; Andrew has learned not to push, because pushing has historically\
  \ backfired.\n\nHe holds authority that nobody questions and warmth that nobody\
  \ resists, and the two are the same instrument played in different registers. He\
  \ learned over twenty-four years in education that timing is the difference between\
  \ a hard truth that lands and a hard truth that sets the room against you. When\
  \ he is right, he says so without flourish. When he is wrong, he says that with\
  \ even less.\n\nThere is a tension at his center he does not want to resolve: the\
  \ bureaucratic warrior who can shred a district memo at 9 AM and the cultural keeper\
  \ who lights incense for his ancestors that evening. He intends to keep both, and\
  \ to make them visible to his kids.\n\nHe carries the role of his mother's caretaker\
  \ without complaint and without theatrics. Friends who try to flatter him on how\
  \ nobly he is handling it get the same answer in different words: she did this for\
  \ me, and I am doing this for her, and the math is simple. He is not depressed about\
  \ it. He does not pretend it is not hard.\n\nHis faith is pragmatic. He goes to\
  \ Jade Lotus Buddhist Temple the way other people go to therapy, not for instruction\
  \ but for the resetting. He lights incense at the family altar on the lunar 1st\
  \ and 15th without thinking about whether he believes the metaphysics, because the\
  \ practice is its own answer. Tet is the year's gravitational center for him. He\
  \ has tried to teach his children that the labor is the celebration, and he believes\
  \ it has mostly worked.\n\nHis humor is bold and well-timed. He laughs from somewhere\
  \ deep and uses laughter the way good doctors use anesthetic, to keep the patient\
  \ in the room long enough to do the work. He believes that family is a verb and\
  \ that culture is something you do, not something you have, and he is willing to\
  \ lose that argument out loud while still holding the position privately.\n\n**Education**:\
  \ BA Education, Pacific Coast State University. MEd Educational Leadership, Gulf\
  \ Coast University, 2004.\n\n## Key Relationships\n\n- **Hoa Pham (mother)**, 78,\
  \ DOB March 15, 1948. Lives with Andrew, retired seamstress, early-stage dementia\
  \ diagnosed 2024. Needs daily supervision during school hours. Andrew speaks only\
  \ Vietnamese with her. She still notices the roses from her window.\n- **Michelle\
  \ Nguyen (ex-wife)**, 54, DOB October 22, 1971. Amicable divorce 2018, lives in\
  \ Katy, petroleum engineer at Brazos Energy Corp. Co-parenting friendship is healthier\
  \ than the marriage was. Contributes $800/month to Hoa's care per agreement.\n-\
  \ **Lily Pham (daughter)**, 26, DOB May 8, 2000. Second-year law student at Magnolia\
  \ School of Law in Houston. Driven, close to Andrew. Designated HCPOA and durable\
  \ financial POA for Andrew. Second person, after Danny, he lets see the slowness\
  \ underneath.\n- **Marcus Pham (son)**, 23, DOB February 14, 2003. Graphic designer\
  \ at Ironworks Creative Agency in Austin. Laid-back, calls every Sunday. Andrew\
  \ drives to Austin on whims.\n- **Danny Tran (best friend)**, 53, DOB April 18,\
  \ 1973. Nurse at Citrine Wellness Medical. Friends since high school. Godfather\
  \ to Lily. Backup medical proxy for Andrew. Loud, unguarded friendship, three and\
  \ a half decades of mutual roasting.\n- **Thay Duc Vo**, 62, monk at Jade Lotus\
  \ Buddhist Temple, spiritual advisor, knows the family well.\n- **Minh Le (music\
  \ director)**, 58, founded Golden Phoenix Ensemble, dan bau player, retired music\
  \ teacher.\n- **Kevin Park (assistant principal)**, 44, Andrew's right hand at Lone\
  \ Star Academy, handles discipline and testing logistics.\n- **Jamal Washington\
  \ (assistant principal)**, second AP, paired with Kevin Park.\n- **Kim Hoang (home\
  \ caregiver)**, 35, watches Hoa weekdays 7 AM to 4 PM, reliable and kind.\n- **Dr.\
  \ Patricia Sandoval**, 60, Hoa's neurologist at Houston Memory Center, quarterly\
  \ visits.\n- **Superintendent Alan Marsh**, 57, Crescent Oaks ISD, Andrew's direct\
  \ supervisor.\n- **Angela Brooks**, PTA president at Lone Star Academy, active and\
  \ supportive.\n- **Great-aunt (deceased)**: taught Andrew the dan tranh; came to\
  \ Houston in the late seventies. Her belief that the strings remember who you are\
  \ is the principle he has carried longest.\n\n## Work & Projects\n\nLone Star Academy\
  \ is a Title I middle school of about 800 students (grades 6 to 8) in Crescent Oaks\
  \ ISD, Houston. Andrew is in his 8th year as principal, 24th year in education total.\
  \ Staff: 62 teachers, 4 counselors, 2 APs (Kevin Park, Jamal Washington), front\
  \ office team of 3.\n\nCurrent initiatives: dual-language education expansion, after-school\
  \ Vietnamese music program (Andrew founded it), STEM lab renovation. School rating\
  \ Met Standard; pushing for Distinction in the upcoming accountability cycle.\n\n\
  He has watched too many students get written off too early. He says, often, that\
  \ the school's job is to hold a higher opinion of the student than the student currently\
  \ holds of themselves, and to wait for the student to grow into it.\n\nGolden Phoenix\
  \ Ensemble: lead vocalist and dan tranh player. Repertoire is nhac tru tinh, cai\
  \ luong, and Vietnamese folk. Standing 1st-Saturday booking at Lotus Garden restaurant.\
  \ Rehearsals at Minh Le's studio Tuesdays and Thursdays.\n\n## Finance\n\n- Salary:\
  \ $98,500/year (principal, Crescent Oaks ISD).\n- Ensemble income: about $8,000/year\
  \ (gigs $300 to $600 per event).\n- Mortgage: $1,380/month (3-bedroom brick ranch,\
  \ Midtown, 30-year at 4.9%).\n- Car: 2021 Honda CR-V, paid off.\n- Hoa's care: Kim\
  \ Hoang $2,400/month; neurologist copays about $150/quarter; medications about $85/month.\n\
  - Michelle pays $800/month toward Hoa's care per divorce agreement.\n- Lily's law\
  \ school: Andrew contributes $500/month (Lily has loans for the rest).\n- Temple\
  \ donation: $200/month to Jade Lotus Buddhist Temple.\n- TRS pension: 24 years vested,\
  \ projected $4,200/month at retirement (age 62).\n- 403(b): $67,000 balance, contributing\
  \ $400/month through Crescent Oaks ISD.\n- Emergency fund: $9,400 in Ally HYSA at\
  \ 4.2%.\n- Credit cards: Chase Freedom ($1,200 balance, paying down); Capital One\
  \ ($0 balance).\n- Groceries about $600/month; gas about $180; phone $95 (T-Mobile\
  \ family plan with Marcus); internet $75 (Xfinity).\n\nHe is frugal in the old-country\
  \ way and generous in the long-term way. He drives cars until they die, repairs\
  \ shoes, buys ingredients in bulk, has worn the same watch for eleven years. He\
  \ gives without negotiation to the temple, to Hoa's care, to Lily's law school,\
  \ and quietly through Kevin Park to students at Lone Star whose families he sees\
  \ struggling. He researches purchases over $100 and writes notes to himself before\
  \ deciding. He prefers small Vietnamese-American businesses even when they cost\
  \ more.\n\n## Health & Wellness\n\n- Prediabetic, A1C 5.9; quarterly bloodwork with\
  \ Dr. Elena Fuentes at Midtown Family Clinic.\n- Annual physical with Dr. Elena\
  \ Fuentes; last January 2026, next due January 2027.\n- Left knee pain from years\
  \ of standing; cortisone shot October 2025; physical therapy 1x/week at Midtown\
  \ Sports Medicine.\n- Sleep 10 PM to 5 AM; light sleeper since Hoa moved in; baby\
  \ monitor in Hoa's room.\n- Eye exam with Dr. Robert Kim, Westside Vision; progressive\
  \ lenses since 2023.\n- Stress management: morning walks, meditation, singing. Refuses\
  \ anxiety medication.\n- Medically relevant diet for Hoa: low-sodium, no red meat\
  \ per cardiologist; Andrew cooks her food separately.\n- Hoa's medications: donepezil\
  \ 10mg, lisinopril 20mg, baby aspirin. Andrew manages the pill organizer weekly.\n\
  \n## Interests & Hobbies\n\n- **Dan tranh**: the older love, learned from his great-aunt.\
  \ Instrument lives on a stand his daughter built him for a birthday. He tunes it\
  \ bridge by bridge every rehearsal evening.\n- **Voice**: nhac tru tinh especially.\
  \ Stopped apologizing for the size of his voice in his forties. Sings at Jade Lotus\
  \ Buddhist Temple, occasional soloist at Vu Lan and Tet.\n- **Cooking**: pho on\
  \ Sunday mornings the way his grandmother made it, broth started Saturday night,\
  \ spices toasted dry first, bones never rushed. Banh chung at Tet (200+ pieces with\
  \ family). Bun bo Hue from his grandmother's recipe.\n- **Garden**: lemongrass,\
  \ cilantro replanted every six weeks, Thai basil that bolts in August, galangal\
  \ that is the same plant for nine years, roses that were his mother's idea.\n- **Morning\
  \ walk**: 5:15 AM, three miles, same route, before sunrise. The day's first negotiation\
  \ with himself. He has rehearsed difficult conversations on it and cried on it twice\
  \ that anyone knows about.\n- **Reading**: Ocean Vuong, Viet Thanh Nguyen, educational\
  \ leadership. Currently reading \"Culturally Responsive Teaching and the Brain.\"\
  \n- **Temple community choir**: regular service plus solo features.\n\n## Home &\
  \ Living\n\n3-bedroom brick ranch in Midtown, Houston. The living room is built\
  \ around the dan tranh on its stand, the family altar against the east wall, and\
  \ a long sofa that has hosted more student-teacher consultations than he can count.\
  \ Walls are warm cream. Art is small and personal: calligraphy from the temple monk,\
  \ a framed photo of Hoa as a young woman in Saigon, Marcus's first published illustration\
  \ mounted simply.\n\nThe kitchen is the room he has invested in most: double oven,\
  \ wok rotation, his grandmother's mortar and pestle with a hairline crack she gave\
  \ it forty years ago. Backyard: herb garden, rose bushes, covered patio with string\
  \ lights for family gatherings. Third bedroom converted for Hoa. Vehicle: 2021 Honda\
  \ CR-V; survives Houston summer asphalt, carries the dan tranh in its case, carries\
  \ Hoa to her appointments without forcing her to climb.\n\nTwo cats: Meo (calico,\
  \ 6) and Boba (orange tabby, 3).\n\n## Devices & Services\n\n- iPhone 15.\n- 13-inch\
  \ MacBook Air (M2 chip).\n- iPad (10th generation).\n- Google Workspace personal\
  \ account at andrew.pham@Finthesiss.ai.\n- Facebook account, used as admin of the\
